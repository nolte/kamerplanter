apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: homeassistant
  labels:
    app.kubernetes.io/name: homeassistant
    app.kubernetes.io/part-of: kamerplanter
spec:
  serviceName: homeassistant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homeassistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homeassistant
        app.kubernetes.io/part-of: kamerplanter
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.37
          command: ["sh", "-c", "cp /config-seed/configuration.yaml /config/configuration.yaml"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-seed
              mountPath: /config-seed
        - name: copy-ha-integration
          image: kamerplanter-ha-integration
          command:
            - sh
            - -c
            - |
              rm -rf /config/custom_components/kamerplanter/__pycache__
              cp -r /ha-integration/custom_components /config/
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: homeassistant
          image: ghcr.io/home-assistant/home-assistant:2026.3.0
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Berlin
          livenessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 70
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config-seed
          configMap:
            name: homeassistant-config
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
