apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kamerplanter-arangodb.fullname" . }}
  labels:
    {{- include "kamerplanter-arangodb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "kamerplanter-arangodb.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "kamerplanter-arangodb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kamerplanter-arangodb.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: arangodb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8529
              protocol: TCP
          env:
            - name: ARANGO_ROOT_PASSWORD
              value: {{ .Values.rootPassword | quote }}
          livenessProbe:
            httpGet:
              path: /_api/version
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /_api/version
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/arangodb3
          {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
