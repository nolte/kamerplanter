replicaCount: 2

image:
  repository: kamerplanter-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

env:
  ARANGODB_HOST: kamerplanter-arangodb
  ARANGODB_PORT: "8529"
  ARANGODB_DATABASE: kamerplanter
  ARANGODB_USERNAME: root
  ARANGODB_PASSWORD: rootpassword
  REDIS_URL: redis://redis-master:6379/0
  CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8080"]'
  DEBUG: "false"

probes:
  liveness:
    path: /api/v1/health/live
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /api/v1/health/ready
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
