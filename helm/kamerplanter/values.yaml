# -- Default pod-level security context applied to all controllers (SEC-M-004)
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

controllers:
  backend:
    type: deployment
    replicas: 1
    strategy: RollingUpdate
    rollingUpdate:
      surge: 1
      unavailable: 0
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
    containers:
      main:
        image:
          repository: ghcr.io/nolte/kamerplanter-backend
          tag: latest
          pullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
          ARANGODB_HOST: kamerplanter-arangodb
          ARANGODB_PORT: "8529"
          ARANGODB_DATABASE: kamerplanter
          ARANGODB_USERNAME: root
          ARANGODB_PASSWORD: rootpassword
          REDIS_URL: redis://kamerplanter-valkey:6379/0
          CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8080"]'
          DEBUG: "false"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/health/live
                port: &backend-port 8000
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/health/ready
                port: *backend-port
              initialDelaySeconds: 10
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 3
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi

  frontend:
    type: deployment
    replicas: 1
    strategy: RollingUpdate
    rollingUpdate:
      surge: 1
      unavailable: 0
    pod:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
    containers:
      main:
        image:
          repository: ghcr.io/nolte/kamerplanter-frontend
          tag: latest
          pullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
          VITE_BACKEND_URL: "http://kamerplanter-backend:8000"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: &frontend-port 80
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *frontend-port
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  arangodb:
    type: statefulset
    replicas: 1
    pod:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
    containers:
      main:
        image:
          repository: arangodb
          tag: "3.12.8"
          pullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
          ARANGO_ROOT_PASSWORD: rootpassword
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /_api/version
                port: &arangodb-port 8529
                httpHeaders:
                  - name: Authorization
                    value: Basic cm9vdDpyb290cGFzc3dvcmQ=
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /_api/version
                port: *arangodb-port
                httpHeaders:
                  - name: Authorization
                    value: Basic cm9vdDpyb290cGFzc3dvcmQ=
              initialDelaySeconds: 15
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
    statefulset:
      volumeClaimTemplates:
        - name: data
          accessMode: ReadWriteOnce
          size: 5Gi
          globalMounts:
            - path: /var/lib/arangodb3

configMaps:
  frontend-nginx:
    enabled: true
    data:
      default.conf: |
        server {
            listen 80;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;

            location / {
                try_files $uri $uri/ /index.html;
            }

            location /api/ {
                proxy_pass http://kamerplanter-backend:8000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Runtime config — never cache (regenerated on each container start)
            location = /runtime-config.js {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

service:
  backend:
    controller: backend
    ports:
      http:
        port: 8000
  frontend:
    controller: frontend
    ports:
      http:
        port: 80
  arangodb:
    controller: arangodb
    ports:
      http:
        port: 8529

persistence:
  nginx-config:
    enabled: true
    type: configMap
    identifier: frontend-nginx
    advancedMounts:
      frontend:
        main:
          - path: /etc/nginx/conf.d/default.conf
            subPath: default.conf
            readOnly: true

  # -- tmpfs mounts for readOnlyRootFilesystem support (SEC-M-004)
  nginx-cache:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 64Mi
    advancedMounts:
      frontend:
        main:
          - path: /var/cache/nginx

  nginx-run:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 1Mi
    advancedMounts:
      frontend:
        main:
          - path: /var/run

  nginx-tmp:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Mi
    advancedMounts:
      frontend:
        main:
          - path: /tmp

  backend-tmp:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 64Mi
    advancedMounts:
      backend:
        main:
          - path: /tmp

ingress: {}

valkey:
  dataStorage:
    enabled: true
    size: 1Gi
