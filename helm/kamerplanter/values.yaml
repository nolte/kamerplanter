# -- Default pod-level security context applied to all controllers (SEC-M-004)
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

controllers:
  backend:
    type: deployment
    replicas: 1
    strategy: RollingUpdate
    rollingUpdate:
      surge: 1
      unavailable: 0
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
    containers:
      main:
        image:
          repository: ghcr.io/nolte/kamerplanter-backend
          tag: latest
          pullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
          ARANGODB_HOST: kamerplanter-arangodb
          ARANGODB_PORT: "8529"
          ARANGODB_DATABASE: kamerplanter
          ARANGODB_USERNAME: root
          ARANGODB_PASSWORD: rootpassword
          REDIS_URL: redis://kamerplanter-valkey:6379/0
          CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8080"]'
          DEBUG: "false"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/health/live
                port: &backend-port 8000
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/health/ready
                port: *backend-port
              initialDelaySeconds: 10
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 3
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi

  frontend:
    type: deployment
    replicas: 1
    strategy: RollingUpdate
    rollingUpdate:
      surge: 1
      unavailable: 0
    pod:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
    initContainers:
      init-runtime-config:
        image:
          repository: ghcr.io/nolte/kamerplanter-frontend
          tag: latest
          pullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        command: ["sh", "-c"]
        args:
          - |
            cat <<EOF > /runtime-config/runtime-config.js
            window.__RUNTIME_CONFIG__ = {
              KAMERPLANTER_MODE: "${KAMERPLANTER_MODE:-full}"
            };
            EOF
        env:
          KAMERPLANTER_MODE:
            value: "full"
    containers:
      main:
        image:
          repository: ghcr.io/nolte/kamerplanter-frontend
          tag: latest
          pullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
          VITE_BACKEND_URL: "http://kamerplanter-backend:8000"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: &frontend-port 80
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *frontend-port
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  arangodb:
    type: statefulset
    replicas: 1
    pod:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
    containers:
      main:
        image:
          repository: arangodb
          tag: "3.12.9"
          pullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
          ARANGO_ROOT_PASSWORD: rootpassword
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /_api/version
                port: &arangodb-port 8529
                httpHeaders:
                  - name: Authorization
                    value: Basic cm9vdDpyb290cGFzc3dvcmQ=
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /_api/version
                port: *arangodb-port
                httpHeaders:
                  - name: Authorization
                    value: Basic cm9vdDpyb290cGFzc3dvcmQ=
              initialDelaySeconds: 15
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
    statefulset:
      volumeClaimTemplates:
        - name: data
          accessMode: ReadWriteOnce
          size: 5Gi
          annotations:
            helm.sh/resource-policy: keep
          globalMounts:
            - path: /var/lib/arangodb3

  celery-worker:
    type: deployment
    replicas: 1
    strategy: RollingUpdate
    rollingUpdate:
      surge: 1
      unavailable: 0
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
    containers:
      main:
        image:
          repository: ghcr.io/nolte/kamerplanter-backend
          tag: latest
          pullPolicy: IfNotPresent
        command: ["celery"]
        args: ["-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=2"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
          ARANGODB_HOST: kamerplanter-arangodb
          ARANGODB_PORT: "8529"
          ARANGODB_DATABASE: kamerplanter
          ARANGODB_USERNAME: root
          ARANGODB_PASSWORD: rootpassword
          REDIS_URL: redis://kamerplanter-valkey:6379/0
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["celery", "-A", "app.tasks", "inspect", "ping", "--timeout", "5"]
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 3
          readiness:
            enabled: false
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  celery-beat:
    type: deployment
    replicas: 1
    strategy: Recreate
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
    containers:
      main:
        image:
          repository: ghcr.io/nolte/kamerplanter-backend
          tag: latest
          pullPolicy: IfNotPresent
        command: ["celery"]
        args: ["-A", "app.tasks", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
          ARANGODB_HOST: kamerplanter-arangodb
          ARANGODB_PORT: "8529"
          ARANGODB_DATABASE: kamerplanter
          ARANGODB_USERNAME: root
          ARANGODB_PASSWORD: rootpassword
          REDIS_URL: redis://kamerplanter-valkey:6379/0
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["sh", "-c", "test -f /tmp/celerybeat-schedule"]
              initialDelaySeconds: 30
              periodSeconds: 60
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: false
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

