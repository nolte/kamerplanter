# Development overrides — runs Vite dev server instead of nginx
replicaCount: 1

service:
  type: ClusterIP
  port: 5173

containerPort: 5173

probes:
  liveness:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 10
  readiness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 10

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

strategy:
  type: Recreate

backend:
  host: kamerplanter-backend
  port: 8000

ingress:
  enabled: true
  backendService: kamerplanter-backend
  backendPort: 8000
