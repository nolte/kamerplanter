species_enrichment:
  "Dracaena trifasciata":
    watering_guide:
      interval_days: 17
      volume_ml_min: 150
      volume_ml_max: 400
      watering_method: soak
      water_quality_hint: null
      practical_tip: "Substrat vollstaendig austrocknen lassen. Bogenhanf ist extrem trockenheitstolerant — lieber zu wenig als zu viel giessen. Staunaesse ist toedlich."
      seasonal_adjustments:
        - label: "Winter (Nov-Feb)"
          months: [11, 12, 1, 2]
          interval_days: 30
          volume_ml_min: 80
          volume_ml_max: 200

  "Dypsis lutescens":
    watering_guide:
      interval_days: 7
      volume_ml_min: 300
      volume_ml_max: 800
      watering_method: drench_and_drain
      water_quality_hint: "Fluoridempfindlich — kein fluoridiertes Leitungswasser. Regenwasser oder gefiltertes Wasser bevorzugt."
      practical_tip: "Obere 2-3 cm abtrocknen lassen, dann gruendlich giessen. Gelbe Wedel oft Zeichen von Ueberwaesserung."
      seasonal_adjustments:
        - label: "Winter (Nov-Feb)"
          months: [11, 12, 1, 2]
          interval_days: 12
          volume_ml_min: 150
          volume_ml_max: 400

  "Echeveria elegans":
    watering_guide:
      interval_days: 12
      volume_ml_min: 30
      volume_ml_max: 100
      watering_method: soak
      water_quality_hint: null
      practical_tip: "NIEMALS auf Blaetter giessen — Farina zerstoeren und Faeulnis. Substrat komplett austrocknen lassen. Flache Toepfe mit exzellenter Drainage."
      seasonal_adjustments:
        - label: "Winter (Nov-Feb)"
          months: [11, 12, 1, 2]
          interval_days: 31
          volume_ml_min: 15
          volume_ml_max: 50

  "Epipremnum aureum":
    # Enrichment fields from removed new_species entry (species exists in species.yaml)
    frost_sensitivity: sensitive
    allows_harvest: false
    native_habitat: "Suedostasien (Mo'orea, Gesellschaftsinseln)"
    bloom_months: []
    watering_guide:
      interval_days: 7
      volume_ml_min: 100
      volume_ml_max: 300
      watering_method: top_water
      water_quality_hint: null
      practical_tip: "Obere 2-3 cm abtrocknen lassen (Fingerprobe). Gelbe Blaetter = Ueberwaesserung, braune Spitzen = Unterwaesserung. Sehr anspruchslos."
      seasonal_adjustments:
        - label: "Winter (Nov-Feb)"
          months: [11, 12, 1, 2]
          interval_days: 12
          volume_ml_min: 60
          volume_ml_max: 150

  "Euphorbia pulcherrima":
    watering_guide:
      interval_days: 5
      volume_ml_min: 100
      volume_ml_max: 300
      watering_method: top_water
      water_quality_hint: "Zimmerwarmes Wasser verwenden. Kein kaltes Wasser — schockt die Pflanze."
      practical_tip: "Gleichmaessig feucht halten, weder austrocknen noch staunass. Staunasse Erde fuehrt schnell zu Wurzelfaeule und Blattverlust."
      seasonal_adjustments:
        - label: "Ruhezeit (Apr-Sep)"
          months: [4, 5, 6, 7, 8, 9]
          interval_days: 10
          volume_ml_min: 50
          volume_ml_max: 150

  "Fatsia japonica":
    watering_guide:
      interval_days: 7
      volume_ml_min: 300
      volume_ml_max: 800
      watering_method: drench_and_drain
      water_quality_hint: "Leitungswasser ok. Gleichmaessig feucht halten, Staunaesse vermeiden."
      practical_tip: "Kuehlere Standorte als die meisten Zimmerpflanzen. Grosse Blaetter verdunsten viel Wasser — bei Waerme haeufiger giessen."
      seasonal_adjustments:
        - label: "Winter (Nov-Feb)"
          months: [11, 12, 1, 2]
          interval_days: 15
          volume_ml_min: 150
          volume_ml_max: 400

