    pollination_type: [wind, insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Maulbeergewaechse mit Milchsaft. Enthaelt Ficus (Birkenfeige,
      Gummibaum, Geigenfeige), Morus und Artocarpus.
    rotation_category: ornamental

  - name: Acanthaceae
