    watering_guide:
      interval_days: 8
      volume_ml_min: 300
      volume_ml_max: 800
      watering_method: drench_and_drain
      water_quality_hint: null
      practical_tip: "Obere 2-3 cm abtrocknen lassen. Standort NICHT veraendern — Birkenfeige reagiert auf Ortswechsel mit Blattabwurf."
