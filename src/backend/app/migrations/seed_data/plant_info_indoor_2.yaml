# yaml-language-server: $schema=./schemas/plant_info.schema.yaml
# Plant-info seed data from spec/knowledge/plants/*.md (30 indoor plant documents).
#
# Adds 15 new botanical families, 29 new species, enriches 29 species with
# watering guides, adds lifecycle configs and growth phases for all 30 species,
# and cultivar data where available.

# ==============================================================================
# S1  NEW BOTANICAL FAMILIES (15)
# ==============================================================================

new_families:
  - name: Arecaceae
    common_name_de: "Palmengewaechse"
    common_name_en: Palm family
    order: Arecales
    typical_nutrient_demand: medium
    frost_tolerance: sensitive
    typical_root_depth: deep
    typical_growth_forms: [tree]
    common_pests: [spider_mites, scale, mealybugs]
    common_diseases: [Wurzelfaeule, Blattflecken]
    pollination_type: [insect, wind]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Palmengewaechse mit ca. 2600 Arten. Tropische und subtropische Baeume
      und Straeucher mit gefiederten oder faecherfoermigen Blaettern.
    rotation_category: ornamental

  - name: Crassulaceae
    common_name_de: "Dickblattgewaechse"
    common_name_en: Stonecrop family
    order: Saxifragales
    typical_nutrient_demand: light
    frost_tolerance: moderate
    typical_root_depth: shallow
    typical_growth_forms: [herb]
    common_pests: [mealybugs, fungus_gnats]
    common_diseases: [Wurzelfaeule, Rosettenfaeule]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Dickblattgewaechse mit sukkulenten Blaettern. Enthalt Echeveria,
      Kalanchoe, Sedum und Crassula. Trockenheitsresistent.
    rotation_category: ornamental

  - name: Euphorbiaceae
    common_name_de: "Wolfsmilchgewaechse"
    common_name_en: Spurge family
    order: Malpighiales
    typical_nutrient_demand: medium
    frost_tolerance: sensitive
    typical_root_depth: medium
    typical_growth_forms: [herb, shrub]
    common_pests: [whitefly, fungus_gnats, aphids]
    common_diseases: [Wurzelfaeule, Grauschimmel]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 6.5
    description: >-
      Wolfsmilchgewaechse mit Milchsaft. Enthaelt Euphorbia (Weihnachtsstern),
      Codiaeum und viele Sukkulenten. Oft giftig.
    rotation_category: ornamental

  - name: Moraceae
    common_name_de: "Maulbeergewaechse"
    common_name_en: Mulberry family
    order: Rosales
    typical_nutrient_demand: medium
    frost_tolerance: sensitive
    typical_root_depth: deep
    typical_growth_forms: [tree, shrub]
    common_pests: [scale, mealybugs, spider_mites, thrips]
