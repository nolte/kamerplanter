  - name: "Celeriac Blanching"
    name_de: "Knollen abdecken (Sellerie)"
    description: >
      Loosely covering the exposed upper portion of the celeriac tuber with newspaper,
      horticultural fleece, or light-excluding material to prevent greening of the tuber
      surface from UV exposure. Celeriac (Apium graveolens var. rapaceum) naturally grows
      with 40-60% of the tuber above the soil line — this aerial exposure is correct for
      optimal tuber development and must not be counteracted by earthing up (which would
      promote crown rot). However, the exposed surface develops chlorophyll when exposed to
      direct sunlight, causing a green discoloration. While celeriac greening does not
      produce toxic compounds (unlike potato solanine), it affects the tuber's visual
      quality and can impart a slightly more bitter taste to the outer layers. In commercial
      production, uniform white-cream tuber color is a quality criterion. Blanching is a
      simple light-exclusion technique: loosely wrap or drape the material around the
      exposed tuber, ensuring air circulation is maintained to prevent moisture buildup and
      fungal infection. Begin when the tuber reaches tennis-ball size (typically August in
      Central European conditions). This is an optional quality measure primarily relevant
      for market gardeners and exhibition growers — home gardeners may choose to skip it
      as the greening is purely cosmetic.
    description_de: >
      Lockeres Abdecken des freiliegenden oberen Teils der Sellerieknolle mit
      Zeitungspapier, Gartenvlies oder lichtundurchlässigem Material, um Vergrünung der
      Knollenoberfläche durch UV-Exposition zu verhindern. Knollensellerie (Apium
      graveolens var. rapaceum) wächst natürlicherweise mit 40-60% der Knolle über der
      Bodenoberfläche — diese Freiluftexposition ist korrekt für optimale
      Knollenentwicklung und darf nicht durch Anhäufeln gegengesteuert werden (was
      Kronenfäule fördern würde). Die freiliegende Oberfläche entwickelt jedoch
      Chlorophyll bei direkter Sonneneinstrahlung, was eine grüne Verfärbung verursacht.
      Während Sellerie-Vergrünung keine toxischen Verbindungen produziert (anders als
      Kartoffel-Solanin), beeinträchtigt sie die optische Qualität der Knolle und kann
      den äusseren Schichten einen leicht bittereren Geschmack verleihen. In der
      kommerziellen Produktion ist eine einheitliche weiss-cremefarbene Knollenfarbe ein
      Qualitätskriterium. Blanching ist eine einfache Lichtexklusionstechnik: Material
      locker um die freiliegende Knolle wickeln oder drapieren, dabei Luftzirkulation
      aufrechterhalten, um Feuchtigkeitsstau und Pilzinfektion zu verhindern. Beginnen,
      wenn die Knolle Tennisballgrösse erreicht (typischerweise August in
      mitteleuropäischen Verhältnissen). Dies ist eine optionale Qualitätsmassnahme,
      primär relevant für Marktgärtner und Ausstellungszüchter — Hobbygärtner können sie
      überspringen, da die Vergrünung rein kosmetisch ist.
    category: "general"
    stress_level: "none"
    skill_level: "beginner"
    recovery_days_default: 0
    species_compatible: ["Apium", "Sellerie", "Celeriac"]
