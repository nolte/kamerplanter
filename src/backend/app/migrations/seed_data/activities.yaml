  - name: "Straw Mulching"
    name_de: "Stroh unterlegen"
    description: >
      Placing a layer of clean straw or specialized mulching material beneath developing
      strawberry fruits to prevent direct soil contact. This is a cornerstone practice in
      integrated strawberry production (IPM) targeting Botrytis cinerea (gray mold), the
      single most destructive pathogen of strawberry fruits worldwide, responsible for
      30-60% of crop losses in humid climates. Botrytis spores are ubiquitous in soil
      and splashed onto fruits during rain or irrigation events. When ripe strawberries
      rest directly on moist soil, the prolonged moisture contact creates ideal infection
      conditions — Botrytis germinates within 4-6 hours on wet fruit surfaces. A straw
      barrier physically separates fruits from soil, dramatically reducing splash-borne
      inoculum transfer and keeping fruit surfaces drier. Field trials consistently show
      40-60% reduction in Botrytis infection rates with proper straw mulching. Additionally,
      the straw layer suppresses weed germination beneath the canopy, reduces soil
      evaporation, and keeps fruits clean for harvest. Apply when the first fruits begin
      to swell and hang downward (typically late May in Central European conditions).
      Use clean, seed-free straw — hay contains weed seeds that will germinate prolifically.
    description_de: >
      Unterlegen einer Schicht sauberen Strohs oder speziellen Mulchmaterials unter
      sich entwickelnde Erdbeerfrüchte, um direkten Bodenkontakt zu verhindern. Dies ist
      eine Kernmassnahme im integrierten Erdbeeranbau (IPM) gegen Botrytis cinerea
      (Grauschimmel), den weltweit zerstörerischsten Pathogen von Erdbeerfrüchten,
      verantwortlich für 30-60% der Ernteverluste in feuchten Klimaten. Botrytis-Sporen
      sind allgegenwärtig im Boden und werden bei Regen oder Bewässerung auf Früchte
      gespritzt. Wenn reife Erdbeeren direkt auf feuchtem Boden liegen, schafft der
      anhaltende Feuchtigkeitskontakt ideale Infektionsbedingungen — Botrytis keimt
      innerhalb von 4-6 Stunden auf nassen Fruchtoberflächen. Eine Strohbarriere trennt
      Früchte physisch vom Boden, reduziert den spritzwassergetragenen Inokulumtransfer
      drastisch und hält Fruchtoberflächen trockener. Feldversuche zeigen konsistent eine
      40-60%ige Reduktion der Botrytis-Infektionsrate bei sachgemässer Strohmulchung.
      Zusätzlich unterdrückt die Strohschicht Unkrautkeimung unter dem Bestand, reduziert
      Bodenverdunstung und hält Früchte sauber für die Ernte. Auftragen, wenn die ersten
      Früchte anschwellen und herabhängen (typischerweise Ende Mai in mitteleuropäischen
      Verhältnissen). Sauberes, samenfreies Stroh verwenden — Heu enthält Unkrautsamen,
      die üppig keimen werden.
    category: "general"
    stress_level: "none"
    skill_level: "beginner"
