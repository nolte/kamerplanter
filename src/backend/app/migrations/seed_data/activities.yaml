    tags: ["blanching", "celeriac", "outdoor"]

  - name: "CO2 Monitoring"
    name_de: "CO2-Kontrolle und Anpassung"
    description: >
      Measuring and adjusting the CO2 concentration in indoor cannabis cultivation spaces
      to optimize photosynthetic efficiency and accelerate growth. Ambient air contains
      approximately 420 ppm CO2, which is the limiting factor for photosynthesis when
      light levels exceed 600 PPFD — at this light intensity, the plant's carbon fixation
      machinery (RuBisCO enzyme) can process CO2 faster than it diffuses into the leaf
      through stomata. Supplementing to 800-1200 ppm CO2 saturates the Calvin cycle,
      increasing dry weight accumulation by 20-40% compared to ambient levels. The
      relationship follows a saturation curve: gains diminish above 1200 ppm, and levels
      above 1500 ppm can cause stomatal closure and growth inhibition. CO2 supplementation
      is only beneficial during the light period (plants do not photosynthesize in darkness)
      and requires corresponding increases in nutrient supply and temperature (optimal
      28-30°C at elevated CO2, vs. 24-26°C at ambient). Monitoring involves: (1) calibrate
      the CO2 meter weekly (sensors drift over time), (2) measure at plant canopy height
      during peak light hours, (3) adjust CO2 injection rate or ventilation accordingly.
      Ensure adequate air exchange when CO2 is not being supplemented — sealed rooms
      without supplementation will deplete CO2 below ambient within 30-60 minutes of
      lights-on, actually reducing growth below what natural ventilation would provide.
    description_de: >
      Messung und Anpassung der CO2-Konzentration in Indoor-Cannabis-Anbauräumen zur
      Optimierung der Photosyntheseeffizienz und Beschleunigung des Wachstums. Umgebungsluft
      enthält ca. 420 ppm CO2, was der limitierende Faktor für die Photosynthese ist, wenn
      die Lichtintensität 600 PPFD übersteigt — bei dieser Lichtintensität kann die
      Kohlenstofffixierungsmaschinerie der Pflanze (RuBisCO-Enzym) CO2 schneller verarbeiten
      als es durch die Stomata ins Blatt diffundiert. Supplementierung auf 800-1200 ppm CO2
      sättigt den Calvin-Zyklus und steigert die Trockenmasse-Akkumulation um 20-40%
      gegenüber Umgebungswerten. Die Beziehung folgt einer Sättigungskurve: Gewinne nehmen
      oberhalb von 1200 ppm ab, und Werte über 1500 ppm können Stomataschluss und
      Wachstumshemmung verursachen. CO2-Supplementierung ist nur während der Lichtperiode
      vorteilhaft (Pflanzen photosynthetisieren nicht im Dunkeln) und erfordert
      entsprechende Erhöhungen der Nährstoffzufuhr und Temperatur (optimal 28-30°C bei
      erhöhtem CO2, vs. 24-26°C bei Umgebungswerten). Monitoring umfasst: (1) CO2-Meter
      wöchentlich kalibrieren (Sensoren driften über die Zeit), (2) auf Pflanzen-
      Kronenhöhe während der Hauptlichtstunden messen, (3) CO2-Injektionsrate oder
      Ventilation entsprechend anpassen. Ausreichenden Luftaustausch sicherstellen, wenn
      kein CO2 supplementiert wird — versiegelte Räume ohne Supplementierung verarmen CO2
      innerhalb von 30-60 Minuten nach Lichtbeginn unter Umgebungswerte und reduzieren
      das Wachstum tatsächlich unter das, was natürliche Belüftung liefern würde.
    category: "inspection"
    stress_level: "none"
    skill_level: "intermediate"
    recovery_days_default: 0
    species_compatible: ["Cannabis", "Hanf"]
    forbidden_phases: ["dormancy"]
    tools_required: ["CO2 meter"]
    estimated_duration_minutes: 10
    sort_order: 77
    tags: ["monitoring", "co2", "cannabis", "indoor"]
