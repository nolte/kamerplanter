  - name: "Staking"
    name_de: "Anbinden / Stützen"
    description: >
      Installing support stakes and tying stems to prevent lodging (stem collapse) caused
      by wind, rain, or the weight of developing fruits and flowers. Many cultivated plants
      have been bred for larger fruits, heavier flower heads, or taller growth than their
      wild ancestors could support — making structural support essential. Staking provides
      a vertical anchor that distributes mechanical load along the stem, preventing the
      critical failure point where the stem buckles under its own weight or lateral wind
      force. Use bamboo stakes, metal plant supports, or wooden dowels sized to 2/3 of the
      expected plant height. Insert stakes at planting time or early in the vegetative phase
      to avoid damaging established root systems. Tie stems loosely with soft material
      (garden twine, foam-coated wire, fabric strips) in a figure-eight pattern — the
      crossover between stem and stake prevents direct pressure on the stem while allowing
      natural swaying that strengthens the stem through thigmomorphogenesis. Tight ties can
      girdle the stem, cutting off phloem transport and causing dieback above the tie point.
      Check ties monthly and loosen as the stem thickens during growth.
    description_de: >
      Anbringen von Stützstäben und Anbinden von Stängeln, um Umknicken (Stängelkollaps)
      durch Wind, Regen oder das Gewicht sich entwickelnder Früchte und Blüten zu
      verhindern. Viele Kulturpflanzen wurden auf grössere Früchte, schwerere Blütenköpfe
      oder höheren Wuchs gezüchtet als ihre wilden Vorfahren tragen konnten — strukturelle
      Unterstützung ist daher essentiell. Stützen bieten einen vertikalen Anker, der die
      mechanische Last entlang des Stängels verteilt und den kritischen Versagenspunkt
      verhindert, an dem der Stängel unter seinem eigenen Gewicht oder seitlicher Windkraft
      einknickt. Bambusstäbe, Metallstützen oder Holzdübel verwenden, bemessen auf 2/3 der
      erwarteten Pflanzenhöhe. Stäbe zur Pflanzzeit oder früh in der vegetativen Phase
      setzen, um Schäden an etablierten Wurzelsystemen zu vermeiden. Stängel locker mit
      weichem Material (Gartenschnur, schaumstoffbeschichteter Draht, Stoffstreifen) in
      Achter-Schlinge anbinden — die Kreuzung zwischen Stängel und Stab verhindert
      direkten Druck auf den Stängel und erlaubt natürliches Schwanken, das den Stängel
      durch Thigmomorphogenese stärkt. Straffe Bindungen können den Stängel einschnüren,
      den Phloemtransport unterbinden und Absterben oberhalb der Bindestelle verursachen.
      Bindungen monatlich kontrollieren und lockern, wenn der Stängel während des Wachstums
      dicker wird.
    category: "training_lst"
    stress_level: "none"
    skill_level: "beginner"
    recovery_days_default: 0
    requires_support: true
    forbidden_phases: ["dormancy", "senescence", "germination"]
    tools_required: ["bamboo stake", "plant ties"]
    estimated_duration_minutes: 10
    sort_order: 72
    tags: ["support", "staking"]

  - name: "Substrate Aeration"
    name_de: "Substratauflockerung"
    description: >
      Carefully loosening compacted substrate in containers by inserting a thin wooden
      stick or chopstick 4-6 times around the pot perimeter, pushing it to 2/3 pot depth
      and gently wiggling to create air channels. Over time, organic substrates (especially
      peat-based mixes) compact from repeated watering cycles — water pressure pushes fine
      particles together, reducing pore space. Compacted substrate becomes hydrophobic:
      water runs down the inside of the pot wall and out the drainage hole without wetting
      the root ball, a phenomenon called channeling. The root zone becomes anaerobic
      (oxygen-depleted), leading to root suffocation and creating conditions favorable for
      root rot pathogens (Pythium, Phytophthora). Substrate aeration breaks up compacted
      zones, restores oxygen flow to roots, and re-establishes even water distribution
      throughout the root ball. This is a critical maintenance activity for long-term
      container plants (Monstera, Ficus, Spathiphyllum) that are not repotted annually.
      Perform every 4-6 weeks during the active growing season. Work carefully around
      the pot perimeter — avoid the center where the main root mass is concentrated to
      minimize root damage.
    description_de: >
      Vorsichtiges Auflockern von verdichtetem Substrat in Töpfen durch Einstechen eines
      dünnen Holzstabs oder Essstäbchens 4-6 Mal um den Topfrand, bis auf 2/3 der
      Topftiefe, und sanftes Bewegen, um Luftkanäle zu erzeugen. Im Laufe der Zeit
      verdichten sich organische Substrate (besonders torfbasierte Mischungen) durch
      wiederholte Bewässerungszyklen — Wasserdruck presst Feinpartikel zusammen und
      reduziert den Porenraum. Verdichtetes Substrat wird hydrophob: Wasser läuft an der
      Topfinnenwand herunter und durch das Abzugsloch, ohne den Wurzelballen zu
      durchfeuchten — ein Phänomen namens Channeling. Die Wurzelzone wird anaerob
      (sauerstoffverarmt), was zu Wurzelerstickung führt und Bedingungen schafft, die
      Wurzelfäule-Pathogene (Pythium, Phytophthora) begünstigen. Substratauflockerung
      bricht verdichtete Zonen auf, stellt den Sauerstofffluss zu den Wurzeln wieder her
      und re-etabliert eine gleichmässige Wasserverteilung im Wurzelballen. Dies ist eine
      kritische Pflegemassnahme für langfristige Topfpflanzen (Monstera, Ficus,
      Spathiphyllum), die nicht jährlich umgetopft werden. Alle 4-6 Wochen während der
      aktiven Wachstumsperiode durchführen. Vorsichtig am Topfrand arbeiten — die Mitte
      meiden, wo die Hauptwurzelmasse konzentriert ist, um Wurzelschäden zu minimieren.
    category: "general"
    stress_level: "low"
    skill_level: "beginner"
    recovery_days_default: 0
    applicable_growth_habits: ["herb", "shrub", "vine"]
    requires_container: true
    forbidden_phases: ["dormancy", "germination"]
    tools_required: ["wooden stick"]
    estimated_duration_minutes: 5
    sort_order: 73
    tags: ["maintenance", "substrate", "houseplant"]

  - name: "Mulching"
    name_de: "Mulchen"
    description: >
      Applying a 5-10 cm layer of organic material (bark mulch, straw, or compost) around
      the base of geophyte plantings for frost protection, moisture retention, and weed
      suppression. Mulch acts as a thermal insulator — it moderates soil temperature swings
      by slowing heat loss at night and reducing solar heating during the day. For dahlia
      tubers and Tigridia corms left in the ground over winter (possible in USDA Zone 8+
      or sheltered microclimates), a thick mulch layer can prevent the soil from reaching
      the lethal freezing threshold of -2°C even when air temperatures drop well below
      freezing. In summer, mulch reduces soil evaporation by 30-50%, maintains more uniform
      soil moisture (reducing tuber desiccation stress), and suppresses weed competition
      that would otherwise compete with the geophytes for water and nutrients. As organic
      mulch decomposes, it contributes humus and nutrients to the soil, improving structure
      over time. Apply mulch after planting in spring (for summer moisture retention) and
      add an additional layer in late autumn before the first frost (for winter insulation).
      Keep mulch 5 cm away from the stem base to prevent crown rot from excessive moisture.
    description_de: >
      Aufbringen einer 5-10 cm dicken Schicht organischen Materials (Rindenmulch, Stroh
      oder Kompost) um die Basis von Geophyten-Pflanzungen zum Frostschutz,
      Feuchtigkeitserhalt und Unkrautunterdrückung. Mulch wirkt als thermischer Isolator —
      er mildert Bodentemperaturschwankungen, indem er den Wärmeverlust nachts verlangsamt
      und die Sonneneinstrahlung tagsüber reduziert. Für Dahlienknollen und Tigridia-Kormen,
      die über Winter im Boden bleiben (möglich ab USDA-Zone 8+ oder in geschützten
      Mikroklimaten), kann eine dicke Mulchschicht verhindern, dass der Boden die letale
      Frostschwelle von -2°C erreicht, selbst wenn die Lufttemperatur deutlich unter den
      Gefrierpunkt sinkt. Im Sommer reduziert Mulch die Bodenverdunstung um 30-50%, hält
      eine gleichmässigere Bodenfeuchte (reduziert Austrocknungsstress der Knollen) und
      unterdrückt Unkrautkonkurrenz, die sonst mit den Geophyten um Wasser und Nährstoffe
      konkurrieren würde. Bei der Zersetzung trägt organischer Mulch Humus und Nährstoffe
      zum Boden bei und verbessert langfristig die Struktur. Mulch nach dem Pflanzen im
      Frühling auftragen (für Feuchtigkeitserhalt im Sommer) und eine zusätzliche Schicht
      im Spätherbst vor dem ersten Frost aufbringen (für Winterisolierung). Mulch 5 cm
      vom Stängelansatz fernhalten, um Kronenfäule durch übermässige Feuchtigkeit zu
      verhindern.
    category: "general"
    stress_level: "none"
    skill_level: "beginner"
    recovery_days_default: 0
