      Terra Aquatica CalMag (0.5 ml/L, erhöht gegenüber Leitungswasser-Variante).
      Ca/Mg via CalMag-Supplement, nicht aus Leitungswasser.
      EC-Ziele leicht erhöht (+0.05) wegen CalMag-Beitrag.
      ACHTUNG: RO-Wasser hat keine pH-Pufferkapazität (KH ~0) —
      pH NACH dem Mischen messen und ggf. korrigieren.
    recommended_substrate_type: soil
    reference_substrate_type: soil
    author: Kamerplanter Referenzdaten
    is_template: true
    version: "1.0"
    tags:
      - gruenlilie
      - spider-plant
      - zimmerpflanze
      - gruenpflanze
      - gardol
      - erde
      - indoor
      - anfaenger
      - schwachzehrer
      - osmosewasser
      - ro
    water_mix_ratio_ro_percent: 100
    cycle_restart_from_sequence: 3
    watering_schedule:
      schedule_mode: interval
      interval_days: 7
      preferred_time: "09:00"
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1

    phase_entries:
      # ── GERMINATION W1-3 ──
      - phase_name: germination
        sequence_order: 1
        week_start: 1
        week_end: 3
        is_recurring: false
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Keine Düngung, kein CalMag. Kindel/Ableger nur mit RO-Wasser
          gießen. Substrat gleichmäßig feucht halten, nicht nass —
          Knollenwurzeln faulen bei Staunässe.
