          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: wasser-bewurzelung
            label: "Nur Wasser (Bewurzelung)"
            application_method: drench
            target_ec_ms: null
            target_ph: 6.0
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.10
            fertilizer_dosages: []

      # ── SEEDLING W4-12 ──
      - phase_name: seedling
        sequence_order: 2
        week_start: 4
        week_end: 12
        is_recurring: false
        npk_ratio: [1.0, 1.0, 1.0]
        reference_ec_ms: 0.45
        calcium_ppm: 30.0
        magnesium_ppm: 15.0
        notes: >-
          Vierteldosis Gardol (1 ml/L) alle 21 Tage + CalMag 0.5 ml/L.
          Gießintervall 7 Tage. Jungpflanze baut Wurzelsystem und
          Blattmasse auf. Schwachzehrer — erst nach sichtbarem Neuzuwachs düngen.
          Ca/Mg via CalMag-Supplement, nicht aus Leitungswasser.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 7
          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: drench-giessduengung
            label: "Gießdüngung (Gießkanne)"
            application_method: drench
            target_ec_ms: 0.45
            target_ph: 6.0
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.2
            fertilizer_dosages:
              - product_name: "CalMag"
                ml_per_liter: 0.5
              - product_name: Grünpflanzendünger
                ml_per_liter: 1.0

      # ── DORMANCY W1-8 (recurring, Jan–Feb) ──
      - phase_name: dormancy
        sequence_order: 3
        week_start: 1
        week_end: 8
        is_recurring: true
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Saisonale Ruhephase Januar–Februar. Keine Düngung, kein CalMag.
          12-Tage-Intervall bei 18–22 °C.
          Knollenwurzeln speichern Wasser — Übergießen vermeiden.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 12
          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: wasser-dormancy
            label: "Nur Wasser (Ruheperiode)"
            application_method: drench
            target_ec_ms: null
            target_ph: 6.0
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.2
            fertilizer_dosages: []

      # ── VEGETATIVE W9-43 (recurring, Mär–Okt) ──
      - phase_name: vegetative
        sequence_order: 4
        week_start: 9
        week_end: 43
        is_recurring: true
        npk_ratio: [1.5, 1.0, 1.5]
