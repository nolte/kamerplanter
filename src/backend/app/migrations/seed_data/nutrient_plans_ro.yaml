            fertilizer_dosages: []

  # ── Spathiphyllum wallisii — Gardol Grünpflanzendünger (Osmosewasser) ───────
  - name: "Spathiphyllum wallisii — Gardol Grünpflanzendünger (Osmosewasser)"
    description: >-
      RO-Wasser-Variante des Spathiphyllum-Gardol-Plans.
      Identische Basisdüngung (halbe Dosis), ergänzt durch Terra Aquatica
      CalMag in Vegetativ- und Blütephase. Ca/Mg via CalMag-Supplement,
      nicht aus Leitungswasser. EC-Ziele leicht erhöht (+0.05) wegen
      CalMag-Beitrag. GIFTIG für Katzen, Hunde und Kinder.
      ACHTUNG: RO-Wasser hat keine pH-Pufferkapazität (KH ~0) —
      pH NACH dem Mischen messen und ggf. korrigieren.
    recommended_substrate_type: soil
    reference_substrate_type: soil
    author: Kamerplanter Referenzdaten
    is_template: true
    version: "1.0"
    tags:
      - spathiphyllum
      - einblatt
      - peace-lily
      - zimmerpflanze
      - gruenpflanze
      - gardol
      - erde
      - indoor
      - anfaenger
      - schwachzehrer
      - schattenvertraeglich
      - osmosewasser
      - ro
    water_mix_ratio_ro_percent: 100
    cycle_restart_from_sequence: 2
    watering_schedule:
      schedule_mode: interval
      interval_days: 7
      preferred_time: "09:00"
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1

    phase_entries:
      # ── GERMINATION W1-4 ──
      - phase_name: germination
        sequence_order: 1
        week_start: 1
        week_end: 4
        is_recurring: false
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Keine Düngung, kein CalMag. Frisch geteilte oder neu gekaufte Pflanze
          nur mit RO-Wasser gießen. 5-Tage-Intervall bei 20–24 °C.
          Staunässe führt bei Spathiphyllum schnell zu Rhizomfäule (Phytophthora).
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 5
