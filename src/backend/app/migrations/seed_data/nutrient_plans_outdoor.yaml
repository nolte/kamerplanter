nutrient_plans:
- name: Buschbohne — Plagron Terra (Leguminose)
  description: 'Minimaldüngungs-Plan für Buschbohne (Phaseolus vulgaris) als N-Fixierer. KEIN Terra Grow! Nur Terra Bloom
    (P+K) in niedriger Dosis. Rhizobium-Symbiose liefert Stickstoff. Direktsaat nach Eisheiligen, 10–14 Wochen Kulturzeit.
    WARNUNG: Rohe Bohnen sind giftig (Phasin)!'
  recommended_substrate_type: soil
  author: Kamerplanter Referenzdaten
  is_template: true
  version: '1.0'
  tags:
  - bohne
  - buschbohne
  - phaseolus
  - fabaceae
  - leguminose
  - plagron
  - terra
  - erde
  - outdoor
  - schwachzehrer
  - n-fixierer
  - gemüse
  watering_schedule:
    schedule_mode: interval
    interval_days: 3
    preferred_time: 07:00
    application_method: drench
    reminder_hours_before: 2
    times_per_day: 1
  phase_entries:
  - phase_name: germination
    sequence_order: 1
    week_start: 1
    week_end: 2
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: Direktsaat nach Eisheiligen, Bodentemperatur mind. 10°C. Dunkelkeimer, 3–5 cm tief. NICHT vorquellen! Mäßig feucht
      halten, nicht nass. Rhizobium-Impfung bei erstmaligem Anbau empfohlen.
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 2
      preferred_time: 07:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-keimung
      label: Wasser Keimung
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.02
      fertilizer_dosages: []
  - phase_name: seedling
    sequence_order: 2
    week_start: 3
    week_end: 4
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: Kein Dünger. Rhizobium-Knöllchen bilden sich an den Wurzeln. N-Düngung würde die Knöllchenbildung hemmen! Erste
      Fiederblätter entfalten sich.
    delivery_channels:
    - channel_id: wasser-pur
      label: Nur Wasser (Sämling)
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.05
      fertilizer_dosages: []
  - phase_name: vegetative
    sequence_order: 3
    week_start: 5
    week_end: 8
    npk_ratio:
    - 0.0
    - 1.0
    - 2.0
    notes: 'Terra Bloom Viertel-Dosis (1.5 ml/L) + Pure Zym. Nur P+K-Versorgung — Rhizobium liefert N. Anhäufelung: 5–8 cm
      Erde an Stängelbasis. Alle 14 Tage düngen.'
    delivery_channels:
    - channel_id: naehrloesung-pk
      label: P+K-Düngung (Gießkanne)
      application_method: drench
      target_ec_ms: 0.5
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.1
      fertilizer_dosages:
      - product_name: Terra Bloom
        ml_per_liter: 1.5
      - product_name: Pure Zym
        ml_per_liter: 1.0
  - phase_name: flowering
    sequence_order: 4
    week_start: 9
    week_end: 11
    npk_ratio:
    - 0.0
    - 2.0
    - 3.0
    notes: Terra Bloom niedrige Dosis (2 ml/L) + Pure Zym. P+K für Blüte und Hülsenbildung. Hitze über 30°C = Blütenabwurf!
      Gleichmäßig gießen (alle 2 Tage). Alle 14 Tage düngen.
    delivery_channels:
    - channel_id: naehrloesung-pk
      label: P+K-Düngung (Gießkanne)
      application_method: drench
      target_ec_ms: 0.6
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.1
      fertilizer_dosages:
      - product_name: Terra Bloom
        ml_per_liter: 2.0
      - product_name: Pure Zym
        ml_per_liter: 1.0
  - phase_name: harvest
    sequence_order: 5
    week_start: 12
    week_end: 14
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: 'Kein Dünger. Alle 2–3 Tage ernten! Überreife Hülsen hemmen Neuansatz. Nach der Ernte: Pflanzen abschneiden, Wurzeln
      im Boden lassen (N-Anreicherung für Nachfolgekultur).'
    delivery_channels:
    - channel_id: wasser-pur
      label: Nur Wasser (Ernte)
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.1
      fertilizer_dosages: []
- name: Chicorée (Freiland + Treiberei) — Plagron Terra
  description: 'Zweiteiliger Plan: Freiland-Wurzelaufbau (Mai–Oktober) + Treiberei im Dunkeln (Nov–Dez). Plagron Terra-Linie,
    3 Produkte. Mittelzehrer. 28 Wochen Gesamtdauer.'
  recommended_substrate_type: soil
  author: Kamerplanter Referenzdaten
  is_template: true
  version: '1.0'
  tags:
  - chicorée
  - zichorie
  - wegwarte
  - chicory
  - cichorium
  - plagron
  - terra
  - erde
  - outdoor
  - mittelzehrer
  - treiberei
  - etiolierung
  watering_schedule:
    schedule_mode: interval
    interval_days: 4
    preferred_time: 07:00
    application_method: drench
    reminder_hours_before: 2
    times_per_day: 1
  phase_entries:
  - phase_name: germination
    sequence_order: 1
    week_start: 1
    week_end: 3
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: Direktsaat Mai/Juni, 1–2 cm tief (Dunkelkeimer). Reihenabstand 30–40 cm. Keimung 10–21 Tage. KEIN Dünger.
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 2
      preferred_time: 07:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-keimung
      label: Wasser Keimung
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.02
      fertilizer_dosages: []
  - phase_name: seedling
    sequence_order: 2
    week_start: 4
    week_end: 7
    npk_ratio:
    - 3.0
    - 1.0
    - 3.0
    notes: Vereinzeln auf 25–30 cm. Viertel-Dosis Terra Grow (1.5 ml/L). Alle 14 Tage düngen.
    delivery_channels:
    - channel_id: naehrloesung-wachstum
      label: Wachstumsdüngung Sämling (Gießkanne)
      application_method: drench
      target_ec_ms: 0.5
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.4
      fertilizer_dosages:
      - product_name: Terra Grow
        ml_per_liter: 1.5
  - phase_name: vegetative
    sequence_order: 3
    week_start: 8
    week_end: 20
    npk_ratio:
    - 2.0
    - 2.0
    - 4.0
    notes: 'W8–12: Terra Grow 2.5 ml/L + Pure Zym. Ab W13: Umstellung auf Terra Bloom 2.5 ml/L (K-betont für Wurzeleinlagerung)
      + Pure Zym. Alle 14 Tage düngen. Ab W18 Düngung einstellen (4 Wochen vor Rodung). Blütenstängel sofort entfernen!'
    delivery_channels:
    - channel_id: naehrloesung-wachstum
      label: Wachstumsdüngung (Gießkanne)
      application_method: drench
      target_ec_ms: 0.65
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.4
      fertilizer_dosages:
      - product_name: Terra Bloom
        ml_per_liter: 2.5
      - product_name: Pure Zym
        ml_per_liter: 1.0
  - phase_name: dormancy
    sequence_order: 4
    week_start: 21
    week_end: 24
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: Wurzeln roden, Kraut auf 3 cm kürzen. 1–2 Wochen bei 0–5°C lagern. Dann in Sand/Erde bei 15–18°C im Dunkeln einstellen.
      KEINE Düngung.
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 7
      preferred_time: 07:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-treiberei
      label: Wasser Treiberei-Vorbereitung
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.1
      fertilizer_dosages: []
  - phase_name: harvest
    sequence_order: 5
    week_start: 25
    week_end: 28
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: Treiberei im Dunkeln. KEIN Dünger, KEIN Licht! Chicoréezapfen wachsen aus der Wurzelkrone. Ernte nach 3–4 Wochen
      bei 15–20 cm. Substrat leicht feucht halten.
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 3
      preferred_time: 07:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-treiberei
      label: Wasser Treiberei (dunkel)
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.1
      fertilizer_dosages: []
- name: Dahlie — Plagron Terra + PK 13-14
  description: 'Saisonplan für Dahlien (dekorative, halbgefüllte und Kaktus-Typen) mit Knollen-Vorkultur ab März und Freilandkultur
    ab Mai. Plagron Terra-Linie mit 5 Produkten inkl. PK 13-14 Blütebooster. Starkzehrer, perennierend via Knolle. 32 Wochen
    aktive Saison + 20 Wochen Dormanz. Geeignet für Cultivare: Armateras, Hapet Daydream, Lavender Perfection, Great Silence,
    Embassy.'
  recommended_substrate_type: soil
  author: Kamerplanter Referenzdaten
  is_template: true
  version: '1.0'
  tags:
  - dahlie
  - dahlia
  - asteraceae
  - plagron
  - terra
  - pk-13-14
  - erde
  - outdoor
  - starkzehrer
  - zierpflanze
  - knollengewächs
  - schnittblume
  watering_schedule:
    schedule_mode: interval
    interval_days: 2
    preferred_time: 07:00
    application_method: drench
    reminder_hours_before: 2
    times_per_day: 1
  cycle_restart_from_sequence: 1
  phase_entries:
  - phase_name: germination
    sequence_order: 1
    week_start: 1
    week_end: 4
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    is_recurring: true
    notes: Knollen ab März in Töpfen antreiben bei 15–18°C. NICHT gießen bis Austrieb sichtbar! Knolle hat ausreichend Reserven.
      Fäulnisgefahr bei nasser Knolle. Knollenteilung möglich (jedes Stück mind. 1 Auge).
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 5
      preferred_time: 07:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-vorkeimen
      label: Wasser Vorkeimen
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.2
      fertilizer_dosages: []
  - phase_name: vegetative
    sequence_order: 2
    week_start: 5
    week_end: 12
    npk_ratio:
    - 3.0
    - 1.0
    - 3.0
    is_recurring: true
    calcium_ppm: 100.0
    magnesium_ppm: 40.0
    notes: Volle Dosis Terra Grow (5 ml/L) + Power Roots + Pure Zym. Kräftiger Laub- und Stängelaufbau. Calcium für Stängelstabilität.
      Entspitzen bei 30–40 cm. Abhärtung ab Woche 9. Auspflanzen nach Eisheiligen (Mitte Mai). Stützstäbe einschlagen. Alle
      7 Tage düngen.
    delivery_channels:
    - channel_id: naehrloesung-wachstum
      label: Wachstumsdüngung (Gießkanne)
      application_method: drench
      target_ec_ms: 0.8
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 1.0
      fertilizer_dosages:
      - product_name: Terra Grow
        ml_per_liter: 5.0
      - product_name: Power Roots
        ml_per_liter: 1.0
      - product_name: Pure Zym
        ml_per_liter: 1.0
  - phase_name: flowering
    sequence_order: 3
    week_start: 13
    week_end: 26
    npk_ratio:
    - 2.0
    - 2.0
    - 4.0
    is_recurring: true
    calcium_ppm: 100.0
    magnesium_ppm: 40.0
    notes: Umstellung auf Terra Bloom (5 ml/L). Power Roots absetzen. PK 13-14 (0.75 ml/L) NUR in Woche 15–16 als Knospenansatz-Boost.
      Danach sofort absetzen! Kein Sugar Royal (N-Überschuss hemmt Blüte). Deadheading konsequent durchführen. Ab September
      (W23–26) Terra Bloom auf 3 ml/L reduzieren. Alle 7–10 Tage düngen.
    delivery_channels:
    - channel_id: naehrloesung-bluete
      label: Blütendüngung (Gießkanne)
      application_method: drench
      target_ec_ms: 0.9
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 1.5
      fertilizer_dosages:
      - product_name: Terra Bloom
        ml_per_liter: 5.0
      - product_name: Pure Zym
        ml_per_liter: 1.0
      - product_name: PK 13-14
        ml_per_liter: 0.75
        optional: true
  - phase_name: harvest
    sequence_order: 4
    week_start: 27
    week_end: 30
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    is_recurring: true
    notes: Keine Düngung. Pflanze nach erstem Frost einziehen lassen. Stängel auf 10–15 cm kürzen. Knollen ausgraben, 5–7
      Tage trocknen, beschriften (Sortenname!), einlagern.
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 7
      preferred_time: 07:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-pur
      label: Nur Wasser (Seneszenz)
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.5
      drench_params:
        volume_per_feeding_liters: 0.5
      fertilizer_dosages: []
  - phase_name: dormancy
    sequence_order: 5
    week_start: 31
    week_end: 52
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    is_recurring: true
    notes: 'Knollen frostfrei lagern bei 4–8°C, dunkel. Kein Wasser, kein Dünger. Lagermedium: Vermiculite, Kokoserde oder
      Zeitungspapier. Monatliche Kontrolle auf Fäulnis/Austrocknung. Zyklus-Neustart im Frühling bei Vorkeimen.'
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 30
      preferred_time: 07:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels: []
- name: Dill (Direktsaat) — Plagron Terra
  description: Minimalistischer Nährstoffplan für Dill (Schwachzehrer). Schnelle Kultur (12 Wochen). Direktsaat, kein Pikieren
    (Pfahlwurzel). Staffelsaat alle 3–4 Wochen. Nur Terra Grow + Pure Zym. Bewusst niedrige Dosierung — überdüngter Dill schmeckt
    fad.
  recommended_substrate_type: soil
  author: Kamerplanter Referenzdaten
  is_template: true
  version: '1.0'
  tags:
  - dill
  - anethum
  - gurkenkraut
  - plagron
  - terra
  - erde
  - kräutergarten
  - schwachzehrer
  - outdoor
  - direktsaat
  - schnellkultur
  watering_schedule:
    schedule_mode: interval
    interval_days: 3
    preferred_time: 08:00
    application_method: drench
    reminder_hours_before: 2
    times_per_day: 1
  phase_entries:
  - phase_name: germination
    sequence_order: 1
    week_start: 1
    week_end: 2
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: 'Direktsaat ab Bodentemperatur 8°C. Lichtkeimer: Samen nur leicht andrücken. NICHT pikieren (Pfahlwurzel). Keimdauer
      7–14 Tage.'
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 2
      preferred_time: 08:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-keimung
      label: Sprühwasser Keimung
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.0
      drench_params:
        volume_per_feeding_liters: 0.02
      fertilizer_dosages: []
  - phase_name: seedling
    sequence_order: 2
    week_start: 3
    week_end: 4
    npk_ratio:
    - 3.0
    - 1.0
    - 3.0
    notes: Viertel-Dosis Terra Grow (1.5 ml/L). Vereinzeln auf 15–20 cm. Nur bei Nährstoffmangel düngen — Kompost im Boden
      genügt oft. Max. 1x düngen.
    delivery_channels:
    - channel_id: naehrloesung-wachstum
      label: Wachstumsdüngung (Gießkanne)
      application_method: drench
      target_ec_ms: 0.4
      target_ph: 6.0
      drench_params:
        volume_per_feeding_liters: 0.2
      fertilizer_dosages:
      - product_name: Terra Grow
        ml_per_liter: 1.5
  - phase_name: vegetative
    sequence_order: 3
    week_start: 5
    week_end: 8
    npk_ratio:
    - 3.0
    - 1.0
    - 3.0
    notes: Haupterntephase. Halbe Dosis Terra Grow (2.0 ml/L) + Pure Zym. Blattspitzen ernten verzögert Schossen. NICHT überdosieren
      — überdüngter Dill schmeckt fad! Alle 3 Wochen 1x düngen.
    delivery_channels:
    - channel_id: naehrloesung-wachstum
      label: Wachstumsdüngung (Gießkanne)
      application_method: drench
      target_ec_ms: 0.5
      target_ph: 6.0
      drench_params:
        volume_per_feeding_liters: 0.2
      fertilizer_dosages:
      - product_name: Terra Grow
        ml_per_liter: 2.0
      - product_name: Pure Zym
        ml_per_liter: 1.0
  - phase_name: flowering
    sequence_order: 4
    week_start: 9
    week_end: 11
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: Keine Düngung. Dill schosst. Blühender Dill = Nützlingsmagnet (Schwebfliegen, Schlupfwespen). Im Mischkulturbeet
      blühen lassen. Dillsamen ernten wenn braun und trocken.
    delivery_channels:
    - channel_id: wasser-pur
      label: Nur Wasser (Blüte)
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.0
      drench_params:
        volume_per_feeding_liters: 0.1
      fertilizer_dosages: []
  - phase_name: harvest
    sequence_order: 5
    week_start: 12
    week_end: 12
    npk_ratio:
    - 0.0
    - 0.0
    - 0.0
    notes: Seneszenz. Kein Dünger. Samen sammeln. Pflanze entfernen oder für Selbstaussaat stehen lassen. Pflanzenreste kompostieren.
    watering_schedule_override:
      schedule_mode: interval
      interval_days: 5
      preferred_time: 08:00
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1
    delivery_channels:
    - channel_id: wasser-pur
      label: Nur Wasser (Seneszenz)
      application_method: drench
      target_ec_ms: 0.0
      target_ph: 6.0
      drench_params:
        volume_per_feeding_liters: 0.1
      fertilizer_dosages: []
