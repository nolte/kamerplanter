        sequence_order: 2
        override_duration_days: 45
        is_terminal: false
        allows_harvest: false
        is_recurring: true
      - phase_name: flowering
        sequence_order: 3
        is_terminal: false
        allows_harvest: false
        is_recurring: true
      - phase_name: harvest
