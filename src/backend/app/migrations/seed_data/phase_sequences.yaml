        is_terminal: false
        allows_harvest: false
        is_recurring: true
      - phase_name: fruiting
        sequence_order: 3
        override_duration_days: 90
        is_terminal: false
        allows_harvest: false
        is_recurring: true
      - phase_name: harvest
        sequence_order: 4
        override_duration_days: 30
        is_terminal: false
        allows_harvest: true
        is_recurring: true
      - phase_name: senescence
        sequence_order: 5
        override_duration_days: 21
        is_terminal: true
        allows_harvest: false
