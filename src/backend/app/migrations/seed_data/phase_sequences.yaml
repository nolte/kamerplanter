        allows_harvest: false
      - phase_name: harvest
        sequence_order: 3
        override_duration_days: 30
        is_terminal: false
        allows_harvest: true
      - phase_name: senescence
        sequence_order: 4
        override_duration_days: 14
        is_terminal: true
        allows_harvest: false

  # -- 8. Full Fruit Cycle Perennial --
  - name: perennial_full_fruit
    display_name: Full Fruit Cycle Perennial
    display_name_de: Voller Fruchtzyklus (mehrjährig)
    description: Multi-season fruit cycle with all phases including ripening
    description_de: Mehrsaisonaler Fruchtzyklus mit allen Phasen inkl. Reife
    cycle_type: perennial
    is_repeating: true
    cycle_restart_entry_order: 0
    tags: [perennial, outdoor, fruit, full-cycle]
    is_system: true
