# S8  IPM DATA
# ==============================================================================

pests:
  - scientific_name: "Frankliniella occidentalis"
    common_name: Western Flower Thrips
    pest_type: insect
    lifecycle_days: 18
    optimal_temp_min: 20.0
    optimal_temp_max: 30.0
    detection_difficulty: hard
    description: >-
      Kalifornischer Blütenthrips. Winzige Insekten (1-2mm),
      verursachen silbrige Saugflecken auf Blättern und Blüten.
      Überträgt Tomatenbronzefleckenvirus (TSWV). Betrifft viele Arten.

  - scientific_name: "Bemisia tabaci"
    common_name: Silverleaf Whitefly
    pest_type: insect
    lifecycle_days: 28
    optimal_temp_min: 20.0
    optimal_temp_max: 32.0
    detection_difficulty: medium
    description: >-
      Silberblatt-Weiße Fliege. Saugt an Blattunterseiten,
      produziert Honigtau und fördert Russstaupilze.
      Betrifft besonders Solanaceae und Petunia.

  - scientific_name: "Otiorhynchus sulcatus"
    common_name: Black Vine Weevil
    pest_type: insect
    lifecycle_days: 90
    optimal_temp_min: 10.0
    optimal_temp_max: 25.0
    detection_difficulty: hard
    description: >-
      Dickmaulrüssler. Adulte fressen Buchtenfraß an Blatträndern (nachts),
      Larven zerstören Wurzeln. Betrifft Erdbeere, Dahlie, Cyclamen,
      viele Zierpflanzen.

  - scientific_name: "Tarsonemus pallidus"
    common_name: Cyclamen Mite
    pest_type: mite
    lifecycle_days: 14
    optimal_temp_min: 15.0
    optimal_temp_max: 25.0
    detection_difficulty: hard
    description: >-
      Weichhautmilbe. Mikroskopisch klein, verursacht
      verkrüppelte, deformierte Blätter und Blüten.
      Betrifft Erdbeere, Dahlie, Begonie, Cyclamen.

  - scientific_name: "Planococcus citri"
    common_name: Citrus Mealybug
    pest_type: insect
    lifecycle_days: 35
    optimal_temp_min: 20.0
    optimal_temp_max: 30.0
    detection_difficulty: medium
    description: >-
      Zitrus-Schmierlaus. Weißliche, wachsbedeckte Insekten
      an Blattachseln und Triebspitzen. Saugen Pflanzensaft,
      produzieren Honigtau. Betrifft Indoor-Pflanzen.

  - scientific_name: "Coccus hesperidum"
    common_name: Brown Soft Scale
    pest_type: insect
    lifecycle_days: 60
    optimal_temp_min: 18.0
    optimal_temp_max: 30.0
    detection_difficulty: medium
    description: >-
      Braune Schildlaus. Ovale, braune Schilde an Blättern und
      Stängeln. Produziert Honigtau. Betrifft Indoor-Pflanzen.

  - scientific_name: "Chaetosiphon fragaefolii"
    common_name: Strawberry Aphid
    pest_type: insect
    lifecycle_days: 14
    optimal_temp_min: 10.0
    optimal_temp_max: 25.0
    detection_difficulty: medium
    description: >-
      Erdbeerblattlaus. Überträger von Erdbeerviren.
      Hellgrüne Blattläuse an Blattunterseiten und Blütenständen.

  - scientific_name: "Botrytis cinerea (vector)"
    common_name: Slug
    pest_type: gastropod
    lifecycle_days: 365
    optimal_temp_min: 5.0
    optimal_temp_max: 20.0
    detection_difficulty: easy
    description: >-
      Nacktschnecken. Fressen Löcher in Blätter und Früchte.
      Besonders schädlich an Erdbeeren, Salat und Jungpflanzen.

diseases:
  - scientific_name: "Botrytis cinerea"
    common_name: Gray Mold
    pathogen_type: fungal
    incubation_period_days: 5
    environmental_triggers: [high_humidity, cool_wet_conditions, poor_airflow]
    affected_plant_parts: [flower, fruit, leaf]
    description: >-
      Grauschimmel. Grauer, pelziger Belag auf Blüten und Früchten.
      Wichtigste Krankheit bei Erdbeere, Dahlie, Petunie.
      Gefördert durch Nässe und schlechte Luftzirkulation.

  - scientific_name: "Dahlia mosaic virus"
    common_name: Dahlia Mosaic Virus
    pathogen_type: viral
    incubation_period_days: 21
    environmental_triggers: [aphid_transmission]
    affected_plant_parts: [leaf]
    description: >-
      Dahlienmosaikvirus (DMV). Hellgrüne Mosaikmuster auf Blättern,
      Wuchsdepression. Übertragung durch Blattläuse. Keine Heilung.

  - scientific_name: "Verticillium dahliae"
    common_name: Verticillium Wilt
    pathogen_type: fungal
    incubation_period_days: 14
    environmental_triggers: [cool_wet_soil, soil_contamination]
    affected_plant_parts: [root, stem, leaf]
    description: >-
      Verticillium-Welke. Einseitiges Welken, Braunfärbung der Leitbahnen.
      Bodenbürtiger Pilz, betrifft Erdbeere, Dahlie, viele Gemüsearten.

  - scientific_name: "Phytophthora fragariae"
    common_name: Red Stele Root Rot
    pathogen_type: fungal
    incubation_period_days: 14
    environmental_triggers: [waterlogged_soil, cool_wet_conditions]
    affected_plant_parts: [root]
    description: >-
      Rote Wurzelfäule der Erdbeere. Roter Zentralzylinder in Wurzeln,
      Welke trotz feuchtem Boden. Schwer zu bekämpfen.

  - scientific_name: "Septoria apiicola"
    common_name: Septoria Leaf Spot of Celery
    pathogen_type: fungal
    incubation_period_days: 10
    environmental_triggers: [warm_humid_conditions, rain_splash]
    affected_plant_parts: [leaf]
    description: >-
      Septoria-Blattfleckenkrankheit. Kleine runde Flecken mit
      dunklem Rand auf Sellerie-Blättern. Breitet sich bei Nässe aus.

  - scientific_name: "Tobacco mosaic virus"
    common_name: Tobacco Mosaic Virus
    pathogen_type: viral
    incubation_period_days: 10
    environmental_triggers: [mechanical_transmission]
    affected_plant_parts: [leaf]
    description: >-
      Tabakmosaikvirus (TMV). Gelbgrünes Mosaikmuster auf Blättern.
      Mechanisch übertragbar. Betrifft Petunia und andere Solanaceae.

treatments:
  - name: "Nematodes (Heterorhabditis)"
    treatment_type: biological
    active_ingredient: "Heterorhabditis bacteriophora"
    application_method: drench
    safety_interval_days: 0
    dosage_per_liter: null
    protective_equipment: []
    description: >-
      Nützlingsnematoden gegen Dickmaulrüssler-Larven im Boden.
      Ausbringung als Gießbehandlung bei Bodentemperatur >12°C.

  - name: "Amblyseius cucumeris"
    treatment_type: biological
    active_ingredient: "Amblyseius cucumeris"
    application_method: release
    safety_interval_days: 0
    dosage_per_liter: null
    protective_equipment: []
    description: >-
      Raubmilbe gegen Thripse. Sachets oder Streuware.
      Vorbeugend ausbringen, funktioniert ab 15°C.

  - name: Yellow Sticky Traps
    treatment_type: mechanical
    active_ingredient: null
    application_method: cultural
    safety_interval_days: 0
    dosage_per_liter: null
    protective_equipment: []
    description: >-
      Gelbtafeln zum Monitoring und zur Reduktion fliegender
      Schädlinge (Weiße Fliege, Trauermücken, geflügelte Blattläuse).

  - name: Straw Mulch
    treatment_type: cultural
    active_ingredient: null
    application_method: cultural
    safety_interval_days: 0
    dosage_per_liter: null
    protective_equipment: []
    description: >-
      Strohmulch unter Erdbeerpflanzen. Verhindert Fruchtfäule
      durch Bodenkontakt und reduziert Schneckenzugang.

  - name: Copper Spray
    treatment_type: chemical
    active_ingredient: copper hydroxide
    application_method: spray
    safety_interval_days: 7
    dosage_per_liter: 3.0
    protective_equipment: [gloves, eye_protection]
    description: >-
      Kupferspritzmittel gegen Pilzkrankheiten. Vorbeugend gegen
      Septoria, Falschen Mehltau und Rost. Karenzzeit beachten.

  - name: Alcohol Spray
    treatment_type: biological
    active_ingredient: "isopropyl alcohol 70%"
    application_method: spray
    safety_interval_days: 0
    dosage_per_liter: null
    protective_equipment: []
    description: >-
      Alkoholspray gegen Schildläuse und Schmierläuse.
      Wattestäbchen oder Sprühflasche direkt auf Schädlinge.

