# yaml-language-server: $schema=./schemas/plant_info.schema.yaml
# Plant-info seed data from spec/ref/plant-info/*.md (32 documents, 28 species).
#
# Adds 1 new botanical family (Iridaceae), 4 new species, enriches 24 existing
# species, adds art-specific growth phases for 11 species, ~120 cultivars,
# companion planting edges, and IPM data.

# ==============================================================================
# S1  NEW BOTANICAL FAMILIES (1)
# ==============================================================================

new_families:
  - name: Iridaceae
    common_name_de: "Schwertliliengewächse"
    common_name_en: Iris family
    order: Asparagales
    typical_nutrient_demand: light
    frost_tolerance: moderate
    typical_root_depth: shallow
    typical_growth_forms: [herb]
    common_pests: [thrips, aphids, gladiolus_thrips]
    common_diseases: [Fusarium, Grauschimmel, "Knollenfäule"]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Schwertliliengewächse mit Iris, Krokus, Gladiole und Tigridia.
      Geophyten mit Zwiebeln, Knollen oder Rhizomen. Insektenbestäubt.
    rotation_category: ornamental

