# S7  COMPANION PLANTING EDGES
# ==============================================================================

companion_planting:
  compatible:
    # Dahlia companions
    - species_a: "Dahlia pinnata"
      species_b: "Helianthus annuus"
      score: 0.6
    # Fragaria companions
    - species_a: "Fragaria x ananassa"
      species_b: "Allium porrum"
      score: 0.7
    - species_a: "Fragaria x ananassa"
      species_b: "Petroselinum crispum"
      score: 0.6
    - species_a: "Fragaria x ananassa"
      species_b: "Raphanus sativus"
      score: 0.6
    - species_a: "Fragaria x ananassa"
      species_b: "Daucus carota"
      score: 0.6
    - species_a: "Fragaria x ananassa"
      species_b: "Pisum sativum"
      score: 0.6
    - species_a: "Fragaria x ananassa"
      species_b: "Viola x wittrockiana"
      score: 0.6
    # Helianthus companions
    - species_a: "Helianthus annuus"
      species_b: "Cucumis sativus"
      score: 0.7
    - species_a: "Helianthus annuus"
      species_b: "Cucurbita pepo"
      score: 0.7
    - species_a: "Helianthus annuus"
      species_b: "Phaseolus vulgaris"
      score: 0.7
    # Viola companions
    - species_a: "Viola x wittrockiana"
      species_b: "Lactuca sativa"
      score: 0.6
    - species_a: "Viola x wittrockiana"
      species_b: "Raphanus sativus"
      score: 0.6
    - species_a: "Viola x wittrockiana"
      species_b: "Daucus carota"
      score: 0.6
    # Petunia companions
    - species_a: "Petunia x hybrida"
      species_b: "Ocimum basilicum"
      score: 0.7
    - species_a: "Petunia x hybrida"
      species_b: "Solanum lycopersicum"
      score: 0.6
    # Indoor plants - generally compatible with each other
    - species_a: "Chlorophytum comosum"
      species_b: "Spathiphyllum wallisii"
      score: 0.5
    - species_a: "Chlorophytum comosum"
      species_b: "Monstera deliciosa"
      score: 0.5
    # Apium rapaceum companions (similar to Apium graveolens)
    - species_a: "Apium graveolens var. rapaceum"
      species_b: "Allium porrum"
      score: 0.7
    - species_a: "Apium graveolens var. rapaceum"
      species_b: "Brassica oleracea var. gemmifera"
      score: 0.7
    - species_a: "Apium graveolens var. rapaceum"
      species_b: "Solanum lycopersicum"
      score: 0.6
    - species_a: "Apium graveolens var. rapaceum"
      species_b: "Phaseolus vulgaris"
      score: 0.6
    - species_a: "Apium graveolens var. rapaceum"
      species_b: "Pisum sativum"
      score: 0.6

  incompatible:
    # Helianthus - strong allelopathy
    - species_a: "Helianthus annuus"
      species_b: "Solanum lycopersicum"
      reason: "Allelopathie: Heliannuole hemmen Tomatenwachstum"
    - species_a: "Helianthus annuus"
      species_b: "Solanum tuberosum"
      reason: "Allelopathie: Heliannuole hemmen Kartoffelwachstum"
    - species_a: "Helianthus annuus"
      species_b: "Lactuca sativa"
      reason: "Allelopathie: Wurzelexsudate hemmen Salatkeimung"
    # Fragaria - replant problem
    - species_a: "Fragaria x ananassa"
      species_b: "Fragaria x ananassa"
      reason: "Autotoxizität: Bodenermüdung bei Nachbau"
    - species_a: "Fragaria x ananassa"
      species_b: "Brassica oleracea var. gemmifera"
      reason: "Nährstoffkonkurrenz"
    # Dahlia
    - species_a: "Dahlia pinnata"
      species_b: "Dahlia pinnata"
      reason: "Virenübertragung bei engem Stand"
    # Apiaceae untereinander
