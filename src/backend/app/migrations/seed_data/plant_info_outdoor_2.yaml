# ==============================================================================
# S4  COMPANION PLANTING
# ==============================================================================

companion_planting:
  compatible:
    # Herbs with vegetables — classic companions
    - species_a: "Satureja hortensis"
      species_b: "Phaseolus vulgaris"
      score: 0.9
    - species_a: "Origanum vulgare"
      species_b: "Solanum lycopersicum"
      score: 0.7
    - species_a: "Melissa officinalis"
      species_b: "Solanum lycopersicum"
      score: 0.6
    - species_a: "Ocimum basilicum"
      species_b: "Solanum lycopersicum"
      score: 0.9

    # Tagetes as nematode deterrent
    - species_a: "Tagetes patula"
      species_b: "Solanum lycopersicum"
      score: 0.8
    - species_a: "Tagetes patula"
      species_b: "Solanum tuberosum"
      score: 0.8
    - species_a: "Tagetes patula"
      species_b: "Fragaria x ananassa"
      score: 0.7
    - species_a: "Tagetes patula"
      species_b: "Rosa spp."
      score: 0.7

    # Tropaeolum as trap crop for aphids
    - species_a: "Tropaeolum majus"
      species_b: "Solanum lycopersicum"
      score: 0.7
    - species_a: "Tropaeolum majus"
      species_b: "Phaseolus vulgaris"
      score: 0.6

    # Phacelia as universal companion / bee forage
    - species_a: "Phacelia tanacetifolia"
      species_b: "Solanum lycopersicum"
      score: 0.6
    - species_a: "Phacelia tanacetifolia"
      species_b: "Solanum tuberosum"
      score: 0.6

    # Spinach and strawberries
    - species_a: "Spinacia oleracea"
      species_b: "Fragaria x ananassa"
      score: 0.7

    # Lavender with roses (aphid deterrent)
    - species_a: "Lavandula angustifolia"
      species_b: "Rosa spp."
      score: 0.8

    # Berry companions
    - species_a: "Ribes rubrum"
      species_b: "Ribes uva-crispa"
      score: 0.6
    - species_a: "Rubus idaeus"
      species_b: "Trifolium pratense"
      score: 0.7

    # Legume pre-crops improve soil for heavy feeders
    - species_a: "Pisum sativum"
      species_b: "Solanum lycopersicum"
      score: 0.7
    - species_a: "Lupinus polyphyllus"
      species_b: "Rosa spp."
      score: 0.6

    # Fruit tree understory
    - species_a: "Trifolium pratense"
      species_b: "Malus domestica"
      score: 0.7
    - species_a: "Tropaeolum majus"
      species_b: "Malus domestica"
      score: 0.6

  incompatible:
    # Brassicaceae allelopathy conflicts
    - species_a: "Sinapis alba"
      species_b: "Fragaria x ananassa"
      reason: "Kreuzbleutler-Allelopathie; Kohlhernie-Risiko im Boden"
    - species_a: "Sinapis alba"
      species_b: "Solanum lycopersicum"
      reason: "Kreuzbleutler hemmen Nachtschattengewaechse"

    # Mint spreads aggressively — conflicts with neighbors
    - species_a: "Mentha piperita"
      species_b: "Petroselinum crispum"
      reason: "Minze verdraengt Petersilie durch aggressive Rhizomausbreitung"

    # Rhododendron allelopathy — acidifies and inhibits surrounding plants
    - species_a: "Rhododendron spp."
      species_b: "Rosa spp."
      reason: "Rhododendron-Phenole hemmen Rosenwurzeln; unterschiedliche pH-Anforderungen"
    - species_a: "Rhododendron spp."
      species_b: "Lavandula angustifolia"
      reason: "Entgegengesetzte pH-Anforderungen (sauer vs. kalkig)"

    # Potatoes and tomatoes share blight
    - species_a: "Solanum tuberosum"
      species_b: "Solanum lycopersicum"
      reason: "Gleiche Familie; Braunfaeule und Krautfaeule uebertraegbar"

    # Fennel/Lovage inhibition
