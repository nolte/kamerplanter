# yaml-language-server: $schema=./schemas/plant_info.schema.yaml
# Plant-info seed data from spec/knowledge/plants/*.md — Outdoor Garden Plants Batch 2.
#
# Adds 15 new botanical families, 38 new species, enriches 14 existing species,
# and adds companion planting edges.
#
# Enum mapping notes:
#   - "rhizomatous" root_type in docs → mapped to "fibrous" (closest match in RootType enum)
#   - "tender" frost_sensitivity in docs → mapped to "sensitive" (FrostTolerance enum)
#   - "half_hardy" frost_sensitivity → mapped to "moderate" (FrostTolerance enum)
#   - nutrient_demand_level values use doc format (light_feeder, medium_feeder, heavy_feeder, nitrogen_fixer)
#     as per existing plant_info.yaml pattern

# ==============================================================================
# S1  NEW BOTANICAL FAMILIES (15)
# ==============================================================================

new_families:
  - name: Oleaceae
    common_name_de: "Oelgewaechse"
    common_name_en: Olive family
    order: Lamiales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: deep
    typical_growth_forms: [shrub, tree]
    common_pests: [aphids, scale_insects, lilac_borer]
    common_diseases: [powdery_mildew, bacterial_blight]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Oelbaumgewaechse mit Flieder, Forsythie und Liguster.
      Meist Straeucher oder Baeume, teils immergruen.
    rotation_category: ornamental

  - name: Geraniaceae
    common_name_de: Storchschnabelgewaechse
    common_name_en: Geranium family
    order: Geraniales
    typical_nutrient_demand: light
    frost_tolerance: hardy
    typical_root_depth: shallow
    typical_growth_forms: [herb]
    common_pests: [slugs, vine_weevil]
    common_diseases: [powdery_mildew, rust]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Storchschnabelgewaechse mit winterharten Geranium-Arten.
      Beliebte Bodendecker und Staudenpflanzen.
    rotation_category: ornamental

  - name: Ranunculaceae
    common_name_de: Hahnenfussgewaechse
    common_name_en: Buttercup family
    order: Ranunculales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [herb]
    common_pests: [aphids, slugs]
    common_diseases: [black_spot, crown_rot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Hahnenfussgewaechse mit Christrose, Eisenhut und Rittersporn.
      Viele Arten enthalten Alkaloide (giftig).
    rotation_category: ornamental

  - name: Asphodelaceae
    common_name_de: Grasliliengewaechse
    common_name_en: Asphodel family
    order: Asparagales
    typical_nutrient_demand: medium
    frost_tolerance: moderate  # Corrected: family spans frost-hardy (Hemerocallis) to sensitive (Aloe) genera
    typical_root_depth: medium
    typical_growth_forms: [herb]
    common_pests: [thrips, slugs, deer]
    common_diseases: [rust, leaf_streak]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Grasliliengewaechse mit Taglilien (Hemerocallis) und Aloe.
      Robuste Stauden mit Knollen oder Rhizomen.
    rotation_category: ornamental

  - name: Hydrangeaceae
    common_name_de: Hortensiengewaechse
    common_name_en: Hydrangea family
    order: Cornales
    typical_nutrient_demand: medium
    frost_tolerance: moderate
    typical_root_depth: medium
    typical_growth_forms: [shrub]
    common_pests: [aphids, spider_mites, vine_weevil]
    common_diseases: [powdery_mildew, leaf_spot, botrytis]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.0
      max_ph: 6.5
    description: >-
      Hortensiengewaechse. Bluetenfarbe pH-abhaengig (sauer = blau, alkalisch = rosa).
      Feuchtigkeitsliebende Straeucher.
    rotation_category: ornamental

  - name: Paeoniaceae
    common_name_de: Pfingstrosengewaechse
    common_name_en: Peony family
    order: Saxifragales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: deep
    typical_growth_forms: [herb, shrub]
    common_pests: [ants, botrytis, nematodes]
    common_diseases: [botrytis, powdery_mildew, leaf_spot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Pfingstrosengewaechse mit langlebigen Stauden- und Strauchpfingstrosen.
      Benoetigen Kaelteperiode fuer Blueteninduktion (Vernalisation).
    rotation_category: ornamental

  - name: Boraginaceae
    common_name_de: Raublattgewaechse
    common_name_en: Borage family
    order: Boraginales
    typical_nutrient_demand: light
    frost_tolerance: moderate
    typical_root_depth: medium
    typical_growth_forms: [herb]
    common_pests: [aphids]
    common_diseases: [powdery_mildew]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Raublattgewaechse mit Phacelia und Borretsch.
      Hervorragende Bienenweide und Gruenduengung.
    rotation_category: green_manure

  - name: Vitaceae
    common_name_de: Weinrebengewaechse
    common_name_en: Grape family
    order: Vitales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: deep
    typical_growth_forms: [vine]
    common_pests: [grape_phylloxera, spider_mites, grape_berry_moth]
    common_diseases: [downy_mildew, powdery_mildew, botrytis]
    pollination_type: [wind, self]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Weinrebengewaechse. Rankende Holzgewaechse mit Trauben.
      PIWI-Sorten (pilzwiderstandsfaehig) fuer Norddeutschland empfohlen.
    rotation_category: permanent

  - name: Ericaceae
    common_name_de: Heidekrautgewaechse
    common_name_en: Heath family
    order: Ericales
    typical_nutrient_demand: light
    frost_tolerance: hardy
    typical_root_depth: shallow
    typical_growth_forms: [shrub]
    common_pests: [vine_weevil, lace_bug]
    common_diseases: [phytophthora, chlorosis]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 4.0
      max_ph: 5.5
    description: >-
      Heidekrautgewaechse mit Rhododendron, Heidelbeere und Erika.
      Benoetigen zwingend saure Boeden (pH 4.0-5.5). Mykorrhiza-abhaengig.
    rotation_category: permanent

  - name: Grossulariaceae
    common_name_de: Stachelbeergewaechse
    common_name_en: Currant family
    order: Saxifragales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [shrub]
    common_pests: [gooseberry_sawfly, aphids, scale_insects]
    common_diseases: [powdery_mildew, leaf_spot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 6.5
    description: >-
      Stachelbeergewaechse mit Johannisbeere und Stachelbeere.
      Winterharte Beerenstraeucher fuer Norddeutschland.
    rotation_category: permanent

  - name: Adoxaceae
    common_name_de: Moschuskrautgewaechse
    common_name_en: Moschatel family
    order: Dipsacales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [shrub]
    common_pests: [aphids, viburnum_leaf_beetle]
    common_diseases: [powdery_mildew]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 7.0
    description: >-
      Moschuskrautgewaechse mit Holunder (Sambucus) und Schneeball (Viburnum).
      Einheimische Wildstraeucher, Vogelnaehrgehoelze.
    rotation_category: permanent

  - name: Caprifoliaceae
    common_name_de: Geissblattgewaechse
    common_name_en: Honeysuckle family
    order: Dipsacales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [shrub]
    common_pests: [aphids]
    common_diseases: [powdery_mildew, leaf_spot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 7.0
    description: >-
      Geissblattgewaechse mit Weigelie, Geissblatt und Abelie.
      Ueberwiegend Zierstaerucher mit reicher Bluete.
    rotation_category: ornamental

  - name: Polemoniaceae
    common_name_de: Himmelsleitergewaechse
    common_name_en: Phlox family
    order: Ericales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [herb]
    common_pests: [spider_mites, nematodes]
    common_diseases: [powdery_mildew, leaf_spot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Himmelsleitergewaechse mit Phlox und Jakobsleiter.
      Beliebte Gartenstauden mit langer Bluetezeit.
    rotation_category: ornamental

  - name: Polygonaceae
    common_name_de: Knoeterichgewaechse
    common_name_en: Buckwheat family
    order: Caryophyllales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: deep
    typical_growth_forms: [herb]
    common_pests: [aphids, slugs]
    common_diseases: [leaf_spot, crown_rot]
    pollination_type: [wind, insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 7.0
    description: >-
      Knoeterichgewaechse mit Rhabarber, Buchweizen und Sauerampfer.
      Enthaelt Oxalsaeure in Blaettern (Rhabarber).
    rotation_category: vegetable

  - name: Tropaeolaceae
    common_name_de: Kapuzinerkressengewaechse
    common_name_en: Nasturtium family
    order: Brassicales
    typical_nutrient_demand: light
    frost_tolerance: sensitive
    typical_root_depth: shallow
    typical_growth_forms: [herb, vine]
    common_pests: [aphids, caterpillars, whiteflies]
    common_diseases: [mosaic_virus]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 7.0
    description: >-
      Kapuzinerkressengewaechse. Essbare Blueten und Blaetter (senfoel-artig).
      Hervorragende Blattlaus-Fangpflanze (Trap Crop).
    rotation_category: ornamental

