nutrient_plans:
  # ── Plan: Monstera deliciosa — Gardol Grünpflanzendünger ──────────────────────
  - name: "Monstera deliciosa — Gardol Grünpflanzendünger"
    description: >-
      Ganzjahresplan für Monstera deliciosa in Erdsubstrat.
      Einzeldünger-Konzept mit Gardol Grünpflanzendünger (NPK 6-4-6).
      Saisonaler Rhythmus: März–Oktober Düngung, November–Februar Pause.
    recommended_substrate_type: soil
    reference_substrate_type: soil
    author: Kamerplanter Referenzdaten
    is_template: true
    version: "1.2"
    tags: [monstera, zimmerpflanze, gruenpflanze, gardol, erde, indoor, anfaenger]
    water_mix_ratio_ro_percent: null
    cycle_restart_from_sequence: 3
    watering_schedule:
      schedule_mode: interval
      interval_days: 7
      preferred_time: "09:00"
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1

    phase_entries:
      # ── GERMINATION W1-4 ──
      - phase_name: germination
        sequence_order: 1
        week_start: 1
        week_end: 4
        is_recurring: false
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Keine Düngung. Steckling nur mit klarem Wasser gießen.
          Substrat feucht halten, nicht nass. 3-Tage-Intervall für kleine Töpfe
          (8–10 cm) bei 22–25 °C.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 3
          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: wasser-bewurzelung
            label: "Nur Wasser (Bewurzelung)"
            application_method: drench
            target_ec_ms: null
            target_ph: 6.0
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.10
            fertilizer_dosages: []

      # ── SEEDLING W5-16 ──
      - phase_name: seedling
        sequence_order: 2
        week_start: 5
        week_end: 16
        is_recurring: false
        npk_ratio: [1.0, 1.0, 1.0]
        reference_ec_ms: 0.6
        calcium_ppm: 40.0
        magnesium_ppm: 20.0
        notes: >-
          Halbe Dosis alle 14 Tage. Pflanze baut Wurzelsystem und erste Blätter auf.
          Eisenbedarf ca. 1 ppm.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 14
          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: drench-giessduengung
            label: "Gießdüngung (Gießkanne)"
            application_method: drench
            target_ec_ms: 0.6
            target_ph: 6.0
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages:
              - product_name: Grünpflanzendünger
                ml_per_liter: 2.0

      # ── DORMANCY W1-8 (recurring, Jan–Feb) ──
      - phase_name: dormancy
        sequence_order: 3
        week_start: 1
        week_end: 8
        is_recurring: true
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Saisonale Ruhephase Januar–Februar. Keine Düngung.
          12-Tage-Intervall bei 18–22 °C.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 12
          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: wasser-dormancy
            label: "Nur Wasser (Ruheperiode)"
            application_method: drench
            target_ec_ms: null
            target_ph: 6.0
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages: []

      # ── VEGETATIVE W9-43 (recurring, Mär–Okt) ──
      - phase_name: vegetative
        sequence_order: 4
        week_start: 9
        week_end: 43
        is_recurring: true
        npk_ratio: [1.5, 1.0, 1.5]
        reference_ec_ms: 1.0
        calcium_ppm: 80.0
        magnesium_ppm: 40.0
        notes: >-
          Volle Dosis wöchentlich (April–September), halbe Dosis 14-tägig
          (März, Oktober). Ca/Mg aus Leitungswasser.
          Alle 6–8 Wochen Salzspülung.
        delivery_channels:
          - channel_id: drench-giessduengung
            label: "Gießdüngung (Gießkanne)"
            application_method: drench
            target_ec_ms: 1.0
            target_ph: 6.0
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.5
            fertilizer_dosages:
              - product_name: Grünpflanzendünger
                ml_per_liter: 4.0

      # ── DORMANCY W44-52 (recurring, Nov–Dez) ──
      - phase_name: dormancy
        sequence_order: 5
        week_start: 44
        week_end: 52
        is_recurring: true
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Saisonale Ruhephase November–Dezember. Keine Düngung.
          12-Tage-Intervall bei 18–22 °C.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 12
          preferred_time: "09:00"
          application_method: drench
