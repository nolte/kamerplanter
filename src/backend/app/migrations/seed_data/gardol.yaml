  # ── Plan: Yucca elephantipes — Gardol Grünpflanzendünger ─────────────────────
  - name: "Yucca elephantipes — Gardol Grünpflanzendünger"
    description: >-
      Ganzjahresplan für Yucca elephantipes (Yucca-Palme) in Erdsubstrat.
      Einzeldünger-Konzept mit Gardol Grünpflanzendünger (NPK 6-4-6).
      Schwachzehrer — stark reduzierte Dosierung (Vierteldosis Maximum).
      Saisonaler Rhythmus: April–September Düngung (4-Wochen-Intervall),
      Oktober–März Pause. Trockenheitsliebend — Substrat zwischen Gießgängen
      gut abtrocknen lassen.
    recommended_substrate_type: soil
    reference_substrate_type: soil
    author: Kamerplanter Referenzdaten
    is_template: true
    version: "1.0"
    tags:
      - yucca
      - yucca-palme
      - zimmerpflanze
      - gruenpflanze
      - gardol
      - erde
      - indoor
      - anfaenger
      - schwachzehrer
      - trockenheitsvertraeglich
    water_mix_ratio_ro_percent: null
    cycle_restart_from_sequence: 3
    watering_schedule:
      schedule_mode: interval
      interval_days: 10
      preferred_time: "09:00"
      application_method: drench
      reminder_hours_before: 2
      times_per_day: 1

    phase_entries:
      # ── GERMINATION W1-4 (Etablierung nach Kauf/Umtopfen) ──
      - phase_name: germination
        sequence_order: 1
        week_start: 1
        week_end: 4
        is_recurring: false
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Keine Düngung. Neugekaufte oder umgetopfte Yucca nur mit klarem
          Wasser gießen. Substrat zwischen Gießgängen fast komplett abtrocknen
          lassen — Yucca speichert Wasser im Stamm und verträgt Trockenheit
          besser als Staunässe. 10-Tage-Intervall, Fingerprobe: obere 5 cm
          trocken = gießen.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 10
          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: wasser-etablierung
            label: "Nur Wasser (Etablierung)"
            application_method: drench
            target_ec_ms: null
            target_ph: 6.5
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages: []

      # ── SEEDLING W5-16 (Jungpflanze/Steckling) ──
      - phase_name: seedling
        sequence_order: 2
        week_start: 5
        week_end: 16
        is_recurring: false
        npk_ratio: [1.0, 1.0, 1.0]
        reference_ec_ms: 0.3
        calcium_ppm: 30.0
        magnesium_ppm: 15.0
        notes: >-
          Vierteldosis Gardol (1 ml/L) alle 28 Tage. Gießintervall 10 Tage.
          Junge Yucca baut Wurzelsystem auf. Schwachzehrer — frühestens
          nach sichtbarem Neuzuwachs düngen. Substrat gut durchlässig
          halten (ggf. Sand/Perlite beimischen). Nur in der
          Wachstumsperiode (April–September) düngen.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 10
          preferred_time: "09:00"
          application_method: drench
          reminder_hours_before: 2
          times_per_day: 1
        delivery_channels:
          - channel_id: drench-giessduengung
            label: "Gießdüngung (Gießkanne)"
            application_method: drench
            target_ec_ms: 0.3
            target_ph: 6.5
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages:
              - product_name: Grünpflanzendünger
                ml_per_liter: 1.0

      # ── DORMANCY W1-13 (recurring, Jan–Mär) ──
      - phase_name: dormancy
        sequence_order: 3
        week_start: 1
        week_end: 13
        is_recurring: true
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Saisonale Ruhephase Januar–März. Keine Düngung.
          14-Tage-Intervall bei 10–18 °C (Yucca verträgt kühle
          Überwinterung bis 5 °C). Substrat fast komplett austrocknen
          lassen. Yucca speichert Wasser im Stamm — Übergießen ist
          der häufigste Pflegefehler. Heller, kühler Standort ideal.
        watering_schedule_override:
          schedule_mode: interval
          interval_days: 14
          preferred_time: "09:00"
          application_method: drench
