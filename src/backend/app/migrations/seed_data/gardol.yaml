          Schwachzehrer — Vierteldosis ist Maximum! Gießintervall 10 Tage,
          Fingerprobe: obere 5 cm trocken = gießen. Ca/Mg aus Leitungswasser.
          Alle 3–4 Monate Salzspülung. Yucca verträgt volle Sonne und
          profitiert von Freilandaufenthalt im Sommer (abhärten!).
          NPK 1,5:1:1,5 = Gardol-Produktrealität. Keine höhere Dosierung
          verwenden — Yucca wächst langsam und benötigt wenig Nährstoffe.
        delivery_channels:
          - channel_id: drench-giessduengung
            label: "Gießdüngung (Gießkanne)"
            application_method: drench
            target_ec_ms: 0.4
            target_ph: 6.5
            method_type: drench
            method_params:
              volume_per_feeding_liters: 0.5
            fertilizer_dosages:
              - product_name: Grünpflanzendünger
                ml_per_liter: 1.0

      # ── DORMANCY W40-52 (recurring, Okt–Dez) ──
      - phase_name: dormancy
