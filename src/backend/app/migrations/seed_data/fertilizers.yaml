  - product_name: "Piranha"
    brand: "Advanced Nutrients"
    fertilizer_type: biological
    is_organic: true
    tank_safe: false
    recommended_application: drench
    npk_ratio: [0.0, 0.0, 0.0]
    ec_contribution_per_ml: 0.0
    mixing_priority: 50
    ph_effect: neutral
    bioavailability: microbial_dependent
    notes: "Mykorrhiza-Pilze für Nährstoffaufnahme. Woche 1-2."

  - product_name: "Tarantula"
    brand: "Advanced Nutrients"
    fertilizer_type: biological
    is_organic: true
    tank_safe: false
    recommended_application: drench
    npk_ratio: [0.0, 0.0, 0.0]
    ec_contribution_per_ml: 0.0
    mixing_priority: 50
    ph_effect: neutral
    bioavailability: microbial_dependent
    notes: "10 Mio. CFU/g Bacillus + Streptomyces. Woche 1-2."

  # ── Enzyme ─────────────────────────────────────────────────────────────────
  - product_name: "Sensizym"
    brand: "Advanced Nutrients"
    fertilizer_type: biological
    is_organic: true
    tank_safe: false
    recommended_application: drench
    npk_ratio: [0.0, 0.0, 0.0]
    ec_contribution_per_ml: 0.0
    mixing_priority: 70
    ph_effect: neutral
    bioavailability: microbial_dependent
    shelf_life_days: 540
    storage_temp_min: 5.0
    storage_temp_max: 25.0
    notes: >-
      Hochkonzentriertes Enzympräparat (Cellulase 850 U/ml, Xylanase 200 U/ml,
      Beta-Glucanase 10 U/ml + >80 weitere Enzymtypen). Baut abgestorbene
      Wurzelmasse und Zelluloserückstände enzymatisch ab. 2 ml/L bei jeder
      Bewässerung (Hydro/Coco), 5 ml/L in Erde. Gesamter Zyklus inkl. Flush.
      Nicht im stehenden Tank lagern (Enzymaktivitätsverlust) — frisch anmischen.

  # ── Flush Agents ───────────────────────────────────────────────────────────
  - product_name: "Flawless Finish"
    brand: "Advanced Nutrients"
    fertilizer_type: supplement
    is_organic: false
    tank_safe: true
    recommended_application: fertigation
    npk_ratio: [0.0, 0.0, 0.0]
    ec_contribution_per_ml: 0.0
    mixing_priority: 90
    ph_effect: neutral
    bioavailability: immediate
    shelf_life_days: 730
    storage_temp_min: 5.0
    storage_temp_max: 30.0
    notes: >-
      Chelat-basiertes Spülmittel (Magnesium-EDTA + MgSO₄, 0,97% Mg).
      Bindet überschüssige Salze, Nitrate und Schwermetalle im Substrat.
      2 ml/L, ausschließlich in den letzten 4-10 Tagen vor der Ernte.
      Ersetzt ALLE Dünger in der Flush-Phase. Ziel: EC im Ablauf <0,1 mS/cm.
      Nicht für Ökolandbau (EDTA). Tank-kompatibel.

  # ── Third-Party Supplements ─────────────────────────────────────────────────
  - product_name: "Drip Clean"
    brand: "House & Garden"
