    ph_effect: acidic
    bioavailability: immediate
    shelf_life_days: 730
    storage_temp_min: 5.0
    storage_temp_max: 25.0
    notes: >-
      Mineralischer Systemreiniger (P2O5 18%, K2O 6%). Löst Salzablagerungen
      in Leitungen und Substrat. 0.1 ml/L bei jeder Bewässerung.
      IMMER vor den Basisdüngern zugeben.

  - product_name: "Free Flow"
    brand: "Bio Nova"
    fertilizer_type: biological
    is_organic: true
    tank_safe: false
    recommended_application: drench
    npk_ratio: [0.0, 0.0, 0.0]
    ec_contribution_per_ml: 0.0
