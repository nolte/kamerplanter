    ph_effect: neutral
    bioavailability: microbial_dependent
    shelf_life_days: 365
    storage_temp_min: 5.0
    storage_temp_max: 25.0
    notes: >-
      Organisches Enzympräparat (Cellulasen, Proteasen, Lipasen).
      Baut abgestorbene Wurzelmasse und organische Rückstände ab.
      0.3-0.5 ml/L per Gießkanne, nicht im Tank (Biofilm-Gefahr).

  # ── CalMag Supplement ──────────────────────────────────────────────────────
  - product_name: "CalMag"
    brand: "Terra Aquatica"
    fertilizer_type: supplement
    is_organic: false
    tank_safe: true
    recommended_application: fertigation
    npk_ratio: [5.0, 0.0, 0.0]
    ec_contribution_per_ml: 0.10
    mixing_priority: 8
    ph_effect: neutral
    bioavailability: immediate
    notes: >-
      Calcium-Magnesium-Supplement (Ca 3.2%, Mg 1.2%, N 5%).
      PFLICHT bei Osmosewasser/RO-Wasser. VOR Basisdüngern zugeben.
      Dosierung: 0.5-1.5 ml/L je nach Phase und Pflanze.
      Leitungswasser (>0.3 EC): meist nicht nötig.


# ── Nutrient Plans ────────────────────────────────────────────────────────────

nutrient_plans:
  # ── Advanced Nutrients pH Perfect Sensi — Cannabis ──────────────────────────
  # Based on: https://www.advancednutrients.com/feeding/
  #           https://www.growbarato.net/blog/en/advanced-nutrients-feeding-chart/
  - name: "Advanced Nutrients pH Perfect Sensi — Cannabis"
    description: >-
      Vollständiges Düngeprogramm für Cannabis mit der pH Perfect Sensi-Serie
      von Advanced Nutrients. Enthält Basis A+B, Booster (Big Bud, Overdrive),
      Supplements (B-52, Bud Candy, Nirvana, Rhino Skin), Biologicals
      (Voodoo Juice, Piranha, Tarantula, Sensizym) und Flush (Flawless Finish).
      Ergänzt durch H&G Drip Clean (Systemreiniger) und Bio Nova Free Flow.
      Für Coco/Hydro optimiert.
    recommended_substrate_type: coco
    author: "Advanced Nutrients"
    is_template: true
    version: "2025.2"
    tags: [advanced-nutrients, ph-perfect, sensi, cannabis, coco, hydro]
    phase_entries:
      # ── 1. Keimung (Week 0-1) ──────────────────────────────────────────
      - phase_name: germination
        sequence_order: 1
        week_start: 1
        week_end: 2
        npk_ratio: [0.0, 0.0, 0.0]
        target_ec_ms: 0.2
        reference_base_ec: 0.0
        target_ph: 6.2
        feeding_frequency_per_week: 1
        notes: "Nur Wasser. Samen keimen in feuchtem Medium, kein Dünger."
        dosages: []

      # ── 2. Sämling (Week 1-3) ──────────────────────────────────────────
      - phase_name: seedling
        sequence_order: 2
        week_start: 2
        week_end: 4
        npk_ratio: [2.0, 1.0, 3.0]
        target_ec_ms: 0.6
        reference_base_ec: 0.0
        target_calcium_ppm: 80.0
        target_magnesium_ppm: 30.0
        target_ph: 5.9
        feeding_frequency_per_week: 2
        volume_per_feeding_liters: 0.3
        notes: >-
          1/4 Dosis Sensi Grow. Voodoo Juice + Tarantula + Piranha
          für Wurzelaufbau. B-52 gegen Umpflanz-Stress.
        dosages:
          - product_name: "Rhino Skin"
            ml_per_liter: 0.5
          - product_name: "Drip Clean"
            ml_per_liter: 0.1
          - product_name: "pH Perfect Sensi Grow A"
            ml_per_liter: 1.0
          - product_name: "pH Perfect Sensi Grow B"
            ml_per_liter: 1.0
          - product_name: "B-52"
            ml_per_liter: 2.0
          - product_name: "Voodoo Juice"
            ml_per_liter: 2.0
          - product_name: "Piranha"
            ml_per_liter: 2.0
          - product_name: "Tarantula"
            ml_per_liter: 2.0
          - product_name: "Sensizym"
            ml_per_liter: 2.0
          - product_name: "Free Flow"
            ml_per_liter: 0.5
            optional: true

      # ── 3. Vegetativ (Week 3-7) ────────────────────────────────────────
      - phase_name: vegetative
        sequence_order: 3
        week_start: 4
        week_end: 8
        npk_ratio: [4.0, 2.0, 6.0]
        target_ec_ms: 1.4
        reference_base_ec: 0.0
        target_calcium_ppm: 150.0
        target_magnesium_ppm: 50.0
        target_ph: 5.9
        feeding_frequency_per_week: 3
        volume_per_feeding_liters: 0.5
        notes: >-
          Volle Dosis Sensi Grow A+B. Rhino Skin für starke Stängel.
          B-52 durchgehend. Sensizym für Wurzelzonen-Hygiene.
          Voodoo Juice in Woche 3-4.
        dosages:
          - product_name: "Rhino Skin"
            ml_per_liter: 2.0
          - product_name: "Drip Clean"
            ml_per_liter: 0.1
          - product_name: "pH Perfect Sensi Grow A"
            ml_per_liter: 4.0
          - product_name: "pH Perfect Sensi Grow B"
            ml_per_liter: 4.0
          - product_name: "B-52"
            ml_per_liter: 2.0
          - product_name: "Voodoo Juice"
            ml_per_liter: 2.0
            optional: true
          - product_name: "Sensizym"
            ml_per_liter: 2.0
          - product_name: "Free Flow"
            ml_per_liter: 0.5

      # ── 4. Blüte — Früh (Week 7-10) ───────────────────────────────────
      - phase_name: flowering
        sequence_order: 4
        week_start: 8
        week_end: 11
        npk_ratio: [5.0, 4.0, 8.0]
        target_ec_ms: 1.6
        reference_base_ec: 0.0
        target_calcium_ppm: 200.0
        target_magnesium_ppm: 60.0
        target_ph: 5.9
        calcium_ppm: 200.0
        magnesium_ppm: 60.0
        feeding_frequency_per_week: 3
        volume_per_feeding_liters: 0.8
        notes: >-
          Umstellung auf Sensi Bloom A+B. Big Bud für Blütenbildung.
          Bud Candy + Nirvana für Aroma. Voodoo Juice in Woche 7-8.
        dosages:
          - product_name: "Rhino Skin"
            ml_per_liter: 2.0
          - product_name: "Drip Clean"
            ml_per_liter: 0.1
          - product_name: "pH Perfect Sensi Bloom A"
            ml_per_liter: 4.0
          - product_name: "pH Perfect Sensi Bloom B"
            ml_per_liter: 4.0
          - product_name: "Big Bud"
            ml_per_liter: 2.0
          - product_name: "B-52"
            ml_per_liter: 2.0
          - product_name: "Bud Candy"
            ml_per_liter: 2.0
          - product_name: "Nirvana"
            ml_per_liter: 2.0
          - product_name: "Voodoo Juice"
            ml_per_liter: 2.0
            optional: true
          - product_name: "Sensizym"
            ml_per_liter: 2.0
          - product_name: "Free Flow"
            ml_per_liter: 0.5

      # ── 5. Blüte — Spät (Week 10-14) ──────────────────────────────────
      - phase_name: flowering
        sequence_order: 5
        week_start: 11
        week_end: 15
        npk_ratio: [6.0, 9.0, 12.0]
        target_ec_ms: 1.8
        reference_base_ec: 0.0
        target_calcium_ppm: 200.0
        target_magnesium_ppm: 60.0
        target_ph: 5.9
        calcium_ppm: 200.0
        magnesium_ppm: 60.0
        feeding_frequency_per_week: 3
        volume_per_feeding_liters: 1.0
        notes: >-
          Overdrive ersetzt Big Bud für maximale Blütendichte.
          Sensi Bloom A+B volle Dosis. Bud Candy + Nirvana weiter.
          Sensizym durchgehend für Wurzelzonen-Hygiene.
        dosages:
          - product_name: "Rhino Skin"
            ml_per_liter: 2.0
          - product_name: "Drip Clean"
            ml_per_liter: 0.1
          - product_name: "pH Perfect Sensi Bloom A"
            ml_per_liter: 4.0
          - product_name: "pH Perfect Sensi Bloom B"
            ml_per_liter: 4.0
          - product_name: "Overdrive"
            ml_per_liter: 2.0
          - product_name: "B-52"
            ml_per_liter: 2.0
          - product_name: "Bud Candy"
            ml_per_liter: 2.0
          - product_name: "Nirvana"
            ml_per_liter: 2.0
          - product_name: "Sensizym"
            ml_per_liter: 2.0
          - product_name: "Free Flow"
            ml_per_liter: 0.5

      # ── 6. Ernte / Flush (Week 14-16) ──────────────────────────────────
      - phase_name: harvest
        sequence_order: 6
        week_start: 15
        week_end: 17
        npk_ratio: [0.0, 0.0, 0.0]
        target_ec_ms: 0.0
        reference_base_ec: 0.0
        target_ph: 6.0
        feeding_frequency_per_week: 7
        volume_per_feeding_liters: 1.0
        notes: >-
          4-10 Tage Flush mit Flawless Finish (Coco).
          Chelate binden überschüssige Salze. Sensizym für Wurzelabbau.
          Drip Clean löst restliche Salzablagerungen.
          Ziel: EC im Ablauf < 0.1 mS.
        dosages:
          - product_name: "Flawless Finish"
            ml_per_liter: 2.0
          - product_name: "Drip Clean"
            ml_per_liter: 0.1
          - product_name: "Sensizym"
            ml_per_liter: 2.0
          - product_name: "Free Flow"
            ml_per_liter: 0.3
            optional: true

