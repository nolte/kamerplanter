# yaml-language-server: $schema=./schemas/plant_info.schema.yaml
# plant_info_outdoor_3.yaml
# Seed data for Nymphaea alba (White Water Lily) and hardy water lily cultivars.
# Source: spec/plant-info/nymphaea_alba.md
# Created: 2026-04-02
#
# Enum mapping notes:
#   - "rhizomatous" root_type -> "fibrous" (closest match in RootType enum)
#   - "hardy" frost_sensitivity -> "hardy" (FrostTolerance enum)
#   - "tender" frost_sensitivity -> "sensitive" (FrostTolerance enum)
#   - allelopathy_score clamped to 0.0 (schema minimum is 0)

# ==============================================================================
# S1  NEW BOTANICAL FAMILIES
# ==============================================================================
new_families:
  - name: Nymphaeaceae
    common_name_de: "Seerosengewaechse"
    common_name_en: Water Lily family
    order: Nymphaeales
    typical_nutrient_demand: heavy
    frost_tolerance: moderate
    typical_root_depth: deep
    typical_growth_forms: [herb]
    common_pests: [water_lily_aphid, water_lily_leaf_beetle]
    common_diseases: [leaf_spot, rhizome_rot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.5
      max_ph: 8.5
    description: >-
      Aquatic plants with floating leaves and showy flowers. Includes
      Nymphaea (water lilies), Nuphar (pond lilies), and Victoria.
      Rhizomatous perennials rooted in pond substrate.
    rotation_category: ornamental

# ==============================================================================
# S2  SPECIES -> FAMILY MAPPING
# ==============================================================================
new_species_family_map:
  "Nymphaea alba": Nymphaeaceae

# ==============================================================================
# S3  NEW SPECIES
# ==============================================================================
new_species:
  - scientific_name: "Nymphaea alba"
    common_names: [Weisse Seerose, White Water Lily, European White Waterlily]
    genus: Nymphaea
    growth_habit: herb
    root_type: fibrous  # rhizomatous -> fibrous
    hardiness_zones: ["4a", "4b", "5a", "5b", "6a", "6b", "7a", "7b", "8a", "8b", "9a", "9b", "10a", "10b"]
    native_habitat: "Europe, North Africa, temperate Asia"
    allelopathy_score: 0.0  # clamped from -0.2
    frost_sensitivity: hardy
    allows_harvest: false
    sowing_indoor_weeks_before_last_frost: 10
    sowing_outdoor_after_last_frost_days: 21
    direct_sow_months: [5, 6]
    bloom_months: [6, 7, 8, 9]
    container_suitable: "yes"
    recommended_container_volume_l: "20--40"
    min_container_depth_cm: 60
    mature_height_cm: "10--30"
    mature_width_cm: "200--300"
    spacing_cm: "300"
    indoor_suitable: limited
    balcony_suitable: "yes"
    greenhouse_recommended: false
    support_required: false
    nutrient_demand_level: heavy_feeder
    hardiness_detail: "Hardy to -25 C (Zone 4). Rhizome overwinters frost-free in pond substrate at min. 60 cm water depth."
    pruning:
      pruning_required: true
      pruning_season: "spring and autumn"
      pruning_notes: "Remove dead leaves in spring (Mar-Apr) and cut back senescent parts in autumn (Sep-Oct) close to rhizome."

# ==============================================================================
# S4  SPECIES ENRICHMENT
# ==============================================================================
species_enrichment: {}

# ==============================================================================
# S5  LIFECYCLE CONFIGS
# ==============================================================================
lifecycle_configs:
  "Nymphaea alba":
    cycle_type: perennial
    photoperiod_type: long_day
    typical_lifespan_years: 30
    dormancy_required: true
    vernalization_required: false
    vernalization_min_days: null
    critical_day_length_hours: 14.0

# ==============================================================================
# S6  ART-SPECIFIC GROWTH PHASES
# ==============================================================================
growth_phases:
  "Nymphaea alba":
    - name: dormancy
      display_name: Winter Dormancy (Nov-Apr)
      duration_days: 150
      sequence_order: 1
      is_terminal: false
      allows_harvest: false
      stress_tolerance: high
      requirement_profile:
        light_ppfd_target: 50
        photoperiod_hours: 8.0
        temperature_day_c: 4.0
        temperature_night_c: 2.0
        humidity_day_percent: 100
        humidity_night_percent: 100
        vpd_target_kpa: 0.0
        co2_ppm: 400
        irrigation_frequency_days: 0.0
        irrigation_volume_ml_per_plant: 0
      nutrient_profile:
        npk_ratio: [0, 0, 0]
        target_ec_ms: 0.0
        target_ph: 7.5
        calcium_ppm: null
        magnesium_ppm: null

    - name: sprouting
      display_name: Spring Emergence (Apr-May)
      duration_days: 32
      sequence_order: 2
      is_terminal: false
      allows_harvest: false
      stress_tolerance: low
      requirement_profile:
        light_ppfd_target: 600
        photoperiod_hours: 13.0
        temperature_day_c: 13.0
        temperature_night_c: 9.0
        humidity_day_percent: 100
        humidity_night_percent: 100
        vpd_target_kpa: 0.0
        co2_ppm: 400
        irrigation_frequency_days: 0.0
        irrigation_volume_ml_per_plant: 0
      nutrient_profile:
        npk_ratio: [5, 10, 5]
        target_ec_ms: 0.0
        target_ph: 7.0
        calcium_ppm: 50
        magnesium_ppm: 15

    - name: vegetative
      display_name: Vegetative Growth (May-Jun)
      duration_days: 42
      sequence_order: 3
      is_terminal: false
      allows_harvest: false
      stress_tolerance: medium
      requirement_profile:
        light_ppfd_target: 900
        photoperiod_hours: 15.0
        temperature_day_c: 19.0
        temperature_night_c: 14.0
        humidity_day_percent: 100
        humidity_night_percent: 100
        vpd_target_kpa: 0.0
        co2_ppm: 400
        irrigation_frequency_days: 0.0
        irrigation_volume_ml_per_plant: 0
      nutrient_profile:
        npk_ratio: [10, 6, 6]
        target_ec_ms: 0.0
        target_ph: 7.0
        calcium_ppm: 70
        magnesium_ppm: 25

    - name: flowering
      display_name: Bloom and Full Growth (Jun-Sep)
      duration_days: 75
      sequence_order: 4
      is_terminal: false
      allows_harvest: false  # P-005: ornamental — no harvestable product
      stress_tolerance: medium
      requirement_profile:
        light_ppfd_target: 1400
        photoperiod_hours: 15.0
        temperature_day_c: 23.0
        temperature_night_c: 17.0
        humidity_day_percent: 100
        humidity_night_percent: 100
        vpd_target_kpa: 0.0
        co2_ppm: 400
        irrigation_frequency_days: 0.0
        irrigation_volume_ml_per_plant: 0
      nutrient_profile:
        npk_ratio: [10, 10, 10]
        target_ec_ms: 0.0
        target_ph: 7.0
        calcium_ppm: 70
        magnesium_ppm: 25

    - name: senescence
      display_name: Senescence (Sep-Oct)
      duration_days: 42
      sequence_order: 5
      is_terminal: false  # P-004: perennial — senescence is end of annual cycle, not plant death
      allows_harvest: false
      stress_tolerance: high
      requirement_profile:
        light_ppfd_target: 400
        photoperiod_hours: 11.5
        temperature_day_c: 14.0
        temperature_night_c: 9.0
        humidity_day_percent: 100
        humidity_night_percent: 100
        vpd_target_kpa: 0.0
        co2_ppm: 400
        irrigation_frequency_days: 0.0
        irrigation_volume_ml_per_plant: 0
      nutrient_profile:
        npk_ratio: [0, 0, 0]
        target_ec_ms: 0.0
        target_ph: 7.5
        calcium_ppm: null
        magnesium_ppm: null

# ==============================================================================
# S7  CULTIVARS
# ==============================================================================
cultivars:
  "Nymphaea alba":
    - name: "Nymphaea alba (Wild Form)"
      traits: [ornamental]
      seed_type: open_pollinated
      description: "Native wild species; for large natural ponds from 50 m2 water surface; white flowers with yellow stamens; water depth 50-300 cm"
    - name: "James Brydon"
      traits: [ornamental, compact]
      seed_type: open_pollinated
      description: "Hardy hybrid; carmine-red double flowers; shade-tolerant (2-3 h sun); medium ponds; USDA 3-11; water depth 30-60 cm"
    - name: "Escarboucle"
      traits: [ornamental]
      seed_type: open_pollinated
      description: "Hardy hybrid; cherry-red large flowers; very free-flowering over long season; medium to large ponds; water depth 40-80 cm"
    - name: "Marliacea Chromatella"
      traits: [ornamental, heirloom]
      seed_type: open_pollinated
      description: "Hardy hybrid; yellow flowers; one of oldest hybrids (Latour-Marliac 1877); proven and robust"
    - name: "Pygmaea Alba"
      traits: [ornamental, compact]
      seed_type: open_pollinated
      description: "Dwarf water lily; miniature white flowers; ideal for mini-pond and container (from 20 L); water depth 15-30 cm; USDA 4-11"

# ==============================================================================
# S8  NEW PESTS
# ==============================================================================
new_pests:
  - scientific_name: Rhopalosiphum nymphaeae
    common_name: Water Lily Aphid
    pest_type: insect
    lifecycle_days: 14
    optimal_temp_min: 18.0
    optimal_temp_max: 28.0
    detection_difficulty: easy

  - scientific_name: Galerucella nymphaeae
    common_name: Water Lily Leaf Beetle
    pest_type: insect
    lifecycle_days: 45
    optimal_temp_min: 16.0
    optimal_temp_max: 26.0
    detection_difficulty: medium

  - scientific_name: Elophila nymphaeata
    common_name: Brown China-mark Moth
    pest_type: insect
    lifecycle_days: 60
    optimal_temp_min: 15.0
    optimal_temp_max: 25.0
    detection_difficulty: medium

# ==============================================================================
# S9  NEW DISEASES
# ==============================================================================
new_diseases:
  - name: Water Lily Leaf Spot (Ramularia)
    pathogen_type: fungal
    symptoms: ["Brown round spots on leaf surface", "Leaves yellow and die"]
    affected_parts: [leaf]
    optimal_temp_min: 15.0
    optimal_temp_max: 25.0
    optimal_humidity_min: 80.0
    optimal_humidity_max: 100.0

  - name: Rhizome Rot (Water Lily)
    pathogen_type: bacterial
    symptoms: ["Soft brown-black rhizome tissue", "Foul smell", "Plant fails to emerge"]
    affected_parts: [root]
    optimal_temp_min: 10.0
    optimal_temp_max: 20.0
    optimal_humidity_min: 95.0
    optimal_humidity_max: 100.0

# ==============================================================================
# S10  NEW TREATMENTS
# ==============================================================================
new_treatments:
  - name: Submerge Leaves (Aphid Removal)
    treatment_type: mechanical
    application_method: cultural
    safety_interval_days: 0
    notes: "Push infested leaves briefly underwater (10-15 sec); aphids fall off and are eaten by fish. Fully aquatic-safe."

  - name: Remove Infested Leaves (Aquatic)
    treatment_type: cultural
    application_method: cultural
    safety_interval_days: 0
    notes: "Cut heavily infested/diseased leaves at the stalk and dispose in household waste (not compost). Fully aquatic-safe."

  - name: Yellow Sticky Traps (Pond Edge)
    treatment_type: mechanical
    application_method: cultural
    safety_interval_days: 0
    notes: "Place 30-50 cm above water surface at pond edge. Catches flying aphids and beetles. Do not place directly over water."

# ==============================================================================
# S11  PEST-SPECIES EDGES
# ==============================================================================
pest_species_edges:
  - ["Water Lily Aphid", "Nymphaea alba"]
  - ["Water Lily Leaf Beetle", "Nymphaea alba"]
  - ["Brown China-mark Moth", "Nymphaea alba"]

# ==============================================================================
# S12  DISEASE-SPECIES EDGES
# ==============================================================================
disease_species_edges:
  - ["Water Lily Leaf Spot (Ramularia)", "Nymphaea alba"]
  - ["Rhizome Rot (Water Lily)", "Nymphaea alba"]
  - ["Powdery Mildew", "Nymphaea alba"]
  - ["Botrytis (Grey Mold)", "Nymphaea alba"]

# ==============================================================================
# S13  TREATMENT-PEST EDGES
# ==============================================================================
treatment_pest_edges:
  - ["Submerge Leaves (Aphid Removal)", "Water Lily Aphid"]
  - ["Remove Infested Leaves (Aquatic)", "Water Lily Aphid"]
  - ["Remove Infested Leaves (Aquatic)", "Water Lily Leaf Beetle"]
  - ["Remove Infested Leaves (Aquatic)", "Brown China-mark Moth"]
  - ["Yellow Sticky Traps (Pond Edge)", "Water Lily Aphid"]
  - ["Yellow Sticky Traps (Pond Edge)", "Water Lily Leaf Beetle"]

# ==============================================================================
# S14  TREATMENT-DISEASE EDGES
# ==============================================================================
treatment_disease_edges:
  - ["Remove Infested Leaves (Aquatic)", "Water Lily Leaf Spot (Ramularia)"]
  - ["Remove Infested Leaves (Aquatic)", "Botrytis (Grey Mold)"]
  - ["Remove Infested Leaves (Aquatic)", "Powdery Mildew"]

# ==============================================================================
# S15  COMPANION PLANTING
# ==============================================================================
# NOTE: Companion planting partners for Nymphaea alba (Hydrocharis morsus-ranae,
# Stratiotes aloides, Ceratophyllum demersum, Pontederia cordata,
# Sagittaria sagittifolia, etc.) are aquatic species not yet in the
# species database. Their compatibility edges will be added when
# these species are introduced. Similarly, incompatible partners
# (Eichhornia crassipes, Nuphar lutea) are not yet available.
