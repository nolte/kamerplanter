    measurement_unit: head_diameter_cm
    measurement_method: caliper
    observation_frequency: weekly
    reliability_score: 0.8
    species_name: Brassica oleracea var. italica

  - indicator_type: texture
    measurement_unit: compactness_score
    measurement_method: manual
    observation_frequency: weekly
    reliability_score: 0.75
    species_name: Brassica oleracea var. italica

  - indicator_type: days_since_flowering
    measurement_unit: days
    measurement_method: calendar
    observation_frequency: daily
    reliability_score: 0.7
    species_name: Brassica oleracea var. italica

