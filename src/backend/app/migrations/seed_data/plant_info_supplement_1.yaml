# yaml-language-server: $schema=./schemas/plant_info.schema.yaml
# Supplement seed data for species/cultivars missing from plant_info_*.yaml
# Generated from spec/knowledge/plants/*.md reference documents.
#
# Covers:
#   2 indoor plants: Saintpaulia ionantha (Streptocarpus ionanthus),
#     Syngonium podophyllum
#   4 Dahlia cultivars: Embassy, Hapet Daydream, Armateras, Lavender Perfection
#     (all under Dahlia x cultorum)
#
# NOTE: Allium porrum, Beta vulgaris subsp. vulgaris, Brassica oleracea var.
#   gemmifera were removed — canonical entries are in adventskalender.yaml.
#
# Enum mappings applied:
#   frost_sensitivity: "tender" -> "sensitive", "half_hardy" -> "moderate",
#     "very_hardy" -> "very_hardy" (enum has sensitive/moderate/hardy/very_hardy)
#   root_type: "aerial" -> "fibrous", "rhizomatous" -> "fibrous"
#   nutrient_demand_level: uses heavy_feeder, medium_feeder, light_feeder enum values
#
# NOTE: Dahlia x cultorum species already exists in plant_info_outdoor_2.yaml or
#   species.yaml — only cultivars are added here. If the species does not exist
#   yet, the new_species entry below will create it.

# ==============================================================================
# S1  NEW SPECIES -> FAMILY MAP (3 new species)
# ==============================================================================

new_species_family_map:
  "Streptocarpus ionanthus": Gesneriaceae
  "Syngonium podophyllum": Araceae
  "Dahlia x cultorum": Asteraceae

# ==============================================================================
# S2  NEW SPECIES (3)
# ==============================================================================

new_species:
