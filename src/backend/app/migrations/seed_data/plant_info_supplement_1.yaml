    photoperiod_type: long_day
    vernalization_required: true

  "Streptocarpus ionanthus":
    cycle_type: perennial
    photoperiod_type: day_neutral

  "Syngonium podophyllum":
    cycle_type: perennial
    photoperiod_type: day_neutral

  "Dahlia x cultorum":
    cycle_type: perennial
    photoperiod_type: short_day

