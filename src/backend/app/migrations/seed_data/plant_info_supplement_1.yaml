# ==============================================================================
# S6  COMPANION PLANTING
# ==============================================================================

companion_planting:
  compatible:
    # Streptocarpus ionanthus (indoor companions)
    - species_a: "Streptocarpus ionanthus"
      species_b: "Fittonia albivenis"
      score: 0.7
      reason: "Aehnliche Feuchtigkeitsanforderungen, optische Ergaenzung"

    # Dahlia x cultorum
    - species_a: "Dahlia x cultorum"
      species_b: "Tagetes erecta"
      score: 0.8
      reason: "Nematodenabwehr durch tiefes Wurzelsystem, Bestauber-Anlockung"
    - species_a: "Dahlia x cultorum"
      species_b: "Calendula officinalis"
      score: 0.7
      reason: "Nuetzlingsfoerderung, Schaedlingsablenkung"

  incompatible: []
    # NOTE: Allium porrum, Beta vulgaris, Brassica oleracea incompatible edges
    # moved to adventskalender.yaml (canonical location for these species)

# ==============================================================================
# S7  PEST-SPECIES EDGES (species -> pest)
# ==============================================================================

pest_species_edges:
  "Streptocarpus ionanthus":
    - pest: "Planococcus citri"
      common_name: "Wollaus"
      severity: medium
      affected_parts: [stem, leaf, root]
      phases: [vegetative, flowering]
    - pest: "Phytonemus pallidus"
      common_name: "Zyklamen-Milbe"
      severity: high
      affected_parts: [leaf, flower]
      phases: [vegetative, flowering]
    - pest: "Thysanoptera"
      common_name: "Thrips"
      severity: medium
      affected_parts: [flower, leaf]
      phases: [flowering]

  "Syngonium podophyllum":
    - pest: "Tetranychus urticae"
      common_name: "Spinnmilbe"
      severity: medium
      affected_parts: [leaf]
      phases: [active_growth]
    - pest: "Pseudococcus spp."
      common_name: "Schmierlaus"
      severity: medium
      affected_parts: [stem, leaf]
      phases: [active_growth]

  "Dahlia x cultorum":
    - pest: "Tetranychus urticae"
      common_name: "Spinnmilbe"
      severity: medium
      affected_parts: [leaf]
      phases: [vegetative, flowering]
    - pest: "Aphidoidea"
      common_name: "Blattlaus"
      severity: medium
      affected_parts: [stem, leaf, flower]
      phases: [vegetative, flowering]
    - pest: "Arion spp."
      common_name: "Nacktschnecke"
      severity: high
      affected_parts: [leaf, stem]
      phases: [sprouting, vegetative]

# ==============================================================================
# S8  DISEASE-SPECIES EDGES (species -> disease)
# ==============================================================================

disease_species_edges:
  "Streptocarpus ionanthus":
    - disease: "Pythium spp."
      common_name: "Wurzelfaeule"
      type: fungal
      severity: high
      phases: [sprouting, seedling, vegetative, flowering, cool_rest]
    - disease: "Botrytis cinerea"
      common_name: "Grauschimmel"
      type: fungal
      severity: medium
      phases: [flowering]
    - disease: "Oidium spp."
      common_name: "Echter Mehltau"
      type: fungal
      severity: medium
      phases: [vegetative]

  "Syngonium podophyllum":
    - disease: "Pythium spp."
      common_name: "Wurzelfaeule"
      type: fungal
      severity: high
      phases: [active_growth, winter_rest]

  "Dahlia x cultorum":
    - disease: "Botrytis cinerea"
      common_name: "Grauschimmel"
      type: fungal
      severity: medium
      phases: [flowering, senescence]
    - disease: "Erysiphe cichoracearum"
      common_name: "Echter Mehltau"
      type: fungal
      severity: medium
      phases: [vegetative, flowering]
    - disease: "Dahlia mosaic virus"
      common_name: "Dahlienmosaikvirus"
      type: viral
      severity: high
      phases: [vegetative, flowering]

