# yaml-language-server: $schema=./schemas/plant_info.schema.yaml
# Plant-info seed data from spec/knowledge/plants/*.md — Outdoor batch 1.
#
# Covers 30 plant-info documents (allium_cepa through foeniculum_vulgare).
# Adds 5 new botanical families, 12 new species, enriches 18 existing species,
# adds growth phases, cultivars, companion planting edges, and IPM data.
#
# Enum mapping notes (doc values -> valid enums):
#   half_hardy / tender -> sensitive / moderate  (frost_sensitivity enum: sensitive, moderate, hardy, very_hardy)
#   rhizomatous -> fibrous (closest valid root_type)
#   heavy_feeder -> heavy  (nutrient_demand_level enum: light, medium, heavy)
#   medium_feeder -> medium
#   light_feeder -> light
#
# NOTE: Apium graveolens var. rapaceum already has a full entry in plant_info.yaml — skipped here.
# NOTE: Foeniculum vulgare exists in species.yaml; the doc describes var. azoricum but enrichment targets the parent.

# ==============================================================================
# S1  NEW BOTANICAL FAMILIES (5)
# ==============================================================================

new_families:
  - name: Ranunculaceae
    common_name_de: "Hahnenfussgewaechse"
    common_name_en: Buttercup family
    order: Ranunculales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [herb, vine]
    common_pests: [aphids, slugs]
    common_diseases: [powdery_mildew, crown_rot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Hahnenfussgewaechse umfassen Anemone, Clematis, Delphinium, Ranunculus.
      Viele Arten enthalten Protoanemonin (hautreizend). Ueberwiegend insektenbestaubt.
    rotation_category: ornamental

  - name: Saxifragaceae
    common_name_de: Steinbrechgewaechse
    common_name_en: Saxifrage family
    order: Saxifragales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [herb]
    common_pests: [aphids, vine_weevil]
    common_diseases: [powdery_mildew, leaf_spot]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 7.0
    description: >-
      Steinbrechgewaechse umfassen Astilbe, Heuchera und Saxifraga.
      Ueberwiegend schattenvertraegliche Stauden fuer feuchte Standorte.
    rotation_category: ornamental

  - name: Buxaceae
    common_name_de: Buchsbaumgewaechse
    common_name_en: Boxwood family
    order: Buxales
    typical_nutrient_demand: light
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [shrub]
    common_pests: [box_tree_moth, box_psyllid]
    common_diseases: [box_blight, volutella_blight]
    pollination_type: [wind, insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Buchsbaumgewaechse mit der Gattung Buxus als wichtigstem Vertreter.
      Immergruene Gehoelze, klassische Heckenpflanze.
    rotation_category: ornamental

  - name: Cornaceae
    common_name_de: Hartriegelgewaechse
    common_name_en: Dogwood family
    order: Cornales
    typical_nutrient_demand: light
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [shrub, tree]
    common_pests: [aphids, scale_insects]
    common_diseases: [anthracnose, powdery_mildew]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 5.5
      max_ph: 7.5
    description: >-
      Hartriegelgewaechse umfassen Cornus (Hartriegel, Kornelkirsche).
      Gehoelze mit dekorativer Rinde, Blueten und essbaren Fruechten.
    rotation_category: ornamental

# ==============================================================================
