# ==============================================================================
# S9  IPM DATA — PESTS, DISEASES, TREATMENTS
# ==============================================================================

pests:
  - scientific_name: "Psila rosae"
    common_name_de: "Moehrenfliege"
    common_name_en: "Carrot Fly"
    pest_type: insect
    affected_parts: [root]
    symptoms: "Rostbraune Fraessgaenge in der Wurzel, welkes Kraut"
    detection_difficulty: medium
    affected_species: ["Daucus carota", "Foeniculum vulgare"]

  - scientific_name: "Pieris brassicae"
    common_name_de: "Grosser Kohlweissling"
    common_name_en: "Large Cabbage White"
    pest_type: insect
    affected_parts: [leaf]
    symptoms: "Lochfrass, Raupen, Kotspuren an Blaettern"
    detection_difficulty: easy
    affected_species:
      - "Brassica oleracea var. sabellica"
      - "Brassica oleracea var. gongylodes"
      - "Brassica oleracea var. italica"
      - "Brassica oleracea var. botrytis"
      - "Brassica oleracea var. gemmifera"

  - scientific_name: "Brevicoryne brassicae"
    common_name_de: "Mehlige Kohlblattlaus"
    common_name_en: "Cabbage Aphid"
    pest_type: insect
    affected_parts: [leaf, shoot]
    symptoms: "Weissliche Kolonien, Blattkraeuselung, Wachsbeschlag"
    detection_difficulty: easy
    affected_species:
      - "Brassica oleracea var. sabellica"
      - "Brassica oleracea var. gongylodes"
      - "Brassica oleracea var. italica"

  - scientific_name: "Delia radicum"
    common_name_de: "Kohlfliege"
    common_name_en: "Cabbage Root Fly"
    pest_type: insect
    affected_parts: [root, stem]
    symptoms: "Larvenbefall an Wurzeln, Welke, Kuemmerwuchs"
    detection_difficulty: difficult
    affected_species:
      - "Brassica oleracea var. gongylodes"
      - "Brassica oleracea var. italica"

  - scientific_name: "Cydia pomonella"
    common_name_de: "Buchsbaumzuensler"
    common_name_en: "Box Tree Moth"
    pest_type: insect
    affected_parts: [leaf]
    symptoms: "Kahlfraß durch Raupen, Gespinste, Pflanze stirbt bei starkem Befall"
    detection_difficulty: medium
    affected_species: ["Buxus sempervirens"]

diseases:
  - name: "Kohlhernie"
    scientific_name: "Plasmodiophora brassicae"
    disease_type: protist
    symptoms: "Knollenartige Wurzelwucherungen, Welke"
    triggers: ["saurer Boden (pH < 6.5)", "Staunaesse"]
    incubation_days_min: 14
    incubation_days_max: 21
    affected_species:
      - "Brassica oleracea var. sabellica"
      - "Brassica oleracea var. gongylodes"
      - "Brassica oleracea var. italica"
      - "Brassica oleracea var. botrytis"
      - "Brassica oleracea var. gemmifera"

  - name: "Alternaria-Blattflecken"
    scientific_name: "Alternaria dauci"
    disease_type: fungal
    symptoms: "Braun-schwarze Laesionen an Blattrandern"
    triggers: ["warm_humid", "rain_splash"]
    incubation_days_min: 5
    incubation_days_max: 10
    affected_species: ["Daucus carota"]

  - name: "Buchsbaumtriebsterben"
    scientific_name: "Cylindrocladium buxicola"
    disease_type: fungal
    symptoms: "Braune Blattflecken, Triebsterben, Blattverlust"
    triggers: ["Feuchtigkeit", "dichte Pflanzung"]
    incubation_days_min: 5
    incubation_days_max: 10
    affected_species: ["Buxus sempervirens"]

treatments:
  - name: "Kulturschutznetz"
    treatment_type: cultural
    active_ingredient: null
    application: "Feinmaschiges Netz (0.8 mm) ueber Beet ab Aussaat/Pflanzung"
    waiting_period_days: 0
    effective_against: ["Psila rosae", "Pieris brassicae", "Delia radicum"]

  - name: "Bacillus thuringiensis (Bt)"
    treatment_type: biological
    active_ingredient: "Bt-Toxin"
    application: "Spruehanwendung 0.5-1%, abends (Raupen aktiv)"
    waiting_period_days: 0
    effective_against: ["Pieris brassicae"]

  - name: "Kalkung (Kohlhernie-Prophylaxe)"
    treatment_type: cultural
    active_ingredient: "Algenkalk / CaCO3"
    application: "100 g/m2, Boden-pH auf 7.0-7.5 anheben vor Pflanzung"
    waiting_period_days: 0
    effective_against: ["Plasmodiophora brassicae"]
