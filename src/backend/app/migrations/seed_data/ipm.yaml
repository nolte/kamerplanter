treatments:
  # Cultural (4) — existing
  - name: Crop Rotation
    treatment_type: cultural
    application_method: cultural
    description: "Rotate plant families to break pest/disease cycles"

  - name: Sanitation
    treatment_type: cultural
    application_method: cultural
    description: "Remove dead plant material and debris"

  - name: Resistant Varieties
    treatment_type: cultural
    application_method: cultural
    description: "Use disease-resistant cultivars"

  - name: Environmental Control
    treatment_type: cultural
    application_method: cultural
    description: "Adjust temperature, humidity, and ventilation"

  # Biological (3) — existing
  - name: Phytoseiulus persimilis
    treatment_type: biological
    application_method: release
    description: "Predatory mite for spider mite control"

  - name: Encarsia formosa
    treatment_type: biological
    application_method: release
    description: "Parasitic wasp for whitefly control"

  - name: Bacillus thuringiensis (Bt)
    treatment_type: biological
    application_method: spray
    description: "Biological insecticide for caterpillar control"

  # Mechanical (2) — existing
  - name: Sticky Traps
    treatment_type: mechanical
    application_method: cultural
    description: "Yellow/blue sticky traps for flying insects"

  - name: Hand Removal
    treatment_type: mechanical
    application_method: cultural
    description: "Manual removal of pests"

  # Chemical (3) — existing
  - name: Pyrethrin
    treatment_type: chemical
    active_ingredient: pyrethrin
    application_method: spray
    safety_interval_days: 7
    dosage_per_liter: 1.0
    protective_equipment: [gloves, mask]

  - name: Neem Oil
    treatment_type: biological
    active_ingredient: azadirachtin
    application_method: spray
    safety_interval_days: 3
    dosage_per_liter: 5.0
    protective_equipment: [gloves]

  - name: Spinosad
    treatment_type: chemical
    active_ingredient: spinosad
    application_method: spray
    safety_interval_days: 14
    dosage_per_liter: 0.5
    protective_equipment: [gloves, mask, goggles]

  - name: Phosphonate (Phosphorous Acid)
    treatment_type: chemical
    active_ingredient: phosphorous acid
    application_method: drench
    safety_interval_days: 21  # EU-Standard for food crops (21-28d depending on crop)
    dosage_per_liter: 3.0
    protective_equipment: [gloves, goggles]
    description: >-
      Oomycete-specific treatment effective against Pythium, Phytophthora
      and Peronospora. Disrupts oomycete phospholipid synthesis. Applied
      as root drench (3 ml/L) or foliar spray (1.5 ml/L). Not effective
      against true fungi.

  - name: Steinernema feltiae (Nematodes)
    treatment_type: biological
    application_method: drench
    description: >-
      Beneficial nematodes for biological control of fungus gnat larvae
      (Bradysia spp.). Applied as drench at 250,000 nematodes per m2.
      Optimal soil temperature 12-25°C. Apply in the evening or on
      overcast days (UV-sensitive). Effective within 2-3 days.

  - name: Insecticidal Soap (Potassium Salts)
    treatment_type: biological
    active_ingredient: potassium salts of fatty acids
    application_method: spray
    safety_interval_days: 1
    dosage_per_liter: 10.0
    protective_equipment: [gloves]
    description: >-
      Contact insecticide effective against soft-bodied insects (aphids,
      whitefly, mealybug, spider mites, thrips). Disrupts cell membranes
      on contact. No residual activity — must contact pest directly.
      Safe for beneficial insects once dry. Repeat every 5-7 days.

  # --- New treatments ---

  # Biological — beneficial organisms
  - name: Trichogramma spp. (Egg Parasitoids)
    treatment_type: biological
    application_method: release
    description: >-
      Trichogramma-Schlupfwespen — tiny parasitic wasps that lay eggs
      inside pest moth eggs (Pieris, Cydia, Ostrinia). Applied as
      cards with parasitized eggs, 3-5 releases at 7-day intervals.
      100,000-200,000 wasps per 1,000 m². Effective against cabbage
      white, codling moth, and corn borer.

  - name: Heterorhabditis bacteriophora (Nematodes)
    treatment_type: biological
    application_method: drench
    description: >-
      Beneficial nematodes for biological control of black vine weevil
      larvae (Otiorhynchus sulcatus) and other soil-dwelling grubs.
      Applied as drench at 500,000 nematodes per m². Optimal soil
      temperature 12-25°C. Apply in evening or overcast conditions
      (UV-sensitive). Larvae die within 48-72 hours. Best applied
      Aug-Oct when larvae are actively feeding.

  - name: Amblyseius swirskii
    treatment_type: biological
    application_method: release
    description: >-
      Predatory mite (Raubmilbe) effective against thrips larvae and
      whitefly eggs/larvae. Release rate: 50-100 per m². Optimal
      conditions: 20-28°C, >60% RH. Also feeds on pollen as
      alternative food source, allowing preventive establishment.
      Compatible with most biological control agents.

  - name: Chrysoperla carnea (Lacewing Larvae)
    treatment_type: biological
    application_method: release
    description: >-
      Florfliegen-Larven — voracious predators of aphids, also
      effective against small caterpillars, mealybugs, thrips, and
      spider mites. Each larva consumes 200-500 aphids during
      development. Release rate: 5-10 larvae per m². Larvae active
      for 2-3 weeks. Can be applied to specific hotspots.

  - name: Adalia bipunctata (Two-Spot Ladybird)
    treatment_type: biological
    application_method: release
    description: >-
      Marienkäfer — classic biological aphid control. Adults and
      larvae both consume aphids. One larva eats up to 400 aphids
      during development. Release rate: 5-20 per m² depending on
      infestation level. Adults may fly away in outdoor settings;
      larval releases are more reliable for targeted control.

  - name: Bacillus subtilis
    treatment_type: biological
    active_ingredient: bacillus subtilis
    application_method: spray
    safety_interval_days: 0
    dosage_per_liter: 2.0
    protective_equipment: [gloves]
    description: >-
      Biological fungicide effective against powdery mildew, botrytis,
      and various soil-borne pathogens. Colonizes plant surfaces and
      competes with pathogenic fungi. Preventive application most
      effective — spray every 7-10 days. Safe for beneficial insects.
      No harvest waiting period (Karenzzeit). Approved for organic
      farming.

  - name: Trichoderma harzianum
    treatment_type: biological
    active_ingredient: trichoderma harzianum
    application_method: drench
    safety_interval_days: 0
    dosage_per_liter: 1.0
    protective_equipment: [gloves]
    description: >-
      Biological soil fungicide. Beneficial fungus that colonizes
      the rhizosphere and protects roots against Fusarium, Pythium,
      Rhizoctonia, and other soil pathogens. Apply as drench or mix
      into growing media. Preventive use most effective. Also promotes
      root growth. Approved for organic farming.

  # Chemical — fungicides
  - name: Copper Fungicide (Bordeaux Mixture)
    treatment_type: chemical
    active_ingredient: copper sulfate + calcium hydroxide
    application_method: spray
    safety_interval_days: 21
    dosage_per_liter: 5.0
    protective_equipment: [gloves, mask, goggles]
    description: >-
      Kupferpräparat (Bordeauxbrühe) — broad-spectrum contact
      fungicide effective against downy mildew, late blight, fire
      blight, bacterial canker, and many other fungal/bacterial
      diseases. Preventive only — does not cure existing infections.
      IMPORTANT: Copper accumulates in soil; max 3 kg Cu/ha/year
      (EU organic limit). Do not apply above 25°C or in direct
      sunlight (phytotoxicity risk). Harmful to aquatic organisms.

  - name: Sulfur (Wettable)
    treatment_type: chemical
    active_ingredient: elemental sulfur
    application_method: spray
    safety_interval_days: 7
    dosage_per_liter: 3.0
    protective_equipment: [gloves, mask]
    description: >-
      Netzschwefel — contact fungicide primarily for powdery mildew
      control. Also effective against rust, apple scab, and some
      mites. Apply preventively at 7-10 day intervals. Do NOT apply
      above 30°C (leaf burn risk) or within 14 days of oil-based
      sprays. Approved for organic farming. Harmful to predatory
      mites — maintain distance from biocontrol releases.

  - name: Potassium Bicarbonate
    treatment_type: chemical
    active_ingredient: potassium bicarbonate
    application_method: spray
    safety_interval_days: 0
    dosage_per_liter: 5.0
    protective_equipment: [gloves]
    description: >-
      Kaliumhydrogencarbonat — mild fungicide effective against
      powdery mildew. Changes leaf surface pH to inhibit spore
      germination. Very low toxicity, no harvest waiting period.
      Apply every 7-10 days. Can cause leaf burn at high
      concentrations on sensitive plants. Approved for organic farming.

  # Mechanical — barriers and traps
  - name: Crop Protection Netting (0.8mm)
    treatment_type: mechanical
    application_method: cultural
    description: >-
      Kulturschutznetz — fine mesh netting (0.8mm Maschenweite) as
      physical barrier against cabbage white butterfly, carrot rust
      fly, cabbage root fly, onion fly, leek moth, and flea beetles.
      Install immediately after sowing/transplanting. Edges must be
      buried or weighted to prevent entry. Remove for pollinator
      access on flowering crops. Reusable for multiple seasons.

  - name: Pheromone Trap (Codling Moth)
    treatment_type: mechanical
    application_method: cultural
    description: >-
      Pheromonfalle Apfelwickler — species-specific lure traps for
      monitoring and mass trapping of Cydia pomonella. Place 1 trap
      per 3-5 trees at head height (1.5-2m) from May to September.
      Replace pheromone lures every 6-8 weeks. Primarily a monitoring
      tool — combine with other methods for effective control.

  - name: Pheromone Trap (Cherry Fruit Fly)
    treatment_type: mechanical
    application_method: cultural
    description: >-
      Pheromonfalle Kirschfruchtfliege — yellow sticky traps with
      ammonium attractant for Rhagoletis cerasi monitoring and mass
      trapping. Hang in tree canopy from mid-May. 4-6 traps per tree
      for mass trapping. Check weekly and replace when covered.

  - name: Slug Fence (Copper Barrier)
    treatment_type: mechanical
    application_method: cultural
    description: >-
      Schneckenzaun (Kupferband) — copper barriers that deter slugs
      through galvanic reaction with slug slime. Install around raised
      beds or individual plant groups. Height minimum 5cm. Keep
      vegetation from bridging the barrier. Effective but requires
      ensuring no slugs are already inside the protected area.

  - name: Slug Pellets (Ferric Phosphate)
    treatment_type: chemical
    active_ingredient: iron(III) phosphate
    application_method: granular
    safety_interval_days: 0
    protective_equipment: [gloves]
    description: >-
      Schneckenkorn (Eisen-III-Phosphat) — slug and snail control
      approved for organic farming. Slugs stop feeding immediately
      after ingestion and die within 3-6 days. Apply 5 g/m² evenly.
      Safe for hedgehogs, pets, and soil organisms. Breaks down into
      iron and phosphate — natural soil components. Reapply after
      heavy rain.

  - name: Granulovirus (CpGV)
    treatment_type: biological
    application_method: spray
    safety_interval_days: 0
    description: >-
      Apfelwickler-Granulovirus — highly specific biological
      insecticide against codling moth (Cydia pomonella) larvae.
      Larvae ingest virus particles on treated fruit surface and die
      within 3-5 days. Apply at egg hatching (monitor with pheromone
      traps). 3-4 applications at 8-day intervals. Harmless to all
      non-target organisms. Approved for organic farming.

  - name: Kaolin Clay (Surround)
    treatment_type: mechanical
    application_method: spray
    description: >-
      Kaolin-Tonerde — particle film technology. Creates a white
      protective layer on fruit and leaves that deters pest feeding
      and egg-laying. Effective against codling moth, cherry fruit
      fly, apple sawfly, and many other pests. Also reduces sunburn
      on fruit. Apply before pest flight begins. Reapply after rain.
      Washes off at harvest. Approved for organic farming.

  - name: Beer Trap (Slug)
    treatment_type: mechanical
    application_method: cultural
    description: >-
      Bierfalle — simple slug trap using shallow containers sunk
      into the ground and filled with beer. Yeast scent attracts
      slugs. Empty and refill every 2-3 days. Note: also attracts
      slugs from surrounding area — use in combination with barriers,
      not as sole control method. Place at bed edges, not in the
      middle of plantings.

  - name: Horticultural Oil (Mineral Oil)
    treatment_type: chemical
    active_ingredient: paraffin oil
    application_method: spray
    safety_interval_days: 7
    dosage_per_liter: 15.0
    protective_equipment: [gloves]
    description: >-
      Paraffinöl — suffocating contact insecticide/acaricide effective
      against scale insects, mealybug, whitefly eggs, and overwintering
      pest stages. Winter application (dormant season) at 2-3% on
      fruit trees against overwintering eggs. Summer application at
      1-1.5% with caution (phytotoxicity risk above 25°C). Do NOT
      combine with sulfur sprays (14-day gap minimum).

  - name: Diatomaceous Earth
    treatment_type: mechanical
    application_method: granular
    description: >-
      Kieselgur — fossilized diatom powder that damages insect
      exoskeletons through abrasion, causing dehydration. Effective
      against crawling insects: flea beetles, ants, slugs (partial),
      and various stored-product pests. Apply as dust around plant
      bases or on leaves. Loses effectiveness when wet — reapply
      after rain. Wear mask during application (respiratory irritant).
      Approved for organic farming.

