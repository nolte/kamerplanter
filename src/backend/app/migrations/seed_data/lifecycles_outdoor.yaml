  # -- Forsythia x intermedia (Forsythie) -- Laubabwerfender Strauch
  - scientific_name: "Forsythia x intermedia"
    cycle_type: "perennial"
    typical_lifespan_years: 30
    dormancy_required: true
    vernalization_required: false
    photoperiod_type: "day_neutral"
    cycle_restart_phase_order: 1
    phase_sequence: "perennial_standard"
    phases:
      - name: "dormancy"
        display_name: "Winterruhe"
        typical_duration_days: 120
        sequence_order: 1
        stress_tolerance: "high"
        allows_harvest: false
        is_terminal: false
        is_recurring: true
      - name: "sprouting"
        display_name: "Austrieb"
        typical_duration_days: 21
        sequence_order: 2
        stress_tolerance: "low"
        allows_harvest: false
        is_terminal: false
        is_recurring: true
      - name: "vegetative"
        display_name: "Vegetative Phase"
        typical_duration_days: 60
        sequence_order: 3
        stress_tolerance: "medium"
        allows_harvest: false
        is_terminal: false
        is_recurring: true
      - name: "flowering"
        display_name: "Blüte"
        typical_duration_days: 30
        sequence_order: 4
        stress_tolerance: "medium"
        allows_harvest: false
        is_terminal: false
        is_recurring: true
      - name: "senescence"
        display_name: "Blattfall"
        typical_duration_days: 30
        sequence_order: 5
        stress_tolerance: "high"
        allows_harvest: false
        is_terminal: true
        is_recurring: true

