# yaml-language-server: $schema=./schemas/plant_info.schema.yaml
# Indoor plant seed data batch 1 — from spec/ref/plant-info/*.md (30 documents).
#
# Adds 15 new botanical families, 29 new species, enriches 1 existing species
# (Chlorophytum comosum already has enrichment in plant_info.yaml — skip here),
# adds lifecycle configs for 29 species, growth phases for 29 species, and cultivars.
#
# Enum mappings applied:
#   frost_sensitivity: "tender" -> "sensitive", "half_hardy" -> "moderate"
#   root_type: "rhizomatous" -> "fibrous", "aerial" -> "fibrous"
#   stress_tolerance: "very high" -> "high" (enum has low/medium/high only)

# ==============================================================================
# S1  NEW BOTANICAL FAMILIES (15)
# ==============================================================================

new_families:
  - name: Pteridaceae
    common_name_de: Saumfarngewächse
    common_name_en: Maidenhair fern family
    order: Polypodiales
