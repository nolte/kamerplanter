    frost_tolerance: sensitive
    typical_root_depth: shallow
    typical_growth_forms: [herb]
    common_pests: [scale_insects, mealybugs]
    common_diseases: [root_rot, leaf_spot]
    pollination_type: []
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.0
    description: >-
      Saumfarngewächse mit dem Frauenhaarfarn (Adiantum) als bekanntestem
      Zimmerpflanzenvertreter. Sporenbildende Farne ohne Blüten.
    rotation_category: ornamental

