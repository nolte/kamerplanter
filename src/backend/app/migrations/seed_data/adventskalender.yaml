# Adventskalender 2025 (Historische Sorten) — Seed Data
# Sources: spec/ref/plant-info/*.md (18 plant-info documents)

# ══════════════════════════════════════════════════════════════════════════════
# §1 New Botanical Families (2)
# ══════════════════════════════════════════════════════════════════════════════

new_families:
  - name: Amaryllidaceae
    common_name_de: "Amaryllisgewächse"
    common_name_en: "Amaryllis family"
    order: Asparagales
    typical_nutrient_demand: medium
    frost_tolerance: hardy
    typical_root_depth: medium
    typical_growth_forms: [herb]
    common_pests: [leek_moth, allium_leafminer, onion_thrips]
    common_diseases: ["Porreerost", "Falscher Mehltau", "Zwiebelfäule"]
    pollination_type: [insect]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Amaryllisgewächse mit vielen Zierblumen und Nutzpflanzen.
      Umfasst alle Allium-Arten (Lauch, Schnittlauch, Zwiebel, Knoblauch).
      Schwefelhaltige Aromastoffe (Allicin). Giftig für Katzen und Hunde.
    rotation_category: allium

  - name: Amaranthaceae
    common_name_de: "Fuchsschwanzgewächse"
    common_name_en: "Amaranth family"
    order: Caryophyllales
    typical_nutrient_demand: medium
    frost_tolerance: moderate
    typical_root_depth: medium
    typical_growth_forms: [herb]
    common_pests: [aphids, flea_beetle, beet_fly]
    common_diseases: ["Cercospora", "Ramularia", "Falscher Mehltau"]
    pollination_type: [wind]
    soil_ph_preference:
      min_ph: 6.0
      max_ph: 7.5
    description: >-
      Fuchsschwanzgewächse (ehem. Chenopodiaceae). Enthält Rote Bete, Mangold,
      Spinat und Amaranth. Windbestäubt, oft hoher Oxalsäuregehalt in Blättern.
    rotation_category: root

