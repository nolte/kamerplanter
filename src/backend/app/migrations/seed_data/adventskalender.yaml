# ══════════════════════════════════════════════════════════════════════════════
# §7 Companion Planting Edges
# ══════════════════════════════════════════════════════════════════════════════

companion_planting:
  compatible:
    # Allium + Daucus: mutual pest repelling (Moehrenfliege / Lauchmotte)
    - [Allium porrum, Daucus carota, 0.9]
    - [Allium schoenoprasum, Daucus carota, 0.8]
    # Allium + Solanaceae: aphid/thrips repellent
    - [Allium schoenoprasum, Solanum lycopersicum, 0.7]
    - [Allium schoenoprasum, Capsicum annuum, 0.6]
    # Allium + Salat: different root depths
    - [Allium porrum, Lactuca sativa, 0.7]
    - [Allium schoenoprasum, Lactuca sativa, 0.7]
    # Allium + Sellerie: mutual benefit
    - [Allium porrum, Apium graveolens, 0.7]
    # Allium + Beta: good companion
    - [Allium porrum, "Beta vulgaris subsp. vulgaris", 0.6]
    - [Allium schoenoprasum, "Beta vulgaris subsp. vulgaris", 0.6]
    # Solanaceae + herbs
    - [Solanum lycopersicum, Ocimum basilicum, 0.9]
    - [Solanum lycopersicum, Petroselinum crispum, 0.7]
    - [Capsicum annuum, Ocimum basilicum, 0.7]
    - [Capsicum annuum, Petroselinum crispum, 0.6]
    # Cucurbitaceae + Fabaceae
    - [Cucumis sativus, Phaseolus vulgaris, 0.8]
    - [Cucumis sativus, Pisum sativum, 0.7]
    - [Cucurbita pepo, Phaseolus vulgaris, 0.8]
    - [Cucurbita pepo, Pisum sativum, 0.7]
    # Cucurbitaceae + herbs/salad
    - [Cucumis sativus, Anethum graveolens, 0.7]
    - [Cucumis sativus, Lactuca sativa, 0.7]
    # Fabaceae + root vegetables
    - [Pisum sativum, Daucus carota, 0.7]
    - [Pisum sativum, Raphanus sativus, 0.7]
    - [Pisum sativum, Lactuca sativa, 0.7]
    - [Phaseolus vulgaris, Daucus carota, 0.6]
    # Salat combinations
    - [Lactuca sativa, Raphanus sativus, 0.7]
    - [Lactuca sativa, Daucus carota, 0.7]
    - [Lactuca sativa, Anethum graveolens, 0.6]
    # Brassica companion planting
    - ["Brassica oleracea var. gemmifera", Apium graveolens, 0.7]
    - ["Brassica oleracea var. gemmifera", Pisum sativum, 0.7]
    - ["Brassica oleracea var. gemmifera", Phaseolus vulgaris, 0.6]
    # Beta + Salat
    - ["Beta vulgaris subsp. vulgaris", Lactuca sativa, 0.7]
    - ["Beta vulgaris subsp. vulgaris", Daucus carota, 0.6]
    # Sellerie combinations
    - [Apium graveolens, Daucus carota, 0.6]
    - [Apium graveolens, Pisum sativum, 0.6]
    - [Apium graveolens, Phaseolus vulgaris, 0.6]
    # Cichorium
    - [Cichorium intybus, Phaseolus vulgaris, 0.6]
    - [Cichorium intybus, Daucus carota, 0.6]
    # Tomate + Daucus
    - [Solanum lycopersicum, Daucus carota, 0.6]
    - [Capsicum annuum, Daucus carota, 0.6]
    # Petersilie + Daucus (same family but compatible in moderation)
    - [Petroselinum crispum, Daucus carota, 0.5]
    # Tagetes (existing species) as universal companion
    - [Tagetes erecta, Solanum lycopersicum, 0.8]
    - [Tagetes erecta, Capsicum annuum, 0.7]
    - [Tagetes erecta, Cucumis sativus, 0.7]
    - [Tagetes erecta, Phaseolus vulgaris, 0.7]
    # Phaseolus + Solanaceae
    - [Phaseolus vulgaris, Solanum lycopersicum, 0.6]
    # Fragaria (existing species)
    - [Fragaria x ananassa, Allium schoenoprasum, 0.7]
    - [Fragaria x ananassa, Lactuca sativa, 0.7]
    - [Fragaria x ananassa, Phaseolus vulgaris, 0.6]

  incompatible:
    # Allium hemmt Leguminosen
    - [Allium porrum, Phaseolus vulgaris, "Allicin-Verbindungen hemmen Knöllchenbakterien"]
    - [Allium porrum, Pisum sativum, "Allicin hemmt Rhizobien-Symbiose"]
    - [Allium schoenoprasum, Phaseolus vulgaris, "Allicin hemmt Knöllchenbakterien"]
    - [Allium schoenoprasum, Pisum sativum, "Allicin hemmt Rhizobien-Symbiose"]
    # Apiaceae untereinander: gleiche Schaedlinge (Moehrenfliege)
    - [Anethum graveolens, Daucus carota, "Gleiche Familie, Möhrenfliegen-Anziehung"]
    - [Anethum graveolens, Petroselinum crispum, "Gleiche Familie, Schädlingsübertragung"]
    - [Anethum graveolens, Apium graveolens, "Gleiche Familie, Schädlingsübertragung"]
    - [Daucus carota, Apium graveolens, "Gleiche Familie, Möhrenfliegen-Risiko"]
    # Cucurbitaceae + Solanaceae: Krankheitsuebertragung
    - [Cucumis sativus, Solanum lycopersicum, "Virusübertragung über gemeinsame Vektoren"]
    - [Cucurbita pepo, Solanum lycopersicum, "Wurzelkonkurrenz, Krankheitsübertragung"]
    - [Cucurbita pepo, Capsicum annuum, "Wurzelkonkurrenz, Nährstoffwettbewerb"]
    # Brassicaceae + Solanaceae
    - ["Brassica oleracea var. gemmifera", Solanum lycopersicum, "Nährstoffkonkurrenz"]
    # Beta + Phaseolus
    - ["Beta vulgaris subsp. vulgaris", Phaseolus vulgaris, "Wuchshemmung dokumentiert"]
    # Foeniculum (existing species) ist Einzelgaenger
    - [Foeniculum vulgare, Solanum lycopersicum, "Fenchel hemmt Tomatenwachstum"]
    - [Foeniculum vulgare, Phaseolus vulgaris, "Fenchel hemmt Bohnenwachstum"]
    - [Foeniculum vulgare, Pisum sativum, "Fenchel hemmt Erbsenwachstum"]
    # Salat + Petersilie (umstritten, aber in manchen Quellen)
    - [Lactuca sativa, Petroselinum crispum, "Wuchshemmung bei engem Stand"]

# ══════════════════════════════════════════════════════════════════════════════
# §8 IPM Data (new pests, diseases, treatments for Allium/Beta/Brassica)
# ══════════════════════════════════════════════════════════════════════════════

pests:
  - scientific_name: "Acrolepiopsis assectella"
    common_name: "Leek Moth"
    pest_type: insect
    lifecycle_days: 35
    optimal_temp_min: 15.0
    optimal_temp_max: 28.0
    detection_difficulty: medium
    description: "Lauchmotte. Raupen fressen Gänge in Blätter und Schäfte von Allium-Arten."

  - scientific_name: "Phytomyza gymnostoma"
    common_name: "Allium Leafminer"
    pest_type: insect
    lifecycle_days: 42
    optimal_temp_min: 10.0
    optimal_temp_max: 25.0
    detection_difficulty: medium
    description: "Lauchminierfliege. Einstichlöcher und Miniergänge in Blättern, Maden an Schaftbasis."

  - scientific_name: "Thrips tabaci"
    common_name: "Onion Thrips"
    pest_type: insect
    lifecycle_days: 21
    optimal_temp_min: 18.0
    optimal_temp_max: 30.0
    detection_difficulty: medium
    description: "Zwiebelthrips. Silbrige Saugflecken auf Blättern von Allium- und Brassica-Arten."

  - scientific_name: "Pieris brassicae"
    common_name: "Cabbage White Butterfly"
    pest_type: insect
    lifecycle_days: 35
    optimal_temp_min: 15.0
    optimal_temp_max: 30.0
    detection_difficulty: easy
    description: "Kohlweißling. Raupen fressen Blätter von Brassica-Arten. Gelege auf Blattunterseiten."

  - scientific_name: "Delia radicum"
    common_name: "Cabbage Root Fly"
    pest_type: insect
    lifecycle_days: 42
    optimal_temp_min: 12.0
    optimal_temp_max: 25.0
    detection_difficulty: hard
    description: "Kohlfliege. Maden fressen an Wurzeln von Brassica-Arten. Pflanze welkt trotz Wasser."

  - scientific_name: "Psila rosae"
    common_name: "Carrot Fly"
    pest_type: insect
    lifecycle_days: 60
    optimal_temp_min: 12.0
    optimal_temp_max: 25.0
    detection_difficulty: hard
    description: "Möhrenfliege. Maden fressen Gänge in Karotten und andere Apiaceae-Wurzeln."

diseases:
  - scientific_name: "Puccinia allii"
    common_name: "Leek Rust"
    pathogen_type: fungal
    incubation_period_days: 10
    environmental_triggers: [warm_humid_conditions, poor_airflow]
    affected_plant_parts: [leaf]
    description: "Porreerost. Orangerote Pusteln auf Blättern von Allium-Arten."

  - scientific_name: "Alternaria dauci"
    common_name: "Alternaria Leaf Blight"
    pathogen_type: fungal
    incubation_period_days: 8
    environmental_triggers: [warm_humid_conditions, rain_splash]
    affected_plant_parts: [leaf]
    description: "Alternaria-Blattfleckenkrankheit. Braune Flecken mit konzentrischen Ringen auf Blättern."

  - scientific_name: "Sclerotium cepivorum"
    common_name: "White Rot"
    pathogen_type: fungal
    incubation_period_days: 21
    environmental_triggers: [cool_wet_soil, soil_contamination]
    affected_plant_parts: [root, stem]
    description: "Weißfäule. Weißer Mycelbelag an Zwiebelbasis, Pflanze vergilbt und stirbt ab."

  - scientific_name: "Cercospora beticola"
    common_name: "Cercospora Leaf Spot"
    pathogen_type: fungal
    incubation_period_days: 10
    environmental_triggers: [warm_humid_conditions, rain_splash]
    affected_plant_parts: [leaf]
    description: "Cercospora-Blattfleckenkrankheit an Beta vulgaris. Runde graue Flecken mit rotem Rand."

treatments:
  - name: "Insect Protection Net"
    treatment_type: mechanical
    application_method: cultural
    safety_interval_days: 0
    description: >-
      Kulturschutznetz (< 0.8mm Maschenweite).
      Wichtigste Maßnahme gegen Lauchmotte, Minierfliege, Kohlfliege und Kohlweißling.

  - name: "Potassium Soap"
    treatment_type: biological
    active_ingredient: "potassium salts of fatty acids"
    application_method: spray
    safety_interval_days: 0
    dosage_per_liter: 15.0
    description: "Kaliseife 1-2%. Gegen Blattläuse, Thripse und weiche Insekten."

  - name: "Potassium Bicarbonate"
    treatment_type: biological
    active_ingredient: "potassium bicarbonate"
    application_method: spray
    safety_interval_days: 0
    dosage_per_liter: 5.0
    description: "Kaliumbicarbonat. Gegen Echten Mehltau und Rostpilze. Vorbeugend und kurativ."

  - name: "Ferramol"
    treatment_type: biological
    active_ingredient: "iron(III) phosphate"
    application_method: cultural
    safety_interval_days: 0
    dosage_per_liter: null
    description: "Schneckenkorn auf Basis Eisen-III-Phosphat. Gegen Nacktschnecken."
    protective_equipment: [gloves]

# Treatment -> Pest targeting edges
pest_treatments:
  - [Insect Protection Net, Leek Moth]
  - [Insect Protection Net, Allium Leafminer]
  - [Insect Protection Net, Cabbage White Butterfly]
  - [Insect Protection Net, Cabbage Root Fly]
  - [Insect Protection Net, Carrot Fly]
  - [Potassium Soap, Onion Thrips]
  - [Potassium Soap, Aphids]
  - [Neem Oil, Onion Thrips]
  - [Neem Oil, Leek Moth]
  - [Neem Oil, Allium Leafminer]
  - ["Bacillus thuringiensis (Bt)", Cabbage White Butterfly]
  - [Ferramol, Slug]

# Treatment -> Disease targeting edges
disease_treatments:
  - [Potassium Bicarbonate, Leek Rust]
  - [Potassium Bicarbonate, Powdery Mildew]
  - [Environmental Control, Leek Rust]
  - [Crop Rotation, White Rot]
  - [Crop Rotation, Cercospora Leaf Spot]
  - [Sanitation, Alternaria Leaf Blight]

# Existing families needed for species creation (loaded at runtime)
existing_families_needed:
  - Brassicaceae
  - Solanaceae
  - Apiaceae
  - Fabaceae
  - Cucurbitaceae
  - Asteraceae
  - Lamiaceae
