  # 7. Erdbeere Coco — Drain-to-Waste (Canna Coco)
  # ══════════════════════════════════════════════════════════════════════════════
  - name: "Erdbeere Coco DTW — Canna Coco"
    description: >-
      Erdbeerplan für Coco (Drain-to-Waste) mit Canna Coco A+B.
      Erdbeeren sind Mittelzehrer mit hohem Ca/K-Bedarf.
      pH 5.5–6.0 für optimale Fe-Aufnahme (Chlorose vermeiden).
      Dauertragende Sorten produzieren 4–6 Monate in Coco.
