            drench_params:
              volume_per_feeding_liters: 0.2
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.5
              - product_name: "Canna Coco A"
                ml_per_liter: 3.0
              - product_name: "Canna Coco B"
                ml_per_liter: 3.0

      - phase_name: harvest
        sequence_order: 3
        week_start: 8
        week_end: 14
        npk_ratio: [3.0, 1.0, 3.0]
        reference_ec_ms: 0.9
        notes: >-
          Erntephase. EC leicht senken. Blatt für Blatt ernten
          (Cut-and-Come-Again). Weiter düngen — kein Flush nötig.
          Nachlegen möglich (Sukzession) alle 2–3 Wochen.
        delivery_channels:
          - channel_id: fertigation-harvest
            label: "Ernte (Gemüse)"
            application_method: fertigation
            target_ec_ms: 0.9
            target_ph: 5.9
            drench_params:
              volume_per_feeding_liters: 0.2
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.0
              - product_name: "Canna Coco A"
                ml_per_liter: 2.5
              - product_name: "Canna Coco B"
                ml_per_liter: 2.5

  # ══════════════════════════════════════════════════════════════════════════════
  # 10. Allgemein Steinwolle — TriPart
  # ══════════════════════════════════════════════════════════════════════════════
  - name: "Allgemein Steinwolle (Rockwool) — TriPart"
    description: >-
      Universeller Steinwolle-Plan mit TriPart. Für Tomate, Paprika,
      Gurke, Erdbeere in Steinwolle-Slabs oder -Würfeln.
      Steinwolle ist pH-inert nach Konditionierung (pH 5.5 einweichen).
      Drain-to-Waste mit 20–30% Runoff. CalMag essenziell bei RO-Wasser.
    recommended_substrate_type: rockwool_slab
    reference_substrate_type: rockwool_slab
    author: Kamerplanter Referenzdaten
    is_template: true
    version: "1.0"
    tags: [steinwolle, rockwool, tripart, allgemein, hydro, drain-to-waste]
    watering_schedule:
      schedule_mode: interval
      interval_days: 1
      preferred_time: "07:00"
      application_method: fertigation
      reminder_hours_before: 1
      times_per_day: 3
    phase_entries:
      - phase_name: seedling
        sequence_order: 1
        week_start: 1
        week_end: 3
        npk_ratio: [2.0, 1.0, 2.0]
        reference_ec_ms: 0.7
        notes: >-
          Steinwolle-Plugs vorher in pH 5.5 Lösung einweichen (24h).
          Halbe Dosis TriPart. CalMag 1.0 ml/L.
          Plug in Propagator bei 22–25°C, 80–90% rH.
        delivery_channels:
          - channel_id: fertigation-seedling
            label: "Steinwolle-Plug (Sämling)"
            application_method: fertigation
            target_ec_ms: 0.7
            target_ph: 5.5
            drench_params:
              volume_per_feeding_liters: 0.05
            fertilizer_dosages:
              - product_name: "CalMag"
                ml_per_liter: 1.0
              - product_name: "TriPart Micro"
                ml_per_liter: 1.5
              - product_name: "TriPart Grow"
                ml_per_liter: 1.0
              - product_name: "TriPart Bloom"
                ml_per_liter: 0.5

      - phase_name: vegetative
        sequence_order: 2
        week_start: 4
        week_end: 8
        npk_ratio: [3.0, 1.0, 4.0]
        reference_ec_ms: 1.4
        notes: >-
          Steinwolle-Slab oder -Würfel. Grow dominant. CalMag 1.5 ml/L.
          3–5x täglich fertigation (kurze Intervalle, Steinwolle trocknet
          schneller als Coco). 20–30% Runoff. EC-Messung im Slab-Drain.
        delivery_channels:
          - channel_id: fertigation-veg
            label: "Steinwolle-Slab (Vegi)"
            application_method: fertigation
            target_ec_ms: 1.4
            target_ph: 5.5
            drench_params:
              volume_per_feeding_liters: 0.15
            fertilizer_dosages:
              - product_name: "CalMag"
                ml_per_liter: 1.5
              - product_name: "TriPart Micro"
                ml_per_liter: 2.5
              - product_name: "TriPart Grow"
                ml_per_liter: 3.0
              - product_name: "TriPart Bloom"
                ml_per_liter: 1.0

      - phase_name: flowering
        sequence_order: 3
        week_start: 8
        week_end: 14
        npk_ratio: [2.0, 3.0, 5.0]
        reference_ec_ms: 2.0
        notes: >-
          Fruchtung. Bloom dominant. CalMag 2.0 ml/L.
          EC-Ziel pflanzenabhängig: Tomate 2.0–2.5, Paprika 1.8–2.2,
          Gurke 1.8–2.0, Erdbeere 1.2–1.5. Werte hier als Mittelwert.
          Steinwolle-EC im Drain überwachen — bei >3.0 mit reinem Wasser spülen.
        delivery_channels:
          - channel_id: fertigation-bloom
            label: "Steinwolle-Slab (Fruchtung)"
            application_method: fertigation
            target_ec_ms: 2.0
            target_ph: 5.8
            drench_params:
              volume_per_feeding_liters: 0.2
            fertilizer_dosages:
              - product_name: "CalMag"
                ml_per_liter: 2.0
              - product_name: "TriPart Micro"
                ml_per_liter: 2.5
              - product_name: "TriPart Grow"
                ml_per_liter: 1.5
              - product_name: "TriPart Bloom"
                ml_per_liter: 3.0

      - phase_name: harvest
        sequence_order: 4
        week_start: 14
        week_end: 24
        npk_ratio: [2.0, 3.0, 5.0]
        reference_ec_ms: 1.8
        notes: >-
          Dauerernte. EC leicht senken. CalMag beibehalten.
          Steinwolle kann 1 Kultur (max. 2 bei Desinfektion) genutzt werden.
          Nach Kulturende: Steinwolle entsorgen (nicht kompostierbar).
        delivery_channels:
          - channel_id: fertigation-harvest
            label: "Steinwolle-Slab (Dauerernte)"
            application_method: fertigation
            target_ec_ms: 1.8
            target_ph: 5.8
            drench_params:
              volume_per_feeding_liters: 0.2
            fertilizer_dosages:
              - product_name: "CalMag"
                ml_per_liter: 1.5
              - product_name: "TriPart Micro"
                ml_per_liter: 2.0
              - product_name: "TriPart Grow"
                ml_per_liter: 1.0
              - product_name: "TriPart Bloom"
                ml_per_liter: 2.5

  # ══════════════════════════════════════════════════════════════════════════════
  # 11. Microgreens — Keimung+Ernte (Minimal)
  # ══════════════════════════════════════════════════════════════════════════════
  - name: "Microgreens — Minimal (TriPart)"
    description: >-
      Ultra-kurzer Plan für Microgreens (7–14 Tage). Sonnenblume, Erbse,
      Radieschen, Brokkoli, Kresse, Senf. Auf Hanfmatte, Kokosmatte
      oder Steinwolle-Plug. Sehr niedrige EC — die meiste Energie kommt
      aus dem Samenkorn. Optional ganz ohne Dünger (nur Wasser).
    recommended_substrate_type: none
    reference_substrate_type: none
    author: Kamerplanter Referenzdaten
    is_template: true
    version: "1.0"
    tags: [microgreens, sprossen, keimung, minimal, tripart, hydro, schnellkultur]
    phase_entries:
      - phase_name: germination
        sequence_order: 1
        week_start: 1
        week_end: 1
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Samen auf feuchte Matte/Pad auslegen. Dicht säen (Samen berühren
          sich). Abdecken für 2–3 Tage (Dunkelkeimer-Phase). Nur RO-Wasser
          sprühen, KEIN Dünger. 20–25°C. Kein Licht in der Keimphase.
        delivery_channels:
          - channel_id: spray-germ
            label: "Sprühen (Keimung)"
            application_method: foliar
            target_ec_ms: 0.0
            target_ph: 6.0
            drench_params:
              volume_per_feeding_liters: 0.01
            fertilizer_dosages: []

      - phase_name: seedling
        sequence_order: 2
        week_start: 1
        week_end: 2
        npk_ratio: [1.0, 0.5, 1.0]
        reference_ec_ms: 0.3
        notes: >-
          Grünen-Phase: Abdeckung entfernen, Licht an (12–16h).
          Optional minimale Düngung (TriPart 0.3 ml/L je).
          Viele Microgreens brauchen KEINEN Dünger — die Energie
          kommt aus dem Samenkorn. Bei >10 Tagen Kultur leicht düngen.
        delivery_channels:
          - channel_id: bottom-water
            label: "Bodenbewässerung"
            application_method: fertigation
            target_ec_ms: 0.3
            target_ph: 5.8
            drench_params:
              volume_per_feeding_liters: 0.05
            fertilizer_dosages:
              - product_name: "TriPart Micro"
                ml_per_liter: 0.3
              - product_name: "TriPart Grow"
                ml_per_liter: 0.3
              - product_name: "TriPart Bloom"
                ml_per_liter: 0.2
                optional: true

      - phase_name: harvest
        sequence_order: 3
        week_start: 2
        week_end: 3
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Ernte bei 5–10 cm Höhe (1–2 echte Blätter). Mit scharfer Schere
          knapp über Substrat schneiden. Sofort verwenden (kurze Haltbarkeit).
          Substrat kompostieren oder entsorgen. Kein Nachwachsen.
        delivery_channels:
          - channel_id: water-harvest
            label: "Wasser (Ernte)"
            application_method: fertigation
            target_ec_ms: 0.0
            target_ph: 6.0
            drench_params:
              volume_per_feeding_liters: 0.03
            fertilizer_dosages: []

  # ══════════════════════════════════════════════════════════════════════════════
  # 12. Chili Coco — Drain-to-Waste (Canna Coco)
  # ══════════════════════════════════════════════════════════════════════════════
  - name: "Chili Coco DTW — Canna Coco"
    description: >-
      Chili-Plan für Coco (Drain-to-Waste) mit Canna Coco A+B.
      Chilis sind Starkzehrer mit langer Kulturzeit (20–30 Wochen
      je nach Sorte). Von Jalapeño (mild) bis Carolina Reaper (extrem).
      Superhots brauchen höhere EC und mehr Geduld. CalMag-Pflicht.
    recommended_substrate_type: coco
    reference_substrate_type: coco
    author: Kamerplanter Referenzdaten
    is_template: true
    version: "1.0"
    tags: [chili, peperoni, capsicum, coco, canna, drain-to-waste, starkzehrer]
    watering_schedule:
      schedule_mode: interval
      interval_days: 1
      preferred_time: "08:00"
      application_method: fertigation
      reminder_hours_before: 1
      times_per_day: 2
    phase_entries:
      - phase_name: germination
        sequence_order: 1
        week_start: 1
        week_end: 3
        npk_ratio: [0.0, 0.0, 0.0]
        notes: >-
          Chili-Keimung dauert lange! 7–21 Tage bei 25–30°C.
          Superhots (Habanero, Reaper) bis 30 Tage. Heizmatte empfohlen.
          Nur RO-Wasser + CalMag (EC 0.3). In Steinwolle-Plug oder
          direkt in Coco-Plug keimen. Warm und feucht halten.
        delivery_channels:
          - channel_id: fertigation-germ
            label: "Keimung (Chili)"
            application_method: fertigation
            target_ec_ms: 0.3
            target_ph: 5.8
            drench_params:
              volume_per_feeding_liters: 0.02
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.0

      - phase_name: seedling
        sequence_order: 2
        week_start: 4
        week_end: 7
        npk_ratio: [2.0, 1.0, 2.0]
        reference_ec_ms: 0.6
        notes: >-
          Langsames Wachstum in den ersten Wochen — normal bei Chilis!
          Halbe Dosis Canna Coco A+B (2 ml/L). CalMag 1.0 ml/L.
          Rhizotonic 2 ml/L für Wurzelaufbau. 22–28°C.
          Erst 1x, dann 2x täglich fertigation.
        delivery_channels:
          - channel_id: fertigation-seedling
            label: "Sämling (Chili)"
            application_method: fertigation
            target_ec_ms: 0.6
            target_ph: 5.8
            drench_params:
              volume_per_feeding_liters: 0.1
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.0
              - product_name: "Canna Coco A"
                ml_per_liter: 2.0
              - product_name: "Canna Coco B"
                ml_per_liter: 2.0
              - product_name: "Canna Rhizotonic"
                ml_per_liter: 2.0

      - phase_name: vegetative
        sequence_order: 3
        week_start: 8
        week_end: 14
        npk_ratio: [3.0, 1.0, 4.0]
        reference_ec_ms: 1.3
        notes: >-
          Hauptwachstumsphase. Canna Coco A+B je 3.5 ml/L. CalMag 1.5 ml/L.
          Toppen bei 5. Blattpaar für buschiges Wachstum (außer Superhots —
          die verzweigen natürlich). Chilis werden groß in Coco — 10–20L Töpfe.
          Stütze/Spalier ab 40 cm Höhe.
        delivery_channels:
          - channel_id: fertigation-veg
            label: "Vegetativ (Chili)"
            application_method: fertigation
            target_ec_ms: 1.3
            target_ph: 5.9
            drench_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.5
              - product_name: "Canna Coco A"
                ml_per_liter: 3.5
              - product_name: "Canna Coco B"
                ml_per_liter: 3.5

      - phase_name: flowering
        sequence_order: 4
        week_start: 14
        week_end: 20
        npk_ratio: [2.0, 3.0, 5.0]
        reference_ec_ms: 1.7
        notes: >-
          Blüte und Fruchtansatz. Canna Coco A+B je 4 ml/L.
          PK 13/14 0.5 ml/L in Woche 2–3 der Blüte (vorsichtig dosieren).
          CalMag 2.0 ml/L. Chilis blühen und fruchten über Monate.
          Erste Blüte (Königsblüte) bei Annuums entfernen.
          Superhots: EC bis 2.0 toleriert.
        delivery_channels:
          - channel_id: fertigation-bloom
            label: "Blüte/Fruchtung (Chili)"
            application_method: fertigation
            target_ec_ms: 1.7
            target_ph: 6.0
            drench_params:
              volume_per_feeding_liters: 0.4
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 2.0
              - product_name: "Canna Coco A"
                ml_per_liter: 4.0
              - product_name: "Canna Coco B"
                ml_per_liter: 4.0
              - product_name: "Canna PK 13/14"
                ml_per_liter: 0.5
                optional: true

      - phase_name: harvest
        sequence_order: 5
        week_start: 20
        week_end: 30
        npk_ratio: [2.0, 2.0, 4.0]
        reference_ec_ms: 1.5
        notes: >-
          Dauerernte 8–12 Wochen. EC leicht senken. CalMag beibehalten.
          Chilis bei Vollreife ernten (rot/gelb/orange je nach Sorte).
          Unreife (grüne) Chilis sind essbar aber weniger scharf.
          Pflanze kann in Coco überwintern (Rückschnitt + EC senken
          auf 0.5, nur CalMag + minimale Basisdüngung).
        delivery_channels:
          - channel_id: fertigation-harvest
            label: "Dauerernte (Chili)"
            application_method: fertigation
            target_ec_ms: 1.5
            target_ph: 6.0
            drench_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.5
              - product_name: "Canna Coco A"
                ml_per_liter: 3.0
              - product_name: "Canna Coco B"
                ml_per_liter: 3.0
