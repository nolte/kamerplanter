      Niedrig-EC-Plan für Blattgemüse und Kräuter in NFT-Systemen.
      Salat, Basilikum, Koriander, Dill, Petersilie, Rucola.
      Schnelle Kultur (4–6 Wochen nach Transplant). TriPart Basis,
