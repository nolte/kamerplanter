          CalMag beibehalten (2.0 ml/L). Reife Früchte regelmäßig ernten,
          fördert Neuansatz. Pflanze produziert 3–6 Monate kontinuierlich.
          KEIN Flush bei Tomaten — bis zum Ende düngen.
        delivery_channels:
