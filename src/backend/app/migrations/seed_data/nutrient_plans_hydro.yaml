      preferred_time: "07:00"
      application_method: fertigation
      reminder_hours_before: 1
      times_per_day: 2
    phase_entries:
      - phase_name: seedling
        sequence_order: 1
        week_start: 1
        week_end: 3
        npk_ratio: [2.0, 1.0, 3.0]
        reference_ec_ms: 0.6
        notes: >-
          Jungpflanze/Steckling einsetzen. Halbe Dosis Canna Coco A+B.
          CalMag 1.0 ml/L. Rhizotonic 2 ml/L für schnelles Anwachsen.
          Erdbeeren aus Ausläufern oder Setzlingen, selten aus Samen.
        delivery_channels:
          - channel_id: fertigation-seedling
            label: "Jungpflanze (Erdbeere)"
            application_method: fertigation
            target_ec_ms: 0.6
            target_ph: 5.8
            drench_params:
              volume_per_feeding_liters: 0.1
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.0
              - product_name: "Canna Coco A"
                ml_per_liter: 2.0
              - product_name: "Canna Coco B"
                ml_per_liter: 2.0
              - product_name: "Canna Rhizotonic"
                ml_per_liter: 2.0

      - phase_name: vegetative
        sequence_order: 2
        week_start: 4
        week_end: 8
        npk_ratio: [3.0, 1.0, 4.0]
        reference_ec_ms: 1.0
        notes: >-
          Blattaufbau und Kronenstärkung. Canna Coco A+B je 3 ml/L.
          CalMag 1.5 ml/L. Ausläufer entfernen für Fruchtertrag!
          Erdbeeren sind Kurztagspflanzen — Blühinduktion bei <12h Licht
          (einmaltragende) oder tagneutral (immertragende).
        delivery_channels:
          - channel_id: fertigation-veg
            label: "Vegetativ (Erdbeere)"
            application_method: fertigation
            target_ec_ms: 1.0
            target_ph: 5.8
            drench_params:
              volume_per_feeding_liters: 0.2
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.5
              - product_name: "Canna Coco A"
                ml_per_liter: 3.0
              - product_name: "Canna Coco B"
                ml_per_liter: 3.0

      - phase_name: flowering
        sequence_order: 3
        week_start: 8
        week_end: 12
        npk_ratio: [2.0, 3.0, 5.0]
        reference_ec_ms: 1.3
        notes: >-
          Blüte und Fruchtansatz. Canna Coco A+B je 3.5 ml/L.
          CalMag 2.0 ml/L — Ca-Mangel = weiche, faulige Früchte!
          PK 13/14 NICHT verwenden (zu aggressiv für Erdbeeren).
          Kalium natürlich über Coco B. pH 5.8–6.0.
        delivery_channels:
          - channel_id: fertigation-bloom
            label: "Blüte/Fruchtung (Erdbeere)"
            application_method: fertigation
            target_ec_ms: 1.3
            target_ph: 5.9
            drench_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 2.0
              - product_name: "Canna Coco A"
                ml_per_liter: 3.5
              - product_name: "Canna Coco B"
                ml_per_liter: 3.5

      - phase_name: harvest
        sequence_order: 4
        week_start: 12
        week_end: 24
        npk_ratio: [2.0, 2.0, 4.0]
        reference_ec_ms: 1.1
        notes: >-
          Dauerernte 3–4 Monate bei immertragenden Sorten. EC leicht
          senken. CalMag beibehalten. Reife Früchte täglich pflücken.
          Höherer EC = süßere Früchte (aber weniger Ertrag).
          Kein Flush — durchgehend düngen.
        delivery_channels:
          - channel_id: fertigation-harvest
            label: "Dauerernte (Erdbeere)"
            application_method: fertigation
            target_ec_ms: 1.1
            target_ph: 5.9
            drench_params:
              volume_per_feeding_liters: 0.3
            fertilizer_dosages:
              - product_name: "Canna CalMag Agent"
                ml_per_liter: 1.5
              - product_name: "Canna Coco A"
                ml_per_liter: 3.0
              - product_name: "Canna Coco B"
                ml_per_liter: 3.0

