version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ARANGODB_HOST=arangodb
      - ARANGODB_PORT=8529
      - ARANGODB_DATABASE=kamerplanter
      - ARANGODB_USERNAME=root
      - ARANGODB_PASSWORD=rootpassword
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - arangodb
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  arangodb:
    image: arangodb:3.11
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=rootpassword
    volumes:
      - arango_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celeryworker:
    build: .
    environment:
      - ARANGODB_HOST=arangodb
      - ARANGODB_PORT=8529
      - ARANGODB_DATABASE=kamerplanter
      - ARANGODB_USERNAME=root
      - ARANGODB_PASSWORD=rootpassword
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - arangodb
      - redis
    command: celery -A app.tasks worker --loglevel=info

volumes:
  arango_data:
