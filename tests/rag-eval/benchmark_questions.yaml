# RAG Quality Benchmark — Kamerplanter KI-Assistent (REQ-031)
#
# 100 kuratierte Frage-Antwort-Paare fuer automatisierte RAG-Qualitaetsmessung.
# Jede Frage hat erwartete Themen (MUSS vorkommen) und Ausschluss-Themen
# (DARF NICHT vorkommen = Halluzination/Fehldiagnose).
#
# Scoring:
#   topic_hit:  +1 pro expected_topics Treffer in der Antwort
#   topic_miss: -0.5 pro expected_topics das NICHT in der Antwort vorkommt
#   false_positive: -2 pro expected_NOT das in der Antwort vorkommt (Halluzination)
#   score = (topic_hits - topic_misses - false_positives) / max_possible
#
# Kategorien: diagnostik, duengung, bewaesserung, ipm, phasen, umwelt,
#             companion_planting, ernte, pflege, anfaenger

---
version: "1.0"
language: de
eval_model: "claude-haiku-4-5"  # LLM-as-Judge fuer Freitextbewertung
min_pass_score: 0.70  # Benchmark gilt als bestanden ab 70%

questions:

  # ===========================================================================
  # DIAGNOSTIK — Naehrstoffmangel & Symptome (15 Fragen)
  # ===========================================================================

  - id: diag-001
    category: diagnostik
    difficulty: beginner
    question_type: diagnosis
    question: "Meine unteren Blaetter werden gelb, die oberen sind noch gruen. Was fehlt?"
    context:
      species: null  # Allgemeine Frage
      phase: vegetative
    expected_topics:
      - stickstoff_mangel
      - mobile_naehrstoffe
      - untere_blaetter
      - ec_pruefen
    expected_NOT:
      - eisen_mangel  # Fe zeigt sich an NEUEN Blaettern
      - calcium_mangel  # Ca zeigt sich an NEUEN Blaettern
      - ueberwaesserung  # Moeglich, aber nicht primaere Diagnose bei diesem Symptom

  - id: diag-002
    category: diagnostik
    difficulty: intermediate
    question_type: diagnosis
    question: "Meine Cannabis-Pflanze zeigt gelbe Blaetter unten in Woche 7 der Bluete. EC ist 1.4 in Coco."
    context:
      species: Cannabis sativa
      phase: flowering
      week: 7
      ec: 1.4
      substrate: coco
    expected_topics:
      - natuerlicher_n_abbau
      - spaete_bluete_normal
      - abreife
    expected_NOT:
      - sofort_ec_erhoehen  # In Woche 7 ist Vergilbung erwuenscht
      - stickstoff_mangel_behandeln  # Nicht behandeln in spaeter Bluete

  - id: diag-003
    category: diagnostik
    difficulty: intermediate
    question_type: diagnosis
    question: "Neue Blaetter meiner Tomate haben braune Flecken und die Triebspitzen kueseln sich. pH 6.2 in Erde."
    context:
      species: Solanum lycopersicum
      phase: vegetative
      substrate: soil
      ph: 6.2
    expected_topics:
      - calcium_mangel
      - immobiler_naehrstoff
      - neue_blaetter
      - gleichmaessige_bewaesserung
    expected_NOT:
      - magnesium_mangel  # Mg zeigt sich an ALTEN Blaettern
      - eisen_mangel  # Fe zeigt intervenale Chlorose, keine Flecken

  - id: diag-004
    category: diagnostik
    difficulty: expert
    question_type: diagnosis
    question: "Intervenale Chlorose an aelteren Blaettern, Blattadern bleiben gruen. Cannabis in Coco, EC 1.6, pH 5.8, Woche 4 Bluete."
    context:
      species: Cannabis sativa
      phase: flowering
      week: 4
      ec: 1.6
      ph: 5.8
      substrate: coco
    expected_topics:
      - magnesium_mangel
      - kalium_antagonismus
      - bittersalz_blattspray
      - calmag
    expected_NOT:
      - eisen_mangel  # Fe zeigt sich an JUNGEN Blaettern
      - stickstoff_mangel  # N zeigt gleichmaessige Vergilbung, nicht intervenal

  - id: diag-005
    category: diagnostik
    difficulty: beginner
    question_type: diagnosis
    question: "Meine Monstera hat braune Blattspitzen. Was mache ich falsch?"
    context:
      species: Monstera deliciosa
      phase: vegetative
    expected_topics:
      - luftfeuchtigkeit_zu_niedrig
      - ueberduengung_moeglich
      - leitungswasser_chlor
    expected_NOT:
      - vpd_optimierung  # Zu technisch fuer Zimmerpflanze
      - ec_messen  # Nicht relevant fuer Zimmerpflanzen-Anfaenger

  - id: diag-006
    category: diagnostik
    difficulty: intermediate
    question_type: diagnosis
    question: "Alle meine Pflanzen im Hydro-System zeigen Mangelsymptome obwohl EC stimmt. pH ist 7.2."
    context:
      phase: vegetative
      ec: 1.2
      ph: 7.2
      substrate: hydro
    expected_topics:
      - ph_lockout
      - ph_zu_hoch
      - eisen_mangel_wahrscheinlich
      - ph_senken
    expected_NOT:
      - mehr_duenger  # EC stimmt ja, Problem ist pH

  - id: diag-007
    category: diagnostik
    difficulty: expert
    question_type: diagnosis
    question: "Braune Flecken auf aelteren Blaettern, pH im Coco-Runoff ist 5.0. Welcher Ueberschuss?"
    context:
      phase: vegetative
      ph: 5.0
      substrate: coco
    expected_topics:
      - mangan_toxizitaet
      - ph_zu_niedrig
      - ph_erhoehen
    expected_NOT:
      - calcium_mangel  # Ca zeigt sich an neuen Blaettern
      - magnesium_mangel  # Mg zeigt intervenale Chlorose

  - id: diag-008
    category: diagnostik
    difficulty: beginner
    question_type: diagnosis
    question: "Meine Pflanze welkt obwohl die Erde nass ist."
    context:
      substrate: soil
    expected_topics:
      - ueberwaesserung
      - wurzelfaeule
      - sauerstoffmangel
      - drainage_pruefen
    expected_NOT:
      - mehr_giessen  # Erde ist bereits nass!
      - unterwaesserung

  - id: diag-009
    category: diagnostik
    difficulty: intermediate
    question_type: diagnosis
    question: "Mein Basilikum hat weisse pudrige Flecken auf den Blaettern."
    context:
      species: Ocimum basilicum
      phase: vegetative
    expected_topics:
      - echter_mehltau
      - luftzirkulation_verbessern
      - befallene_blaetter_entfernen
    expected_NOT:
      - falscher_mehltau  # Falscher Mehltau zeigt sich an Unterseite
      - naehrstoffmangel

  - id: diag-010
    category: diagnostik
    difficulty: intermediate
    question_type: diagnosis
    question: "Meine Erdbeer-Fruechte haben braune Flecken am Boden."
    context:
      species: Fragaria x ananassa
      phase: flowering
    expected_topics:
      - bluetenendfaeule
      - calcium
      - gleichmaessige_bewaesserung
    expected_NOT:
      - schimmel  # BER ist kein Schimmel sondern Ca-Transport-Problem
      - fungizid

  - id: diag-011
    category: diagnostik
    difficulty: expert
    question_type: diagnosis
    question: "Weisse Wurzeln sind braun und schleimig geworden, Reservoir-Temperatur 26°C."
    context:
      substrate: dwc
      water_temp: 26
    expected_topics:
      - pythium
      - wurzelfaeule
      - wassertemperatur_senken
      - sauerstoff
      - h2o2
    expected_NOT:
      - ueberduengung
      - ph_problem

  - id: diag-012
    category: diagnostik
    difficulty: beginner
    question_type: diagnosis
    question: "Kleine schwarze Fliegen kommen aus der Erde wenn ich giesse."
    context:
      substrate: soil
    expected_topics:
      - trauermucken
      - substrat_abtrocknen
      - gelbtafeln
      - nematoden_steinernema
    expected_NOT:
      - spinnmilben
      - thrips

  - id: diag-013
    category: diagnostik
    difficulty: intermediate
    question_type: diagnosis
    question: "Silbrige Streifen und schwarze Punkte auf den Blaettern meiner Pflanze."
    context:
      phase: vegetative
    expected_topics:
      - thrips
      - blaue_klebefallen
      - spinosad
      - raubmilben
    expected_NOT:
      - spinnmilben  # Spinnmilben zeigen Stippling, nicht silbrige Streifen
      - naehrstoffmangel

  - id: diag-014
    category: diagnostik
    difficulty: expert
    question_type: diagnosis
    question: "Mein pH driftet jeden Tag um 0.5 nach oben im DWC-Reservoir."
    context:
      substrate: dwc
    expected_topics:
      - nitrat_aufnahme
      - algenbildung
      - reservoir_groesse
      - karbonataerte
    expected_NOT:
      - wurzelfaeule  # pH-Drift nach oben ist normal bei gesundem Wachstum

  - id: diag-015
    category: diagnostik
    difficulty: intermediate
    question_type: diagnosis
    question: "Runoff-EC ist 3.2 bei Input-EC 1.4 in Coco."
    context:
      substrate: coco
      ec_input: 1.4
      ec_runoff: 3.2
    expected_topics:
      - salzanreicherung
      - flush_noetig
      - ec_reduzieren
    expected_NOT:
      - ec_erhoehen
      - alles_ok

  # ===========================================================================
  # DUENGUNG — EC, Mischen, CalMag (15 Fragen)
  # ===========================================================================

  - id: dueng-001
    category: duengung
    difficulty: beginner
    question_type: factual
    question: "Muss ich CalMag verwenden wenn ich Osmosewasser nutze?"
    context:
      water_type: ro
    expected_topics:
      - ja_immer
      - calcium_magnesium_fehlt
      - ec_03_04
      - vor_base_nutrients
    expected_NOT:
      - optional
      - nicht_noetig

  - id: dueng-002
    category: duengung
    difficulty: intermediate
    question_type: howto
    question: "In welcher Reihenfolge mische ich meine Naehrloesung?"
    expected_topics:
      - wasser_zuerst
      - silikat_vor_calmag
      - calmag_vor_part_a
      - part_a_vor_part_b
      - ph_zuletzt
    expected_NOT:
      - reihenfolge_egal

  - id: dueng-003
    category: duengung
    difficulty: expert
    question_type: diagnosis
    question: "Meine Naehrloesung ist trueb geworden nachdem ich CalMag und Part B gleichzeitig zugegeben habe."
    expected_topics:
      - calciumsulfat_ausfaellung
      - gips
      - falsche_mischreihenfolge
      - calcium_nicht_verfuegbar
    expected_NOT:
      - normal
      - weiter_verwenden

  - id: dueng-004
    category: duengung
    difficulty: intermediate
    question_type: diagnosis
    question: "Welche EC soll ich in der Bluete Woche 5 meiner Cannabis-Pflanze in Coco anpeilen?"
    context:
      species: Cannabis sativa
      phase: flowering
      week: 5
      substrate: coco
    expected_topics:
      - ec_14_20
      - pk_boost
      - peak_bloom
    expected_NOT:
      - ec_unter_10  # Zu niedrig fuer Peak Bloom
      - flush  # Noch nicht — erst 2 Wochen vor Ernte

  - id: dueng-005
    category: duengung
    difficulty: beginner
    question_type: factual
    question: "Mein Leitungswasser hat EC 0.6. Muss ich da etwas beachten?"
    expected_topics:
      - basis_ec_abziehen
      - ec_net_berechnen
      - wasserhaerte_pruefen
    expected_NOT:
      - ro_anlage_kaufen  # EC 0.6 ist ok, kein RO noetig

  - id: dueng-006
    category: duengung
    difficulty: intermediate
    question_type: howto
    question: "Wann starte ich den PK-Boost bei Cannabis?"
    context:
      species: Cannabis sativa
      phase: flowering
    expected_topics:
      - woche_3_4
      - nach_stretch
      - halbe_dosis_starten
      - ec_beachten
    expected_NOT:
      - sofort_bei_umstellung  # Nicht in Woche 1!
      - volle_dosis_sofort

  - id: dueng-007
    category: duengung
    difficulty: expert
    question_type: factual
    question: "Kann ich Wasserstoffperoxid zusammen mit Mykorrhiza verwenden?"
    expected_topics:
      - nein_inkompatibel
      - h2o2_toetet_nuetzlinge
      - entweder_oder
    expected_NOT:
      - ja_kein_problem
      - kombinierbar

  - id: dueng-008
    category: duengung
    difficulty: beginner
    question_type: howto
    question: "Wie oft soll ich meine Zimmerpflanze duengen?"
    expected_topics:
      - wachstumsperiode
      - maerz_oktober
      - alle_2_4_wochen
      - halbe_dosis
      - winter_nicht_duengen
    expected_NOT:
      - ec_messen  # Zu technisch fuer Zimmerpflanzen-Anfaenger
      - woechentlich  # Zu oft fuer die meisten Zimmerpflanzen

  - id: dueng-009
    category: duengung
    difficulty: intermediate
    question_type: factual
    question: "Was ist der Unterschied zwischen Hornmehl und Hornspaenen?"
    expected_topics:
      - koernung
      - hornmehl_schneller
      - hornspaene_langsamer
      - stickstoff_quelle
    expected_NOT:
      - gleich  # Sind nicht gleich!
      - phosphor  # Hornprodukte liefern primaer N, nicht P

  - id: dueng-010
    category: duengung
    difficulty: expert
    question_type: howto
    question: "Mein Coco ist neu und ungepuffert. Was muss ich tun?"
    context:
      substrate: coco
    expected_topics:
      - calmag_loesung_einweichen
      - kationenaustausch
      - natrium_kalium_auswaschen
      - ph_58_60
    expected_NOT:
      - sofort_pflanzen  # Ohne Pufferung → Ca/Mg-Mangel
      - nur_waessern

  - id: dueng-011
    category: duengung
    difficulty: intermediate
    question_type: diagnosis
    question: "Meine Tomaten im Freiland wachsen langsam. Bodenanalyse zeigt pH 5.2."
    context:
      species: Solanum lycopersicum
      substrate: soil
      ph: 5.2
    expected_topics:
      - ph_zu_niedrig
      - kalken
      - aluminium_toxizitaet_moeglich
      - naehrstoff_verfuegbarkeit
    expected_NOT:
      - ph_senken  # pH ist schon zu niedrig!
      - mehr_duengen_sofort

  - id: dueng-012
    category: duengung
    difficulty: beginner
    question_type: diagnosis
    question: "Weisse Kruste auf der Erde meiner Zimmerpflanze — was ist das?"
    expected_topics:
      - salzanreicherung
      - ueberduengung
      - hartes_wasser
      - durchspuelen
    expected_NOT:
      - schimmel  # Weisse Kruste = Salz, nicht Schimmel (Schimmel ist flauschig)
      - normal

  - id: dueng-013
    category: duengung
    difficulty: intermediate
    question_type: factual
    question: "Soll ich vor der Ernte flushen? Ist das wissenschaftlich belegt?"
    expected_topics:
      - umstritten
      - guelph_studie
      - kompromiss
      - ec_reduzieren
    expected_NOT:
      - auf_jeden_fall  # Nicht eindeutig belegt
      - auf_keinen_fall  # Auch nicht definitiv widerlegt

  - id: dueng-014
    category: duengung
    difficulty: expert
    question_type: diagnosis
    question: "Mein pH driftet bei Ammonium-betontem Duenger staendig nach unten."
    expected_topics:
      - ammonium_senkt_ph
      - nh4_no3_verhaeltnis
      - nitrat_betont_waehlen
    expected_NOT:
      - ph_up_verwenden  # Symptom behandeln statt Ursache
      - normal

  - id: dueng-015
    category: duengung
    difficulty: intermediate
    question_type: howto
    question: "Kann ich Bittersalz als Blattspray verwenden?"
    expected_topics:
      - ja_magnesium
      - 5g_pro_liter
      - abends_spruehen
      - schnelle_aufnahme
    expected_NOT:
      - nicht_empfohlen
      - nur_wurzelduengung

  # ===========================================================================
  # BEWAESSERUNG (10 Fragen)
  # ===========================================================================

  - id: wasser-001
    category: bewaesserung
    difficulty: beginner
    question_type: howto
    question: "Wie oft soll ich meine Zimmerpflanze giessen?"
    expected_topics:
      - fingertest
      - nicht_nach_zeitplan
      - substrat_pruefen
      - topfgewicht
    expected_NOT:
      - jeden_montag
      - taeglich

  - id: wasser-002
    category: bewaesserung
    difficulty: intermediate
    question_type: howto
    question: "Wie oft muss ich in Coco giessen?"
    context:
      substrate: coco
    expected_topics:
      - hochfrequenz
      - 3_5_mal_taeglich_bluete
      - nie_austrocknen
      - immer_mit_naehrloesung
    expected_NOT:
      - wie_erde  # Coco ist fundamental anders als Erde!
      - einmal_taeglich_reicht

  - id: wasser-003
    category: bewaesserung
    difficulty: beginner
    question_type: diagnosis
    question: "Meine Pflanze haengt schlaff und der Topf ist schwer. Ueberwaesserung?"
    expected_topics:
      - ja_wahrscheinlich
      - schwerer_topf
      - nicht_giessen
      - austrocknen_lassen
    expected_NOT:
      - mehr_giessen
      - unterwaesserung

  - id: wasser-004
    category: bewaesserung
    difficulty: intermediate
    question_type: factual
    question: "Kann ich Regenwasser fuer meine Pflanzen verwenden?"
    expected_topics:
      - ja_gut_geeignet
      - weich
      - calmag_noetig
      - dunkel_lagern
    expected_NOT:
      - nein_nicht_geeignet
      - gefaehrlich

  - id: wasser-005
    category: bewaesserung
    difficulty: beginner
    question_type: factual
    question: "Brauche ich einen Topf mit Loch am Boden?"
    expected_topics:
      - ja_unbedingt
      - drainage
      - uebertopf
      - staunaesse
    expected_NOT:
      - optional
      - nicht_noetig

  - id: wasser-006
    category: bewaesserung
    difficulty: intermediate
    question_type: howto
    question: "Wie funktioniert Bewaesserung bei Pon/Lechuza?"
    context:
      substrate: pon
    expected_topics:
      - wasserstandsanzeiger
      - trockenphase
      - wicking_prinzip
      - nicht_uebergiessen
    expected_NOT:
      - wie_erde  # Pon ist Semi-Hydro, nicht Erde

  - id: wasser-007
    category: bewaesserung
    difficulty: beginner
    question_type: factual
    question: "Hilft eine Kiesschicht am Topfboden fuer bessere Drainage?"
    expected_topics:
      - nein_mythos
      - perched_water_table
      - staunaesse
      - perlit_stattdessen
    expected_NOT:
      - ja_empfohlen  # Ist ein verbreiteter Mythos!

  - id: wasser-008
    category: bewaesserung
    difficulty: intermediate
    question_type: diagnosis
    question: "Mein Leitungswasser hat Chlor. Schadet das meinen Pflanzen?"
    expected_topics:
      - 24_stunden_abstehen
      - verfluchtigt
      - aktivkohlefilter
      - chloramin_anders
    expected_NOT:
      - egal  # Chlor kann Bodenleben schaedigen
      - gefaehrlich  # In normalen Mengen nicht akut gefaehrlich

  - id: wasser-009
    category: bewaesserung
    difficulty: expert
    question_type: howto
    question: "Wie berechne ich das Mischungsverhaeltnis RO-Wasser zu Leitungswasser?"
    expected_topics:
      - basis_ec_zielwert
      - mischrechnung
      - 02_04_ec
    expected_NOT:
      - immer_100_ro  # Mischung ist oft besser

  - id: wasser-010
    category: bewaesserung
    difficulty: beginner
    question_type: factual
    question: "Soll ich morgens oder abends giessen?"
    expected_topics:
      - morgens_bevorzugt
      - outdoor_morgens
      - indoor_vor_lichtphase
    expected_NOT:
      - mittags  # Schlechtester Zeitpunkt (Verdunstung)

  # ===========================================================================
  # UMWELT — VPD, Licht, Temperatur, CO2, Growzelt (15 Fragen)
  # ===========================================================================

  - id: umwelt-001
    category: umwelt
    difficulty: intermediate
    question_type: factual
    question: "Was ist VPD und warum ist es wichtiger als Luftfeuchtigkeit allein?"
    expected_topics:
      - dampfdruckdefizit
      - temperatur_und_rh
      - transpiration
      - eine_kennzahl
    expected_NOT:
      - nur_rh_messen_reicht  # Das ist der ganze Punkt — RH allein reicht nicht

  - id: umwelt-002
    category: umwelt
    difficulty: intermediate
    question_type: diagnosis
    question: "VPD in meinem Zelt ist 0.5 kPa in der Bluete. Was muss ich tun?"
    context:
      phase: flowering
      vpd: 0.5
    expected_topics:
      - vpd_zu_niedrig
      - schimmelrisiko
      - entfeuchter_einschalten
      - abluft_erhoehen
    expected_NOT:
      - alles_ok  # 0.5 ist viel zu niedrig fuer Bluete!

  - id: umwelt-003
    category: umwelt
    difficulty: beginner
    question_type: factual
    question: "Welches Fenster ist am besten fuer meine Zimmerpflanzen?"
    expected_topics:
      - suedfenster_hell
      - ostfenster_morgensonne
      - nordfenster_wenig_licht
      - abstand_wichtig
    expected_NOT:
      - ppfd_messen  # Zu technisch fuer Anfaenger

  - id: umwelt-004
    category: umwelt
    difficulty: intermediate
    question_type: factual
    question: "Wie viel PPFD brauche ich fuer Cannabis in der Bluete?"
    context:
      species: Cannabis sativa
      phase: flowering
    expected_topics:
      - 600_1000_ppfd
      - dli
      - lichtabstand
    expected_NOT:
      - 200_reicht  # Viel zu wenig fuer Bluete

  - id: umwelt-005
    category: umwelt
    difficulty: expert
    question_type: factual
    question: "Lohnt sich CO2-Anreicherung in meinem 1.2x1.2m Zelt mit 400W LED?"
    expected_topics:
      - licht_zuerst
      - ppfd_pruefen
      - nur_bei_600_plus
      - kosten_nutzen
    expected_NOT:
      - auf_jeden_fall  # Bei 400W LED ist PPFD oft grenzwertig

  - id: umwelt-006
    category: umwelt
    difficulty: beginner
    question_type: diagnosis
    question: "Meine Pflanze waechst lang und duenn zum Licht. Was stimmt nicht?"
    expected_topics:
      - vergeilen
      - zu_wenig_licht
      - naeher_ans_fenster
      - pflanzenlampe
    expected_NOT:
      - ueberduengung
      - ueberwaesserung

  - id: umwelt-007
    category: umwelt
    difficulty: intermediate
    question_type: howto
    question: "Temperatur in meinem Zelt erreicht 33°C im Sommer. Was kann ich tun?"
    context:
      temperature: 33
    expected_topics:
      - licht_dimmen
      - abluft_maximum
      - lichtphase_nachts
      - klimaanlage
    expected_NOT:
      - eiswuerfel  # Unsinnig und kontraproduktiv

  - id: umwelt-008
    category: umwelt
    difficulty: expert
    question_type: howto
    question: "Wie stelle ich meinen Entfeuchter und die Abluft in der spaeten Bluete ein?"
    context:
      phase: late_flowering
    expected_topics:
      - entfeuchter_dauerbetrieb
      - rh_unter_55
      - abluft_hoch
      - vpd_12_16
      - botrytis_risiko
    expected_NOT:
      - entfeuchter_aus  # In spaeter Bluete PFLICHT!
      - rh_60_ok  # Zu hoch fuer spaete Bluete

  - id: umwelt-009
    category: umwelt
    difficulty: intermediate
    question_type: diagnosis
    question: "Nachts steigt die Luftfeuchtigkeit in meinem Zelt auf 75%. Ist das ein Problem?"
    context:
      phase: flowering
      rh_night: 75
    expected_topics:
      - ja_problematisch
