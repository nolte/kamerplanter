version: "3.8"

services:
  # ── ArangoDB ──────────────────────────────────────────────
  arangodb:
    image: arangodb:3.11
    environment:
      ARANGO_ROOT_PASSWORD: rootpassword
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    healthcheck:
      test: >
        curl -sf -u root:rootpassword http://localhost:8529/_api/version || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Valkey (Redis-compatible) ────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────
  backend:
    build:
      context: ./src/backend
    environment:
      ARANGODB_HOST: arangodb
      ARANGODB_PORT: "8529"
      ARANGODB_DATABASE: kamerplanter
      ARANGODB_USERNAME: root
      ARANGODB_PASSWORD: rootpassword
      REDIS_URL: redis://valkey:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8080"]'
      DEBUG: "false"
      REQUIRE_EMAIL_VERIFICATION: "false"
    ports:
      - "8000:8000"
    depends_on:
      - arangodb
      - valkey
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery Worker ────────────────────────────────────────
  celery-worker:
    build:
      context: ./src/backend
    environment:
      ARANGODB_HOST: arangodb
      ARANGODB_PORT: "8529"
      ARANGODB_DATABASE: kamerplanter
      ARANGODB_USERNAME: root
      ARANGODB_PASSWORD: rootpassword
      REDIS_URL: redis://valkey:6379/0
    depends_on:
      - arangodb
      - valkey
    command: celery -A app.tasks worker --loglevel=info

  # ── Celery Beat (periodic tasks) ─────────────────────────
  celery-beat:
    build:
      context: ./src/backend
    environment:
      ARANGODB_HOST: arangodb
      ARANGODB_PORT: "8529"
      ARANGODB_DATABASE: kamerplanter
      ARANGODB_USERNAME: root
      ARANGODB_PASSWORD: rootpassword
      REDIS_URL: redis://valkey:6379/0
    depends_on:
      - arangodb
      - valkey
    command: celery -A app.tasks beat --loglevel=info

  # ── Frontend (React + nginx) ──────────────────────────────
  frontend:
    build:
      context: ./src/frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  arangodb_data:
  valkey_data:
