site_name: Kamerplanter Dokumentation
site_url: https://docs.kamerplanter.example.com
site_description: Dokumentation für die Kamerplanter Pflanzenpflege-Plattform — von der Aussaat bis zur Ernte.
site_author: Kamerplanter Development Team

repo_url: https://github.com/nolte/kamerplanter
repo_name: nolte/kamerplanter
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Kamerplanter

docs_dir: docs

theme:
  name: material
  language: de

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Zum Dunkelmodus wechseln
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Zum Hellmodus wechseln

  font:
    text: Roboto
    code: Roboto Mono

  logo: assets/images/logo.svg
  favicon: assets/images/favicon.png

  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search:
      lang:
        - de
        - en
      separator: '[\\s\\-,:!=\\[\\]()\"/]+|(?!\\b)(?=[A-Z][a-z])|\\.(?!\\d)|&[lg]t;'

  - i18n:
      docs_structure: folder
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Startseite: Home
            Erste Schritte: Getting Started
            Installation: Installation
            Schnellstart: Quickstart
            Erstes Deployment: First Deployment
            Benutzerhandbuch: User Guide
            Stammdaten: Plant Master Data
            Standorte & Substrate: Locations & Substrates
            Wachstumsphasen: Growth Phases
            Dünge-Logik: Fertilization Logic
            Sensorik: Sensors
            Aufgaben: Tasks
            Ernte: Harvest
            Pflanzenschutz (IPM): Pest Management (IPM)
            Pflanzdurchläufe: Planting Runs
            Tankmanagement: Tank Management
            Kalender: Calendar
            Dashboard: Dashboard
            Onboarding-Wizard: Onboarding Wizard
            Light-Modus: Light Mode
            KI-Assistent: AI Assistant
            KI-Provider einrichten: AI Provider Setup
            Umgebungssteuerung: Actuator Control
            Mandanten & Gaerten: Tenants & Gardens
            Pflegeerinnerungen: Care Reminders
            Vermehrung: Propagation
            Datenschutz (DSGVO): Privacy (GDPR)
            Druckansichten & Export: Print & Export
            Gießprotokoll: Watering Log
            Plattform-Admin: Platform Admin
            Architektur: Architecture
            Überblick: Overview
            Backend: Backend
            Frontend: Frontend
            Datenbank: Database
            Infrastruktur: Infrastructure
            KI-Architektur: AI Architecture
            Entwicklung: Development
            Lokales Setup: Local Setup
            Code-Standards: Code Standards
            Testen: Testing
            Debugging: Debugging
            Agent-Katalog: Agent Catalog
            API: API
            Authentifizierung: Authentication
            Fehlerbehandlung: Error Handling
            Betriebsprofile: Deployment Profiles
            Deployment: Deployment
            Kubernetes: Kubernetes
            Helm Charts: Helm Charts
            ArgoCD: ArgoCD
            CI/CD: CI/CD
            Guides: Guides
            GDD-Berechnung: GDD Calculation
            VPD-Optimierung: VPD Optimization
            Nährlösung mischen: Nutrient Mixing
            Fehlerbehebung: Troubleshooting
            Pflanzendaten per AI: AI Plant Data Pipeline
            Home Assistant Integration: Home Assistant Integration
            RAG-Wissensbasis: RAG Knowledge Base
            Service Accounts: Service Accounts
            Datenaufbewahrung: Data Retention
            Mischkultur: Companion Planting
            Nachernte: Post-Harvest
            Referenz: Reference
            API-Referenz: API Reference
            Datenbankschema: Database Schema
            Umgebungsvariablen: Environment Variables
            ADR: ADR
            Changelog: Changelog
            Unveröffentlicht: Unreleased

  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
      strict: false

  - awesome-pages:
      collapse_single_pages: false

  - minify:
      minify_html: true
      minify_js: false
      minify_css: true
      htmlmin_opts:
        remove_comments: true

  - redirects:
      redirect_maps: {}

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  version:
    provider: mike
    default: stable
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nolte/kamerplanter

