# Topic-Synonym-Woerterbuch fuer RAG-Benchmark Topic-Match
# Jeder Topic-Key entspricht einem expected_topics/expected_NOT Wert
# in benchmark_questions.yaml.
# pattern: Regex fuer schnelles Matching in der Antwort (case-insensitive)
# de: Liste von Keywords/Phrasen die das Topic repraesentieren

---
topics:

  # === DIAGNOSTIK: Naehrstoffe ===
  stickstoff_mangel:
    pattern: "(?i)stickstoff|nitrogen|N[- ]?Mangel|Stickstoffmangel|Stickstoff.*fehlt|zu.*wenig.*N\\b"
    de: [Stickstoff, Stickstoffmangel, N-Mangel, Nitrogen, Stickstoff fehlt]

  mobile_naehrstoffe:
    pattern: "(?i)mobil|umverlag|verlagert|transportiert|aelter.*Blaett|unten.*zuerst|von.*unten.*nach.*oben"
    de: [mobil, Umverlagerung, verlagert, transportiert, aeltere Blaetter, von unten nach oben]

  untere_blaetter:
    pattern: "(?i)unter.*Blaett|unter.*Blatt|aelter.*Blaett|aelter.*Blatt|Blaett.*unten|Blatt.*unten|unteren.*Blaett"
    de: [untere Blaetter, unteres Blatt, aeltere Blaetter, aelteres Blatt, unteren Blaetter]

  ec_pruefen:
    pattern: "(?i)EC.*prue|EC.*mess|EC.*kontroll|EC.*check|EC[- ]?Wert|Leitfaehigkeit"
    de: [EC pruefen, EC messen, EC kontrollieren, EC-Wert, Leitfaehigkeit]

  natuerlicher_n_abbau:
    pattern: "(?i)natuerlich.*Abbau|natuerlich.*Prozess|normal.*Vergilb|normal.*Erscheinung|Abreife|spaete.*Bluete.*normal|Ende.*Bluete.*normal|Seneszenz"
    de: [natuerlicher Abbau, natuerlicher Prozess, normal in spaeter Bluete, Abreife, Seneszenz, normale Erscheinung]

  spaete_bluete_normal:
    pattern: "(?i)spaete.*Bluete.*normal|Woche.*[67].*8.*normal|erwuenscht|Ende.*Bluete|letzte.*Wochen.*normal|kein.*Grund.*Sorge|nicht.*behandeln"
    de: [spaete Bluete, normal, erwuenscht, Ende der Bluete, kein Grund zur Sorge]

  abreife:
    pattern: "(?i)Abreife|Reifung|Erntereife|letzte.*Wochen|Seneszenz|Alterung|natuerlich.*Absterben"
    de: [Abreife, Reifung, Erntereife, Seneszenz, letzte Wochen]

  calcium_mangel:
    pattern: "(?i)calcium|Ca[- ]?Mangel|Calciummangel"
    de: [Calcium, Calciummangel, Ca-Mangel]

  immobiler_naehrstoff:
    pattern: "(?i)immobil|nicht.*mobil|nicht.*verlagert|junge.*Blaett|junge.*Blatt|neue.*Blaett|neue.*Blatt|obere.*Blaett"
    de: [immobil, nicht mobil, nicht verlagert, junge Blaetter, neue Blaetter, obere Blaetter]

  neue_blaetter:
    pattern: "(?i)neue.*Blaett|neue.*Blatt|junge.*Blaett|junge.*Blatt|Triebspitz|Neuwuchs|obere.*Blaett|obere.*Blatt|Wachstumspunkt"
    de: [neue Blaetter, junge Blaetter, Triebspitzen, Neuwuchs, obere Blaetter, Wachstumspunkte]

  gleichmaessige_bewaesserung:
    pattern: "(?i)gleichmaessig.*giess|gleichmaessig.*bewaesser|regelmaessig.*wasser|regelmaessig.*giess|Schwankung.*vermeid|konstant.*bewaesser|konstant.*feucht|Bewaesserung.*gleichmaessig"
    de: [gleichmaessig giessen, gleichmaessig bewaessern, regelmaessig, Schwankungen vermeiden, konstant bewaessern]

  magnesium_mangel:
    pattern: "(?i)magnesium|Mg[- ]?Mangel|Magnesiummangel|Bittersalz"
    de: [Magnesium, Magnesiummangel, Mg-Mangel, Bittersalz]

  kalium_antagonismus:
    pattern: "(?i)Kalium.*Antagonis|K/Mg|K.*Mg.*Antagonis|Kalium.*verdraeng|Kalium.*blockier|K.*blockiert.*Mg|hohe.*Kalium|Kalium.*Ueberschuss|K.*Ueberschuss|Kalium.*hemmt"
    de: [Kalium-Antagonismus, K verdraengt Mg, K blockiert Mg, Kalium-Ueberschuss, hoher Kaliumgehalt]

  bittersalz_blattspray:
    pattern: "(?i)Bittersalz|Epsom|MgSO4|Blattspray.*Mg"
    de: [Bittersalz, Epsom Salt, MgSO4, Blattspray]

  calmag:
    pattern: "(?i)CalMag|Calcium.*Magnesium|Ca.*Mg"
    de: [CalMag, Calcium-Magnesium]

  eisen_mangel:
    pattern: "(?i)Eisen|Fe[- ]?Mangel|Eisenmangel|Eisenchelat"
    de: [Eisen, Eisenmangel, Fe-Mangel]

  ueberwaesserung:
    pattern: "(?i)ueberwaesser|uebergies|zu.*viel.*Wasser|Wurzelfaeule"
    de: [Ueberwaesserung, zu viel Wasser, Wurzelfaeule]

  mangan_toxizitaet:
    pattern: "(?i)Mangan.*Toxizit|Mn.*Ueberschuss|Mangan.*Ueberschuss"
    de: [Mangan-Toxizitaet, Mn-Ueberschuss]

  # === DIAGNOSTIK: pH/EC ===
  ph_lockout:
    pattern: "(?i)pH[- ]?Lockout|Lockout|pH.*block|nicht.*verfuegbar.*pH|pH.*Bereich.*Aufnahme|gesperrt|Verfuegbarkeit.*pH"
    de: [pH-Lockout, Lockout, nicht verfuegbar, gesperrt, Verfuegbarkeit]

  ph_zu_hoch:
    pattern: "(?i)pH.*zu.*hoch|pH.*ueber|pH.*senken"
    de: [pH zu hoch, pH senken]

  ph_zu_niedrig:
    pattern: "(?i)pH.*zu.*niedrig|pH.*unter|pH.*erhoehen|kalken"
    de: [pH zu niedrig, pH erhoehen, kalken]

  ph_senken:
    pattern: "(?i)pH.*senken|pH[- ]?Down|Phosphorsaeure|Salpetersaeure"
    de: [pH senken, pH-Down]

  ph_erhoehen:
    pattern: "(?i)pH.*erhoeh|pH[- ]?Up|Kaliumhydroxid|kalken|Dolomitkalk"
    de: [pH erhoehen, pH-Up, kalken]

  salzanreicherung:
    pattern: "(?i)Salz.*anreicher|Versalzung|Salz.*aufbau|Runoff.*EC.*hoch"
    de: [Salzanreicherung, Versalzung]

  flush_noetig:
    pattern: "(?i)Flush|spuelen|durchspuelen|3.*Topfvolumen|mit.*klarem.*Wasser|Substrat.*waschen"
    de: [Flush, spuelen, durchspuelen, mit klarem Wasser spuelen]

  ec_reduzieren:
    pattern: "(?i)EC.*reduzier|EC.*senken|EC.*verringer|weniger.*Duenger"
    de: [EC reduzieren, EC senken, weniger Duenger]

  # === DIAGNOSTIK: Schaedlinge ===
  spinnmilben:
    pattern: "(?i)Spinnmilb|Tetranychus|spider.*mite|Gespinst"
    de: [Spinnmilben, Tetranychus, Gespinste]

  thrips:
    pattern: "(?i)Thrips|Thysanoptera|silbrig.*Streif|Frankliniella"
    de: [Thrips, silbrige Streifen]

  trauermucken:
    pattern: "(?i)Trauermueck|Bradysia|Sciarid|fungus.*gnat|schwarze.*Flieg"
    de: [Trauermucken, Bradysia, schwarze Fliegen]

  botrytis:
    pattern: "(?i)Botrytis|Grauschimmel|grey.*mold|gray.*mold"
    de: [Botrytis, Grauschimmel]

  kohlhernie:
    pattern: "(?i)Kohlhernie|Plasmodiophora|clubroot|verdickt.*Wurzel"
    de: [Kohlhernie, Plasmodiophora, clubroot]

  # === DUENGUNG ===
  ja_immer:
    pattern: "(?i)ja|immer|unbedingt|zwingend|Pflicht"
    de: [ja, immer, unbedingt, zwingend]

  calcium_magnesium_fehlt:
    pattern: "(?i)kein.*Calcium|kein.*Magnesium|0.*ppm|keine.*Mineral"
    de: [kein Calcium, kein Magnesium, keine Mineralien]

  ec_03_04:
    pattern: "(?i)EC.*0[.,]3|EC.*0[.,]4|0[.,]3.*0[.,]4|0[.,]3.*mS"
    de: [EC 0.3, EC 0.4]

  vor_base_nutrients:
    pattern: "(?i)vor.*Base|vor.*Part.*A|zuerst|erste.*Zugabe"
    de: [vor Base-Nutrients, vor Part A, zuerst]

  wasser_zuerst:
    pattern: "(?i)Wasser.*zuerst|Wasser.*vorlegen|erst.*Wasser"
    de: [Wasser zuerst]

  silikat_vor_calmag:
    pattern: "(?i)Silikat.*vor.*CalMag|Silikat.*zuerst|Silikat.*als.*erst"
    de: [Silikat vor CalMag]

  calmag_vor_part_a:
    pattern: "(?i)CalMag.*vor.*Part.*A|CalMag.*vor.*Base|CalMag.*zuerst"
    de: [CalMag vor Part A]

  part_a_vor_part_b:
    pattern: "(?i)Part.*A.*vor.*Part.*B|A.*vor.*B|Teil.*A.*vor.*Teil.*B"
    de: [Part A vor Part B]

  ph_zuletzt:
    pattern: "(?i)pH.*zuletzt|pH.*am.*Ende|pH.*letzt.*Schritt"
    de: [pH zuletzt, pH am Ende]

  calciumsulfat_ausfaellung:
    pattern: "(?i)Calciumsulfat|Gips|CaSO4|Ausfaellung|Praezipitat"
    de: [Calciumsulfat, Gips, Ausfaellung]

  ec_14_20:
    pattern: "(?i)EC.*1[.,][4-9]|EC.*2[.,]0|1[.,]4.*2[.,]0"
    de: [EC 1.4-2.0]

  pk_boost:
    pattern: "(?i)PK[- ]?Boost|Phosphor.*Kalium|PK.*13.*14"
    de: [PK-Boost, Phosphor-Kalium]

  woche_3_4:
    pattern: "(?i)Woche.*3|Woche.*4|ab.*Woche.*3|nach.*Stretch"
    de: [Woche 3, Woche 4, nach Stretch]

  halbe_dosis_starten:
    pattern: "(?i)halbe.*Dosis|50.*Prozent|25.*Prozent|niedrig.*starten"
    de: [halbe Dosis, 50%, niedrig starten]

  basis_ec_abziehen:
    pattern: "(?i)Basis.*EC.*abzieh|Ausgangs.*EC|EC.*net|EC.*netto"
    de: [Basis-EC abziehen, EC-net, EC netto]

  ec_net_berechnen:
    pattern: "(?i)EC.*net|EC.*netto|Ziel.*EC.*minus|EC.*berechn"
    de: [EC-net, EC netto, berechnen]

  wasserhaerte_pruefen:
    pattern: "(?i)Wasserhaerte|GH|Gesamthaerte|dGH|Haertegrad"
    de: [Wasserhaerte, Gesamthaerte, GH]

  nein_inkompatibel:
    pattern: "(?i)nein|nicht.*kombinier|inkompatibel|entweder.*oder|toetet"
    de: [nein, nicht kombinieren, inkompatibel, entweder oder]

  h2o2_toetet_nuetzlinge:
    pattern: "(?i)H2O2.*toet|Peroxid.*toet|zerstoer.*Mykorrhiza|zerstoer.*Trichoderma"
    de: [H2O2 toetet, zerstoert Mykorrhiza, zerstoert Trichoderma]

  entweder_oder:
    pattern: "(?i)entweder.*oder|nicht.*gleichzeitig|nicht.*zusammen"
    de: [entweder oder, nicht gleichzeitig]

  umstritten:
    pattern: "(?i)umstritten|nicht.*eindeutig|wissenschaftlich.*nicht.*beleg|Debatte"
    de: [umstritten, nicht eindeutig belegt, Debatte]

  guelph_studie:
    pattern: "(?i)Guelph|Studie|Forschung.*Flush|University"
    de: [Guelph, Studie]

  ammonium_senkt_ph:
    pattern: "(?i)Ammonium.*senk|NH4.*senk|Ammonium.*sauer|NH4.*pH"
    de: [Ammonium senkt pH, NH4]

  nh4_no3_verhaeltnis:
    pattern: "(?i)NH4.*NO3|Ammonium.*Nitrat|Verhaeltnis.*1.*5|1.*10"
    de: [NH4:NO3, Ammonium-Nitrat-Verhaeltnis]

  hornmehl_schneller:
    pattern: "(?i)Hornmehl.*schnell|fein.*gemahlen|2.*4.*Wochen"
    de: [Hornmehl schneller, fein gemahlen, 2-4 Wochen]

  hornspaene_langsamer:
    pattern: "(?i)Hornspaene.*langsam|grob|4.*8.*Wochen"
    de: [Hornspaene langsamer, grob, 4-8 Wochen]

  koernung:
    pattern: "(?i)Koernung|Mahlung|fein.*grob|Partikelgroesse"
    de: [Koernung, Mahlung, fein vs grob]

  stickstoff_quelle:
    pattern: "(?i)Stickstoff.*Quelle|N.*Quelle|organisch.*Stickstoff|12.*14.*Prozent"
    de: [Stickstoffquelle, 12-14% N]

  calmag_loesung_einweichen:
    pattern: "(?i)einweich|puffer|CalMag.*Loesung|8.*24.*Stund"
    de: [einweichen, puffern, CalMag-Loesung, 8-24 Stunden]

  kationenaustausch:
    pattern: "(?i)Kationenaustausch|CEC|KAK|Austauschkapazit"
    de: [Kationenaustausch, CEC, KAK]

  natrium_kalium_auswaschen:
    pattern: "(?i)Natrium.*auswaschen|Kalium.*auswaschen|Na.*K.*freisetz"
    de: [Natrium auswaschen, Na/K freisetzen]

  # === BEWAESSERUNG ===
  fingertest:
    pattern: "(?i)Fingertest|Finger.*Erde|Finger.*Substrat|2.*3.*cm.*tief|Finger.*steck|Finger.*pruef"
    de: [Fingertest, Finger in die Erde, Finger ins Substrat, mit dem Finger pruefen]

  nicht_nach_zeitplan:
    pattern: "(?i)nicht.*Zeitplan|nicht.*jeden.*Montag|nach.*Bedarf|nicht.*regelmaessig|individuell|je.*nach.*Pflanze|kein.*fester.*Rhythmus"
    de: [nicht nach Zeitplan, nach Bedarf, individuell, kein fester Rhythmus]

  substrat_pruefen:
    pattern: "(?i)Substrat.*pruef|Erde.*pruef|Feuchtigkeit.*pruef"
    de: [Substrat pruefen, Erde pruefen]

  topfgewicht:
    pattern: "(?i)Topf.*Gewicht|Topf.*heben|schwer.*leicht|Gewichts.*methode"
    de: [Topfgewicht, Topf hochheben]

  hochfrequenz:
    pattern: "(?i)hochfrequenz|mehrmals.*taeglich|3.*5.*mal|Fertigation"
    de: [Hochfrequenz, mehrmals taeglich, Fertigation]

  nie_austrocknen:
    pattern: "(?i)nie.*austrock|nicht.*austrock|feucht.*halten"
    de: [nie austrocknen, feucht halten]

  immer_mit_naehrloesung:
    pattern: "(?i)immer.*Naehr|nie.*nur.*Wasser|immer.*Duenger"
    de: [immer mit Naehrloesung, nie nur Wasser]

  ja_gut_geeignet:
    pattern: "(?i)ja.*geeignet|gut.*geeignet|empfehlenswert|vorteil"
    de: [ja, gut geeignet, empfehlenswert]

  dunkel_lagern:
    pattern: "(?i)dunkel.*lager|dunkel.*Behaelter|Licht.*vermeid|Algen"
    de: [dunkel lagern, Algen vermeiden]

  ja_unbedingt:
    pattern: "(?i)ja.*unbedingt|Pflicht|muss|zwingend|essentiell"
    de: [ja, unbedingt, Pflicht, muss]

  drainage:
    pattern: "(?i)Drainage|Abfluss|Ablauf.*Loch|Drainage.*Loch"
    de: [Drainage, Abflussloch]

  uebertopf:
    pattern: "(?i)Uebertopf|Innentopf|dekorativer.*Topf"
    de: [Uebertopf, Innentopf]

  staunaesse:
    pattern: "(?i)Staunaesse|stehendes.*Wasser|Wasser.*Untersetzer"
    de: [Staunaesse, stehendes Wasser]

  nein_mythos:
    pattern: "(?i)Mythos|nicht.*empfohl|falsch|kontraproduktiv|perched"
    de: [Mythos, nicht empfohlen, perched water table]

  perched_water_table:
    pattern: "(?i)perched|Stau.*naesse.*ueber|Schicht.*Wasser"
    de: [perched water table, Staunaesse]

  perlit_stattdessen:
    pattern: "(?i)Perlit|Perlite|stattdessen|Alternative"
    de: [Perlit, Perlite, stattdessen]

  24_stunden_abstehen:
    pattern: "(?i)24.*Stund|abstehen|stehen.*lassen|verfliegt"
    de: [24 Stunden, abstehen lassen, verfliegt]

  verfluchtigt:
    pattern: "(?i)verfluecht|verfliegt|ausgast|evaporier"
    de: [verfluchtigt, ausgasen]

  aktivkohlefilter:
    pattern: "(?i)Aktivkohle|Carbon.*Filter|Kohlefilter"
    de: [Aktivkohle, Carbon-Filter]

  chloramin_anders:
    pattern: "(?i)Chloramin|nicht.*verfliegt|Vitamin.*C|Ascorbinsaeure"
    de: [Chloramin, verfliegt nicht, Vitamin C]

  morgens_bevorzugt:
    pattern: "(?i)morgens|frueh|Morgen.*giess|vor.*Mittag"
    de: [morgens, frueh, vor Mittag]

  # === UMWELT ===
  dampfdruckdefizit:
    pattern: "(?i)Dampfdruck|Vapor.*Pressure|VPD.*erklaer|VPD.*ist|VPD.*steht.*fuer|VPD.*bedeutet|VPD.*beschreibt"
    de: [Dampfdruckdefizit, Vapor Pressure Deficit, VPD steht fuer, VPD beschreibt]

  temperatur_und_rh:
    pattern: "(?i)Temperatur.*Feuchtig|Temperatur.*RH|beides|kombiniert"
    de: [Temperatur und Feuchtigkeit, kombiniert]

  transpiration:
    pattern: "(?i)Transpiration|Verdunstung.*Blatt|Stomata"
    de: [Transpiration, Verdunstung]

  eine_kennzahl:
    pattern: "(?i)eine.*Kennzahl|ein.*Wert|vereint|zusammenfass"
    de: [eine Kennzahl, vereint]

  vpd_zu_niedrig:
    pattern: "(?i)VPD.*zu.*niedrig|VPD.*unter|VPD.*gering"
    de: [VPD zu niedrig]

  schimmelrisiko:
    pattern: "(?i)Schimmel|Botrytis|Faeulnis|Pilz.*risiko"
    de: [Schimmel, Botrytis, Faeulnis]

  entfeuchter_einschalten:
    pattern: "(?i)Entfeuchter|dehumidif|Luftentfeucht|RH.*senken"
    de: [Entfeuchter, Luftentfeuchter]

  abluft_erhoehen:
    pattern: "(?i)Abluft.*erhoeh|Abluft.*hoch|Abluft.*maximum|Luefter.*hoch"
    de: [Abluft erhoehen, Abluft auf Maximum]

  licht_dimmen:
    pattern: "(?i)Licht.*dimm|Lampe.*dimm|PPFD.*reduzier|Abstand.*erhoeh"
    de: [Licht dimmen, Lampe dimmen, Abstand erhoehen]

  lichtphase_nachts:
    pattern: "(?i)Licht.*Nacht|Nacht.*Licht|Lampe.*nachts|Beleuchtung.*verleg"
    de: [Lichtphase nachts, Beleuchtung verlegen]

  klimaanlage:
    pattern: "(?i)Klimaanlage|Split.*Geraet|Air.*Condition|Kuehlung"
    de: [Klimaanlage, Split-Geraet]

  600_1000_ppfd:
    pattern: "(?i)600.*1000|600.*µmol|800.*PPFD|1000.*PPFD"
    de: [600-1000 PPFD]

  dli:
    pattern: "(?i)DLI|Daily.*Light|Tageslichtsumme|mol.*Tag"
    de: [DLI, Daily Light Integral]

  lichtabstand:
    pattern: "(?i)Abstand.*Lampe|Lampe.*Abstand|cm.*Abstand|Light.*distance"
    de: [Lichtabstand, Abstand zur Lampe]

  vergeilen:
    pattern: "(?i)Vergeil|Etiolation|lang.*duenn|streckt.*Licht"
    de: [Vergeilen, Etiolation, lang und duenn]

  entfeuchter_dauerbetrieb:
    pattern: "(?i)Entfeuchter.*Dauer|Entfeuchter.*permanent|Entfeuchter.*Pflicht"
    de: [Entfeuchter Dauerbetrieb, Entfeuchter Pflicht]

  rh_unter_55:
    pattern: "(?i)RH.*unter.*55|55.*Prozent|Feuchtigkeit.*unter.*55"
    de: [RH unter 55%, 55 Prozent]

  vpd_12_16:
    pattern: "(?i)VPD.*1[.,][2-6]|1[.,]2.*1[.,]6.*kPa"
    de: [VPD 1.2-1.6]

  kondenswasser:
    pattern: "(?i)Kondenswasser|Kondensation|Tau.*Blaett|Tropfen.*Blaett"
    de: [Kondenswasser, Kondensation, Tau]

  heizung_2_3_grad:
    pattern: '(?i)Heizung.*2.*3|leichte.*Heizung|Nacht.*Heizung|\+2.*3.*Grad'
    de: [Heizung +2-3 Grad, leichte Heizung]

  umluft_niedrigste_stufe:
    pattern: "(?i)Ventilator.*niedrig|Umluft.*niedrig|sanft.*Luft|nicht.*ausschalt"
    de: [Ventilator niedrigste Stufe, nicht ausschalten]

  dif_reduzieren:
    pattern: "(?i)DIF.*reduzier|DIF.*klein|Tag.*Nacht.*gering|2.*4.*Grad.*DIF"
    de: [DIF reduzieren, 2-4 Grad DIF]

  humidity_dome:
    pattern: "(?i)Humidity.*Dome|Abdeckung|Kuppel|Klarsichtfolie|Propagator"
    de: [Humidity Dome, Abdeckung, Kuppel]

  led_effizienter:
    pattern: "(?i)LED.*effizient|LED.*sparsam|LED.*besser|µmol.*Joule"
    de: [LED effizienter, LED sparsamer]

  led_weniger_waerme:
    pattern: "(?i)LED.*weniger.*Waerme|LED.*kuehl|weniger.*Abwaerme|kein.*Infrarot"
    de: [LED weniger Waerme, weniger Abwaerme]

  led_empfohlen:
    pattern: "(?i)LED.*empfohl|LED.*Stand.*Technik|LED.*Neuanschaff"
    de: [LED empfohlen, Stand der Technik]

  hps_guenstiger_anschaffung:
    pattern: "(?i)HPS.*guenstig|HPS.*billig|Natriumdampf.*preisw"
    de: [HPS guenstiger, Natriumdampf preiswert]

  blatt_vpd:
    pattern: "(?i)Blatt[- ]?VPD|Leaf[- ]?VPD|Blattemperatur.*VPD"
    de: [Blatt-VPD, Leaf-VPD]

  led_offset:
    pattern: "(?i)LED.*Offset|LED.*kuehler|2.*4.*Grad.*kuehler|Infrarot.*weniger"
    de: [LED-Offset, Blaetter kuehler unter LED]

  blaetter_kuehler:
    pattern: "(?i)Blaetter.*kuehler|Blatttemperatur.*niedrig|unter.*Luft"
    de: [Blaetter kuehler, Blatttemperatur niedriger]

  infrarot_thermometer:
    pattern: "(?i)Infrarot.*Thermo|IR.*Thermo|Blatt.*Temperatur.*mess"
    de: [Infrarot-Thermometer, IR-Thermometer]

  # === IPM ===
  rh_erhoehen:
    pattern: "(?i)RH.*erhoeh|Feuchtigkeit.*erhoeh|Befeuchter"
    de: [RH erhoehen, Feuchtigkeit erhoehen]

  raubmilben:
    pattern: "(?i)Raubmilb|Phytoseiulus|Amblyseius"
    de: [Raubmilben, Phytoseiulus, Amblyseius]

  abduschen:
    pattern: "(?i)abduschen|abspritz|Wasserstrahl|abspuel"
    de: [abduschen, abspritzen]

  grosszuegig_herausschneiden:
    pattern: "(?i)grosszuegig.*schneid|herausschneid|5.*cm.*ueber|weit.*schneid"
    de: [grosszuegig herausschneiden, 5cm ueber Befall]

  nicht_schuetteln:
    pattern: "(?i)nicht.*schuett|Sporen.*verteil|vorsichtig"
    de: [nicht schuetteln, Sporen verteilen]

