title: Physiologische Stoerungen — nicht-infektioese Pflanzenschaeden
language: de
category: diagnostik
tags: [physiologisch, sonnenbrand, frost, chlorose, bluetenendfaeule, gruenkragen, aufplatzen, abiotisch, umweltschaden]
