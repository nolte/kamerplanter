title: Virale Pflanzenkrankheiten erkennen und handeln
language: de
category: diagnostik
tags: [virus, mosaik, tmv, cmv, tswv, ringflecken, virusdiagnostik, thrips, blattlaus]
expertise_level: [beginner, intermediate, expert]
