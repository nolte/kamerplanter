title: Bakterielle Pflanzenkrankheiten erkennen und behandeln
language: de
category: diagnostik
tags: [bakterien, feuerbrand, weichfaeule, bakterienbrand, pseudomonas, xanthomonas, pflanzenkrankheit]
expertise_level: [beginner, intermediate, expert]
