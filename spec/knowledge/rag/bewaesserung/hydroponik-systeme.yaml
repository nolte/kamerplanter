  - id: hydroponik-systeme-vergleich
    title: Welches Hydroponik-System passt zu mir? Vergleich DWC, NFT, Ebb&Flow, Kratky
    content: |
      Hydroponik bedeutet: Pflanzen wachsen ohne Erde in Naehrloesung. Es gibt
      mehrere Systeme — jedes hat andere Anforderungen, Kosten und Staerken.
      Hier ein schneller Ueberblick:

      DWC (Deep Water Culture) — Eimer mit belüfteter Naehrloesung:
      Schwierigkeit: Mittel. Kosten: Gering (20-60 EUR). Ertrag: Sehr hoch.
      Pflanzen: Cannabis, Tomaten, Paprika. Anfaengergeeignet: Ja.

      Kratky-Methode — passiv, kein Strom:
      Schwierigkeit: Sehr gering. Kosten: Minimal (Einmachglas). Ertrag: Mittel.
      Pflanzen: Salat, Kraeuter, Microgreens. Anfaengergeeignet: Ja, ideal zum Einstieg.

      Ebb & Flow (Flut und Ebbe) — timergesteuerte Flutung:
      Schwierigkeit: Mittel. Kosten: Mittel (100-300 EUR). Ertrag: Hoch.
      Pflanzen: Cannabis, Gemuese, Kraeuter. Anfaengergeeignet: Bedingt.

      NFT (Nutrient Film Technique) — Film aus Naehrloesung:
      Schwierigkeit: Mittel-Hoch. Kosten: Mittel. Ertrag: Hoch.
      Pflanzen: Salat, Kraeuter, Erdbeeren. Anfaengergeeignet: Nein (kein Puffer).

      Drip/Tropfsystem — Tropfer an jede Pflanze:
      Schwierigkeit: Mittel. Kosten: Variabel. Ertrag: Hoch.
      Pflanzen: Fast alles. Anfaengergeeignet: Bedingt.

      Aeroponik — Wurzeln werden mit Nebel besprueht:
      Schwierigkeit: Hoch. Kosten: Hoch. Ertrag: Maximal.
      Pflanzen: Fast alles. Anfaengergeeignet: Nein.

      Anfaenger-Empfehlung: Kratky fuer Salat und Kraeuter (kein Strom, kein Aufwand),
      DWC als naechster Schritt fuer Gemuese und Cannabis. NFT und Aeroponik erst
      wenn Erfahrung mit pH- und EC-Management vorhanden.
