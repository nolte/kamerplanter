  - id: dwc-deep-water-culture
    title: DWC (Deep Water Culture) — Aufbau und Betrieb
    content: |
      DWC ist das beliebteste aktive Hydroponik-System fuer Einsteiger und Profis.
      Prinzip: Wurzeln haengen permanent in sauerstoffreicher Naehrloesung.

      Aufbau:
      - Lichtdichter Behaelter (Eimer 15-20L, Tonne, Wanne)
      - Netzbecher (5-10cm) in Deckelausschnitt — haelt das Substrat (Hydroton/Blahton)
      - Luftstein am Eimerboden, verbunden mit Luftpumpe (mindestens 1 Watt pro 5L)
      - Naehrloesung: Wasserstand so dass Netzbecher-Unterseite 1-2 cm ins Wasser reicht

      Sauerstoff ist alles in DWC: Ohne geloesten Sauerstoff sterben Wurzeln ab.
      Mindestens 1 Watt Luftpumpenleistung pro 5 Liter Reservoir — besser mehr.
      Geloester Sauerstoff (DO) sollte ueber 6 mg/L liegen.

      Wassertemperatur unter 22°C halten — das ist die wichtigste Regel.
      Ueber 22°C sinkt der Sauerstoffgehalt drastisch, Pythium-Risiko steigt stark.
      Bei Sommertemperaturen: Aquarium-Chiller oder Reservoir im Kuehlschrank.

      Wasserwechsel:
      - Woechentlicher Vollwechsel (alle 7 Tage): Komplette Naehrloesung
        ablassen, Reservoir saeubern, frisch ansetzen. Das ist der Standard.
      - Top-Off (zwischen den Wechseln): Verdunstetes Wasser mit reinem Wasser
        nachfuellen (NICHT mit Naehrloesung — EC steigt sonst). Taeglich EC pruefen.

      RDWC (Recirculating DWC): Mehrere Eimer ueber Rohrverbindungen mit einem
      zentralen Reservoir verbunden. Vorteil: Stabile EC und pH durch groesseres
      Volumen, weniger Drift. Aufwand: Hoeher (Umwaelzpumpe, Rohre, Gefaelle).

      Haeufigste Problem: Wurzelfaeule (Pythium) durch zu warmes Wasser. Weisse
      Wurzeln werden braun und schleimig. Ursache ist fast immer Wassertemperatur
      ueber 22-24°C.
