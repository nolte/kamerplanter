  - id: ebb-flow-flut-ebbe
    title: Ebb & Flow (Flut und Ebbe) — timergesteuerte Bewaesserung
    content: |
      Beim Ebb & Flow (auch Flut und Ebbe) wird eine Wanne oder ein Tisch
      zyklisch mit Naehrloesung geflutet und anschliessend wieder entleert.
      Das Substrat bekommt abwechselnd Wasser und Luft — ideal fuer die Wurzeln.

      Prinzip:
      - Timer schaltet Pumpe ein → Reservoir pumpt Loesung in die Wanne
      - Wanne fuellt sich bis zum Ueberlaufschutz (Flut, 15-20 Minuten)
      - Timer schaltet Pumpe aus → Loesung laeuft durch Schwerkraft zurueck ins Reservoir
      - Wanne ist leer, Substrat trocknet leicht an (Ebbe)

      Timer-Einstellungen:
      - Waehrend der Lichtphase: Alle 2-4 Stunden fluten
      - Nachts: 1-2 Mal oder komplett pausieren (Pflanze transpiriert nicht)
      - Saemlinge brauchen haeufigere, kuerze Fluten (Substrat nicht zu lange trocken)

      Substrate fuer Ebb & Flow:
      - Hydroton/Blahton: Klassisch, wiederverwertbar, keine Naehrstoffe
      - Steinwolle-Platten/-Wuerfel: Gut fuer Jungpflanzen, dann in Blahton
      - Perlit: Guenstig, gute Drainage, schwimmt jedoch leicht

      Vorteile: Robust, einfacher Aufbau, gute Sauerstoffversorgung durch
      den Nassphase/Trockenphase-Wechsel, pumpenausfall nicht sofort kritisch
      (anders als bei NFT — das Substrat haelt Restfeuchtigkeit).

      Geeignet fuer: Cannabis (beliebt), Tomaten, Paprika, Gurken, Kraeuter.
      Gut skalierbar von klein (30x30 cm Wanne) bis Profi-Tisch (mehrere m²).
    metadata:
