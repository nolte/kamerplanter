  - id: reservoir-hygiene-algen
    title: Reservoir-Hygiene, Algenpraevention und Beneficial Bacteria
    content: |
      Das Reservoir ist das Herz jedes Hydroponiksystems. Sauberkeit und Lichtausschluss
      sind die wichtigsten Punkte fuer gesunden Betrieb.

      Algenpraevention — lichtdichtes Reservoir ist Pflicht:
      Algen wachsen wo Licht auf Naehrloesung trifft. Algenbildung macht das
      Reservoir gruenlich, verbraucht Sauerstoff und Naehrstoffe, und kann
      den pH nach oben treiben. Loesung: Absolut lichtdichtes Reservoir
      (schwarze Eimer, weisse Abdeckung, keine klaren Rohre oder Behaelter).
      Lichtdicht bedeutet KEIN Lichtspalt, auch am Deckel und an den Anschluessen.

      pH-Drift nach oben im DWC — Ursachen:
      Bei aktiv wachsenden Pflanzen steigt der pH-Wert, weil aktives Wachstum
      und Nitrat-Aufnahme Hand in Hand gehen: Die Pflanze nimmt Nitrat (NO3-)
      auf und gibt Hydroxid-Ionen ab, was den pH hebt. Nitrat-Aufnahme ist also
      ein Zeichen, dass die Pflanze gut waechst. Daneben kann Algenbildung den
      pH weiter erhoehen (Algen verbrauchen CO2, pH steigt). Bei starker pH-Drift:
      Karbonathaerte (KH) des Wassers pruefen — hohe Pufferkapazitaet (KH)
      laesst pH nur langsam sinken und treibt ihn hoch. Groesseres Reservoir
      stabilisiert pH-Schwankungen. Ein Reservoir mit mindestens 10-20 Liter
      pro Pflanze puffert besser als ein kleines Reservoir.

      Reinigung zwischen Zyklen:
      1. Naehrloesung vollstaendig ablassen
      2. Reservoir mit klarem Wasser ausspuelen
      3. 3% H2O2-Loesung (Wasserstoffperoxid, 3 ml/L) einlassen, 1 Stunde einwirken
      4. Komplett ausspuelen, neu befuellen

      Beneficial Bacteria vs. Steriles Reservoir:
      - Steriler Ansatz (H2O2): Einfacher zu handhaben, kein Biofilm, weniger
        Pythium-Risiko. H2O2 (3 ml/L der 3%-Loesung) dem Reservoir zugeben.
      - Beneficial Bacteria (z.B. Hydroguard, Tarantula): Besiedelung mit
        nuetzlichen Bakterien (Bacillus subtilis) die Pythium verdraengen.
        Vorteil: Schutz vor Wurzelfaeule ohne Chemie. Nachteil: Beides
        gleichzeitig (H2O2 + Bacteria) ist sinnlos — H2O2 toetet die Bakterien.

      Reservoir-Groesse: Mindestens 5 Liter pro Pflanze, besser 10-20 Liter.
      Groessere Reservoirs puffern EC- und pH-Schwankungen deutlich besser.
