      power_required: false
      pump_required: false
      best_for: [lettuce, herbs, spinach]
      ph_range: [5.5, 6.5]
      ec_range: [0.8, 1.2]
      difficulty: beginner

  - id: aeroponik-grundlagen
    title: Aeroponik — Wurzeln im Nebel
    content: |
      Aeroponik ist die intensivste Hydroponik-Methode: Wurzeln haengen frei in
      der Luft und werden zyklisch mit feinstem Naehrstoff-Nebel besprueht.
      Kein Substrat, keine stehende Naehrloesung.

      Prinzip:
      Hochdruck-Duesen (oder Niederdruckduesen bei einfacheren Systemen) spruehen
      einen feinen Nebel direkt auf die freistehenden Wurzeln. Kurze Spruehintervalle
      (z.B. 30 Sekunden alle 3-5 Minuten) halten die Wurzeln feucht ohne sie zu
      sauerstoffarm zu haelten.

      Vorteile:
      - Maximale Sauerstoffversorgung der Wurzeln
      - Groesstes Wachstumspotenzial aller Hydro-Systeme
      - Geringster Wasserverbrauch
      - Ideale Wahl fuer Aeroponische Stecklingsboxen (Kloner)

      Aeroponische Kloner: Die verbreitetste Anwendung im Hobby-Bereich.
      Stecklinge haengen in Schaumstoffhalterungen, Duesen bespruejen die
      Stiel-Unterseite. Wurzeln bilden sich in 5-10 Tagen — schneller als in
      Steinwolle oder Erde.

      Nachteile und Risiken:
      - Verstopfte Duesen = keine Bewaesserung = Wurzeln trocknen schnell aus
      - Systemausfall ist kritischer als bei anderen Systemen
      - Hoher Anschaffungspreis fuer Hochdruck-Systeme
      - Regelmaessige Reinigung der Duesen noetig (Kalkablagerungen)
      - Fuer Profis und erfahrene Grower — nicht fuer Einsteiger

      Fazit: Aeroponik empfiehlt sich fuer Stecklingsboxen (Kloner) auch fuer
      Fortgeschrittene. Fuer den Hauptanbau nur bei vorhandener Erfahrung und
      Backup-Systemen.
