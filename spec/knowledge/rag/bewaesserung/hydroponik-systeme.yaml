  - id: nft-nutrient-film-technique
    title: NFT (Nutrient Film Technique) — duenner Naehrloesungsfilm
    content: |
      NFT laesst einen hauchuennen Naehrstoff-Film (2-3 mm) permanent durch geneigte
      Kanaele ueber die Wurzeln fliessen. Die Wurzeln liegen halb in der Loesung,
      die Oberseite der Wurzel bekommt Luft (Sauerstoff).

      Aufbau:
      - Geneigte PVC-Rinnen oder Rohre (Durchmesser 7-10 cm fuer Kraeuter,
        10-15 cm fuer schwerere Pflanzen)
      - Gefaelle: 1-2% (1-2 cm Hoehenunterschied pro Meter Laenge) — nicht mehr!
        Zu steil = Film wird zu schnell, Wurzeln trocknen aus.
      - Pumpe im Reservoir foerdert Loesung in die Kanaele, laeuft durch Schwerkraft
        zurueck ins Reservoir
      - Pumpe laeuft 24/7 — niemals abschalten

      Groesster Nachteil: Pumpenausfall = Katastrophe. Die Wurzeln trocknen bei
      Pumpenausfall innerhalb von 30-60 Minuten aus. Backup-Pumpe oder Alarm
      (Schwimmschalter mit Benachrichtigung) ist Pflicht.

      Geeignete Pflanzen: Salat (optimal), Basilikum, Schnittlauch, Petersilie,
      Spinat, Erdbeeren. NFT ist das professionelle Salat-System in Gewächshaeusern.

      NICHT geeignet fuer: Grosse Fruchtpflanzen (Tomate, Paprika) ohne zusaetzliche
      Stuetzen und breite Kanaele. Tomaten koennen NFT ueberleben, brauchen aber
      stabile Stutzen und groessere Kanaele (15 cm+).

      Vorteil: Sehr effizient im Wasserverbrauch, sauber, skalierbar. Profi-Systeme
      fuer Gewächshaeuser bauen auf NFT (kommerzielle Salatproduktion).
