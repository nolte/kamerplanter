  - id: dwc-wurzelfaeule-pythium
    title: Wurzelfaeule in DWC — Pythium erkennen und bekaempfen
    content: |
      Braune, schleimige Wurzeln im DWC sind das Symptom Nummer eins und fast
      immer Pythium (Wurzelfaeule). Pythium ist ein Wasserschimmelpilz der bei
      warmem, sauerstoffarmem Wasser explodiert.

      Ursache: Fast immer Wassertemperatur ueber 22-24°C. Warmes Wasser haelt
      weniger Sauerstoff, Pythium liebt diese Bedingungen. Wenn das Reservoir
      26°C warm ist, sind Bedingungen fuer Pythium ideal.

      Sofortmassnahmen bei Wurzelfaeule:
      1. Wassertemperatur senken — unter 22°C kuehlen (Aquarium-Chiller,
         Eisflaschen, Reservoir in kuehlem Raum). Das ist die wichtigste
         Massnahme. Wasserchiller sind in DWC fast obligatorisch.
      2. Belueftung maximieren — groessere Luftsteine, staerkere Luftpumpe,
         Sauerstoff (O2/Luftstein) ist die wichtigste Waffe gegen Pythium
      3. H2O2 zugeben: 3 ml Wasserstoffperoxid (3%-Loesung) pro Liter
         Reservoir-Wasser. Toetet Pythium, schadet Wurzeln kurzfristig nicht.
      4. Reservoir komplett wechseln — alte Loesung ablassen, Reservoir mit
         H2O2-Loesung reinigen, frische Naehrloesung ansetzen
      5. Befallene Wurzeln entfernen — braune, schleimige Wurzeln abschneiden

      Praevention:
      - Reservoirtemperatur dauerhaft unter 22°C (ideal 18-20°C)
      - Starke Belueftung (Sauerstoff/Luftstein 24/7)
      - Lichtdichtes Reservoir (kein Algenwachstum)
      - Beneficial Bacteria (Hydroguard) als Praeventivbehandlung
      - Reservoir woechentlich wechseln — kein altes Wasser stehenlassen

      Diese Massnahmen sind NICHT ueberduengungsbedingt — Wurzelfaeule entsteht
      durch Pythium, nicht durch falsche EC oder pH-Probleme.
