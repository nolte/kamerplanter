  - id: kratky-passive-hydroponik
    title: Kratky-Methode — Hydroponik ohne Strom
    content: |
      Die Kratky-Methode ist passive Hydroponik: keine Pumpe, kein Strom, kein
      Timer. Ideal fuer Einsteiger und kleine Anbauflaechen.

      Prinzip:
      Ein Behaelter wird mit Naehrloesung befuellt, ein Netzbecher mit Substrat
      (Hydroton, Steinwolle) wird oben eingehaengt. Die Unterseite des Netzbechers
      beruehrt die Naehrloesung. Die Pflanze trinkt die Loesung — der Wasserspiegel
      sinkt. Dabei entsteht ein wachsender Luftspalt zwischen Wasseroberflaeche und
      Netzbecher-Unterseite. In diesem Luftspalt bilden sich Luft-Wurzeln die
      Sauerstoff aufnehmen. Die Wasser-Wurzeln tauchen tiefer ins sinkende Wasser.

      Setup fuer Anfaenger:
      - Einmachglas (1L fuer Kraeuter, 3-5L fuer Salat)
      - Netzbecher 5cm in Deckelausschnitt
      - Naehrloesung ansetzen (pH 5.5-6.5, EC 0.8-1.2 fuer Salat)
      - Saemling einsetzen, fertig

      Naehrloesung einmal ansetzen — nicht nachfuellen:
      Im klassischen Kratky-Ansatz wird die Naehrloesung nur einmal befuellt und
      nicht ergaenzt. Die Pflanze wachst durch die gesamte Loesung. Das Volumen
      reicht fuer die komplette Kulturzeit.

      Geeignet fuer:
      - Salat (optimal — 3-5 Wochen bis Ernte)
      - Kraeuter (Basilikum, Petersilie, Schnittlauch)
      - Spinat, Pak Choi, Mangold
      - Microgreens (angepasste Version)

      Grenzen der Kratky-Methode:
      - Nur kleine bis mittelgrosse Pflanzen (kein Langzeitanbau, keine Tomaten)
      - Kein automatischer pH/EC-Ausgleich (manuell pruefen und korrigieren)
      - Nicht geeignet fuer Cannabis oder grosse Fruchtgemuese
    metadata:
