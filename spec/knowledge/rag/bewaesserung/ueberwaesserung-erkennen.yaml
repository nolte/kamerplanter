chunks:
  - id: symptome-ueberwaesserung
    title: Symptome von Ueberwaesserung
    content: |
      Ueberwaesserung ist die HAEUFIGSTE Todesursache fuer Zimmerpflanzen
      und Saemlinge. Erkennung:
      - Blaetter haengen schlaff herunter (DROOPING, nicht Wilting)
        → wichtiger Unterschied: drooping = schwer und voll, wilting = trocken
      - Blaetter fuehlen sich weich und aufgedunsen an
      - Vergilbung beginnt an unteren Blaettern, breitet sich nach oben aus
      - Substrat ist nass, Topf ist schwer
      - Stengelbasis wird weich oder braun (erste Faeulnis)
      - Trauermucken (kleine schwarze Fliegen) → lieben dauernasse Erde
      - Muffiger Geruch aus dem Substrat
      - Wachstum stoppt oder verlangsamt sich deutlich
      - Schimmel auf der Substrat-Oberflaeche
      Warum ist Ueberwaesserung so schaedlich?
      Nicht das Wasser selbst toetet — sondern der SAUERSTOFFMANGEL.
      Wurzeln brauchen O2 fuer Naehrstoffaufnahme und Zellatmung.
      Dauerhaft nasses Substrat verdraengt alle Luft aus den Poren.
      Ohne Sauerstoff sterben Wurzeln ab → Wurzelfaeule → Pflanze kann
      kein Wasser mehr aufnehmen → Pflanze welkt TROTZ nassem Substrat.
      Das ist das Paradox: Ueberwaesserte Pflanze zeigt Welke-Symptome.
    metadata:
      topic: overwatering_symptoms
      cause: oxygen_deprivation

  - id: diagnose-schlaff-schwerer-topf
    title: Diagnose — Pflanze haengt schlaff und Topf ist schwer
    content: |
      Wenn eine Pflanze schlaff haengt und der Topf sich schwer anfuehlt,
      deutet das auf Ueberwaesserung hin — ja, wahrscheinlich Ueberwaesserung.
      Ein schwerer Topf bedeutet: Das Substrat ist durchnaesst.
      Schlaffe Blaetter bei nassem Substrat = klassisches Zeichen fuer
      Ueberwaesserung (Sauerstoffmangel an den Wurzeln).
      Was tun? Giessen sofort stoppen — nicht giessen bis das Substrat
      komplett abgetrocknet ist. Substrat austrocknen lassen, auch wenn
      das mehrere Tage dauert. Topf aus dem Uebertopf oder Untersetzer
      nehmen, damit ueberschuessiges Wasser ablaufen kann.
      Erst wieder giessen, wenn der Finger-Test "trocken" zeigt
      (obere 2-3 cm trocken und kruemelig).
      WICHTIG: Hier KEIN zusaetzliches Wasser geben — das wuerde das
      Problem verschlimmern. Die Pflanze braucht Luft an den Wurzeln,
      nicht mehr Feuchtigkeit.
    metadata:
      topic: diagnosis_overwatering_heavy_pot
      diagnosis: overwatering_confirmed

  - id: unterschied-ueber-unter
    title: Ueberwaesserung vs. Unterwaesserung unterscheiden
    content: |
      Beide zeigen haengende Blaetter — aber der Unterschied ist kritisch:
      UEBERWAESSERUNG:
      - Topf ist SCHWER
      - Substrat ist NASS
      - Blaetter sind WEICH und aufgedunsen
      - Vergilbung an unteren Blaettern
      - Stengel kann weich werden
      - Erholung: Substrat austrocknen lassen (Tage bis Wochen)
      Gegenstueck (NICHT zutreffend bei schwerem Topf):
      - Topf ist LEICHT
      - Substrat ist TROCKEN, zieht sich von Topfrand zurueck
      - Blaetter sind DUENN, papierartig, knusprig an den Raendern
      - Blaetter rollen sich ein (Verdunstungsschutz)
      - Stengel ist trocken aber fest
      - Erholung: Durchdringend giessen, Pflanze erholt sich in Stunden
      SCHNELL-TEST: Topf anheben.
      - Schwer + haengende Blaetter = Ueberwaesserung → nicht giessen,
        austrocknen lassen
      - Leicht + haengende Blaetter = zu trocken → durchdringend giessen
    metadata:
      topic: overwatering_vs_underwatering
      quick_test: weight

  - id: drainage-loecher-pflicht
    title: Topf mit Loch — warum Drainage-Loecher unverzichtbar sind
    content: |
      Braucht ein Pflanzentopf ein Loch am Boden? Ja, unbedingt!
      Drainage-Loecher (Abzugsloecher) im Topfboden sind absolut
      unverzichtbar fuer gesunde Pflanzen. Ohne Loch im Topf sammelt
      sich Wasser am Boden → Staunaesse → Wurzelfaeule → Pflanze stirbt.
      Warum sind Drainage-Loecher so wichtig?
      - Ueberschuessiges Giesswasser kann abfliessen
      - Verhindert Staunaesse und stehendes Wasser im Topf
      - Wurzeln bekommen Sauerstoff (nass + kein Abfluss = kein O2)
      - Beim Durchgiessen werden Salzansammlungen ausgewaschen
      Was tun bei dekorativen Toepfen ohne Loch (Uebertopf/Kaschpo)?
      - Pflanze im Innentopf MIT Drainage-Loechern belassen
      - Innentopf in den Uebertopf stellen
      - Nach dem Giessen: Ueberschuss-Wasser aus dem Uebertopf entfernen
        (Untersetzer leeren, Ueberstand abgiessen — nach 30 Minuten)
      - NIEMALS direkt in einen Topf ohne Loch pflanzen!
      Toepfe ohne Loch nachruestbar? Ja — bei Ton/Keramik mit
      Steinbohrer, bei Plastik mit heissem Nagel oder Schraubenzieher.
    metadata:
      topic: drainage_holes_required
      importance: essential

  - id: ursachen-ueberwaesserung
    title: Haeufige Ursachen fuer Ueberwaesserung
    content: |
      1. Zu haeufiges Giessen: "Meine Pflanze sieht traurig aus → Wasser!"
         Nein! Erst pruefen OB Substrat trocken ist (Finger-Test).
      2. Topf zu gross: Kleine Pflanze in riesigem Topf → Substrat bleibt
         wochenlang nass, Wurzeln koennen Wasser nicht nutzen. Beim Umtopfen
         maximal 2-3cm groesseren Durchmesser waehlen.
      3. Keine Drainage-Loecher: Wasser sammelt sich am Topfboden.
         Absolutes No-Go. JEDER Topf braucht Abflussloecher.
      4. Staunasser Untersetzer: Wasser im Untersetzer nicht stehen lassen.
         30 Minuten nach dem Giessen Ueberstand entfernen.
      5. Verdichtetes Substrat: Alte Erde verliert Struktur, wird matschig,
         haelt zu viel Wasser. Loesung: Perlit beimischen (20-30%) oder
         frisches Substrat beim naechsten Umtopfen.
      6. Wenig Licht + wenig Waerme: Pflanze transpiriert kaum →
         Substrat trocknet nicht ab. Im Winter seltener giessen!
      7. Mythos "Drainage-Schicht": Steine/Blähton unter der Erde im Topf
         VERBESSERN die Drainage NICHT — sie erzeugen eine "perched water
         table" (Staunaesse) ueber der Schicht. Lieber mehr Perlit
         ins gesamte Substrat mischen.
    metadata:
      topic: overwatering_causes
      top_cause: watering_schedule_instead_of_checking

  - id: rettung-ueberwaesserung
    title: Notfall-Protokoll bei Ueberwaesserung
    content: |
      Leichter Fall (Pflanze haengt, Substrat nass, aber kein Geruch):
      1. Giessen SOFORT stoppen
      2. Topf aus Uebertopf/Untersetzer nehmen (Wasser muss ablaufen)
      3. An warmen, hellen Ort stellen (foerdert Verdunstung)
      4. Substrat komplett abtrocknen lassen (auch wenn es Tage dauert)
      5. Erst wieder giessen wenn Finger-Test "trocken" zeigt
      Schwerer Fall (Fauliger Geruch, braune Stengelbasis, Schimmel):
      1. Pflanze aus Topf nehmen, Substrat vorsichtig entfernen
      2. Wurzeln inspizieren: Braun/schleimig = Wurzelfaeule
      3. Alle kranken Wurzeln abschneiden (sterilisierte Schere)
      4. Gesunde Wurzeln in 3% H2O2-Loesung tauchen (10 Min)
      5. In frisches, trockenes Substrat umtopfen (mit Perlit!)
      6. Kleinerer Topf als vorher (weniger Wurzeln = weniger Topfvolumen)
      7. NICHT giessen fuer 3-5 Tage nach dem Umtopfen
      8. Danach sehr vorsichtig giessen (wenig, nur wenn trocken)
      Prognose: Leichter Fall → volle Erholung in 1-2 Wochen.
      Schwerer Fall mit Wurzelfaeule → 50/50 Chance, Erholung 3-6 Wochen.
      Wenn >80% der Wurzeln befallen → kaum zu retten.
    metadata:
      topic: overwatering_rescue
      urgency: [mild, severe]
