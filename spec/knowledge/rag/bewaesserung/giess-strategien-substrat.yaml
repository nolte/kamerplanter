chunks:
  - id: giessen-zimmerpflanzen
    title: Wie oft Zimmerpflanze giessen — Fingertest und Topfgewicht
    content: |
      Wie oft soll ich meine Zimmerpflanze giessen? Die Antwort ist:
      Nicht nach Zeitplan! Es gibt keinen festen Rhythmus wie "jeden
      Montag giessen". Ob eine Zimmerpflanze Wasser braucht, haengt von
      vielen Faktoren ab und ist individuell — es kommt darauf an.
      Die Giess-Frequenz variiert je nach Pflanze, Topfgroesse, Substrat,
      Licht, Temperatur und Jahreszeit. Pauschal laesst sich nicht sagen
      "alle X Tage giessen". Stattdessen: Substrat pruefen vor jedem
      Giessen.
      Fingertest (beste Methode): Zeigefinger 2-3 cm tief in die Erde
      stecken. Fuehlt sich das Substrat noch feucht an, nicht giessen.
      Ist die Erde trocken und kruemelig, ist es Zeit zu giessen. Den
      Fingertest VOR jedem Giessen machen — er ist die zuverlaessigste
      Methode fuer Zimmerpflanzen.
      Topfgewicht-Methode (Alternative/Ergaenzung): Topf hochheben und
      das Gewicht pruefen. Schwerer Topf bedeutet noch feucht, also nicht
      giessen. Leichter Topf bedeutet Zeit zu giessen. Tipp: Frisch
      gegossenen Topf wiegen oder anheben als Referenz, um das Topfgewicht
      einschaetzen zu lernen.
      Saisonale Unterschiede bei Zimmerpflanzen:
      - Sommer/Wachstumsphase: haeufiger giessen (alle 3-7 Tage)
      - Winter/Ruhephase: deutlich seltener (alle 7-14 Tage)
      Topfmaterial beeinflusst die Frequenz:
      - Plastik: Haelt Feuchtigkeit laenger
      - Terracotta/Ton: Trocknet schneller durch Verdunstung ueber Waende
    metadata:
      topic: watering_houseplants
      test_method: [finger_test, weight_method]

  - id: giessen-erde
    title: Giess-Strategie fuer Erde und erdbasierte Substrate
    content: |
      WICHTIGSTE REGEL: Nicht nach Zeitplan giessen! Es gibt keinen
      festen Rhythmus — die Frequenz haengt von Pflanze, Topfgroesse,
      Substrat, Licht und Temperatur ab. Pauschal laesst sich nicht
      sagen "alle X Tage giessen". Stattdessen: Substrat pruefen.
      Finger-Test (beste Methode): Zeigefinger 2-3cm tief in die Erde
      stecken. Fuehlt sich feucht an → noch nicht giessen. Trocken und
      kruemelig → giessen. Den Finger-Test VOR jedem Giessen machen.
      Topfgewicht-Methode (Alternative/Ergaenzung): Topf hochheben und
      das Gewicht pruefen. Schwerer Topf = noch feucht, nicht giessen.
      Leichter Topf = Zeit zu giessen. Tipp: Frisch gegossenen Topf wiegen
      als Referenz, um das Gewicht einzuschaetzen.
      Richtig giessen in Erde:
      - Langsam und gleichmaessig ueber die gesamte Oberflaeche giessen
      - So viel giessen bis 10-20% als Runoff unten herauslaufen
      - Runoff zeigt: Gesamtes Substrat ist durchfeuchtet (kein trockener Kern)
      - Ueberschuss in Untersetzer abgiessen (nicht stehen lassen!)
      Frequenz variiert stark (nur Richtwerte, kein Zeitplan!):
      - Sommer/Wachstumsphase: alle 3-5 Tage (je nach Topfgroesse)
      - Winter/Ruhephase: alle 7-14 Tage
      - Grosse Pflanze in kleinem Topf: haeufiger
      - Kleine Pflanze in grossem Topf: seltener (Wurzelfaeule-Risiko!)
      Topfmaterial-Einfluss:
      - Plastik: Haelt Feuchtigkeit laenger, guenstiger
      - Terracotta/Ton: Verdunstet ueber Waende, trocknet 2× schneller
      - Stofftopf (Fabric Pot): Gute Belueftung, trocknet schnell, Air-Pruning
    metadata:
      topic: watering_soil
      test_method: [finger_test, weight_method]
      runoff_target_percent: [10, 20]

  - id: giessen-coco
    title: Giess-Strategie fuer Kokos/Coco
    content: |
      Coco ist KEIN Erde-Ersatz — Giessverhalten ist fundamental anders
      als in erdbasierten Substraten! Coco und Erde haben nichts gemeinsam.
      Kernregel: Coco haeufig und immer mit Naehrloesung giessen.
      Nie komplett austrocknen lassen — Coco wird hydrophob wenn es
      austrocknet und nimmt dann kein Wasser mehr auf. Feucht halten
      ist Pflicht.
      Nie nur mit reinem Wasser giessen — immer Duenger bzw. Naehrloesung
      verwenden. Reines Wasser wascht CEC-gebundene Naehrstoffe aus dem
      Coco. Deshalb: Immer mit Naehrloesung giessen, nie nur Wasser.
      Hochfrequenz-Fertigation (Standard in Coco):
      - Saemlinge: 1 mal taeglich, kleine Menge
      - Vegetativ: 2-3 mal taeglich
      - Bluete: 3-5 mal taeglich (Peak Bloom bis 7 mal in kleinen Toepfen)
      - Immer 10-20% Runoff als Ziel
      In der Bluete also mehrmals taeglich giessen — 3 bis 5 mal taeglich
      ist Standard. Das klingt viel, ist aber noetig.
      Warum so oft? Coco haelt Wasser UND Luft gleichzeitig (anders als Erde).
      Haeufiges Giessen in Coco fuehrt NICHT zu Ueberwaesserung, weil die
      Struktur natuerlich belueftet bleibt. Im Gegenteil: Haeufiges Giessen
      bedeutet haeufiger frische Naehrstoffe und schnelleres Wachstum.
      Automatisierung: Bei 3-5 mal taeglich wird manuelles Giessen unpraktisch.
      Timer-gesteuerte Bewaesserung (Tropfer, Halos) empfohlen.
      Topfgroesse in Coco: Kleiner als in Erde (3-5L reichen fuer grosse
      Pflanzen bei Hochfrequenz-Fertigation vs. 10-20L in Erde).
    metadata:
      topic: watering_coco
      frequency_bloom: [3, 7]
      never: [dry_out, plain_water]

  - id: giessen-hydro
    title: Giess-Strategie fuer Hydroponik-Systeme
    content: |
      DWC (Deep Water Culture):
      - Wurzeln haengen permanent in belüfteter Naehrloesung
      - Keine "Giess-Frequenz" — Loesung ist immer da
      - Entscheidend: Geloester Sauerstoff (Luftsteine, >6 mg/L DO)
      - Wassertemperatur 18-22°C (Pythium-Praevention)
      - Wasserstand: Wurzeln 2-3cm ueber Wasserspiegel starten lassen
        (Luft-Wurzeln bilden sich), dann Niveau halten
      NFT (Nutrient Film Technique):
      - Duenner Naehrloesungsfilm (2-3mm) fliesst permanent ueber Wurzeln
      - Pumpe muss 24/7 laufen (Pumpenausfall = sofortige Austrocknung!)
      - Backup-Pumpe oder Alarm empfohlen
      - Neigung: 1-3% Gefaelle
      Ebb & Flow (Flut & Ebbe):
      - Wanne wird zyklisch geflutet und entleert
      - Frequenz: Alle 2-4 Stunden waehrend Lichtphase
      - Seltener nachts (1-2× oder gar nicht)
      - Flutzyklus: 15-30 Minuten flueten, dann ablaufen lassen
      Tropf-/Drip-Systeme:
      - Kontrollierte Zufuhr ueber Tropfer an jede Pflanze
      - Timer-gesteuert: Gleiche Frequenz wie Coco (abhaengig vom Substrat
        im Topf: Steinwolle, Coco, Perlit, Blähton)
    metadata:
      topic: watering_hydro
      systems: [dwc, nft, ebb_flow, drip]

  - id: giessen-pon-semihydro
    title: Giess-Strategie fuer Pon, Seramis und Semi-Hydro
    content: |
      Pon (Lechuza, mineralisches Substrat), Seramis und aehnliche
      mineralische Substrate funktionieren nach dem Docht-/Wicking-Prinzip:
      Grundprinzip: Wasservorrat im Gefaess-Boden, Substrat saugt
      Wasser nach oben (Kapillarwirkung). Pflanze nimmt was sie braucht.
      Giessen bei Pon/Lechuza-System:
      - Wasser auf 1/3 der Gefaesshoehe auffuellen (Wasserstandsanzeiger)
      - WARTEN bis Reservoir LEER ist (Anzeiger auf Minimum)
      - 1-3 Tage trocken lassen (Trockenphase/Dry-Cycle)
      - Dann wieder auffuellen
      Warum Trockenphase? Wurzeln brauchen Sauerstoff. Die Trockenphase
      belueftet das Substrat. Ohne Trockenphase → Sauerstoffmangel →
      Wurzelfaeule (auch in mineralischem Substrat moeglich!).
      Umstellung von Erde auf Pon:
      - Wurzeln muessen sich an Semi-Hydro anpassen (2-4 Wochen)
      - Alte Erd-Wurzeln sterben teilweise ab, neue Wasser-Wurzeln bilden sich
      - Waehrend Umstellung: Sparsam giessen, Pflanze nicht ueberstrapazieren
      - Kein Duenger fuer erste 2 Wochen nach Umstellung
      Naehrstoff-Versorgung: Fluessigduenger ins Giesswasser (0.5-1.0 mS/cm),
      oder Langzeit-Duenger-Kegel im Substrat (Lechuza PON enthaelt welchen).
    metadata:
      topic: watering_pon_semihydro
      principle: wicking
      dry_cycle: required

  - id: giessen-outdoor-beete
    title: Bewaesserung im Freiland und Hochbeet
    content: |
      Grundregel Outdoor: Lieber seltener und durchdringend giessen als
      taeglich oberflaechlich. Tiefliegende Wurzeln machen Pflanzen
      trockenresistenter.
      Frequenz-Richtwerte (Sommer, kein Regen):
      - Gemuese-Beete: 2-3×/Woche, je 15-25 L/m²
      - Hochbeete: Haeufiger (trocknen schneller aus, weniger Erdvolumen)
      - Frisch gepflanzt: Taeglich fuer 1-2 Wochen (Anwachsen)
      - Etablierte Stauden/Gehoelze: 1×/Woche tief giessen
      Giess-Zeitpunkt:
      - Morgens frueh (5-9 Uhr): Beste Zeit. Pflanze nutzt Wasser
        am Tag, Blaetter trocknen schnell (weniger Pilzkrankheiten)
      - Abends: Zweitbeste Option, weniger Verdunstung. Nachteil:
        Feuchtigkeit auf Blaettern ueber Nacht → Pilzrisiko
      - NICHT mittags in voller Sonne (Verdunstung, angeblicher
        Brennglas-Effekt ist Mythos, aber Verschwendung)
      Methoden:
      - Tropfbewaesserung: Effizienteste Methode, Wasser direkt an Wurzeln
      - Giesskanne: Bodennah giessen, Blaetter trocken halten
      - Rasensprenger: Nur Notloesung (viel Verdunstung, nasse Blaetter)
      - Ollas (Ton-Gefaesse): Vergraben, Wasser sickert durch poroese Wand
      Mulch: Reduziert Verdunstung um 50-70%. Immer mulchen!
    metadata:
      topic: watering_outdoor
      best_time: morning
      frequency_per_week: [2, 3]

  - id: giess-zeitpunkt
    title: Wann giessen — morgens oder abends?
    content: |
      Soll ich morgens oder abends giessen? Die kurze Antwort: Morgens
      ist der beste Zeitpunkt zum Giessen, sowohl indoor als auch outdoor.
      Morgens giessen hat klare Vorteile gegenueber abends oder mittags.
      Outdoor / Freiland — morgens giessen (5-9 Uhr):
      Im Garten und auf dem Balkon ist morgens die beste Giesszeit. Die
      Pflanze hat den ganzen Tag Zeit, das Wasser aufzunehmen. Der Tau
      auf den Blaettern kann abtrocknen, was Pilzkrankheiten vorbeugt.
      Die Verdunstung ist morgens noch gering, das Wasser versickert
      tiefer ins Erdreich. Outdoor morgens zu giessen ist die goldene
      Regel fuer jeden Gaertner.
      Abends ist die zweitbeste Option (weniger Verdunstung als mittags),
      hat aber den Nachteil, dass Feuchtigkeit ueber Nacht auf den
      Blaettern bleibt und Pilzkrankheiten foerdern kann.
      NICHT mittags in voller Sonne giessen — hohe Verdunstung und
      Wasserverschwendung. Der "Brennglas-Effekt" ist zwar ein Mythos,
      aber es ist trotzdem der schlechteste Zeitpunkt.
      Indoor / Growzelt / Growroom — vor der Lichtphase giessen:
      Bei Indoor-Anbau im Zelt oder Growroom am besten direkt vor
      Beginn der Lichtphase giessen, also vor dem Einschalten der Lampe.
      Warum? Die Pflanze beginnt mit der Transpiration sobald das Licht
      angeht und braucht dann frisches Wasser. Im Zelt vor der Lichtphase
      zu giessen ist das Indoor-Aequivalent zum "morgens giessen".
      Zimmerpflanzen: Am besten morgens oder vormittags giessen, wenn
      das Tageslicht einsetzt. So kann ueberschuessige Feuchtigkeit
      verdunsten und die Pflanze hat Energie fuer die Wasseraufnahme.
    metadata:
      topic: watering_timing
      best_time: [morning, before_lights_on]
