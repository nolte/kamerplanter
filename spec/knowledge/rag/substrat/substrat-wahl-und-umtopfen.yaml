  - id: substrat-vergleich-entscheidungshilfe
    title: Welches Substrat soll ich nehmen — Erde, Coco, Hydro oder Mineral?
    content: |
      Die Wahl des Substrats haengt von Pflanze, Erfahrung, Zeiteinsatz und Ziel ab.
      Ein Substrat passt nicht fuer alles — hier die wichtigsten Typen im Vergleich.

      Blumenerde (organisch, gepuffert):
      Blumenerde ist das Einsteiger-Substrat schlechthin. Neben organischen Bestandteilen
      (Torf, Kompost, Humus) enthaelt gute Blumenerde bereits Naehrstoffe fuer 4-6 Wochen.
      Der pH-Puffer abfedert Fehler beim Duengen. Nachteil: Erde kann Schaedlinge (Trauer-
      muecken) mitbringen, verdichtet sich mit der Zeit und haelt mehr Wasser — bei zu
      kleinen Toepfen steigt das Ueberwaesserungsrisiko. Geeignet fuer: Zimmerpflanzen,
      Krauter, Gemuese, Saemlinganzucht. Schwierigkeit: Anfaenger.

      Kokos/Coco (inert, schnell, kontrollierbarer):
      Kokossubstrat ist ein Abfallprodukt der Kokosnuss-Industrie — inert (keine eigenen
      Naehrstoffe), hat eine hohe Luftporen-Rate und ausgezeichnetes Luft-Wasser-Verhaeltnis.
      Kokos verzeiht Fehler beim Giessen weniger als Erde — es muss haeufig gewaessert
      werden und IMMER mit Naehrloesung (nie mit reinem Wasser). Wer Erde-Erfahrung hat
      und mehr Kontrolle ueber Naehrstoffe will, sollte Coco probieren. Geeignet fuer:
      Cannabis, Tomaten, fortgeschrittene Anbauer. Schwierigkeit: Mittel.

      Mineralsubstrat: Pon, Seramis, Lechuza (Zimmerpflanzen-Semi-Hydro):
      Pon und Seramis sind anorganische Mineralsubstrate aus vulkanischen Gesteinen.
      Sie speichern Wasser und Naehrstoffe im Porenraum und geben sie durch Kapillar-
      wirkung ab. Semi-hydroponisch: Die Pflanze entnimmt Wasser aus einem kleinen
      Wasserreservoir am Topfboden. Nahezu wartungsarm, kein Schimmel, keine Trauer-
      muecken. Nachteil: teurere Anschaffung, Umstellung von Erde dauert 2-4 Wochen.
      Geeignet fuer: anspruchslose Zimmerpflanzen, Sanseveria, Pothos, Yucca.
      Schwierigkeit: Einsteiger nach kurzer Eingewoehnung.

      Hydroponik (substratlos oder mit inertem Traegermedium):
      DWC, NFT und Kratky arbeiten ohne Substrat — die Wurzeln haengen direkt in der
      Naehrloesung. Maximale Kontrolle, maximales Wachstum, aber auch maximaler Aufwand.
      Als Traegermedium werden Blahton (Clay Pebbles), Steinwolle oder Perlit verwendet.
      Geeignet fuer: Erfahrene Anbauer, Cannabis, Salat, Krauter in NFT. Schwierigkeit: Experten.

      Faustregel: Anfaenger starten mit guter Blumenerde. Fortgeschrittene wechseln
      auf Coco fuer mehr Kontrolle. Zimmerpflanzen-Enthusiasten probieren Pon/Seramis.
      Hydroponik ist das naechste Level nach Coco-Erfahrung.
    metadata:
      topic: substrat_vergleich
      substrate_types: [soil, coco, pon_mineral, hydro]
      difficulty: beginner

  - id: erde-richtig-mischen
    title: Welche Erde fuer meine Monstera, Alocasia oder Zimmerpflanze — und wie mischen?
    content: |
      Fertige Blumenerde ist ein guter Ausgangspunkt, aber die meisten Zimmerpflanzen
      profitieren von einer aufgelockerten Mischung mit besserer Drainage. Reine Erde
      ohne Zusatz ist oft zu schwer und speichert zu viel Wasser.

      Basis-Mischung fuer Zimmerpflanzen (Monstera, Philodendron, Pothos, Alocasia):
      - 60-70% Blumenerde (qualitativ hochwertig, torfarme Moeglichkeit bevorzugen)
      - 20-30% Perlit (weisse, porige Vulkankiesel) — verbessert Drainage und Luftporen,
        beugt Verdichtung und Ueberwaesserung vor, beimischen ist Pflicht bei schwerer Erde
      - 10% Wurmhumus oder Kompost (Naehrstoffe, Mikrobiom)
      Perlit beimischen ist die einfachste Massnahme fuer bessere Drainage — 20-30% Anteil.

      Mischung fuer Kakteen und Sukkulenten:
      - 40-50% mineralische Erde oder Kakteenerde (kalkhaltig, grob)
      - 30-40% Perlit oder Bims (schnelle Drainage, verhindert Staunaesse)
      - 10-20% Sand oder Quarzkies

      Mischung fuer Aroiden (Monstera, Anthurium, Alocasia):
      - 40% Blumenerde
      - 25% Perlit
      - 20% Orchideenrinde (grobe Stuecke — schafft Luftporen)
      - 15% Wurmhumus

      Mischung fuer Cannabis in Erde:
      - 50% Qualitaets-Blumenerde (pH 6.0-7.0)
      - 20-30% Perlit (Drainage, Belueftung)
      - 10-20% Wurmhumus (langsame Naehrstofffreisetzung)
      Optional: Kokosfaser (Auflockerung), Aktivkohle (Anti-Moder), Perlite bis 40%.

      Anzuchterde (fuer Samen und Jungpflanzen):
      Anzuchterde ist bewusst naehrstoffarm und fein — Wurzeln wachsen besser in
      schwacher Naehrstoffumgebung. Keine normaler Blumenerde fuer Samen verwenden!
      Oft reicht fertige Anzuchterde vom Handel. Fuer Stecklinge: reines Perlit oder
      Coco-Perlit-Gemisch (50/50) ohne Naehrstoffe.

      Fertig-Substrate sind praktisch, aber oft zu nass-schwer fuer Topfkultur.
      Selbst mischen kostet einmalig mehr Zeit, gibt aber bessere Kontrolle.
    metadata:
      topic: erde_mischen
      common_species: [Monstera, Alocasia, Philodendron, Cannabis, Kakteen]
      difficulty: beginner

  - id: coco-substrat-vorbereiten
    title: Kokos/Coco-Substrat vorbereiten — Buffering, pH und Perlit-Anteil
    content: |
      Frisches, ungepuffertes Kokossubstrat MUSS vor dem ersten Gebrauch vorbereitet
      werden — andernfalls bindet es Calcium und Magnesium aus der Naehrloesung und
      verursacht direkt nach dem Einpflanzen CalMag-Mangel.

      Buffering (Pufferung) — Pflichtschritt:
      Frisches Coco hat eine hohe Kationenaustauschkapazitaet (CEC). Es bindet
      CalMag-Ionen und gibt dafuer Natrium und Kalium frei. Wenn man ungepuffertes
      Coco mit Naehrloesung giesst, "stiehlt" das Substrat das Calcium und Magnesium
      fuer die ersten Wochen. Loesung: Coco mit CalMag-Loesung einweichen und puffern.
      Puffer-Anleitung:
      1. CalMag-Loesung ansetzen: EC 1.2-1.5, Ca:Mg Verhaeltnis ca. 3:1-5:1, pH 5.8-6.2
      2. Coco in CalMag-Loesung einweichen (mindestens 8-24 Stunden)
      3. Abgiessen, leicht ausdruecken, direkt verwenden
      Nach dem Puffern ist der Kationenaustausch gesaettigt — die CEC-Bindungsplaetze
      sind mit Calcium belegt statt mit Natrium.

      EC und pH vor der Nutzung pruefen:
      Billiges Coco kann hohe EC-Werte durch Salz-Rueckstaende aus der Verarbeitung
      haben. Runoff-EC ueber 1.0 mS/cm beim ersten Giessen deutet auf schlechte Qualitaet
      hin. Gutes Coco hat nach dem Buffering einen Runoff-pH von 5.5-6.5.

      Perlit-Anteil:
      Reines Coco ist eher dicht. 30-50% Perlit beimischen verbessert die Luft-
      poren-Rate deutlich und verhindert Ueberwaesserung. Bei Hochfrequenz-Fertigation
      (3-5x taeglich) sind 30% Perlit Standard; bei weniger haeufigem Giessen 40-50%.

      Bewaesserungsstrategie in Coco (Run-to-Waste):
      Coco wird immer mit Naehrloesung gegossen, nie nur mit Wasser. Ziel sind
      10-20% Runoff bei jedem Giessvorgang. Haeufiges Giessen (mehrmals taeglich
      in der Bluete) ist gewollt und fuehrt NICHT zu Ueberwaesserung — Coco haelt
      durch seine Struktur Luft und Wasser gleichzeitig.
