  - id: umtopfen-guide
    title: Wann und wie umtopfen — Topfgroesse, Zeitpunkt und der Tonscherben-Mythos
    content: |
      Umtopfen ist notig wenn die Wurzeln den Topf ausgefuellt haben oder das Substrat
      erschoepft ist. Aber nicht jede Pflanze will sofort einen riesigen Topf.

      Wann ist umtopfen noetig?
      - Wurzeln wachsen aus den Loechern des Topfbodens heraus
      - Der Topf ist komplett durchgewurzelt (Wurzeln sichtbar oben, seitlich)
      - Wachstum stagniert trotz ausreichend Licht, Wasser und Naehrstoffe
      - Substrat laeuft sofort durch (kein Wasser haelt sich)
      - Pflanze kippt im Topf (zu schwer oben, zu wenig Wurzelmasse unten)
      Wurzeln pruefen: Topf kippen und Ballen herausnehmen — wenn der Wurzelballen
      eng und filzartig ist, ist es Zeit. Wurzeln aus den Loechern zu sehen ist
      das deutlichste Signal.

      Wie gross soll der neue Topf sein?
      NICHT zu gross — ein Topf der viel zu gross ist fuehrt zu Staunaesse! In
      grossem Substratvolumen ohne Wurzeln haelt sich das Wasser zu lang.
      Faustregel: nur 2-3 cm groesseren Durchmesser nehmen als der aktuelle Topf.
      Schrittweise umpflanzen ist immer besser als grosse Spruenge.

      Bester Zeitpunkt zum Umtopfen:
      Im Fruehling, am besten Maerz bis April, wenn die Wachstumsperiode beginnt.
      Dann erholt sich die Pflanze am schnellsten und kann sofort ins aktive Wachstum
      starten. Im Herbst oder Winter moeglichst vermeiden — die Pflanze ist in Ruhe
      und vertraegt den Stress schlecht.

      Topfmaterial:
      - Plastik: Guenstig, haelt Feuchtigkeit laenger, gut fuer feuchtigkeitsliebende Pflanzen
      - Terracotta/Ton: Verdunstet ueber Waende, trocknet schneller — ideal fuer Kakteen,
        Sukkulenten, Rosmarin, Feigenbaeume
      - Fabric Pot (Stofftopf): Beste Belueftung, Air-Pruning der Wurzeln verhindert
        Wurzelspiralbildung, trocknet schnell — beliebt fuer Cannabis

      Der Tonscherben-Mythos — Drainage-Schicht am Topfboden:
      Kiesel, Tonscherben oder eine Schicht Steine am Topfboden sollen angeblich die
      Drainage verbessern. Das ist ein Mythos! Diese Schichten sind kontraproduktiv.
      Wegen der "Perched Water Table" (haengende Wasserzone): Wasser behaelt eine
      Kapillarzone direkt ueber dem Uebergang von Substrat zu Kies und sammelt sich
      dort. Das Ergebnis ist mehr Staunaesse, nicht weniger. Stattdessen: Perlit
      (20-30%) ins Substrat mischen — das verbessert Drainage ohne negative Effekte.
      Topf mit Drainage-Lochern am Boden ist Pflicht — das ist die echte Drainage.
      Angiessung nach dem Umtopfen: Einmal gruendlich giessen, dann 3-5 Tage
      weniger giessen (Wurzeln bilden sich besser in leicht trocknerem Substrat).
    metadata:
      topic: umtopfen
      difficulty: beginner

  - id: spezialsubstrate-zimmerpflanzen
    title: Spezialsubstrate — Orchideen, Kakteen, Bonsai, Moorbeet und Anzuchterde
    content: |
      Nicht jede Pflanze kommt mit normaler Blumenerde klar. Diese Spezialfaelle brauchen
      ein angepasstes Substrat.

      Orchideensubstrat (fuer Phalaenopsis, Cattleya, Dendrobium):
      Orchideen sind Epiphyten — sie wachsen in der Natur auf Baumrinden, nicht in Erde.
      Orchideensubstrat besteht aus grober Pinienrinde, Perlit und manchmal Sphagnum-Moos.
      Die Rinde ermoeglicht gute Belueftung und das Abtrocknen zwischen den Giessvorgaengen.
      Normale Blumenerde ist fuer Orchideen ungeeignet — zu schwer, zu wenig Luft,
      Wurzeln verrotten. Giessrhythmus: Tauchbad alle 7-14 Tage, komplett abtrocknen lassen.

      Kakteenerde und Sukkulentenerde (mineral, mager):
      Kakteen und Sukkulenten brauchen sehr schnell draenierende, mineralreiche und
      naehrstoffarme Erde. Normale Blumenerde ist zu naehrstoffreich und zu feucht.
      Fertige Kakteenerde ist ein guter Ausgangspunkt — noch besser: 50% Kakteenerde
      plus 30-50% mineralischer Zusatz (Perlit, Bims, Quarzsand). pH 6.5-7.5.

      Bonsai-Substrat (Akadama, Bims, Lava):
      Bonsai brauchen ein mineralhaltiges, strukturstabiles Substrat das gut
      draeniert und nicht verschlaemmt. Klassische Mischung: Akadama (japanischer
      Ton, gebrannt) + Bimskies + Lava-Granulat je zu einem Drittel.
      Normaler Boden oder Blumenerde sind fuer Bonsai nicht geeignet.

      Moorbeeterde (sauer, pH 4-5):
      Moorbeetpflanzen wie Heidelbeere, Azalee, Rhododendron und Hortensie brauchen
      saures Substrat. Moorbeeterde hat pH 4.0-5.0. Kalkhaltige Blumenerde schadet
      ihnen — die Pflanzen koennen Eisen und Mangan nicht aufnehmen (Chlorose).
      Heidelbeeren und Blaubeeren ausschliesslich in Moorbeeterde oder spezielle
      Blaubeerende pflanzen!

      Anzuchterde fuer Samen und Jungpflanzen:
      Anzuchterde ist fein und naehrstoffarm — das klingt paradox, ist aber gewollt.
      Junge Wurzeln wachsen aktiver in schwachen Naehrstoffumgebungen auf der Suche
      nach Naehrstoffen (Tropismus). Normale Blumenerde ist zu naehrstoffreich fuer
      frisch gekeimte Samen und kann Jungpflanzen verbrennen. Nach 3-4 Wochen in
      normales oder angepasstes Substrat umpflanzen.

      Sphagnum-Moos (fuer Orchideen und Karnivoren):
      Torfmoos hat eine sehr hohe Wasserhaltekapazitaet und einen natuerlich sauren
      pH (3.5-4.5). Ideal fuer feuchtigkeitsliebende Epiphyten und fleischfressende
      Pflanzen (Sarracenia, Drosera). Karnivoren brauchen Sphagnum mit destilliertem
      Wasser oder Regenwasser — kein Leitungswasser, kein Duenger.
    metadata:
      topic: spezialsubstrate
      substrate_types: [orchid_bark, sphagnum, pon_mineral]
      common_species: [Orchidee, Kaktus, Sukkulente, Bonsai, Heidelbeere, Hortensie]
