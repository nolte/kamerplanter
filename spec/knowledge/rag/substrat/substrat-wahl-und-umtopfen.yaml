  - id: substrat-recycling-wiederverwendung
    title: Substrat wiederverwenden — wann geht das und wie aufbereiten?
    content: |
      Gebrauchtes Substrat ist nicht automatisch unbrauchbar. Ob Wiederverwendung
      sinnvoll ist, haengt vom Substrattyp, der Nutzungsdauer und dem Pflanzenzustand ab.

      Wann Substrat wiederverwenden?
      Erde: Nach einem Anbau-Zyklus (1 Saison) kann Erde aufgefrischt werden.
      Blahton (Clay Pebbles) und Perlit: Mehrfach wiederverwendbar nach Reinigung.
      Coco: 2-3 Zyklen moeglich, wenn pH-Verlauf stabil war (Standardabweichung < 0.3)
      und keine starke Salzanreicherung vorliegt (EC-Anstieg unter 1.0 mS/cm).
      Steinwolle-Slabs: Max. 3 Zyklen mit Dampfsterilisation.

      Wann NICHT wiederverwenden (absolut):
      - Nach Pilzkrankheiten (Botrytis, Fusarium, Pythium) — Sporen bleiben im Substrat!
      - Nach starkem Schimmelbefall oder Wurzelfaeule
      - Nach Befall mit bodenleben Schaedlingen (Fungus Gnats, Thrips-Puppen)
      - Anzucht-Plugs aus Steinwolle (rockwool_plug) sind Einweg-Substrat
      - Bei stark versalzenem Substrat (EC im Runoff dauerhaft ueber 3.0 mS/cm)

      Aufbereitungsmethoden:
      Erde auffrischen: Altes Substrat mit 20-30% frischem Perlit und 20% Wurmhumus
      oder Kompost mischen. Grosse Wurzelreste entfernen. Vor Wiederverwendung
      pH pruefen und ggf. korrigieren.
      Blahton reinigen: Wurzelreste entfernen, in H2O2-Loesung (3%) einweichen
      (12 Stunden), gruendlich mit pH-neutralem Wasser abspuelen.
      Perlit reinigen: Wurzelreste absieben, mit H2O2 desinfizieren, abspuelen.
      Coco aufbereiten: Bei hohem EC zuerst entsalzen (mit pH 5.5-Wasser durchspuelen,
      3-5x Substratvolumen), danach erneut CalMag-Puffern (einweichen, 8-24 Stunden).
      Steinwolle-Slabs: Dampfsterilisation (70 Grad Celsius, 30 Minuten) oder
      H2O2 3% Einweichen (24 Stunden), anschliessend mit pH-5.5-Wasser entsalzen.
      Living Soil: Nach der Ernte 14 Tage Nachkompostierung mit Wurmkompost und
      Gesteinsmehl, dann Komposttee zur Mikrobiom-Reaktivierung zugeben. Living Soil
      profitiert von Wiederverwendung — das Mikrobiom wird von Zyklus zu Zyklus aktiver.

      Faustregel: Bei Krankheit oder Schaedlingen niemals wiederverwenden.
      Bei gesunden Pflanzen und stabilen EC/pH-Werten lohnt die Aufbereitung.
    metadata:
      topic: substrat_recycling
      substrate_types: [coco, clay_pebbles, perlite, rockwool_slab, living_soil]
      difficulty: intermediate
