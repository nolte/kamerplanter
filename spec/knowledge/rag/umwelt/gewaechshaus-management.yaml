  - id: gewaechshaus-typen-vergleich
    title: Welcher Gewaechshaus-Typ passt zu mir? Glashaus, Folienhaus, Doppelstegplatten und Fruehbeet im Vergleich
    content: |
      Das Glashaus (Gewächshaus aus Einscheibensicherheitsglas oder Einscheibenflachglas) ist
      die hochwertigste und langlebigste Variante. Vorteile: maximale Lichtdurchlaessigkeit
      (90-92%), robust, langlebig (20-30 Jahre), witterungsbestaendig. Nachteile: teuer
      (ab 1.500 € aufwaerts fuer Qualitaet), schweres Fundament noetig, wenig flexibel.
      Ideal fuer dauerhaften, professionellen Anbau.

      Das Folienhaus (Polytunnel) ist die guenstige Alternative. UV-stabile Polyethylenfolie
      ueber Stahlrohrboegen — einfach aufzubauen, schnell aufgestellt. Vorteile: geringe
      Kosten (ab 300 €), gute Lichtdurchlaessigkeit (85-88%), flexibel umsetzbar, kein
      Fundament noetig. Nachteile: Folie alle 3-5 Jahre austauschen, weniger sturmsicher,
      Kondenswasser tropft von der Folie (Pilzrisiko), optisch weniger ansprechend.
      Besonders geeignet fuer: Tomaten (Regenschutz!), Salat, Kräuter, Erdbeeren.

      Doppelsteg- oder Hohlkammerplatten (Polycarbonat) bieten den besten Kompromiss aus
      Isolation und Preis. Lichtdurchlaessigkeit 70-80% (weniger als Glas!), aber deutlich
      bessere Waermeisolation (U-Wert bis 1.6 W/m²K statt 5.8 bei Einfachglas). Gut fuer
      Winter-Nutzung und beheizte Gewaechshaeuser, weil Heizkosten sinken.

      Das Fruehbeet (Mini-Gewaechshaus) ist der einfachste Einstieg: Holzrahmen mit altem
      Fenster oder Acrylhaube, Suedausrichtung. Kostet kaum etwas, eignet sich fuer Frühkultur
      (Salat, Radieschen, Kohlrabi) ab Februar und als Abhaertungsstation fuer Jungpflanzen.

      Ausrichtung: Ost-West-Ausrichtung (Laengsachse von Ost nach West) maximiert den
      Lichteinfall im Winter, wenn die Sonne tief steht. Nord-Sued-Ausrichtung gibt
      gleichmaessigeres Licht im Sommer — weniger Hotspots auf einzelnen Reihen.

      Groesse: Mindestens 6 m² nutzbare Flaeche planen, besser 10-15 m². Ein 2,4 × 4 m
      Gewaechshaus fuehlt sich schnell zu klein an, sobald Tomaten, Gurken und
      Ueberwinterungspflanzen gleichzeitig darin stehen.
