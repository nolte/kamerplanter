  - id: stecklinge-klone-schneiden
    title: Stecklinge und Klone schneiden — Schritt-fuer-Schritt
    content: |
      Stecklinge sind die zuverlaessigste vegetative Vermehrungsmethode:
      genetisch identische Kopien der Mutterpflanze, in kurzer Zeit bereit.

      Wann Stecklinge nehmen:
      Immer aus der vegetativen Phase — niemals aus bluehenden Pflanzen
      (Hormone passen nicht zur Bewurzelung, Stress zu hoch). Ideal:
      gesunde Triebspitzen von 8-15 cm Laenge. Mutterpflanze sollte
      mindestens 4 Wochen keine chemischen Pflanzenschutzmittel
      bekommen haben.

      So schneidet man richtig:
      1. Werkzeug sterilisieren — Skalpell oder scharfe Schere mit
         Alkohol 70% abwischen. Keine saubere Scherenklinge uebertraegt
         Pathogene auf den frischen Schnitt.
      2. Schnitt: 45-Grad-Winkel direkt unterhalb eines Knotens (Nodium).
         Schraegeschnitt vergroessert die Aufnahmeflaeche fuer Wasser
         und Bewurzelungshormon.
      3. Untere Blaetter entfernen: Alle Blaetter die ins Substrat oder
         Wasser eintauchen wuerden — sie faulen und foerdern Schimmel.
         Obere 2-3 Blaetterpaare behalten. Grosse Blaetter zur Haelfte
         kuerzen (reduziert Transpiration bei noch wurzellosen Stecklingen).
      4. Bewurzelungshormon anwenden (foerdert Wurzelbildung deutlich):
         - Clonex-Gel (IBA-Gel): Schnittflaeche eintauchen, Ueberschuss
           abstreifen. Empfehlenswert fuer Cannabis, Tomaten, Kräuter.
         - Aloe-Vera-Gel: Frisches Gel direkt aus dem Blatt — natuerliche
           Alternative mit Auxinen und Antiseptika. Funkioniert gut fuer
           Zimmerpflanzen und Kräuter.
         - Weidenwasser: Junge Weidenäste 24 Stunden in Wasser einlegen,
           Stecklinge im Weidenwasser anwurzeln. Enthält natuerliches
           IBA (Indolbuttersaeure).
         - Honig (duenn aufgetragen): Antiseptisch, minimale Auxinwirkung.
           Fuer unkritische Arten ausreichend.

      Bewurzelungsmedien im Vergleich:
      - Steinwolle-Wuerfel (Rockwool): Ideal fuer Cannabis und Tomaten.
        Vorher 24h in pH-5.5-Wasser einweichen. Hohe Bewurzelungsrate,
        direkter Uebergang in Hydroponik oder Coco.
      - Perlite (100% oder mit Kokos gemischt): Ausgezeichnete Drainage,
        gute Sauerstoffversorgung an der Wurzelzone. Bewurzelungsrate
        hoch, guenstig.
      - Wasser (Wasserbewurzelung): Einfachste Methode fuer Einsteiger.
        Pothos, Philodendron, Tradescantia, Monstera-Nodien, Basilikum
        bewurzeln sehr gut in Wasser. Uebergang zu Erde langsam und
        stufenweise — direkt in Erde setzen stresst Wasserwurzeln stark.
      - Jiffy-Pellets / Kokos-Quelltabletten: Biologisch abbaubar,
        direkt ins Substrat einpflanzen. Guenstig fuer Kräuter.

      Umgebungsbedingungen:
      - Luftfeuchtigkeit: 80-90% unter Humidity-Dome oder Klarsichtfolie.
        Wurzellose Stecklinge koennen kein Wasser aus dem Boden ziehen,
        muessen Wasser ueber die Blaetter aufnehmen.
      - Temperatur: 22-25 Grad Luft. Heizmatte unter dem Medium:
        ideale Substrattemperatur liegt 2-5 Grad ueber der Lufttemperatur
        (wärmeres Substrat foerdert Wurzelwachstum).
      - Licht: KEIN Direktlicht, keine volle Lampenstaerke. 50-150 PPFD,
        18/6-Rhythmus. Zu viel Licht stresst wurzellose Stecklinge
        (Photoinhibition).

      Arten:
      - Kopfsteckling (apikal): Triebspitze mit Vegetationspunkt — hoechste
        Auxin-Konzentration, schnellste Bewurzelung. Standard fuer Cannabis.
      - Nodal-Steckling: Stammabschnitt mit Knoten — fuer Monstera,
        Philodendron, Pothos. Kein Vegetationspunkt noetig, ein Nodium
        genuegt. Besonders einfach fuer Zimmerpflanzen-Einsteiger.
      - Blattsteckling: Ganzes Blatt oder Blattsegment (Begonie, Sansevieria,
        Peperomia, Sukkulenten). Blattstiel in feuchtes Substrat stecken,
        neue Pflanzen wachsen an der Schnittkante.
