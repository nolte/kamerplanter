  - id: pikieren-richtig
    title: Pikieren — Keimlinge vereinzeln ohne Wurzelschaden
    content: |
      Pikieren bedeutet: Keimlinge aus der Aussaatschale einzeln in
      eigene Toepfe oder groessere Abstaende umpflanzen, sobald sie
      beengt werden. Wer zu spaet pikiert riskiert verdraengte, verknotete
      Wurzeln und etiolierte (vergeile) Pflanzen.

      Wann pikieren?
      Der richtige Zeitpunkt ist das 1. echte Blattpaar — NICHT schon
      bei den Keimblaettern (Kotyledonen). Die Keimblaetter sind runde,
      einfache Blaetter die als Erste erscheinen. Das 1. echte Blattpaar
      sieht aus wie ein Miniatur-Abbild der Erwachsenenpflanze.
      Bei Tomaten: 2-3 Wochen nach Keimung. Bei Paprika: 3-4 Wochen.
      Bei Cannabis: 1-2 Wochen (waechst schnell).
      Richtlinie: Mindest-Staemmlingsgroesse 3-5 cm, Wurzeln sollten
      sichtbar, aber noch nicht verwirrt sein.

      Wie pikieren ohne Wurzelschaden:
      1. Substrat im Zielcontainer vorfeuchten (leicht feucht,
         nicht tropfend nass). Loch mit Pikierstab oder Bleistift
         vorbohren — mindestens so tief wie die Wurzeln lang sind.
      2. Keimling nie am Stengel anfassen! Der Stengel ist empfindlich,
         Druckschaden faehrt leicht in die Leitungsbahnen. Immer an
         den Keimblaettern (Kotyledonen) anfassen — die sind weniger
         kritisch.
      3. Pikierstab unter die Wurzeln schieben und den ganzen Erdklumpen
         heben, nicht den Stengel ziehen. Wurzeln moeglichst unverletzt
         lassen.
      4. In vorbereitetes Loch setzen. Keimblatt-Ansatz sollte auf
         Substratniveau oder leicht darunter sein (Tomate kann tiefer
         gepflanzt werden — bildet Adventivwurzeln am Stengel).
      5. Substrat sachte andruecken, dann angießen. Keinen Duenger
         in der ersten Woche nach dem Pikieren — Stress reduzieren.
      6. Fuer 2-3 Tage aus direktem Licht und Wind halten (Eingewoehnung).

      Schock vermeiden:
      - Immer mit temperierten Wasser angiessen (Kaltwasser-Schock
        bremst Wachstum deutlich).
      - Pikieren bei bewolktem Wetter oder abends (weniger Stress).
      - Grosse Keimlinge: Blaetter vor dem Pikieren leicht besprühen
        (Transpiration sinkt, Keim verliert weniger Wasser).
      Substrat fuer pikierte Keimlinge: Leichtes, naehrstoffarmes
      Anzuchtsubstrat oder eine Mischung aus Anzuchterde und 20% Perlit.
      Noch keine volle Blumenerde — zu viele Naehrstoffe fuer junge Wurzeln.
