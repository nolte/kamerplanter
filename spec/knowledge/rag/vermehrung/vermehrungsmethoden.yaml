  - id: aussaat-und-keimung-grundlagen
    title: Aussaat und Keimung — Saatgut, Tiefe und Keimbedingungen
    content: |
      Erfolgreich saeen beginnt mit guter Saatgut-Qualitaet und dem
      Verstaendnis einfacher Grundregeln.

      Saatgut-Qualitaet und Alter:
      Alte Samen keimen schlechter. Faustregel Keimfaehigkeitsdauer:
      Zwiebeln/Schnittlauch: 1-2 Jahre. Paprika, Petersilie: 2-3 Jahre.
      Tomate, Salat, Gurke: 3-5 Jahre. Bohne, Erbse, Kuerbis: 4-6 Jahre.
      Keimtest: 10 Samen auf feuchtem Papier 7-10 Tage bei Raumtemperatur
      liegen lassen. Keimen weniger als 5: Saatgut erneuern.
      Vorquellen (fuer grosse, harte Samen): Bohne, Erbse, Kuerbis, Cannabis
      12-24 Stunden in Wasser einlegen — beschleunigt Keimung um 1-3 Tage.
      Nicht laenger als 24 Stunden (Sauerstoffmangel).

      Saattiefe:
      Faustregel: 2x Samendurchmesser tief saeen.
      - Lichtkeimer (feine Samen) — Basilikum, Salat, Erdbeere, Kamille,
        Begonie: NUR auf Substrat druecken, NICHT bedecken. Licht loest
        Keimung aus.
      - Mittlere Samen — Tomate, Paprika, Aubergine: 5-10 mm tief.
      - Grosse Samen — Bohne, Kuerbis, Mais, Cannabis: 10-20 mm tief.

      Substrat:
      Anzuchterde oder Keimsubstrat verwenden — feinkruemelig, wenig
      Naehrstoffe (zu viele Naehrstoffe verbrennen zarte Keimwurzeln),
      gute Feuchtigkeitsspeicherung. KEINE normale Gartenerde
      (zu schwer, Krankheitskeime, verkrustet).
      Alternativ: Jiffy-Pellets oder Steinwolle-Wuerfel (pH 5.5 einweichen).
      Steinwolle ist ideal fuer spaetere Hydroponik-Systeme.

      Direkte Aussaat vs. Vorkultur:
      - Vorkultur (Anzucht innen): Fuer waermeliebende Arten (Tomate,
        Paprika, Aubergine, Kuerbis) 4-8 Wochen vor letztem Frost starten.
        Kontrollierte Bedingungen, hoehere Keimrate.
      - Direkte Aussaat (Outdoor): Fuer kalttolerante Arten die keinen
        Umstress vertragen: Karotte, Radieschen, Erbse, Spinat, Ruebe.
        Boden muss mindestens 8-10 Grad warm sein.

      Keimbedingungen:
      - Temperatur: Die meisten Gemuese- und Kraeuter-Samen keimen optimal
        bei 20-25 Grad. Paprika/Aubergine: 25-28 Grad (Heizmatte!).
        Salat/Spinat: 10-20 Grad (kein Hitzekeimer).
      - Feuchtigkeit: Substrat gleichmaessig feucht halten, nie nass.
        Klarsichtfolie oder Humidity-Dome verhindert Austrocknung.
        Taeglich kurz lueften (5 Minuten) gegen Schimmelbildung.
      - Licht: Erst NACH Keimung noetig. Sobald Keimlinge die Erde
        durchbrechen: sofort unter Pflanzenlampe oder ans hellste Fenster.
        Zu wenig Licht = Vergeilen (langer, duenner, blasser Stengel).
