  - id: veredelung-und-pfropfung
    title: Veredelung und Pfropfung — Warum, Wann und Wie
    content: |
      Veredelung (Pfropfung) verbindet zwei Pflanzen: das Edelreis
      (Sorte, Frucht oder Genetik die man haben will) mit der Unterlage
      (Wurzelsystem das Resistenz oder Staerke liefert).

      Warum veredeln?
      - Resistenz: Tomaten auf Beaufort-Unterlage sind resistent gegen
        Fusarium und Nematoden. Obstbaeume auf bestimmten Unterlagen
        tolerieren Naesse oder Kalk.
      - Wuchsstaerke und Ertrag: Unterlagen koennen das Wachstum
        foerdern oder begrenzen (Zwergunterlage fuer kleine Gaerten).
      - Sortenerhalt: Alte Obstbaumsorten lassen sich durch Veredelung
        erhalten wenn Saatgut nicht sortenecht waere (F1-Hybriden).

      Haeufige Veredelungsmethoden:
      - Kopulation (Geradschnitt): Edelreis und Unterlage haben gleichen
        Durchmesser. Beide schraeg anschneiden, zusammenstecken, verbinden.
        Einfachste Methode fuer Tomaten, Gurken.
      - Okulation (Schildchenpfropfung): Einzelnes Auge (Knospe) des
        Edelreises unter die Rinde der Unterlage schieben. Standard fuer
        Rosen und Obstbaeume. Erfordert Uebung.
      - Approach Grafting (Annaeherungspfropfung): Beide Pflanzen sind noch
        verwurzelt. Seitlich anschneiden und zusammenbinden bis verwachsen,
        dann Edelreis von Mutterpflanze trennen. Sicher fuer empfindliche Arten.

      Tomaten-Veredelung (Praxis-Tipp):
      Jungpflanzen von Sorte und Unterlage gleichzeitig aussaeen. Wenn
      Stengeldurchmesser 2-4 mm: Veredelungsclip anlegen, beide diagonal
      anschneiden, clip fixiert die Verbindung. 7-14 Tage unter
      Humidity-Dome bei 90% Luftfeuchtigkeit und 22-24 Grad. Nach
      Verwachsung langsam an Normalbedingungen gewoehnen.

      Obstbaum-Veredelung:
      Im Fruehjahr (Februar-April) wenn der Saft steigt, aber die Knospen
      noch nicht ganz offen sind. Edelreis aus dem Vorjahrestrieb schneiden
      (als Holz eingelagert kuehl und feucht). Kompatibel innerhalb
      derselben Gattung (Apfel auf Apfelunterlage, Birne auf Quitten-
      unterlage moeglich). Verschiedene Familien sind inkompatibel —
      Tomate auf Kartoffelunterlage zum Beispiel nur begrenzt moeglich.

      Cannabis-Pfropfung (experimentell):
      Technisch moeglich innerhalb der Gattung Cannabis (gleiche Art).
      In der Praxis selten wegen hohem Aufwand und unsicherer Anwuchsrate.
      Ziel: Resistente Unterlage + Elite-Genetik kombinieren. Noch nicht
      praxisbewahrt im groesseren Massstab — als Experiment zu betrachten.

      Graft-Kompatibilitaet:
      Innerhalb derselben Gattung: in der Regel kompatibel.
      Innerhalb derselben Familie: moeglicherweise kompatibel (pruefen).
      Verschiedene Familien: fast immer inkompatibel.
      Im Zweifelsfall: explizite Praxis-Erfahrungen und Literatur pruefen —
      taxonomische Naehe ist ein Hinweis, aber keine Garantie.
