  - id: samen-ernten-und-aufbewahren
    title: Samen ernten, trocknen und aufbewahren — Saatgutgewinnung
    content: |
      Eigenes Saatgut zu gewinnen spart Geld, erhaelt seltene Sorten
      und schliesst den Kreislauf der Gartenarbeit.

      Nur samenfeste Sorten verwenden:
      F1-Hybriden produzieren Nachkommen die nicht sortenecht sind —
      die Kinder zeigen zumeist andere Eigenschaften als die Elternpflanze.
      Fuer eigene Saatgutgewinnung nur samenfeste (OP-Sorten, open-
      pollinated) Sorten waehlen. Auf der Saatgut-Packung steht oft
      „samenfest" oder „OP-Sorte".

      Reife erkennen:
      - Tomate: Frucht vollreif (weich, volle Farbe). Samen aus ueberreifen
        Fruechten keimen oft schlechter.
      - Paprika/Chilies: Frucht voll ausgefaerbt und leicht runzelig.
      - Bohne/Erbse: Schote vollstaendig trocken und braun an der Pflanze.
      - Kuerbis/Zucchini: Frucht voll ausgereift lassen (laenger als fuer Ernte).
      - Salat/Kamille: Bluetenstand abschneiden wenn erste Samen braun
        werden — in Beutel kopfueber trocknen.
      - Tomate Fermentation: Fruchfleisch und Samen 2-4 Tage bei
        Raumtemperatur fermentieren lassen. Gute Samen sinken ab,
        schlechte schwimmen. Abschwemmen, spaeheln und trocknen.

      Trocknung und Lagerung:
      Samen duenn auf Loeschpapier oder Zeitungspapier ausbreiten.
      2-4 Wochen bei Raumtemperatur (20-25 Grad) an luftigem, schattigen
      Ort trocknen. Vollstaendig trockene Samen lassen sich nicht mehr
      biegen ohne zu brechen.
      Lagerung: Kuehl (5-10 Grad — Kuehlschrank-Gemuese-Fach), dunkel,
      trocken. In Papiertuetenchen oder Glasgefaessen mit Silikat-Trockenmittel.
      Plastikbeutel nur wenn voellig trocken (sonst Schimmelgefahr).
      Keimfaehigkeitsdauer je nach Art:
      - 1-2 Jahre: Schnittlauch, Zwiebeln, Pastinake
      - 2-3 Jahre: Paprika, Petersilie, Sellerie
      - 3-5 Jahre: Tomate, Salat, Gurke, Kohlrabi
      - 4-6 Jahre: Bohne, Erbse, Kuerbis, Melone

      Saatgut-Tausch:
      Samenfeste Sorten koennen mit anderen Gaertnerinnen getauscht werden.
      Saatgut-Tauschboersen gibt es regional und online. Eigenes Saatgut
      aus mehreren Jahren erzeugt Sorten die an den eigenen Garten
      adaptiert sind (lokale Selektion).
