      timing: first_true_leaf_pair
      handle_by: cotyledon_not_stem
      difficulty: beginner

  - id: teilung-und-ableger
    title: Teilung, Kindel und Ableger — Zimmerpflanzen und Stauden vermehren
    content: |
      Teilung und Ableger sind die einfachsten Vermehrungsmethoden mit
      der hoechsten Erfolgsrate — die neuen Pflanzen haben bereits ein
      eigenes Wurzelsystem.

      Rhizom-Teilung (Stauden, Gräser, Zimmerpflanzen):
      Funktioniert bei Pflanzen die bueschelartig oder horstartig wachsen:
      Calathea, Spathiphyllum, Strelitzia, Agapanthus, Gräser, Iris,
      Hostas, Maranta.
      Wann teilen: Im Fruehjahr (Maerz-Mai) kurz vor oder am Beginn
      der Wachstumsperiode — beste Erholungschancen. Oder im Frueherbst
      (August-September) nach der Hauptwachstumsphase.
      Wie teilen:
      1. Pflanze aus dem Topf nehmen oder ausgraben.
      2. Wurzelballen vorsichtig mit Haenden, Pikierstab oder sauberen
         Haenden auseinanderfuehren. Wenn noetig: scharfes, steriles
         Messer einsetzen — jeden Schnitt desinfizieren.
      3. Jeder Teil braucht mindestens 2-3 gesunde Triebe UND ein
         eigenes Wurzelsystem. Stuecke ohne Wurzeln ueberleben meist nicht.
      4. Schnittflaechen mit Zimtpulver oder Holzkohlepulver behandeln
         (verhindert Pilzbefall).
      5. Sofort in frisches Substrat setzen und angiessen.

      Kindel und Ableger (natuerliche Tochterpflanzen):
      Viele Zimmerpflanzen bilden selbststaendig Tochterpflanzen:
      - Aloe vera, Haworthia, Agave: Kindel (kleine Pflanzen am Fuss
        der Mutterpflanze). Warten bis Kindel mindestens 5-8 cm gross
        und mit eigenen Wurzeln versehen sind. Dann mit scharfem Messer
        abtrennen und separat einpflanzen.
      - Pilea peperomioides (Chinesisches Geldbaeuemchen): Kindel wachsen
        direkt aus der Erde rund um die Mutterpflanze. Einfach herausnehmen
        und einpflanzen — einfachste Zimmerpflanzen-Vermehrung.
      - Chlorophytum comosum (Grünlilie): Lange Auslaeufertriebe mit
        fertigen Jungpflanzen. Jungpflanze in kleinen Topf mit Substrat
        setzen, Auslaeufertrieb erst trennen wenn neue Pflanze eingewurzelt.
      - Bromeliaceae (Bromelien): Nach der Bluete stirbt die Mutterpflanze,
        bildet aber Kindel (Ableger) aus der Basis. Warten bis Kindel
        1/3 der Mutterpflanzengroesse erreicht, dann abtrennen.

      Auslaeufer (Freiland und Zimmerpflanzen):
      Erdbeeren bilden lange Auslaeufertriebe mit Jungpflanzen (Stolonen).
      Jungpflanze in kleinen Topf mit Erde drücken (ohne Auslaeufertrieb zu
      trennen). Nach 3-4 Wochen hat die Jungpflanze eigene Wurzeln —
      dann Auslaeufertrieb durchtrennen.

      Bulbillen (Brutzwiebeln):
      Knoblauch bildet Bulbillen im Bluetenstand. Lilien bilden kleine
      Brutzwiebeln an den Blattachseln. Im Herbst abnehmen und einpflanzen
      wie Saatgut — erste Ernte nach 1-2 Jahren.
