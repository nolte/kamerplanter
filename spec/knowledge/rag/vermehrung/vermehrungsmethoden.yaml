  - id: bewurzelung-troubleshooting
    title: Steckling bewurzelt nicht — Diagnose und Loesungen
    content: |
      Stecklinge die nach 2-3 Wochen noch keine Wurzeln zeigen oder
      faulen und schimmeln sind das haeufigste Problem bei der
      vegetativen Vermehrung.

      Steckling fault statt zu wurzeln:
      Ursache: Zu viel Naesse, Werkzeug nicht sterilisiert, Faeulnis-
      erreger aus dem Mutterpflanzen-Substrat. Faulen beginnt immer an
      der Schnittflaeche.
      Loesung: Faulen Teil sauber abschneiden (frischer, gruener Stengel
      muss sichtbar sein), Werkzeug sterilisieren, in frisches steriles
      Medium umsetzen. Bewurzelungsmedium sollte FEUCHT aber nicht NASS sein.
      Perlite bietet den besten Kompromiss aus Feuchte und Sauerstoff.

      Schimmel am Steckling oder im Medium:
      Ursache: Zu wenig Belueftung unter dem Dome, stehendes Wasser,
      organische Rueckstaende (entfernte Blaetter nicht vollstaendig
      abgeschnitten).
      Loesung: Dome 2x taeglich fuer 10-15 Minuten lueften. Schimmelflecken
      mit 3%igem Wasserstoffperoxid abtupfen. Befallene Stecklinge entfernen
      bevor Sporen andere befallen. Zimtpulver duenn auf Substrat-
      oberflaeche verhindert Schimmelwachstum (natuerlich antifungal).

      Luftfeuchtigkeit zu niedrig — Steckling welkt trotz feuchtem Substrat:
      Ohne Wurzeln kann ein Steckling kein Wasser aus dem Substrat
      aufnehmen. Er ist auf die Wasseraufnahme ueber die Blaetter
      angewiesen. Luftfeuchtigkeit muss 80-90% betragen.
      Loesung: Humidity-Dome oder Plastiktuete ueber den Steckling
      stuelpen. Grosse Blaetter zur Haelfte kuerzen (weniger Transpiration).

      Zu lange Bewurzelungsdauer (keine Wurzeln nach 3 Wochen):
      - Temperatur zu niedrig: Substrattemperatur unter 20 Grad hemmt
        Wurzelwachstum stark. Heizmatte unter den Stecklingen verwenden.
        Ideal 22-24 Grad Substrat, 2-5 Grad ueber der Lufttemperatur.
      - Kein Bewurzelungshormon: Clonex-Gel oder Weidenwasser beschleunigen
        Bewurzelung erheblich. Ohne Hormon bewurzeln empfindliche Arten
        oft gar nicht.
      - Falscher pH im Medium: Steinwolle muss auf pH 5.5 eingeweicht sein
        (ab Werk pH 7-8). Wasser-Bewurzelung: pH 6.0-6.5 verwenden.
      - Zu viel Licht: Photoinhibition bei wurzellosen Stecklingen.
        Licht auf 50-100 PPFD reduzieren, keinen Direktstrahler.

      Uebergang von Wasser- zu Erdbewurzelung:
      Wasserwurzeln haben keine Wurzelhaare und keine Anpassung an
      Trockenheit. Direktes Umsetzen in Erde stresst die Pflanze stark.
      Schrittweise Akklimatisierung: Erst in feuchtes Perlit-Substrat
      (95% Feuchtigkeit halten), nach 1 Woche auf 80% reduzieren, dann
      normales Giessen. Alternativ: Fuer Zimmerpflanzen die immer in
      Wasser bleiben koennen (Pothos, Philodendron in Vasen-Kultur).

      Haeufige Gesamtfehler:
      - Steckling aus blüehender Pflanze genommen (Hormone falsch)
      - Werkzeug nicht sterilisiert (Pilzeintrag)
      - Zu tief gepflanzt (Stengel fault)
      - Dome nicht belueftet (Schimmel)
      - Wasserstress durch zu wenig Luftfeuchtigkeit
