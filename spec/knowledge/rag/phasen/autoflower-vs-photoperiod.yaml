  - id: autoflower-vs-photo-grundlagen
    title: Autoflower vs. Photoperiod — Was ist der Unterschied?
    content: |
      Die wichtigste Entscheidung vor jedem Cannabis-Grow: Autoflower oder
      Photoperiod? Der Unterschied liegt in der Bluetausloesung.

      Photoperiodische Sorten (short_day / Kurztagspflanze):
      - Bluehen NUR wenn die Dunkelphase lang genug ist (12h+)
      - Indoor: Du steuerst die Bluete durch Umschalten des Lichtplans auf 12/12
      - Outdoor: Bluete beginnt natuerlich ab August wenn die Tage kuerzer werden
      - Genetik: Cannabis sativa, Cannabis indica und deren Hybride
      - Veg-Phase: Beliebig lang steuerbar (du entscheidest wann geblueht wird)
      - Bluete: 8-12 Wochen je nach Sorte
      - Gesamtdauer Indoor: 4-8 Wochen Veg + 8-12 Wochen Bluete = 3-5 Monate

      Autoflowering Sorten (day_neutral / Selbstblueher):
      - Bluehen automatisch nach Alter — unabhaengig vom Lichtzyklus
      - Genetik: Cannabis ruderalis Kreuzung (Taigapflanze, kurze Vegetationszeit)
      - Kein Umschalten noetig: 18/6 oder 20/4 Licht durchgehend von Keimung bis Ernte
      - Vegetative Phase: Nur 2-4 Wochen (nicht verlaengerbar!)
      - Bluete: 5-8 Wochen
      - Gesamtdauer: 8-12 Wochen von Keim bis Ernte

      Ertragsvergleich:
      - Photoperiod: Hoehere Ertraege pro Pflanze (laengere Veg = groessere Pflanze)
      - Autoflower: Schneller und mehrere Ernten pro Jahr moeglich (2-3 Zyklen Indoor)
      - Pro m² Growraum kann Autoflower durch Rotation mithalten

      Technischer Hintergrund (Systemebene): Der photoperiod_type-Wert im
      Sortenstammdatum bestimmt das Phasensteuerungsverhalten — short_day fuer
      photoperiodische Sorten, day_neutral fuer Autoflower.
