  - id: photoperiod-anbau-praxis
    title: Photoperiodische Cannabis-Sorten anbauen — volle Kontrolle uebernehmen
    content: |
      Photoperiodische Sorten bieten maximale Kontrolle ueber den Wachstumszyklus.
      Die Pflanze blueht erst wenn du es moechtest.

      Vegetative Phase (18/6 Licht):
      - Standard-Lichtplan: 18h Licht, 6h Dunkel
      - Dauer: Frei waehlbar — 4 Wochen (kleine kompakte Pflanze) bis 12+ Wochen
        (grosser Baum mit maximaler Ernte)
      - In der Veg-Phase kannst du alle Training-Techniken anwenden:
        LST, Topping, FIM, Supercropping, SCROG — ohne Einschraenkung

      Bluetausloesung — Umschalten auf 12/12:
      - Exakt 12h Licht, 12h ununterbrochene Dunkelheit
      - KRITISCH: Kein Lichtleck in der Dunkelphase! Selbst 5 Minuten Licht
        (Handy-Display, Tuerspalt) kann die Bluete stoeren oder Zwitter ausloesen
        (Hermaphroditen). Grow-Zelt auf absolute Lichtdichtigkeit pruefen.
      - Outdoor: Bluete beginnt natuerlich ab August wenn Taglaenge unter 12h faellt

      Mutterpflanze und Klone:
      - Mutterpflanze dauerhaft in 18/6 halten → unbegrenzt Stecklinge
      - Stecklinge sind genetisch identisch mit der Mutterpflanze
      - Mehrere Veg-Raeume + ein Bluetraum = kontinuierliche Produktion

      Ertrag und Zeitplanung:
      - Laengere Veg-Phase = groessere Pflanze = hoehere Ernte
      - Typisch: 4-8 Wochen Veg + 8-12 Wochen Bluete = 3-5 Monate pro Zyklus
      - Sativa-Typen: Bis 14 Wochen Bluete moeglich
      - Indica-Typen: 8-9 Wochen, kompakter und fruehreifer

      Outdoor-Timing:
      - Pflanzen im Mai nach draussen (nach Eisheiligen, kein Frost!)
      - Abhuerten: 1-2 Wochen langsam akklimatisieren
      - Bluete beginnt natuerlich im August, Ernte Oktober
    metadata:
