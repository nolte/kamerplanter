  - id: autoflower-anbau-praxis
    title: Autoflower anbauen — die wichtigsten Regeln
    content: |
      Autoflower-Anbau ist ideal fuer Einsteiger, hat aber klare Eigenheiten die
      man kennen muss. Verstoss gegen diese Regeln kostet Ertrag.

      Lichtzyklus: 18/6 oder 20/4 — durchgehend von Tag 1 bis Ernte.
      Kein Umschalten auf 12/12 noetig oder sinnvoll (reduziert nur den Ertrag).
      Mehr Licht = mehr Photosynthese = mehr Ertrag. 24/0 (kein Dunkelzyklus) ist
      moeglich, aber umstritten — viele Grower berichten bessere Ergebnisse mit
      mindestens 4-6h Dunkelphase.

      Topfgroesse: Endtopf von Beginn an waehlen — 7-15L je nach Sorte.
      KEIN Umtopfen! Autoflower reagieren sehr empfindlich auf Wurzelstress, und
      die kurze Veg-Phase laesst keine Zeit zur Erholung. Direktsaat in den Endtopf
      oder Umsetzen aus winzigem Keimtopf (max. 0,5L) in der ersten Woche.

      Training: Ausschliesslich LST (Low Stress Training) verwenden.
      Topping, FIM, Supercropping oder andere HST-Methoden sind bei Autoflowern
      nicht empfohlen — die vegetative Phase ist zu kurz fuer die noetige
      Erholungszeit. Jeder Stressverlust bei einem 10-Wochen-Grow ist prozentual
      viel groesser als bei einem 5-Monats-Photo-Grow.

      Duengung: Zurueckhaltend starten. Autoflower haben genetisch bedingt
      kleinere Wurzelsysteme und reagieren empfindlicher auf Ueberernaehrung.
      Einstieg mit 50-75% der empfohlenen Photoperiod-Dosis, EC niedriger halten
      (0,6-1,0 in Saemlings-/Veg-Phase). Erst bei klarem Bedarf steigern.

      Timeline (typisch):
      - Keimung: 3-5 Tage
      - Saemling: 1-2 Wochen
      - Vegetativ: 2-4 Wochen
      - Stretch und Vorblute: Woche 4-5
      - Bluete: 5-8 Wochen
      - Ernte: Woche 8-12 ab Keimung

      Keine Klone moeglich: Da Autoflower nach Alter bluehen, sind Mutterpflanzen
      und Stecklinge sinnlos — ein Klon blueht zum selben Zeitpunkt wie die
      Mutterpflanze. Fuer Klone immer Photoperiod-Sorten verwenden.
    metadata:
