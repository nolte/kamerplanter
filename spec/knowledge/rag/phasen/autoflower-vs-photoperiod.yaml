  - id: lichtplaene-dli
    title: Lichtplaene und DLI fuer Autoflower und Photoperiod
    content: |
      Der richtige Lichtzyklus ist entscheidend — und DLI (Daily Light Integral)
      ist die praezisere Zielgroesse als reine Stunden-Angabe.

      DLI = PPFD (µmol/m²/s) × Beleuchtungsstunden × 0,0036
      Einheit: mol/m²/d

      Empfohlene DLI-Zielwerte:
      - Saemling: 15-20 mol/m²/d
      - Vegetativ: 30-40 mol/m²/d
      - Bluete: 40-50 mol/m²/d

      Autoflower Lichtplaene im Vergleich:
      - 18/6 (Standard): Solider Kompromiss, Stromkosten moderat
      - 20/4 (Ertrags-optimiert): ~10% mehr DLI als 18/6, klarer Ertragsvorteil
      - 24/0 (kein Dunkelzyklus): Hoehere Stromkosten, umstritten — manche
        Sorten reagieren besser mit Ruhephase. Geteilte Meinungen in der Praxis.
      Faustregel: Autoflower 18/6 empfohlen als Standard.

      Photoperiod Lichtplaene:
      - Veg 18/6: Sicherer Standard, beweist sich seit Jahrzehnten
      - Veg 20/4: Schnelleres Wachstum moeglich, hoeherer Stromverbrauch
      - Bluete 12/12: Pflicht fuer zuverlaessige Bluetausloesung
      - Manche Grower nutzen 11/13 oder 10/14 fuer schwaechere Stretch-Reaktion

      Praxisbeispiel DLI-Berechnung:
      - PPFD 600 µmol/m²/s × 18h × 0,0036 = 38,9 mol/m²/d (Veg, gut)
      - PPFD 900 µmol/m²/s × 12h × 0,0036 = 38,9 mol/m²/d (Bluete, gleicher DLI!)
      - Fazit: Autoflower holen durch laengere Beleuchtung denselben DLI bei
        niedrigerer PPFD — vorteilhaft fuer LED-Effizienz.
    metadata:
      topic: licht_dli_cannabis
      dli_vegetative: [30, 40]
      dli_flowering: [40, 50]
      difficulty: intermediate

  - id: autoflower-oder-photo-entscheidung
    title: Autoflower oder Photoperiod — Entscheidungshilfe
    content: |
      Autoflower empfohlen wenn:
      - Du Einsteiger bist und den ersten Grow ohne viel Technik durchziehen willst
      - Dein Growraum klein ist (Autoflower bleiben kompakter)
      - Du schnelle Ernte willst: 8-12 Wochen statt 4-5 Monate
      - Du mehrere Ernten pro Jahr planst: 2-3 Zyklen Indoor, 2 Outdoor-Ernten
        pro Saison moeglich
      - Outdoor in Regionen mit kurzem Sommer: Norddeutschland, Skandinavien,
        Gebirgslagen — Autoflower reift vor dem Herbstregen ab
      - Du keine Klone ziehen willst und keine Mutterpflanze betreiben moechtest

      Photoperiod empfohlen wenn:
      - Du maximalen Ertrag pro Pflanze willst
      - Du Klone ziehen und genetisch identische Pflanzen reproduzieren willst
      - Du alle Training-Techniken ausreizen willst (Topping, SCROG, Supercropping)
      - Du volle Kontrolle ueber den Zeitplan brauchst (z.B. Ernte zu einem
        bestimmten Datum planen)
      - Du Sativas mit langen Bluetzeiten anbaust
      - Outdoor in suedlichen Regionen mit langem warmem Sommer: Spanien,
        Sueditalien, Mittelmeerklima — hoher Ertrag durch lange Veg-Zeit

      Kombination moeglich: Viele Grower bauen beides parallel an.
      Autoflower fuer schnelle Rotationen und ueberbrueckende Ernten,
      Photoperiod fuer Haupt-Saison mit maximaler Ausbeute.
    metadata:
      topic: autoflower_vs_photo_entscheidung
      beginner_recommendation: autoflower
      difficulty: beginner

  - id: autoflower-fehler-vermeiden
    title: Haeufige Autoflower-Fehler — und wie man sie vermeidet
    content: |
      Autoflower verzeihen weniger Fehler als Photoperiod, weil jede
      verlorene Woche prozentual mehr vom Gesamtlebenszyklus ausmacht.

      Fehler 1 — Umtopfen: Der groesste Einzelfehler. Wurzelstress kostet bei
      Autoflower 1-2 Wochen Erholungszeit, die bei einem 10-Wochen-Grow
      direkt vom Ertrag abgehen. Loesung: Immer in den Endtopf saen oder
      sehr frueh (Woche 1) umsetzen.

      Fehler 2 — HST/Topping: Topping, FIM oder Supercropping sind fuer
      Autoflower nicht empfohlen. Die Erholungszeit von 3-7 Tagen frisst
      wertvolle Wachstumszeit. Nur LST (Low Stress Training) verwenden —
      kein Erholungsfenster noetig.

      Fehler 3 — Ueberernaehrung: Autoflower sind empfindlicher gegenueber
      zu viel Duenger. Starte mit 50-75% der empfohlenen Dosis und beobachte
      die Pflanze sorgfaeltig. Naehrstoffverbrennung bei Autoflower ist
      schwerer zu korrigieren (weniger Erholungszeit).

      Fehler 4 — Topfgroesse falsch: Zu kleiner Topf (unter 5L) begrenzt das
      Wurzelsystem und damit den Ertrag direkt. Zu grosser Topf (ueber 20L)
      fuehrt zu langsamem Austrocknen und Wurzelfaeule-Risiko. Ziel: 7-15L.

      Fehler 5 — Bluetebeginn verpassen: Autoflower wechseln selbstaendig in
      die Bluete — ohne Signal von dir. Beobachte die Pflanze regelmaessig
      ab Woche 3-4. Sobald erste Vorbluten sichtbar sind: Duenger auf
      Bluete-Verhaeltnis umstellen (mehr P und K, weniger N).

      Fehler 6 — Lichtplan zu kurz: Unter 18h Licht verschenkt Ertrag.
      Autoflower leben und sterben mit der Lichtmenge. 18/6 als Minimum,
      20/4 fuer bessere Ergebnisse.

      Fehler 7 — Klone ziehen wollen: Klappt technisch, ergibt aber keinen
      Sinn. Ein Autoflower-Klon bluegt zum gleichen Zeitpunkt wie die
      Mutterpflanze und liefert kaum Ertrag. Fuer Klone Photoperiod-Sorten
      nutzen.
    metadata:
      topic: autoflower_fehler
      common_mistakes: [repotting, topping, overfeeding, wrong_pot_size, missing_bloom_start, short_light_schedule, cloning]
      difficulty: beginner
