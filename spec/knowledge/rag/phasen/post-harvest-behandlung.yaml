  - id: einmachen-konservieren
    title: Einmachen, Einfrieren und Einlegen — Grundregeln der Konservierung
    content: |
      Einkochen (Einwecken):
      Gemuese und Fruechte in sterile Glaeser fuellen, im Wasserbad oder Einkochautomat
      erhitzen. Durch Erhitzen werden Keime abgetoetet und ein Vakuum gebildet.
      Temperatur und Saeure sind entscheidend:
      - Saure Lebensmittel (Tomaten, Gurken, Obst): Ausreichend pH < 4.5 hemmt
        Botulismus-Erreger. Bei genuegend Saeure reicht 90 Grad fuer 20-30 Minuten.
      - Wenig saures Gemuese (Bohnen, Mais, Kohl ohne Essig): Erfordert Druckkocher
        (mindestens 116 Grad) fuer Botulismus-Sicherheit. Keine Ausnahme!
      - Im Zweifelsfall Essig zugeben (pH sicherstellen) oder Gefrierer nutzen.
      Haltbarkeit: Selbst eingekochtes haelt 1-2 Jahre dunkel gelagert.

      Einfrieren (schnellste Methode):
      Fast alles kann eingefroren werden — aber Blanchieren vor dem Einfrieren ist
      Pflicht bei Gemuese! Kurz in kochendes Wasser (1-3 Minuten je nach Sorte),
      dann sofort in Eiswasser abschrecken. Blanchieren inaktiviert Enzyme die
      sonst Farbe, Konsistenz und Naehrstoffe im Tiefkuehlschrank abbauen.
      Ausnahmen (kein Blanchieren noetig): Kraeuterpesto, Fruechte fuer Smoothies,
      Paprika (roh einfrierbar, verliert aber Biss).
      Haltbarkeit: 6-12 Monate bei minus 18 Grad.

      Einlegen in Essig:
      Essig (mind. 5% Saeuregehalt) konserviert zuverlaessig durch niedrigen pH.
      Gurken, Rote Bete, Kuerbis, Zwiebeln. Heiss einlegen (sterilisiert Glas),
      mindestens 2 Wochen ziehen lassen vor dem ersten Oeffnen.

      Einlegen in Oel:
      Nur fuer getrocknete Zutaten (Tomaten, Kraeuter, Paprika) geeignet!
      Frische Zutaten in Oel sind ein Botulismus-Risiko (anaerobe Umgebung).
      Immer im Kuehlschrank lagern und innerhalb von 2-4 Wochen verbrauchen.

      Lebensmittelsicherheit:
      - Glaeser und Deckel sterilisieren (auskochen oder heissem Wasser)
      - Beschaedigtes Erntegut nicht einkochen
      - Bei Schimmel oder seltsamen Geruch: Glas entsorgen, nie kosten
