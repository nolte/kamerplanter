  - id: ernte-richtig-lagern
    title: Ernte richtig lagern — Wurzelgemuese, Kartoffeln, Zwiebeln, Aepfel
    content: |
      Nach der Ernte entscheidet die Lagerung ob das Gemuese wochenlang haltbar
      bleibt oder innerhalb weniger Tage verdirbt. Jedes Gemuese hat andere
      Ansprueche.

      Wurzelgemuese (Karotten, Rote Bete, Sellerie, Pastinaken):
      Beste Methode: Sandkiste oder Erdmiete. Schicht Gemuese, Schicht
      feuchter (nicht nasser) Sand, wieder Gemuese. In kuehlfeuchtem Keller
      bei 2-4 Grad Celsius haelt Wurzelgemuese so 4-6 Monate. Laub vorher
      abdrehen (nicht schneiden — Schnittstelle fault). Vorab beschaedigte oder
      angefaulte Stuecke aussondern — ein krankes Stueck kann die ganze Kiste ruinieren.

      Kartoffeln:
      - Dunkel lagern (Licht loest Solaninbildung aus — gruene Stellen giftig!)
      - 4-8 Grad Celsius, trocken und luftig (Holzkiste mit Lueftungsschlitzen)
      - NICHT im Kuehlschrank (unter 4 Grad wandelt sich Staerke in Zucker —
        Kartoffeln werden suesslich und brunen beim Braten stark)
      - Keine Aepfel in der Naehe (Ethylen beschleunigt Keimung)
      - Gefaehrdete Stellen: Kellerhals mit Lichteinfall, feuchte Ecken

      Zwiebeln und Knoblauch:
      Trocken lagern ist entscheidend — Feuchtigkeit loest sofort Schimmel aus.
      Zopf binden oder in Netzen aufhaengen. Luftig, kuehl (5-15 Grad), dunkel.
      Haelt trocken gelagert 6-12 Monate. Beschaedigte oder gekeimte Zwiebeln
      zuerst verbrauchen.

      Aepfel und Birnen:
      Kuehl (2-5 Grad), luftig und getrennt von anderen Fruechten und Gemuese
      lagern. Aepfel und Birnen sind starke Ethylen-Produzenten und beschleunigen
      die Reife von Lagergemuese, Kartoffeln und Salat. Lagerfaehige Sorten
      (Boskop, Jonagold, Elstar) haelten mehrere Monate — Tafelaepfel (Gala,
      Braeburn) nur wenige Wochen.

      Kuerbis und Speisekuerbis:
      Trocken, warm (12-15 Grad), gut belueftet. Kuehl-feuchte Keller sind
      nicht geeignet! Stiel belassen (Schutzbarriere gegen Pilze). Haelt
      3-6 Monate je nach Sorte.

      Grundregel: Niemals beschaedigtes Erntegut einlagern — es verdirbt
      schnell und infiziert Nachbarstuecke.
