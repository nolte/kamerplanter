  - id: gemuese-kraeuter-trocknen
    title: Gemuese und Kraeuter trocknen — Lufttrocknung, Doerrautomat, Backrohr
    content: |
      Trocknen ist die einfachste und guenstigste Konservierungsmethode — kein
      Strom, keine Gefriertruhe, jahrelange Haltbarkeit. Gilt fuer Gemuese und
      Kuechenkreaeuter — fuer Cannabis-Ernte gelten eigene Regeln (langsam,
      kuehle Temperatur, kein direktes Erwaermen).

      Welche Kraeuter trocknen gut:
      Rosmarin, Thymian, Oregano, Majoran, Beifuss, Pfefferminze, Kamille und
      Lorbeer trocknen ausgezeichnet — der Geschmack bleibt erhalten oder
      konzentriert sich sogar. Einfach buendeln, kopfueber an einem luftigen,
      schattigen Platz aufhaengen. Niemals in der Sonne trocknen (UV zerstoert
      aetherische Oele).

      Welche Kraeuter besser einfrieren:
      Basilikum, Petersilie, Schnittlauch und Koriander verlieren beim Trocknen
      viel Aroma — besser frisch hacken und in Eiswuerfelformen mit etwas Wasser
      oder Oel einfrieren.

      Doerrautomat (empfohlen):
      - Kraeuter: 35-45 Grad Celsius, 2-6 Stunden (je nach Wassergehalt)
      - Gemuese (Tomaten, Paprika, Zucchini): 50-60 Grad, 6-12 Stunden
      - Pilze: 40-50 Grad, 4-8 Stunden
      - Obst (Aepfel, Birnen, Pflaumen): 60-70 Grad, 8-16 Stunden
      - Wichtig: Lueftungsschlitze nicht blockieren, Scheiben gleichmaessig dick

      Backrohr als Notloesung (nur fuer Gemuese und Kraeuter):
      Backrohr auf niedrigste Stufe (50-80 Grad), Tuere einen Spalt offen
      lassen damit Feuchtigkeit entweichen kann. Nicht ideal fuer Gemuese —
      ungleichmaessige Temperatur, hoher Energieverbrauch.

      Lufttrocknung ohne Geraet:
      Kraeuter in kleinen Buendeln (nicht zu dicht!) an Schnur aufhaengen.
      Luftig, schattig, trocken — kein direktes Sonnenlicht. Fertig wenn Blaetter
      rascheln und zwischen den Fingern zerbroeseln (2-4 Wochen je nach Art
      und Luftfeuchtigkeit).

      Lagerung getrockneter Kraeuter:
      Luftdichte Glaeser (kein Plastik — nimmt Geruch an), dunkel und kuehle
      Stelle. Ganze Blaetter lagern, erst beim Kochen moersern oder zerreiben
      (Aroma bleibt laenger).
