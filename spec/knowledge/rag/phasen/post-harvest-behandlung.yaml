  - id: cannabis-wet-trim-dry-trim
    title: Cannabis trimmen — Wet-Trim vs. Dry-Trim, Vor- und Nachteile
    content: |
      Nach der Ernte muss Cannabis getrimmt werden — Zuckerblätter rund um
      die Blueten werden entfernt. Zwei Methoden mit unterschiedlichen Vor- und
      Nachteilen:

      Wet-Trim (Frisch-Trimmen, direkt nach der Ernte):
      - Blueten werden VOR der Trocknung getrimmt
      - Vorteile: Einfacher zu schneiden (weiches Material), schnellere
        Trocknung (weniger Blattmasse, Feuchtigkeit entweicht schneller),
        geringeres Schimmelrisiko bei hoher Luftfeuchtigkeit
      - Nachteile: Klebrig und zeitaufwaendig direkt nach der Ernte,
        Trocknung geht schneller (kann zu schnell werden wenn RH niedrig)
      - Empfehlung: Fuer feuchtes Klima (>65% RH im Trocknungsraum) und
        grosse Ernten (Cannabis Social Club, professionelle Erzeuger)

      Dry-Trim (Trocken-Trimmen, nach der Trocknung):
      - Blueten haengen komplett mit Blaettern und werden NACH der Trocknung
        getrimmt
      - Vorteile: Blaetter schuetzen Blueten waehrend der Trocknung
        (langsamere, gleichmaessigere Trocknung), angenehmeres Arbeitsbedarf,
        besseres Aroma (Terpene koennen sich laenger entwickeln)
      - Nachteile: Schwieriger zu trimmen (trockene Blaetter brechen),
        hoehere Schimmelgefahr wenn Luftzirkulation schlecht
      - Empfehlung: Fuer trockenes Klima, kleinere Mengen, hoechste Qualitaet

      Was mit den Trimmresten?
      Zuckerblätter (Sugar Leaves — harzbesetzte kleine Blaetter) enthalten
      Trichome und eignen sich fuer Bubble Hash, Rosin, Tinktur oder Kief.
      Grosse Blattblaetter (Fan Leaves) haben wenig Harz — Kompost.

      Werkzeug:
      Scharfe Trimmscheren (kurze Klingen fuer Praezision), grosse Scheren
      fuer Zweige. Isopropanol (70%+) zum Reinigen — Harz klebt sofort.
      Trimmschalen mit Siebeinlage fangen Kief auf.
