  - id: fermentation-milchsaeure
    title: Fermentation — Sauerkraut, Saure Gurken und Kimchi selbst herstellen
    content: |
      Milchsaeuregaerung ist eine der aeltesten Konservierungsmethoden — keine
      Hitze, kein Essig, nur Salz und Zeit. Ideal wenn im Herbst Kohl und
      Gurken im Ueberfluss vorhanden sind.

      Grundprinzip Milchsaeuregaerung:
      Milchsaeurebakterien (auf jedem Gemuese natuerlich vorhanden) wandeln
      Zucker in Milchsaeure um. Die entstehende Saeure hemmt Faeulnisbakterien
      und konserviert das Gemuese. Entscheidend: das Gemuese muss komplett unter
      die Fluessigkeit tauchen — Sauerstoffkontakt stoert die Gaerung.

      Salzkonzentration — die wichtigste Variable:
      - 2-3% Salz (bezogen auf Gemuesegewicht) ist der Standardbereich
      - Zu wenig Salz (<1.5%): Faeulnisrisiko, unerwuenschte Bakterien
      - Zu viel Salz (>3.5%): Gaerung verlangsamt oder stoppt, sehr salzig
      - Beispiel: 1 kg Kohl → 20-25 g nicht jodiertes Salz (Jod hemmt Bakterien!)

      Sauerkraut — Schritt fuer Schritt:
      1. Kohl fein hobeln, Salz einmassieren bis Saft austritt (5-10 Minuten)
      2. Fest in ein sauberes Glasgefaess oder Steinguttopf stampfen
      3. Kohl muss vollstaendig im eigenen Saft versinken
      4. Beschwerungstein oder Zip-Lock-Beutel mit Salzwasser als Gewicht
      5. Zimmertemperatur (18-22°C), nach 1-2 Tagen beginnt die Gaerung
      6. Fertig nach 2-4 Wochen (je laenger, desto saurer und komplexer)
      7. Dann kuehle Lagerung (Keller, Kuehlschrank) — haelt Monate

      Saure Gurken / Kimchi:
      Gurken (ganz oder geschnitten) in 2% Salzlake einlegen, Glas mit Tuch
      abdecken. Kimchi: Chinakohl mit Salzlake weichmachen, dann mit Knoblauch,
      Ingwer und Chili vermengen — gleiches Gaerungsprinzip.

      Gaerbehаelter:
      Einmachglaeser mit losem Deckel (damit CO2 entweichen kann), Gaertoepfe
      mit Wasserrinne (ideal), oder einfache Weckglaeser. Niemals luftdicht
      verschliessen in den ersten Wochen — Druckaufbau durch CO2.

      Hygiene:
      Glaeser mit heissem Wasser reinigen (kein Seifenrueckstand!). Haende und
      Werkzeug sauber. Gemuese unbedingt unter der Fluessigkeit halten — alles
      was Luftkontakt hat schimmelt.
