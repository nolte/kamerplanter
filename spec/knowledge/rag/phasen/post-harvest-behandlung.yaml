      topic: cannabis_trimming
      methods: [wet_trim, dry_trim]
      difficulty: intermediate
      target_audience: [cannabis_grower, cannabis_social_club]

  - id: cannabis-langzeitlagerung
    title: Cannabis langfristig lagern — nach dem Curing richtig aufbewahren
    content: |
      Nach abgeschlossenem Curing (mindestens 4 Wochen) kann Cannabis
      langfristig gelagert werden ohne signifikanten Qualitaetsverlust.

      Optimale Lagerbedingungen:
      - Temperatur: 15-20 Grad Celsius (keinesfalls unter 10 oder ueber 25 Grad)
      - Luftfeuchtigkeit: 58-62% RH — Boveda- oder Integra-Pack 62% einlegen
        und aufgebrauchte Packs regelmassig tauschen
      - Dunkel: UV-Licht ist der groesste Feind — baut THC ab. Lichtundurchlaessige
        Glaeser oder dunkle Aufbewahrung verwenden
      - Keine Erschuetterungen: Trichome sind bruechig — haendeln mit Sorgfalt

      Vakuumversiegelung fuer Langzeitlagerung:
      Vakuumgeraete entfernen Sauerstoff und verlangsamen den Abbau erheblich.
      FoodSaver-Geraete oder Vakuumbeutel mit Handpumpe. Bei Vakuum kein
      Boveda-Pack noetig (aber Glas bevorzugen vor Plastik).

      Haltbarkeit:
      - Korrekte Lagerung (Glas, dunkel, 15-20 Grad, 62% RH): 6-12 Monate
        ohne signifikanten Potenz-Verlust
      - Vakuum zusaetzlich: bis 2 Jahre
      - Kuehlschrank: Nicht empfohlen (Temperaturschwankungen beim Oeffnen
        bilden Kondenswasser, stoert Trichome)
      - Tiefkuehlschrank (Vakuum): bis 5+ Jahre fuer Archivzwecke — nur wenn
        absolut dicht versiegelt und tatsaechlich nie geoeffnet bis Nutzung

      Zeichen fuer Qualitaetsverlust:
      Blasse, kruemelende Trichome, Heu-Geruch statt Aroma, bruechige
      Konsistenz. Schimmel zeigt sich als weisser Flaum oder Ammoniak-Geruch
      — dann sofort entsorgen, nie konsumieren.
