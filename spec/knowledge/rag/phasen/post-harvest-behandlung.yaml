  - id: saatgut-ernte-lagerung
    title: Saatgut ernten und lagern — nach der Haupternte Samen fuer naechstes Jahr
    content: |
      Saatgut-Ernte lohnt sich besonders bei Sorten die man liebt und die nicht
      im Handel erhaeltlich sind. Grundregel: Nur von gesunden, kräftigen Pflanzen
      Saatgut gewinnen. Kranke Pflanzen geben schlechtes Saatgut.

      Welche Pflanzen fuer Saatgut stehen lassen:
      Einjahrige (Tomate, Paprika, Basilikum, Buschbohne, Erbse, Kuerbis):
      Einfach — Pflanzen vollstaendig ausreifen lassen. Einige Exemplare der
      besten Pflanzen markieren und NICHT ernten — fuer Saatgut stehen lassen.

      Zweijahrige (Karotte, Rote Bete, Mangold, Petersilie, Pastinak):
      Bluehen erst im zweiten Jahr. Im ersten Jahr ueberwintern lassen
      (oder ausgraben und einlagern), im Fruehjahr wieder einpflanzen.
      Saatgut nach der Bluetenbildung im Sommer des zweiten Jahres ernten.

      Tomaten-Saatgut (Fermentationsmethode):
      Tomatensamen sind von Fruchtfleisch und einer Hemmstoff-Gallerte umgeben.
      Fermentation entfernt diese Schicht und verbessert die Keimrate:
      1. Samen mit Fruchtfleisch in ein Glas geben, etwas Wasser zugeben
      2. 2-3 Tage bei Raumtemperatur stehen lassen (bis Schimmelschicht entsteht)
      3. Wasser aufgiessen, schlechte Samen (schwimmen oben) und Schimmel
         abgiessen, gute Samen sinken auf den Boden
      4. Gute Samen abseihen, auf Kuechenpapier trocknen (nicht in der Sonne!)

      Trocknung und Reifungszeit:
      Samen muessen vollstaendig trocken sein bevor sie gelagert werden —
      Restfeuchtigkeit fuehrt zu Schimmel in der Lagertuete. Mindestens
      1-2 Wochen auf Papier oder Sieb bei Raumtemperatur trocknen.
      Brassica-Samen (Kohl, Radieschen, Rueben): Schoten vollstaendig braun
      und trocken werden lassen, dann drueschandeln oder reiben.
      Kuerbis/Zucchini: Frucht vollstaendig ueberreifen lassen (weit nach
      Erntezeitpunkt), Samen herausnehmen, waschen, trocknen.

      Lagerung:
      Trocken, dunkel und kuehle Lagerung verlaengert die Keimfaehigkeit
      erheblich. Papiertueten oder Glasglaeser mit Kieselgel-Beutel
      (entzieht Restfeuchtigkeit), im Kuehlschrank oder kuehlfeuchtem Keller.
      Beschriften: Art, Sorte, Erntejahr — wichtig fuer spaetere Keimraten-
      Einschaetzung. Faustregel Haltbarkeit: Tomate/Paprika 3-5 Jahre,
      Kohl/Brokkoli 4-5 Jahre, Karotte/Petersilie/Pastinake 1-2 Jahre (kurz!),
      Kuerbis 4-6 Jahre, Bohne/Erbse 2-3 Jahre.
