chunks:
  - id: reife-indikatoren-gemuese
    title: Reife-Indikatoren fuer Gemuese und Obst
    content: |
      Tomate:
      - Farbe: Gleichmaessig rot (oder sortentyp. Farbe), kein Gruen am Stiel
      - Festigkeit: Leicht nachgebend bei sanftem Druck
      - Stielbruch: Loest sich leicht von der Pflanze am Sollbruchstelle
      - Aroma: Intensiver Tomatengeruch am Stielansatz
      Paprika/Chili:
      - Farbumschlag: Gruen → Gelb/Rot (je nach Sorte). Gruene Paprika
        sind unreif — essbar, aber weniger Vitamine und Geschmack.
      - Festigkeit: Feste, glaenzende Haut
      - Chili-Schaerfe: Steigt mit Reife (mehr Capsaicin bei voller Farbentwicklung)
      Gurke: Groesse sortenabhaengig (Salatgurke 25-30cm, Einlegegurke 6-10cm).
      NICHT ueberreif werden lassen (werden bitter, Kerne gross).
      Salat: Vor dem Schossen ernten! Wenn der Stengel sich streckt und
      Bluetenknospen bildet → zu spaet, Blaetter werden bitter.
      Kuerbis/Zucchini: Zucchini bei 15-20cm (zart). Kuerbis: Klopfprobe
      (hohl = reif), Stiel vertrocknet, Schale mit Fingernagel nicht
      mehr einritzbar. Kuerbis 2 Wochen vor Frost ernten.
      Wurzelgemuese: Schulter-Test (oberer Teil ragt aus Erde). Karotten:
      Schulterdurchmesser 1.5-2.5cm, ca. 70-120 Tage nach Aussaat
      (sortenabhaengig). Frost verbessert den Geschmack (Staerke wird in
      Zucker umgewandelt) — deshalb ruhig bis zum ersten leichten Frost
      im Beet lassen.
    metadata:
      topic: harvest_indicators_vegetables
      crops: [tomato, pepper, cucumber, lettuce, squash, root_vegetables]

  - id: karotten-ernte
    title: Karotten ernten — Schulterdurchmesser und Tage nach Aussaat
    content: |
      Wann Karotten ernten? Zwei zuverlaessige Indikatoren:
      1. Schulterdurchmesser: Der Schulterdurchmesser (oberer Teil der Karotte,
         der aus der Erde ragt) sollte 1,5-2,5 cm betragen. Den Schulterdurchmesser
         kann man sehen ohne die Karotte auszugraben — einfach die Erde am
         Karottenansatz etwas beiseite schieben.
      2. Tage nach Aussaat: Karotten brauchen ca. 70-120 Tage nach Aussaat
         bis zur Erntereife (sortenabhaengig). Fruehmöhren 70-80 Tage,
         Lagerkarotten 100-120 Tage nach Aussaat.
      Frost verbessert den Geschmack: Leichter Frost wandelt Staerke in
      Zucker um und macht Karotten suesser. Karotten koennen deshalb ruhig
      bis zum ersten leichten Frost im Beet bleiben.
      Wichtig: Karotten bluehen im ersten Jahr NICHT — sie sind zweijährig.
      Wenn eine Karotte blueht, wurde sie ueberwintert und ist nicht mehr
      zum Essen geeignet (holzig).
      Erntetechnik: Erde lockern (Grabgabel), Karotte am Laub vorsichtig
      herausziehen. Laub abdrehen (nicht schneiden — blutet sonst).
    metadata:
      topic: carrot_harvest_timing
      days_to_harvest: [70, 120]
      shoulder_diameter_cm: [1.5, 2.5]

  - id: tomaten-auspflanzen
    title: Tomaten ins Freie pflanzen — nach Eisheiligen ab Mitte Mai, vorher abhaerten
    content: |
      Tomaten erst nach den Eisheiligen ins Freie pflanzen — also ab Mitte Mai
      (nach dem 15. Mai). Vorher abhaerten! Tomaten sind frostempfindlich und
      vertragen keinen Frost, schon Temperaturen unter 5 Grad schaedigen die
      Pflanze. In Mitteleuropa besteht vor Mitte Mai Spaetfrost-Gefahr, deshalb
      ist der Zeitpunkt nach den Eisheiligen entscheidend.
      Abhaerten vor dem Auspflanzen (7-10 Tage):
      Jungpflanzen die drinnen vorgezogen wurden muessen vor dem Auspflanzen
      abgehaertet werden. Abhaerten bedeutet: Die Pflanzen taeglich fuer einige
      Stunden nach draussen stellen — erst in den Halbschatten, dann langsam
      in die Sonne. Nachts wieder reinholen. So gewoehnt sich die Pflanze an
      Wind, UV-Strahlung und Temperaturschwankungen. Ohne Abhaerten riskiert
      man Sonnenbrand und Kaelteschock.
      Standort: Sonnig und windgeschuetzt, mindestens 6-8 Stunden
      direkte Sonne pro Tag. Pflanzabstand 50-80 cm.
      Tomaten-Tipp: Die Pflanze tiefer setzen als sie im Topf stand —
      der Stengel bildet entlang der vergrabenen Laenge Adventivwurzeln,
      was die Pflanze kraeftiger macht.
    metadata:
      topic: tomato_outdoor_planting
      earliest_date: mid_may

  - id: ernte-cannabis-trichome
    title: Cannabis-Erntezeitpunkt anhand der Trichome bestimmen
    content: |
      Den optimalen Erntezeitpunkt bei Cannabis bestimmt man anhand der
      Trichome (Harzdruesen auf den Blueten). Dafuer braucht man eine Lupe
      oder ein Taschenmikroskop mit mindestens 60-facher Vergroesserung —
      mit blossem Auge sind die Details nicht erkennbar.
      Trichom-Stadien:
      - Klar/durchsichtig: Noch nicht reif. THC-Gehalt niedrig. Warten.
      - Milchig/trueb: Optimaler Erntezeitpunkt fuer maximale Potenz.
        Die Mehrzahl der Trichome sollte milchig-trueb sein.
      - Bernstein/amber: THC wandelt sich in CBN um (sedativer Effekt).
        Ein Bernstein-Anteil von 10-20 Prozent ist ideal fuer eine
        ausgewogene Wirkung. Mehr Bernstein = mehr Couch-Lock.
      Erntefenster: Wenn 70-90% der Trichome milchig sind und 10-20%
      bernsteinfarben, ist der ideale Zeitpunkt erreicht.
      Wichtig: Die Verfaerbung der Pistillen (Stempel) taugt nicht als
      zuverlaessiger Indikator — Umweltfaktoren verfaelschen das Bild.
      Trichome sind die einzige zuverlaessige Methode. Nur ein
      Mikroskop oder eine Juwelier-Lupe zeigt den wahren Reifegrad.
      Nicht allein nach Kalender ernten — Sorten variieren stark
      (8-14 Wochen Bluetezeit).
    metadata:
      topic: trichome_harvest_timing
      tools: [loupe, microscope]

  - id: ernte-kraeuter
    title: Kraeuter richtig ernten
    content: |
      Zeitpunkt: Morgens nach Abtrocknen des Taus. Aetherische Oele sind
      morgens am konzentriertesten (vor der Mittagshitze).
      Vor der Bluete ernten (fuer Kuechennutzung): Sobald Kraeuter bluehen,
      leidet der Geschmack — deshalb immer vorher ernten. Regelmaessiges
      Ernten und Pinchen verzoegert die Bluetenbildung und foerdert
      buschiges Wachstum.
      Basilikum:
      - Immer ueber einem Blattpaar schneiden (2 neue Triebe wachsen nach)
      - Bluetenansaetze frueh entfernen
      - Maximal 1/3 der Pflanze auf einmal ernten
      Petersilie/Koriander:
      - Aeussere Stiele zuerst (Herz wachsen lassen)
      - Koriander: Blaetter vor Bluete, Samen nach Reife (Koriandersamen)
      Rosmarin/Thymian/Lavendel:
      - Triebspitzen schneiden (foerdert Verzweigung)
      - Nicht ins alte Holz schneiden (treibt nicht neu aus!)
      - Lavendel: 1/3 zurueckschneiden wenn Blueten welk, nie ins Holz
      Schnittlauch: Bodennah abschneiden (waechst komplett nach)
      Minze: Aggressiver Wuchs — gerne grosszuegig ernten.
      Im Topf halten (Auslaeufer!)
      Konservierung: Trocknen (haengen, Doerrautomat 35-40°C), Einfrieren
      (gehackt in Eiswuerfel-Form mit Wasser/Oel), Oel/Essig ansetzen.
    metadata:
      topic: herb_harvesting
      best_time: morning
      rule: before_flowering

  - id: trocknung-cannabis
    title: Cannabis richtig trocknen — 15-20 Grad, dunkel, Zweige knacken als Test
    content: |
      Cannabis richtig trocknen: bei 15-20 Grad Celsius in einem dunklen Raum.
      Dunkel ist entscheidend — Licht baut Cannabinoide und Terpene ab. Die
      Trocknung ist fertig wenn kleine Zweige knacken (Knack-Test).
      Optimale Trocknungsbedingungen im Detail:
      - Temperatur: 15-20°C, also 15 bis 20 Grad (langsam und schonend)
      - Luftfeuchtigkeit: 55-65% RH
      - Dunkel: Raum komplett abdunkeln, kein Licht
      - Leichte Luftzirkulation: Ventilator an Wand (NICHT auf Pflanzen!),
        nur zur Verhinderung stagnierender Luft
      - Dauer: 7-14 Tage (je langsamer desto besser)
      Methoden:
      - Ganze Pflanze (Ideal): Kopfueber aufhaengen, langsamste Trocknung,
        Blaetter schuetzen Blueten
      - Einzelne Aeste: An Schnur/Draht aufhaengen
      - Trocknungsnetz/Drying Rack: Fuer kleine Mengen oder wenn kein
        Platz zum Aufhaengen
      Fertig-Indikator (Zweige-Knack-Test):
      - Kleine Zweige knacken und brechen (nicht biegen) bei 90° → fertig.
        Wenn Zweige knacken statt sich zu biegen, ist die Trocknung abgeschlossen.
      - Grosse Zweige: Biegen sich noch leicht → ok (Feintrocknung im Glas)
      - Blueten fuehlen sich aussen trocken an, aber nicht broeselig
      Fehler vermeiden: Wer bei ueber 25 Grad und unter 45% RH trocknet,
      riskiert Heu-Geruch, harschen Rauch und zerstoerte Terpene weil das
      Chlorophyll nicht abgebaut wird. Immer langsam und geduldig vorgehen.
      Bei ueber 70% RH steigt das Schimmelrisiko — taeglich inspizieren.
    metadata:
      topic: cannabis_drying
      temperature_celsius: [15, 20]
      rh_percent: [55, 65]
      duration_days: [7, 14]

  - id: curing-cannabis
    title: Cannabis-Curing (Fermentierung im Glas)
    content: |
      Nach der Trocknung beginnt das Curing — der wichtigste Schritt fuer
      Geschmack, Geruch und Glatte des Rauchs:
      Methode:
      1. Getrocknete Blueten in luftdichte Glaeser fuellen (Mason Jars)
         — 75% voll, nicht pressen
      2. Boveda/Integra Boost Pack einlegen (62% RH) → stabilisiert
         Feuchtigkeit automatisch
      3. Erste Woche: 2-3× taeglich oeffnen und 15 Minuten lueften
         ("Burping"). Geruch pruefen: Ammoniak = zu feucht = Schimmelrisiko!
      4. Woche 2-4: 1× taeglich oeffnen und lueften
      5. Ab Woche 4: 1-2× pro Woche oeffnen
      6. Minimum Curing: 2-4 Wochen. Optimal: 4-8 Wochen.
         Premium: 2-6 Monate (Terpen-Entwicklung setzt sich fort).
      Warum Curing hilft:
      - Chlorophyll wird abgebaut (kein Heu-Geruch/-Geschmack mehr)
      - Terpene reifen und entwickeln sich weiter
      - Rauch wird glatter (weniger harsch auf Hals/Lunge)
      - Feuchtigkeit gleicht sich im Bud aus (aussen=innen)
      Lagerung nach Curing: Dunkle, kuehle Glaeser (15-20°C).
      Boveda-Pack austauschen wenn ausgehaertet. Haltbarkeit: 6-12 Monate
      ohne signifikanten Potenz-Verlust bei korrekter Lagerung.
    metadata:
      topic: cannabis_curing
      target_rh: 62
      min_weeks: 2
      optimal_weeks: [4, 8]

  - id: karenz-gate
    title: Karenzzeit — Sicherheitsabstand vor der Ernte
    content: |
      Karenzzeit (Wartezeit/Pre-Harvest Interval): Obligatorischer Zeitraum
      zwischen der letzten Pflanzenschutz-Behandlung und der Ernte.
      Zweck: Rueckstaende von Pflanzenschutzmitteln muessen unter den
      gesetzlichen Hoechstwert (MRL) abgebaut sein.
      Typische Karenzzeiten (Beispiele):
      - Neem-Oel: 1-3 Tage (biologisch, baut schnell ab)
      - Pyrethrum: 1-2 Tage
      - Spinosad: 1-3 Tage
      - Kupfer-Praeparate: 14-28 Tage (Vorsicht bei Gemuese!)
      - Schwefel: 7-14 Tage
      - Systemische Fungizide: 14-35 Tage
      In Kamerplanter: Karenz-Gate (REQ-007, REQ-010):
      - System blockiert Ernte-Erstellung wenn aktive Behandlungen
        die Karenzzeit nicht eingehalten haben
      - KarenzViolationError (HTTP 422) bei Versuch einer Ernte
        vor Ablauf der Karenzzeit
      - IPM-SafetyIntervalValidator prueft automatisch
      Wichtig: Karenzzeiten gelten auch fuer biologische Mittel!
      "Bio" bedeutet nicht "keine Wartezeit". Auch Neem-Oel und
      Pyrethrum haben Rueckstaende die abgebaut werden muessen.
      Bei Cannabis besonders relevant: Keine zugelassenen PSM,
      daher strengste Standards anwenden.
    metadata:
      topic: pre_harvest_interval
      kamerplanter_feature: karenz_gate
      http_error: 422

  - id: ethylen-nachernte
    title: Ethylen — Reife-Steuerung und Lagerungsrisiko
    content: |
      Ethylen (C2H4) ist ein pflanzliches Reifehormon das nach der Ernte
      weiterhin Fruechte beeinflusst:
      Ethylen-Produzenten (hohe Freisetzung):
      - Apfel, Banane, Tomate, Avocado, Pfirsich, Birne
      - Ein reifer Apfel kann ganze Kisten unreifer Tomaten reifen lassen
      Ethylen-Empfindliche Kulturen (reagieren stark):
      - Salat (Vergilbung, Blattverlust), Brokkoli (Vergilbung)
      - Gurke (beschleunigte Alterung), Karotte (Bitterkeit)
      - Erdbeere (beschleunigte Ueberreife und Schimmel)
      - Schnittblumen (vorzeitiges Welken)
      Praxis-Konsequenzen:
      - Ethylen-Produzenten GETRENNT von empfindlichen Kulturen lagern
      - Tomate: Ethylen-Trigger fuer gleichmaessige Abreife (Buendel-Reife).
        Gruene Tomaten mit reifem Apfel in Papiertüte → Rotfaerbung in 5-7 Tagen.
      - Cannabis: Ethylen nicht relevant (Trichom-basierte Reife, keine
        klimakterische Frucht). Aber: Ernte nicht neben reifen Fruechten
        trocknen (Terpene koennen durch Ethylen beeinflusst werden).
      - Kuehlschrank: Aepfel und Tomaten NICHT zusammen mit Salat lagern.
      Belueftung der Lagerstelle reduziert Ethylen-Anreicherung.
    metadata:
      topic: ethylene
      high_producers: [apple, banana, tomato, avocado]
      sensitive: [lettuce, broccoli, cucumber, strawberry]
