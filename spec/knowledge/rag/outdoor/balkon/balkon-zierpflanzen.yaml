  - id: sommerblumen-balkon
    title: Sommerblumen fuer den Balkon — die Klassiker
    content: |
      Welche Blumen bluehen den ganzen Sommer auf dem Balkon? Die
      typischen Balkonblumen sind so beliebt, weil sie von Mai bis
      Oktober durchbluehen — wenn man ein paar Grundregeln beachtet.
      Geranien (Pelargonium):
      - Der Balkon-Klassiker schlechthin. Stehend (Zonale) oder
        haengend (Peltatum). Extrem bluetenreich und pflegeleicht.
      - Volle Sonne, regelmaessig giessen, woechentlich fluessig
        duengen. Verbluehtes ausputzen foerdert Nachbluete.
      - Vertragen kurze Trockenheit, aber keine Staunaesse.
      Petunien und Surfinien:
      - Surfinien sind haengende Petunien — Bluetenwasserfall am
        Gelaender. Riesige Farbauswahl.
      - Brauchen VIEL Wasser und VIEL Duenger (alle 1-2 Wochen
        Fluessigduenger). Sind echte Starkzehrer.
      - Regenempfindlich: Volle Blueten verkleben bei Regen. Geschuetzter
        Standort ideal. Verbluhtes regelmaessig auszupfen.
      Begonien (Elatior, Semperflorens):
      - Auch fuer Halbschatten und Nordbalkon geeignet.
      - Brauchen weniger Sonne als Geranien. Gleichmaessig feucht
        halten, keine direkte Mittagssonne.
      Weitere Top-Sommerblumen:
      - Husarenknopf (Sanvitalia): Mini-Sonnenblumen, trockenheits-
        vertraeglich, ideal als Unterpflanzung.
      - Maennertreu (Lobelia): Blau bluehend, haengend, fuer Halbschatten.
      - Kapuzinerkresse: Essbar, pflegeleicht, rankend oder buschig.
        Auch fuer Anfaenger und Kinder.
      - Zinnie: Bunt, aufrecht, Schmetterlings-Magnet.
      Genereller Pflegetipp: Balkonblumen brauchen mehr Duenger als
      Beetpflanzen, weil Naehrstoffe im kleinen Topf schnell ausge-
      waschen werden. Langzeitduenger bei der Pflanzung einarbeiten
      UND ab Juni woechentlich fluessig nachduengen.
    metadata:
      topic: summer_balcony_flowers
      difficulty: easy
      plants: [geranium, petunia, surfinia, begonia, sanvitalia, lobelia]

  - id: herbstbepflanzung
    title: Herbstbepflanzung — Farbe bis zum Frost
    content: |
      Was pflanze ich auf den Balkon, wenn die Sommerblumen verblueht
      sind? Ab September kannst du den Balkon fuer den Herbst neu
      bepflanzen. Herbstpflanzen trotzen kuehlen Naechten und bringen
      nochmal Farbe bis in den November.
      Herbst-Klassiker:
      - Heide (Calluna, Erica): Bluehen in Rosa, Weiss, Violett von
        September bis November. Brauchen saures Substrat (Rhododendron-
        erde), keine Staunaesse. Knospenheide (Calluna) haelt besonders
        lange, weil die Knospen geschlossen bleiben und nicht verbluehn.
      - Chrysanthemen: Leuchtende Farben im Herbst. Als Topfpflanzen
        meist nicht winterhart — nach der Bluete kompostieren oder an
        geschuetzter Stelle im Garten versuchen.
      - Alpenveilchen (Cyclamen): Fuer Halbschatten, vertragen leichte
        Froeste (bis -2°C). Elegante Bluetenform, ideal fuer Ost- und
        Nordbalkon im Herbst.
      - Zierkohl (Brassica): Dekoratives Blattwerk in Violett, Weiss,
        Rosa. Wird mit Kaelte sogar schoener (Farbe intensiviert sich).
        Trotzt Frost bis -8°C.
      - Graeser: Federborstengras (Pennisetum), Segge (Carex), Lampen-
        putzergras. Strukturgeber im Herbstkasten, wunderschoen mit
        Raureif. Carex und Festuca sind winterhart und koennen im
        Kasten bleiben.
      Herbst-Kombination fuer einen 80-cm-Kasten:
      3 Calluna (Knospenheide, verschiedene Farben) + 1 Carex (Segge,
      ueberhangend am Rand) + 1 Zierkohl (Mitte, Hoehe). Dazu kleine
      Kuerbisse oder Zapfen als Deko. Haelt bis zum ersten harten Frost.
      Pflege: Weniger giessen als im Sommer (kuehler, weniger Verdunstung),
      aber nicht austrocknen lassen. Keinen Duenger mehr — Pflanzen
      wachsen kaum noch.
    metadata:
      topic: autumn_balcony_planting
      difficulty: easy
      plants: [heather, chrysanthemum, cyclamen, ornamental_cabbage, grasses]

  - id: winterharte-kuebelpflanzen
    title: Winterharte Kuebelpflanzen — dauerhaft auf dem Balkon
    content: |
      Welche Pflanzen koennen das ganze Jahr im Kuebel auf dem Balkon
      bleiben? Winterharte Kuebelpflanzen sind das Rueckgrat eines
      ganzjahrig bepflanzten Balkons. Aber Achtung: Winterhart im
      Beet bedeutet NICHT winterhart im Kuebel! Im Topf friert der
      Wurzelballen komplett durch — im Beet schuetzt die umgebende Erde.
      Faustregel: Eine Pflanze muss mindestens 2 Winterhaertezonen
      haerter sein als dein Standort, um im Kuebel zu ueberleben.
      Zuverlaessig winterharte Kuebelpflanzen:
      - Buchsbaum (Buxus): Immergruen, schnittvertraeglich, klassisch.
        Winterhart bis -20°C auch im Kuebel. Achtung: Buchsbaumzuensler.
      - Lavendel (Lavandula angustifolia): Winterhart, duftet, bluehen
        im Sommer. Im Winter trockene Stellen an der Hauswand.
      - Graeser: Blauschwingel (Festuca glauca), Japan-Segge (Carex
        morrowii), Rutenhirse (Panicum) — ganzjaehrig dekorativ.
      - Immergruene: Skimmia, Ilex (Stechpalme), Zwergkiefer (Pinus
        mugo), Eibe — gruene Struktur auch im Winter.
      - Hosta: Einziehen im Winter (kein Laub), treiben im Fruehling
        zuverlaessig aus. Fuer schattige Balkone.
      Winterschutz im Kuebel:
      - Topf mit Luftpolsterfolie, Juteband oder Kokosmatten umwickeln
        — schuetzt den Wurzelballen vor Durchfrieren.
      - Topf auf Styropor-Platte oder Holzbrett stellen (Kaelteschutz
        von unten, Balkonboden leitet Kaelte).
      - Topf an die Hauswand ruecken (Waermeabstrahlung).
      - Immergruene auch im Winter giessen! Sie verdunsten weiter ueber
        die Blaetter und vertrocknen (Frosttrocknis), wenn der Ballen
        komplett durchgefroren ist. An frostfreien Tagen giessen.
      - Kronen von Strauchern mit Vlies umwickeln bei starkem Frost
        (unter -10°C) oder nassem Schnee.
    metadata:
      topic: hardy_container_plants
      difficulty: moderate
      plants: [buxus, lavender, grasses, skimmia, ilex, hosta]
      frost_tolerance: minus_20

  - id: sichtschutz-pflanzen
    title: Sichtschutz-Pflanzen fuer den Balkon
    content: |
      Wie schaffe ich natuerlichen Sichtschutz auf dem Balkon? Statt
      einer Plastik-Bespannung kannst du lebende Pflanzen als Sichtschutz
      einsetzen — schoener, lebendiger und je nach Art sogar essbar.
      Schneller Sichtschutz (1 Saison):
      - Feuerbohne/Prunkbohne: Klettert 3-4 m hoch am Rankgitter,
        rote Blueten, essbare Bohnen. Einjahrig, jedes Jahr neu saeen.
      - Kapuzinerkresse (rankend): 2-3 m Ranken, essbare Blueten und
        Blaetter.
      - Schwarzaeugige Susanne (Thunbergia): 1.5-2 m, leuchtend
        orange/gelbe Blueten. Einjahrig, braucht Waerme.
      - Duftwicke (Lathyrus): 1.5-2 m, wunderbarer Duft, einjahrig.
      Dauerhafter Sichtschutz (mehrjaehrig):
      - Bambus im Kuebel (Fargesia): Nicht wuchernde Sorten (Fargesia
        murielae, Fargesia nitida) bleiben im Kuebel kompakt. Immergruen,
        2-3 m hoch, winterhart. Braucht grossen Kuebel (40+ Liter)
        und viel Wasser.
      - Clematis: Klettert am Rankgitter, bluetenreich. Immergruene
        Clematis armandii fuer ganzjaehrigen Sichtschutz, aber nur
        bedingt winterhart (geschuetzter Standort!). Sommergruene
        Clematis-Hybriden sind haerter.
      - Wilder Wein (Parthenocissus): Spektakulaere Herbstfaerbung,
        selbstkletternd, sehr robust. Achtung: Haftwurzeln beschaedigen
        Fassaden — nur an Rankgitter leiten, nicht an Wand haften lassen.
      - Efeu (Hedera helix): Immergruen, schattenvertraeglich, winterhart.
        Am Rankgitter leiten. Wuechsig — regelmaessig schneiden.
      Tipp: Rankgitter nicht direkt an die Hauswand montieren, sondern
      10-15 cm Abstand halten (Hinterlueftung, verhindert Feuchtig-
      keitsschaeden). Stabile Befestigung — ein bewachsenes Rankgitter
      faengt viel Wind.
    metadata:
      topic: privacy_screen_plants
      difficulty: moderate
      plants: [bamboo_fargesia, clematis, parthenocissus, hedera, runner_bean]
