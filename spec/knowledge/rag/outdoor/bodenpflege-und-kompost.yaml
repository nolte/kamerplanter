  - id: bodenanalyse-verstehen
    title: Bodenanalyse — Bodenprobe nehmen, Ergebnisse verstehen und umsetzen
    content: |
      Eine professionelle Bodenanalyse ist der sicherste Weg um zu verstehen was der
      eigene Gartenboden braucht. Sie ersetzt das Raten und spart Geld fuer ueberflüssige
      Duenger.

      Wann Bodenprobe nehmen:
      Idealer Zeitpunkt ist Herbst (nach der Ernte) oder frühes Frühjahr (vor der Düngung).
      Nicht direkt nach Kalkung oder Düngung — verfaelscht Ergebnisse (mind. 4 Wochen warten).

      Wie die Probe richtig nehmen (Mischprobe):
      1. Stechwerkzeug reinigen (Rost verfaelscht Eisenwert)
      2. Mindestens 10 Einstiche quer über die Fläche, gleichmäßig verteilt
      3. Tiefe: 20 cm (Gartenspaten-Blatttiefe), fuer Rasen 10 cm
      4. Alle Proben in einen sauberen Eimer mischen, gut umrühren
      5. Ca. 500 g in den mitgelieferten Proben-Beutel abfüllen
      6. Frische Grasreste und Steine entfernen vorher

      Was wird gemessen:
      - pH-Wert: Wichtigster Wert — bestimmt Naehrstoffverfügbarkeit
      - Phosphor (P): Blüten- und Wurzelentwicklung
      - Kalium (K): Wasserregulierung, Stresstoleanz, Fruchtentwicklung
      - Magnesium (Mg): Chlorophyllbildung, Photosynthese
      - Humusgehalt (%): Bodengesundheit und Wasserspeicherkapazitaet
      - Bodenart (Ton/Schluff/Sand-Anteil): Grundlage fuer alle weiteren Empfehlungen

      Ergebnisse interpretieren — Versorgungsstufen A-E:
      Stufe A = sehr niedrig (Mangel moeglich), Stufe B = niedrig, Stufe C = ausreichend
      (Optimum), Stufe D = hoch, Stufe E = sehr hoch (Ueberschuss, Ausbringen stoppen).
      Ziel fuer die meisten Kulturen: pH 6.0-7.0, P und K in Stufe C-D.

      Labor-Empfehlungen umsetzen:
      Kalkung (pH erhoehen): Dolomitkalk oder Calciumcarbonat, Herbstgabe bevorzugt
      (loest sich langsam auf). pH um 1 Punkt anheben: ca. 200-300 g Kalk/m².
      P- und K-Mangel: Kompost, Hornmehl, Kalimagnesia (Patentkali), Basaltmehl.
      Ueberschuss: Nicht mehr duengen bis Stufe sinkt.

      Kosten und Anlaufstellen:
      Raiffeisen-Laboranalyse, LUFA (Landwirtschaftliche Untersuchungs- und
      Forschungsanstalt) oder regionale Bodenlabore: ca. 30-50 €.
      Enthält detaillierte Düngungsempfehlungen in kg/ha — durch 10 teilen fuer g/m².
