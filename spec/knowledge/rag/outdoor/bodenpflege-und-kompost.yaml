  - id: kompostierung-grundlagen
    title: Kompostierung — was rein darf und was nicht, Heiß- vs. Kaltkompost
    content: |
      Kompost ist das wichtigste Bodenverbesserungsmittel — selbst hergestellt aus
      organischen Abfaellen, die sonst im Muell landen. Reifer Kompost riecht nach
      Wald, ist dunkelbraun und krümelig.

      Was darf in den Kompost (JA):
      - Küchenabfaelle: Obst- und Gemueseabfaelle, Kaffeesatz mit Filter, Teebeutel
        (papier), Eierschalen (zerkleinernd — liefern Calcium und neutralisieren pH)
      - Gartenabfaelle: Rasenschnitt (duenn schichten!), Laub, Stauden, Blumenerde,
        welke Blumen (ohne Samen), Heckenschnitt (gehäckselt)
      - Braunes Material: Karton, Zeitungspapier, Stroh, Saegemehl (unbehandelt),
        trockene Blätter

      Was NICHT in den Kompost (NEIN):
      - Fleisch, Fisch, Knochen, gekochte Speisen → Schädlinge und Gestank
      - Kranke Pflanzen (Mehltau, Virosen, Kohlhernie) → Krankheiten ueberleben
      - Unkraut mit Samen (Giersch, Vogelmiere in Blüte) → Samenbank im Kompost
      - Zitrusschalen in großen Mengen → hemmen Bodenlebewesen, sehr langsam rottend
      - Hundekot, Katzenkot → Krankheitserreger
      - Kohle, Asche von Kohle → Schadstoffe (Holzasche in kleinen Mengen ok)

      C:N-Verhältnis — braun zu grün = 3:1:
      Kohlenstoffreiches (braunes) Material: Stroh, Pappe, Häckselgut, Sägemehl.
      Stickstoffreiches (gruenes) Material: Rasenschnitt, frische Küchenabfaelle.
      Zu viel Grün → Faulschlamm, Gestank. Zu viel Braun → rottet kaum.
      Regel: Auf jede Schicht Rasenschnitt eine Schicht gehäckseltes Braummaterial.

      Heißkompost (Thermokomposter):
      Kerntemperatur 55-70°C tötet Unkrautsamen, Krankheitserreger und Schädlinge ab.
      Erfordert Mindestvolumen (~1 m³), regelmäßiges Umsetzen (alle 2-4 Wochen)
      und ausreichend Feuchtigkeit (wie ausgedrückter Schwamm — nicht tropfnass).
      Reifezeit: 3-6 Monate bei aktivem Management.

      Kaltkompost (offener Haufen):
      Weniger Aufwand, aber keine Hitzephase. Unkrautsamen und Krankheiten bleiben
      aktiv. Nur sicheres Material kompostieren. Reifezeit: 9-18 Monate.

      Kompostertypen:
      Thermokomposter (isoliert, ideal fuer Heißkompost), offener Holz- oder
      Drahtrahmen-Komposter (guenstig, gut belueftet), Wurmkiste (see eigener Chunk).
      Reife pruefen: Kompost laesst sich in der Hand zerbroeckeln, riecht erdig,
      Temperatur im Kern gefallen, keine erkennbaren Ausgangsmaterialien mehr.
    metadata:
      topic: kompostierung_grundlagen
      cn_ratio: "3:1 (braun:gruen)"
