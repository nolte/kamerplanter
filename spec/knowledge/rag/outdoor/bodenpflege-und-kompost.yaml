  - id: wurmkompost-vermicompost
    title: Wurmkompost (Vermicompost) — Wurmkiste fuer Balkon und Zimmerpflanzen
    content: |
      Wurmkompost (Vermicompost) ist der naehrstoffreichste organische Duenger den
      man selbst herstellen kann. Der Wurmhumus enthaelt 5-10x mehr Nahrstoffe als
      normaler Kompost und ist sofort pflanzenverfuegbar. Ideal fuer Balkon, Wohnung
      und als Duenger fuer Zimmerpflanzen.

      Geeignete Wurmarten:
      Kompostwuermer — nicht der gewoehnliche Regenwurm (Lumbricus terrestris)!
      Hauptsaechlich verwendet werden:
      - Eisenia fetida (Roter Wurm, Tiger Worm) — haeufigste Art
      - Eisenia andrei (roter Streifen-Kompostwurm)
      Beide sind kauflich erhältlich (~5-10 € fuer 250-500 Exemplare).

      Wurmkiste einrichten:
      Undurchsichtiger Behaelter (Kunststoff, Holz), mind. 30 cm tief mit Deckel.
      Bohrungen fuer Luftzirkulation und Ablauf fuer Wurmtee.
      Einstreu: Feuchter Karton/Kokosfaser/Zeitungspapier als erstes Bett.
      Feuchtigkeit: Wie ausgedrueckter Schwamm — nie klitschnass, nie ausgetrocknet.
      Temperatur: 15-25°C, kein direktes Sonnenlicht.

      Fuetterung:
      Gluecklich sind sie mit Gemiese- und Obstabfaellen (kein Zitrus in großen Mengen,
      kein Fleisch, keine scharfen Gewuerze). Kaffeesatz wird gerne genommen.
      Langsam beginnen: In den ersten 4 Wochen nur wenig fuettern bis die Population
      angepasst ist. Nahrung immer leicht eingraben — verhindert Geruch und Fliegen.

      Ernte des Wurmhumus:
      Nach 3-4 Monaten ist die unterste Schicht reifer Wurmhumus. Wuermer wandern
      nach oben zur frischen Nahrung — Humus kann unten entnommen werden.
      Methode: Neues Futter nur auf eine Haelfte legen, Wuermer wandern dorthin,
      andere Haelfte ernten.

      Wurmtee (Wuermsaft):
      Die braune Fluessigkeit die am Boden ablaeuft ist hochwirksamer Fluessigduenger.
      1:10 mit Wasser verduennen und als Gieß- oder Blattduenger verwenden.
      Unverdünnt kann er Wurzeln verbrennen.

      Als Zimmerpflanzenduenger:
      Eine Handvoll Wurmhumus als Toppressing auf die Erde geben oder 1 TL in 1 L
      Wasser aufloesen und giessen. Riecht angenehm erdig, kein Gestank bei richtiger
      Fuehrung der Wurmkiste.
    metadata:
