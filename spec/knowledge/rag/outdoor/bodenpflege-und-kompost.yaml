  - id: mulchen-methoden-vorteile
    title: Mulchen — Feuchtigkeit halten, Unkraut unterdrücken, Boden schützen
    content: |
      Mulch ist jedes Material das auf die Bodenoberfläche aufgebracht wird. Mulchen
      ist eine der wirkungsvollsten und einfachsten Maßnahmen im Garten.

      Warum mulchen (die vier Hauptvorteile):
      1. Feuchtigkeit halten: Mulch reduziert Wasserverdunstung aus dem Boden um
         50-70%. Weniger gießen, gleichmäßigere Bodenfeuchtigkeit.
      2. Unkraut unterdrücken: Lichtabschluss verhindert Keimung vieler Unkraeuter.
         Nicht alle werden unterdrückt — Giersch z.B. treibt durch 20 cm Mulch durch.
      3. Bodentemperatur regulieren: Hält Boden im Sommer kuehl (Wurzelschutz),
         verzögert Austrocknung. Im Fruehling aber ERST mulchen wenn Boden warm ist!
      4. Bodenlebewesen foerdern: Regenwuermer, Pilzmyzel und Bodenbakterien werden
         aktiver. Mulch wird langsam von unten humifiziert — Bodenstruktur verbessert
         sich langfristig ohne Umgraben.

      Mulchmaterialien und ihre Eigenschaften:
      - Stroh: Ideal fuer Gemuese (Tomaten, Erdbeeren), laesst Luft durch, verrottet
        mittelschnell. Vorsicht: Schneckenhabitat! Schichtdicke 8-10 cm.
      - Rasenschnitt: Kostenlos, aber duenn schichten (max. 3-5 cm) sonst faule Schicht.
        Reich an Stickstoff — duengt nebenbei. Antrocknen lassen bevor aufbringen.
      - Rindenmulch: Langlebig (2-3 Jahre), ideal unter Straeuchern und Baeumen.
        Fuer Gemuese weniger geeignet — bindet beim Verrotten Stickstoff aus dem Boden.
      - Holzhaecksel: Aehnlich wie Rindenmulch. Tiefwurzler wie Tomaten vertragen es.
        Im Gemuesebereich 1-2 cm Abstand zu Pflanzenstaengeln halten.
      - Laub (verrottet): Hervorragend fuer Beete und als Winterschutz.
        Frisches Laub erst kompostieren oder als Kaltmulch aufbringen.
      - Reifer Kompost: Duengt und schuetzt gleichzeitig. Schichtdicke 3-5 cm.

      Wann NICHT mulchen:
      - Schneckenproblem: Mulch bietet Unterschlupf und Feuchtigkeit — Schneckendruck
        steigt stark an. Bierfallen und Schneckenkorn zuerst, dann entscheiden ob Mulch.
      - Nasse, schwere Boeden: Mulch verstaerkt Staunaesse und Faeulnis.
      - Fruehling: Boden zuerst aufwärmen lassen (Mitte April), dann mulchen.
      - Direkt an Pflanzenstaengeln: 5-10 cm Abstand halten — verhindert Faeulnis.

      Schichtdicke: 5-10 cm fuer gutes Ergebnis. Zu duenn = kaum Wirkung, zu dick =
      kein Gasaustausch, Faeulnis moeglich.
    metadata:
      topic: mulchen
      layer_thickness_cm: [5, 10]
      moisture_reduction_percent: [50, 70]
      difficulty: beginner
      target_groups: [freiland, gemeinschaftsgarten, casual]

  - id: gruenduengung-praxis
    title: Grüngedüngung — Phacelia, Klee, Lupine, Senf und Stickstoff-Fixierung
    content: |
      Grüngedüngung bedeutet: Pflanzen werden nicht geerntet sondern in den Boden
      eingearbeitet. Das verbessert Bodenstruktur, Stickstoffversorgung und
      Bodenfruchtbarkeit — vollstaendig organisch und kostenguenstig.

      Warum Gruenduengung unverzichtbar ist:
      - Stickstoff-Fixierung (N-Fixierung): Leguminosen wie Klee und Lupine bilden
        mit Knoellchenbakterien (Rhizobien) Symbiosen und fixieren Luftstickstoff.
        Klee liefert 80-120 kg N/ha, Lupine 100-150 kg N/ha — kostenlos aus der Luft.
      - Bodenlockerung: Tiefwurzler wie Lupine (Pfahlwurzel bis 2 m) und Ölrettich
        (bis 150 cm) brechen Bodenverdichtungen auf ohne Umgraben.
      - Erosionsschutz: Bedeckter Boden verliert keine Erde durch Regen und Wind.
      - Unkrautunterdrückung: Dichte Gruenduengung verdraengt Unkraut durch Beschattung.
      - Humusaufbau: Eingearbeitete Gruenmasse erhoet den Humusgehalt dauerhaft.

      Sommergrüngedüngung (Aussaat April-August):
      - Phacelia (Bueschelschoen): Die universellste Gruenduengung. Keine Verwandtschaft
        mit Gemuese — passt in jede Fruchtfolge. Ausgezeichnete Bienenweide. Friert
        bei -5°C ab (kein weiteres Umarbeiten noetig). Aussaat bis August.
      - Buchweizen: Schnell (6-8 Wochen bis Bluete), lockt Nuetzlinge an, mobilisiert
        gebundenen Phosphor im Boden. Waermeliebend, kein Frost.
      - Ölrettich: Tiefwurzler bricht Verdichtungen auf. ACHTUNG: Kreuzbluetler (Brassicaceae)
        — nicht vor oder nach Kohlgewaechsen einsetzen!
      - Gelbsenf: Schnellwuechsig, unterdrueckt Nematoden. Ebenfalls Kreuzbluetler.

      Wintergrüngedüngung (Aussaat August-Oktober):
      - Winterroggen: Winterhart bis -25°C, dichte Wurzelmasse, bester Erosionsschutz.
        Im Fruehling 3-4 Wochen vor Pflanzung abmaehen und oberflaechlich einarbeiten.
      - Inkarnatklee (Klee): Leguminose mit N-Fixierung. 80-120 kg N/ha durch Rhizobien.
        Aussaat bis September. Mit Winterroggen mischen fuer Sicherheit.
      - Lupine: Leguminose, Pfahlwurzel bis 2 m, 100-150 kg N/ha N-Fixierung.
        Ideal fuer verdichtete und saure Böden. Auch im Sommer moeglich.
      - Winterwicke: Leguminose, 60-100 kg N/ha. Klettern an Roggen hoch — ideale
        Mischung (Landsberger Gemenge: Winterroggen + Inkarnatklee + Winterwicke).

      Einarbeitung:
      Gruenmasse oberflaechlich einarbeiten (Grabgabel, Grubber) — NICHT tief untergraben.
      2-4 Wochen Rottephase abwarten bevor naechste Aussaat. Im Fruchtfolgeplan:
      Gruenduengungsjahr ist Jahr 4 im klassischen Vierjahres-Rotationsschema.
      Gruenduengung immer VOR der Bluete einarbeiten — danach holzig und verrottet langsam.
