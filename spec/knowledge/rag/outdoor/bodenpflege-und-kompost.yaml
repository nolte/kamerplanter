  - id: bodenarten-erkennen-verbessern
    title: Bodenart bestimmen und verbessern — Fingerprobe, Sand, Lehm, Ton
    content: |
      Die Bodenart ist die wichtigste Eigenschaft des Gartenbodens — sie bestimmt
      Wasserspeicherung, Belueftung und Naehrstoffverfuegbarkeit. Einfachste Methode
      zur Bestimmung: die Fingerprobe.

      Fingerprobe durchfuehren:
      Feuchte Erde zwischen Daumen und Zeigefinger rollen. Formt sich eine glatte,
      plastische Wurst (laenger als 3 cm ohne zu reissen)? → Tonreicher Boden.
      Rollt sich gar nicht, bricht sofort auseinander? → Sandboden.
      Faellt nach 3-4 cm auseinander, fuehlt sich leicht mehlig an? → Lehmboden (Optimum).

      Sandiger Boden (leichter Boden):
      Vorteile: Schnell warm im Fruehling, gut belueftet, leicht zu bearbeiten.
      Nachteile: Haelt Wasser und Naehrstoffe schlecht, trocknet rasch aus.
      Verbesserung: Reifkompost (5-8 L/m² einarbeiten), Bentonit (250-500 g/m²,
      erhoet die Wasserhaltekapazitaet dauerhaft), Gruenduengung mit Leguminosen.

      Toniger/lehmiger Boden (schwerer Boden):
      Vorteile: Naehrstoffreich, gute Wasserhaltekapazitaet, hohe Kationenaustauschkapazitaet.
      Nachteile: Verdichtet leicht, schlechte Belueftung, spaet warm, Staunaesse-Risiko.
      Verbesserung: Groben Sand (mind. 10 L/m², nie Feinsand — macht es schlimmer!),
      Reifkompost und Ton-Humus-Komplexe aufbauen durch regelmaessige Kompostgaben.
      Grundregel: Schwere Boeden nie nass bearbeiten — Struktur wird zerstoert.

      Idealer Gartenboden (Lehm):
      Krümelig und dunkel, riecht nach Wald (Petrichor = Geosmin von Actinobakterien),
      laesst sich locker in der Hand zusammendrücken, faellt dann auseinander.
      pH-Zielbereich fuer die meisten Gemuese: 6.0-7.0 (leicht sauer bis neutral).

      pH-Test:
      Guenstiger Einstieg: pH-Testset aus dem Gartencenter (~5-15 €), genuegt fuer
      grobe Orientierung. Fuer Genauigkeit: Professionelle Bodenanalyse (Raiffeisen,
      LUFA, kostet ca. 30-50 €) — gibt auch P, K, Mg und Humusgehalt an.
      pH zu niedrig (unter 6.0)? → Kalken mit Dolomitkalk oder Calciumcarbonat.
      pH zu hoch (ueber 7.5)? → Schwefel einarbeiten oder saure organische Materialien
      (Nadelkompost, Rindenmulch).
