  - id: hochbeet-befuellen-schichtaufbau
    title: Hochbeet befüllen — der richtige Schichtaufbau und Pflege über die Jahre
    content: |
      Ein Hochbeet ist der perfekte Einstieg fuer Anfaenger und produziert im ersten
      Jahr meist die besten Ertraege des gesamten Gartens. Der Schlüssel liegt im
      richtigen Schichtaufbau — von unten nach oben.

      Schichtaufbau (Standardhochbeet 80 cm tief):
      Schicht 1 — Drainage und Rohkompost (ca. 20 cm):
      Grobe Äste, Holzabschnitte, Baumstumpfreste. Dient als Drainage und langer
      Naehrstoffspeicher. Verrottet langsam ueber 3-5 Jahre und gibt Waerme ab.

      Schicht 2 — Haeckselgut/Zweige (ca. 15 cm):
      Kleineres gehaeckseltes Material, Laub-Strauch-Schnitt. Uebergangszone,
      lockert die Struktur, gute Belueftung.

      Schicht 3 — Organisches Material (ca. 15 cm):
      Laub, Rasenschnitt, Küchenabfaelle, Halbkompost. Hauptlieferant fuer Naehrstoffe
      und Bodenlebewesen. NIE frischen Rasenschnitt in zu dicken Schichten — Faeulnis.

      Schicht 4 — Reifer Kompost oder gute Gartenerde (ca. 20 cm):
      Reifer Kompost gemischt mit guter Gartenerde (ca. 50:50). Pflanzschicht,
      direkt fuer Wurzeln verfügbar.

      Schicht 5 — Pflanzerde (ca. 10 cm):
      Hochwertige Blumenerde oder spezielle Hochbeet-Erde als Abschluss.
      Feinkoernig, direkte Aussaatmoeglichkeit.

      Setzung einplanen:
      Im ersten Jahr setzt sich das Hochbeet um 10-20% (organisches Material
      verrottet). Regelmaessig mit Kompost nachfuellen, besonders im Herbst.

      Naehrstoffverlauf ueber die Jahre:
      Jahr 1: Starkzehrer bevorzugen! Tomaten, Kuerbis, Kohl, Zucchini profitieren
      vom maximalen Naehrstoffangebot aus verrottenden unteren Schichten.
      Jahr 2: Immer noch gut, aber etwas weniger intensiv. Mittelzehrer — Moehren,
      Zwiebeln, Rote Bete, Salat — optimal.
      Jahr 3: Schwachzehrer — Krauter, Bohnen, Erbsen, Radieschen.
      Jahr 4+: Hochbeet leeren, Inhalt in den Gartenboden einarbeiten und neu
      befuellen, oder grosse Kompostgabe oben aufbringen.

      Wann nachfuellen:
      Jedes Jahr im Herbst 5-10 cm Kompost oder verrottetes Laub auffuellen.
      Hochbeete trocknen schneller aus als Beete — regelmaessiger gießen
      und mulchen reduziert den Wasserverbrauch stark.
