  - id: keimbedingungen-licht-waerme
    title: Keimtemperatur, Heizmatte und Licht fuer Saeumlinge
    content: |
      Keimdauer und Keimrate haengen direkt von Temperatur und Feuchtigkeit ab —
      Licht spielt erst nach dem Auflaufen eine Rolle.

      Keimtemperatur je nach Kulturgruppe:
      - Nachtschattengewaechse (Tomate, Paprika, Aubergine): 22-26°C optimal
      - Kuebitze (Kuerbis, Gurke, Zucchini): 22-25°C
      - Kohlgewaechse: 15-18°C (kühler als Nachtschatten!)
      - Krauter: 18-22°C (Ausnahmen: Basilikum >20°C, Petersilie schon ab 10°C)

      Heizmatte (Anzuchtmatte):
      Auf der normalen Fensterbank herrschen oft nur 16-18°C — zu kalt fuer
      Nachtschattengewaechse. Eine Heizmatte erwaermt das Substrat auf
      22-26°C und verkuerzt die Keimdauer von 14-21 Tagen auf 5-10 Tage.
      Nach dem Auflaufen Heizmatte abschalten oder Abstand vergroessern —
      Saeumlinge vertragen Waerme nach dem Keimen schlechter.

      Licht erst nach dem Auflaufen entscheidend:
      Sobald die Keimlinge auflaufen: SOFORT maximales Licht! Keimlinge die auch
      nur 1-2 Tage im Dunkeln oder Halbdunkel stehen, vergeilen (etiolieren) — sie
      werden lang, duenn und bruechig. Ohne ausreichend Licht muessen Pflanzen
      naeher ans Fenster gestellt oder eine Pflanzenlampe eingesetzt werden.

      Fensterbank: Suedausrichtung bringt 200-400 µmol/m²/s PPFD im Fruehjahr —
      ausreichend fuer Saeumlinge, aber nur bei wolkenlosem Wetter. An
      bedeckten Tagen zu wenig Licht → Vergeilen.
      Nordfenster: Zu dunkel fuer Voranzucht ohne Pflanzenlampe.

      Pflanzenlampe (Grow-Light) fuer Saeumlinge:
      100-200 µmol/m²/s PPFD genuegt fuer Keimlinge, 16 Stunden taeglich.
      Abstand LED-Panel zu Saemlingen: 20-30 cm. LED-Leiste oder Panel ab ca.
      30-50 € genuegen fuer eine Standardfensterbank-Flaeche.
      Nach dem Pikieren kann auf 200-400 µmol/m²/s erhoet werden.

      Temperatur nach dem Keimen absenken:
      Nach dem Auflaufen Temperatur auf 16-18°C absenken (Fenster kippen, kuehlere
      Stelle). Kuehle Temperaturen foerdern kompakten, robusten Wuchs.
    metadata:
      topic: keimbedingungen
      months: [1, 2, 3, 4]
      equipment: [heizmatte, pflanzenlampe, saatschale]
