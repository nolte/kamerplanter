  - id: voranzucht-wann-was
    title: Was vorziehen und wann — Rückrechnung vom Auspflanztermin
    content: |
      Nicht alle Kulturen profitieren von Voranzucht. Die Faustregel: Wer lange
      Anzuchtzeit hat oder im Freiland nicht ausreichend Zeit zum Reifen bekommt,
      wird vorgezogen. Wer Pfahlwurzeln bildet oder schnell keimrt, wird direkt gesaet.

      Vorziehen empfohlen (Saattermin = Auspflanztermin minus Anzuchtzeit):
      - Paprika, Chili, Aubergine: Anzucht 10-12 Wochen → Saatstart Januar-Februar
      - Tomate: Anzucht 6-8 Wochen → Saatstart Maerz (Auspflanzen nach Eisheiligen = 15. Mai)
      - Kohlarten (Brokkoli, Blumenkohl, Kohlrabi): Anzucht 4-6 Wochen → Maerz-April
      - Sellerie, Porree: Anzucht 8-10 Wochen → Februar-Maerz
      - Kuerbis, Zucchini: Anzucht NUR 3-4 Wochen (wachsen sonst zu gross) → April

      Direktsaat besser (kein Vorziehen):
      - Moehre, Pastinake, Rote Bete — Pfahlwurzel vertraegt Umpflanzen nicht
      - Radieschen, Rettich — zu schnell wachsend, kein Vorteil durch Voranzucht
      - Bohne, Erbse, Mais — keimen schnell, vertragen Wurzelstress schlecht
      - Spinat, Feldsalat — kaeltetolerant, Direktsaat ab Maerz problemlos

      Rückrechnung Beispiel Tomate:
      Letzter Frost: 15. Mai → minus 7 Tage Abhaertung → minus 7 Wochen Anzucht
      = Saatstart Anfang bis Mitte Maerz.
      Vorsicht: Zu fruehe Aussaat fuehrt zu grossen, stressgeplagten Pflanzen
      auf der Fensterbank — lieber 1 Woche spaeter als 3 Wochen zu frueh.
