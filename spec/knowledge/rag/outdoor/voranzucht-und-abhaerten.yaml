  - id: pikieren-schritt-fuer-schritt
    title: Pikieren — Zeitpunkt, Technik und welche Pflanzen es nicht vertragen
    content: |
      Pikieren bedeutet: einzelne Saeumlinge aus der Saatschale in eigene Toepfe
      umsetzen. Es gibt mehr Wurzelraum und verhindert Verdrängungskonkurrenz.

      Richtiger Zeitpunkt:
      Das erste echte Blattpaar — nicht die Keimblaetter (rund, meist gleich
      geformt) sondern die ersten artypischen Blaetter (gezahnte Tomatenform,
      gefingerte Kuerbisform). Zu frueh pikieren bedeutet zerbrechliche Wurzeln,
      zu spaet bedeutet verdraengte, verfilzte Wurzeln.

      Vorbereitung:
      - Einzeltoepfe 7-9 cm befuellen mit frischer Anzuchterde (leicht feuchten)
      - Pikierstab oder Bleistift bereit legen
      - Saatschale gut angießen 1 Stunde vor dem Pikieren (Wurzeln loesen sich besser)
      - Pflanzloch in Zieltopf vorbereiten: tief genug fuer die ganze Wurzel

      Technik Schritt fuer Schritt:
      1. Pikierstab neben Saeumling in die Erde stechen und Wurzel vorsichtig
         nach oben hebeln — nie am Stengel ziehen!
      2. Saeumling am Keimblatt anfassen (nicht am Stengel — Stengel ist empfindlich)
      3. In Zieltopf einsetzen — tiefer als vorher! Besonders bei Tomaten:
         den Stengel bis zu den Keimblaettern einbuddeln. Der eingegrabene
         Stengelanteil bildet Adventivwurzeln.
      4. Erde vorsichtig andruecken, angießen (nicht schwaemmen)
      5. 1-2 Tage an halbschattigem Ort aufstellen — Schatten reduziert
         Trockenstress waehrend die Wurzeln sich erholen

      Diese Pflanzen vertragen Pikieren NICHT gut:
      - Kuerbis, Zucchini, Gurke, Melone — Wurzeln sehr empfindlich. Besser:
        Direkt in Einzeltopfe saeen (3-4 Wochen vor Auspflanzung), dann
        ohne Umpflanzen ins Freiland setzen.
      - Bohne, Erbse — schneller als Pikieren keimt die Direktsaat im Freiland
      - Moehre, Pastinake — Pfahlwurzel bricht beim Umsetzen

      Nach dem Pikieren:
      Erste Woche weniger Wasser als spaeter. Kein Duenger fuer 2-3 Wochen —
      die neue Anzuchterde enthaelt genug Naehrstoffe. Erst wenn die Pflanze
      sichtbar weitergwaechst: normales Giessen und nach 3-4 Wochen minimale Duengung.
    metadata:
      topic: pikieren
      months: [2, 3, 4, 5]
      technique: pricking_out
      difficulty: beginner

  - id: abhaerten-hardening-off-detail
    title: Abhaerten — der kritische Schritt vor dem Auspflanzen ins Freiland
    content: |
      Abhaerten (Hardening Off) ist kein optionaler Schritt — es ist Pflicht.
      Pflanzen die im Haus aufgewachsen sind, kennen keinen Wind, keine direkte
      Sonne und keinen Temperaturwechsel. Der Schock beim unvermittelten Auspflanzen
      kann Sonnenbrand, Windschaden, Blattverlust oder Totalverlust verursachen.

      Das Abhaerungsprotokoll (10-14 Tage vor dem geplanten Auspflanztermin):
      Tag 1-3:
        2-3 Stunden draussen. Schattiger, windgeschuetzter Platz (Nordseite des
        Hauses, hinter einem Gebuesch). Noch kein direktes Sonnenlicht.
      Tag 4-6:
        4-5 Stunden draussen. Etwas Morgensonne ist okay. Immer noch windgeschuetzt.
      Tag 7-9:
        6-8 Stunden draussen. Zunehmend volle Sonne, auch leichter Wind.
        Bei Regen die Pflanzen kurz zurueckholen (noch empfindlich).
      Tag 10-12:
        Ganztags draussen. Nachts noch reinholen wenn Temperaturen unter 8-10°C
        fallen oder Frost droht.
      Tag 13-14:
        Tag und Nacht draussen, sofern frostfrei. Pflanzen sind abgehaertet.

      Zeichen einer erfolgreich abgehaerteten Pflanze:
      - Stengel dicker und stabiler als vorher
      - Blaetter dunkler und kompakter (weniger lang gestreckt)
      - Leicht blaeuliche oder violette Tonung der Stengel moeglich (normal!)
      - Pflanze bewegt sich im Wind, ohne zu knicken

      Was passiert ohne Abhaerten:
      - Sonnenbrand: weisse, braune oder papierartige Flecken auf den Blaettern
        (irreversibel, aber die Pflanze erholt sich wenn Ursache behoben)
      - Windschaden: Stengelbruch, Blattraender trocknen ein
      - Kaeltestress: Lila-Verfaerbung, stagnierendes Wachstum, bei empfindlichen
        Arten (Paprika, Aubergine) dauerhafte Wachstumsverzoegerung

      Abhaerten bei wechselhaftem Wetter:
      Bei Gewitter, Starkregen oder Temperaturen unter 5°C sofort reinholen.
      Kein Duengen waehrend der Abhaertungsphase — die Pflanze soll Energie
      fuer die Anpassung aufwenden, nicht fuer Wachstum.
    metadata:
      topic: abhaerten
      months: [4, 5]
      duration_days: 14
      technique: hardening_off
