  - id: auspflanzen-erste-woche
    title: Auspflanzen nach den Eisheiligen — Timing, Technik und Schneckenschutz
    content: |
      Der richtige Auspflanztermin fuer frostempfindliche Kulturen (Tomate, Paprika,
      Gurke, Kuerbis, Zucchini, Bohne, Basilikum) ist nach den Eisheiligen, also ab
      dem 15. Mai. Vor Mitte Mai droht in Mitteleuropa noch Nachtfrost — der diese
      Kulturen sofort schaedigt oder toetet. In Kaltluftsenken und Hochlagen: erst
      ab 20. Mai oder spaeter pflanzen.

      Bodenbedingung pruefen:
      Bodentemperatur muss mindestens 12°C betragen (Thermometer 10 cm Tiefe).
      Kalter Boden hemmt Wurzelwachstum und foerdert Wurzelfaeule.
      Im Zweifel schwarze Mulchfolie 2 Wochen vorab auslegen — erwaermt den Boden
      um 3-5°C.

      Pflanzloch vorbereiten:
      - Grosszuegig ausstechen: doppelte Topfgroesse
      - 1-2 Haende voll reifen Kompost einarbeiten
      - Pflanzloch gut waessern bevor die Pflanze eingesetzt wird (Anwasserung)
      - Pflanztiefe je nach Art:
        Tomate: tief einsetzen bis fast zu den untersten Blaettern —
        der begrabene Stengel bildet zahlreiche Adventivwurzeln und foerdert
        kraeftiges Wachstum.
        Alle anderen: auf gleiche Hoehe wie im Topf (nicht tiefer)

      Erste Woche nach dem Auspflanzen:
      - Mulchen: 5-8 cm Stroh oder Rasenschnitt um die Pflanze — haelt Feuchtigkeit,
        unterdrueckt Unkraut, kuehlt den Boden
      - Angießen: taeglich in der ersten Woche, spaeter nach Bedarf
      - Schneckenschutz sofort: Schneckenkorn (Eisenphosphat, bienenfreundlich),
        Schneckenringe aus Kupfer oder Kalk um die Pflanzstelle
      - Kein Duenger in den ersten 2 Wochen — Stress vermeiden, Wurzeln ausbreiten lassen
      - Windschutz fuer Paprika und Aubergine: Kleine Strauchschere oder Vliesbeuebel
        in der ersten Woche

      Wenn doch noch Frost kommt:
      Gartenvlies (17 g/m²) ueber Nacht ueber die Pflanzen legen. Morgens
      wieder entfernen, damit keine Ueberhitzung entsteht.
    metadata:
      topic: auspflanzen
      months: [5, 6]
      frost_tolerance: none
      technique: transplant
      difficulty: beginner

  - id: haeufige-voranzucht-fehler
    title: Haeufige Fehler bei der Voranzucht — Vergeilen, Umfallkrankheit und Co.
    content: |
      Diese Fehler kosten jedes Jahr viele Jungpflanzen. Sie sind leicht vermeidbar
      wenn man die Ursachen kennt.

      Vergeilen (Etiolieren) — Pflanze waechst lang, duenn, blass, streckt sich
      zum Licht hin:
      Ursache: Zu wenig Licht. Fensterbank mit Nordausrichtung oder bedeckte
      Tage ohne Pflanzenlampe. Auch zu wenig Abstand zur Lampe kann
      Lichtmangel vortaeuschen.
      Loesung: Pflanze naeher ans Fenster (suedliches Fenster bevorzugen) oder
      Pflanzenlampe einsetzen (mind. 100 µmol/m²/s, 16h taeglich).
      Vergeilte Saeumlinge sind zwar noch rettbar (Stengel beim Pikieren tiefer
      einpflanzen), aber nie so robust wie gut belichtete.

      Umfallkrankheit (Damping-off) — Saemlinge fallen kurz nach dem Auflaufen um,
      Stengel ist am Boden eingeschnuert oder verfault:
      Ursache: Pilze (Fusarium, Pythium) bei zu feuchtem Substrat, schlechter
      Belueftung und nicht-sterilem Substrat. Haeufig auf frisch gedungtem Blumenerde-
      oder selbst angesetzter Komposterde.
      Loesung: Sterile Anzuchterde verwenden, nach dem Auflaufen die Haube entfernen,
      Umluftventilator auf niedrigste Stufe stellen, nie staunass giessen.
      Befallene Saeumlinge sofort entfernen (Pilz uebertraegt sich auf Nachbarn).

      Zu frueh gesaet — Pflanzen werden riesig bevor draussen Auspflanzzeit ist:
      Ursache: Saatstart zu frueh geplant (z.B. Tomate schon im Januar).
      Loesung: Ruckrechnen (Auspflanztermin minus Anzuchtzeit) und im Zweifel
      1 Woche spaeter saeen. Grossen Tomaten auf der Fensterbank werden wurzelgebunden
      und gestresst — das sieht man der Pflanze den ganzen Sommer an.

      Nicht pikiert — viele Keimlinge in Saatschale bleiben ohne Umtopfen:
      Ursache: Vergessen oder befuerchtet es falsch zu machen.
      Loesung: Pikieren bei erstem echten Blattpaar ist einfacher als befuerchtet.
      Ohne Pikieren konkurrieren die Wurzeln, Pflanzen bleiben kueemmerlich.

      Nicht abgehaertet — direkt vom Fenster ins Beet:
      Ursache: Zeitmangel oder Unkenntnis. Folge: Sonnenbrand, Windschaden, Kaelteschock.
      Loesung: Mindestens 7 Tage Abhaertungsprotokoll einhalten. Lieber einen
      Auspflanztermin verschieben als Wochen Voranzucht durch Schock zu verlieren.
    metadata:
      topic: voranzucht_fehler
      months: [2, 3, 4, 5]
      problems: [etiolierung, damping_off, zu_frueh, nicht_pikiert, nicht_abgehaertet]
      difficulty: beginner
