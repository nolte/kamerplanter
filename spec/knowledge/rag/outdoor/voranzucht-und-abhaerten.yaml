  - id: aussaat-technik-substrat
    title: Anzuchterde, Saattiefe und Aussaat-Technik richtig machen
    content: |
      Das richtige Substrat und die korrekte Saattiefe entscheiden ob Samen keimen
      oder verrotten.

      Anzuchterde — warum speziell:
      Standard-Blumenerde ist zu naehrstoffreich (verbrennt Keimwurzeln) und oft
      zu grob. Anzuchterde ist naehrstoffarm (EC unter 1.0 mS/cm), feinkoernig,
      gut durchlueftet und steril (kein Damping-off durch Pilzsporen).
      Alternative: 1 Teil Kokoserde + 1 Teil Perlite — ebenso geeignet.

      Saattiefe — die 2x-Regel:
      Samentiefe = 2-facher Samendurchmesser. Beispiele:
      - Tomate (klein): 0,5 cm tief
      - Kuerbis (gross): 2-3 cm tief
      - Basilikum, Sellerie (sehr klein): nur andrücken, nicht bedecken (Lichtkeimer!)

      Lichtkeimer — Samen NICHT bedecken:
      Bedeckte Lichtkeimer keimen nicht oder sehr schlecht. Auf Substrat drücken,
      angießen, Haube drauf — das genuegt.
      Lichtkeimer: Basilikum, Sellerie, Majoran, Oregano, Petunie, Lobelie,
      Salat (teilweise), Thymian, Minze, Schnittlauch.

      Dunkelkeimer — abdunkeln:
      Dunkelkeimer brauchen Dunkelheit zum Keimen. Saatschale mit schwarzer Folie
      abdecken oder in einen dunklen Schrank stellen. Taeglich pruefen!
      Dunkelkeimer: Ringelblume, Kapuzinerkresse, Phaseln, Stiefmütterchen,
      Stockrose, Delphinblume, Spinat (leichter Dunkelkeimer).

      Aussaat-Ablauf:
      1. Substrat mit lauwarmen Wasser vorfeuchten (druecken — soll feucht, nicht nass sein)
      2. Saatschale befuellen, leicht andrücken
      3. Samen einzeln verteilen oder reihen (mind. 2 cm Abstand fuer spaeters Pikieren)
      4. Mit Sieberde oder Sand bedecken (ausser Lichtkeimer)
      5. Nochmals sanft andruecken
      6. Mit Sprühflasche (fein) angießen — nie mit Gießkanne (spuelt Samen weg!)
      7. Beschriften! (Art, Sorte, Aussaatdatum)
      8. Haube oder Klarsichtfolie aufsetzen fuer gleichmaessige Feuchte
