  - id: orchidee-grundpflege
    title: Orchideen-Grundpflege — Die wichtigsten Regeln
    content: |
      Orchideen sind anders als normale Zimmerpflanzen:
      Substrat: KEINE normale Blumenerde! Orchideen wachsen in der Natur
      auf Baeumen (Epiphyten). Sie brauchen grobes Orchideen-Substrat
      (Rindenstuecke, Sphagnum-Moos, Blaehton). Die Wurzeln muessen
      Luft bekommen — in Erde ersticken und verfaulen sie.
      Giessen: Alle 7-10 Tage den ganzen Topf 10-15 Minuten in lauwarmes
      Wasser tauchen, dann gut abtropfen lassen. Zwischen den Giess-
      Durchgaengen muss das Substrat fast austrocknen. Silbrig-gruene
      Wurzeln = trocken (giessen). Saftig-gruene Wurzeln = feucht (warten).
      Topf: Durchsichtiger Plastiktopf (Orchideen-Wurzeln betreiben
      Photosynthese!). Drainage-Loecher zwingend.
      Licht: Hell aber keine direkte Mittagssonne. Ost- oder Westfenster
      ideal. Blaetter sollten mittelgruen sein — dunkelgruen = zu wenig
      Licht, gelbgruen/roetlich = zu viel Licht.
      Temperatur: 18-25 Grad, keine Zugluft. Fuer Bluetenbildung
      voruebergehend kuehle Naechte (15-18 Grad) noetig.
    metadata:
      topic: orchid_basic_care
      species: Phalaenopsis
      difficulty: beginner
