  - id: microgreens-hygiene-schimmel
    title: Schimmel bei Microgreens verhindern — Ursachen und Gegenmassnahmen
    content: |
      Schimmel ist das haeufigste Problem beim Microgreens-Anbau —
      aber er ist gut zu verhindern wenn man die Ursachen kennt.
      WICHTIG zuerst — Wurzelhaare sind kein Schimmel!
      An den Wurzeln junger Keimlinge bilden sich weisse, feine,
      flauschige Faeden — das sind Wurzelhaare, kein Schimmel.
      Sie sind ganz normal, erscheinen im Bereich der Wurzeln und
      verschwinden wenn Luft und Licht die Oberflaeche erreichen.
      Echter Schimmel dagegen sitzt zwischen den Stengeln an der
      Substratoberflaeche, ist grau-gruenlich oder schwarz, riecht
      muffig und breitet sich flaechig aus.
      Ursachen fuer Schimmelbefall:
      - Zu viel Feuchtigkeit an der Oberflaeche (von oben giessen!)
      - Zu dicht gesaet ohne ausreichend Luftzirkulation
      - Zu wenig Belueeftung (stehende Luft)
      - Zu warme und feuchte Umgebung (ueber 26 Grad bei hoher Luft-
        feuchtigkeit)
      - Verunreinigte Schalen oder wiederverwendetes Substrat
      Praeventions-Massnahmen:
      1. Immer bottom-watering — niemals von oben auf die Keimlinge
         giessen. Wasser nur in die Auffangschale.
      2. Kleiner Ventilator: Schon ein leiser USB-Luefter auf niedriger
         Stufe reicht um die Luftzirkulation deutlich zu verbessern und
         Schimmelrisiko stark zu reduzieren.
      3. H2O2-Spray zur Praevention: 3 ml 3-prozentiges Wasserstoffperoxid
         (H2O2) pro Liter Wasser in eine Sprühflasche — nach der Aussaat
         einmal auf das Substrat spruehen (nicht auf Keimlinge!). Das
         desinifziert und reduziert Schimmeldruck ohne die Samen zu schaedigen.
      4. Schalen nach jeder Ernte gruendlich reinigen: Heisses Wasser,
         Spuelmittel oder 1-2% H2O2-Loesung. Schimmelsporen ueberleben
         in Schalenritzen.
      5. Substrat nie wiederverwenden: Verbrauchtes Substrat in den
         Kompost, frisches Material fuer die naechste Aussaat.
      6. Samen sauber aufbewahren: Kuehler, trockener, dunkler Ort.
         Feuchte Samen schimmeln bereits vor der Keimung.
      Was tun bei Schimmelbefall?
      Wenn Schimmel auftritt: Betroffene Bereiche entfernen, Luft-
      zirkulation erhoehen, Giessmengen reduzieren. Bei starkem Befall
      lieber neu ansetzen als weiter kaempfen — die Ernte in wenigen
      Tagen ist die bessere Investition.
