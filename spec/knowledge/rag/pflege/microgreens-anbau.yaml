  - id: microgreens-ausruestung
    title: Ausruestung fuer Microgreens — Was wird wirklich benoetigt?
    content: |
      Fuer den Einstieg braucht es erstaunlich wenig Ausruestung.
      Schalen: Standard sind flache Anzuchtschalen im 10x20-Zoll-Format
      (ca. 25x50 cm), ca. 5 cm tief. Zwei Schalen pro Anbau: eine mit
      Drainageloecher (Pflanzschale), eine ohne (als Auffangschale fuer
      das Bottom-Watering). Guenstige Plastikschalen aus dem Gartenhandel
      genuegen, stabilere Edelstahlschalen sind hygienischer und
      langlebiger.
      Substrat: Mehrere Optionen:
      - Kokosmatten oder Hanfmatten: Ideal fuer Hydroponik-Einsteiger und
        saubere Vermarktung. Einfach einlegen, anfeuchten, saeen.
        Kein Erde-Schmutz, einfache Entsorgung.
      - Kokoserde (Coco Coir): Guenstig, erneuerbar, gute Wasserhalte-
        kapazitaet. 2-3 cm Schicht reicht.
      - Anzuchterde oder Universalerde: Funktioniert gut, etwas unordentlicher.
      - Vermiculit: Gut fuer kleine Samen, haelt Feuchtigkeit gleichmaessig.
      Licht: Microgreens brauchen weniger Licht als ausgewachsene Pflanzen.
      100 bis 200 PPFD reichen aus — eine einfache LED-Leiste genuegt.
      Direktes Sonnenlicht am Suedfenster kann sogar zu warm und zu hell
      werden. Ost- oder Westfenster sind ideal; am Nordfenster hilft eine
      guenstige Pflanzenlampe.
      Dauer: 12 bis 16 Stunden Licht pro Tag.
      Belueftung: Ein kleiner USB-Ventilator auf niedriger Stufe verbessert
      die Luftzirkulation und reduziert Schimmelrisiko erheblich.
      Sprühflasche: Fuer die erste Anfeuchtung des Substrats und gelegent-
      liche Befeuchtung der Keimblaetter. Spaeter nur noch Bottom-Watering.
      Kein Duenger noetig: Der Samen speichert alle Naehrstoffe fuer
      die Microgreen-Phase. Wer duengt, riskiert eher Schimmel als Ertrag.
      Startkosten gesamt: Unter 50 Euro fuer eine komplette Erstausruestung
      (Schalen, Matten, LED-Leiste, Samen-Sortiment).
