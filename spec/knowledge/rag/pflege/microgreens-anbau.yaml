  - id: microgreens-grundlagen
    title: Was sind Microgreens — und warum lohnt sich der Anbau?
    content: |
      Microgreens sind junge Saemlinge die nach dem Keimblattstadium
      geerntet werden — typischerweise 7 bis 21 Tage nach der Aussaat,
      wenn die ersten echten Blaetter gerade erscheinen oder kurz davor
      stehen. Sie sind 2 bis 7 cm hoch und werden mit Substrat oder
      Matte als Basis angebaut.
      Abgrenzung zu aehnlichen Konzepten:
      Sprossen (z.B. Alfalfa, Linsen, Mungo-Bohnen) keimen im Glas oder
      Sieb ohne jedes Substrat — nur mit Wasser. Sie werden komplett
      gegessen inklusive Wurzel. Microgreens wachsen dagegen immer auf
      einem Substrat (Erde, Kokosmatten, Hanfmatten, Vermiculit) und
      werden knapp ueber der Oberflaeche abgeschnitten.
      Baby-Greens sind aelter als Microgreens, wachsen im Beet oder
      groesseren Topf und brauchen 3 bis 8 Wochen bis zur Ernte.
      Warum Microgreens?
      Studien zeigen, dass viele Microgreens 4 bis 40-mal mehr Nah-
      rstoffe enthalten als das ausgewachsene Gemuese — konzentriert
      in den Keimblaettern. Brokkoli-Microgreens enthalten z.B. besonders
      viel Sulforaphan, Radieschen-Microgreens liefern viel Vitamin C.
      Weitere Vorteile: ganzjaehrig indoor anbaubar, kaum Platz noetig
      (eine einzige Fensterbank reicht), sehr schnelle Ergebnisse (schon
      nach 5-7 Tagen sichtbares Wachstum), keine Erde notwendig wenn
      Matten verwendet werden, geringe Kosten.
      Beliebte Sorten: Brokkoli, Radieschen, Sonnenblume, Erbse,
      Basilikum, Senf, Rucola, Kresse, Weizengras, Rote Bete, Koriander,
      Mangold, Pak Choi.
