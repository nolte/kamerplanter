  - id: microgreens-sorten-guide
    title: Microgreens Sorten-Guide — Welche Sorte fuer wen?
    content: |
      Anfaenger-Sorten (schnell, zuverlaeassig, fehlerverzeihend):
      Radieschen: 5 bis 7 Tage bis zur Ernte. Sehr schnell, fast
      immer erfolgreich, scharf-wuerzig im Geschmack. Perfekt als
      Einstieg. Keine Vorbehandlung noetig.
      Kresse: 5 bis 7 Tage. Das absolut einfachste Microgreen
      ueberhaupt — funktioniert sogar auf feuchtem Kuechenpapier.
      Mild-pfeffrig. Klassisches Schulprojekt aus gutem Grund.
      Senf: 7 bis 10 Tage. Wuerzig, wachstumsstark, sehr dankbar.
      Gelbe oder braune Senfkerne liefern leicht unterschiedliche
      Schaerfe.
      Brokkoli: 8 bis 12 Tage. Mild-nussig, besonders naehrstoffdicht
      (Sulforaphan). Eine der gesundheitlich wertvollsten Sorten.
      Fortgeschrittene Sorten (etwas mehr Aufmerksamkeit noetig):
      Sonnenblume: 10 bis 14 Tage. Unbedingt 8 bis 12 Stunden einweichen!
      Nussig, knackig, beliebt in Salaten und auf Bruschetta. Braucht
      etwas mehr Substrat-Tiefe (3 cm) und guten Druck in der Blackout-
      Phase damit die Samenschalen abgestreift werden.
      Erbsenschoss: 12 bis 16 Tage. Suesslich, aromatisch — erinnert
      an frische Erbsen. Ebenfalls einweichen (8 Stunden). Wachsen sehr
      schnell in die Hoehe; braucht etwas mehr Licht als andere Sorten.
      Rote Bete: 12 bis 16 Tage. Erdiges Aroma, tiefrote Faerbung,
      spektakulaer in der Optik. Keimt etwas langsamer.
      Basilikum: 14 bis 21 Tage. Die anspruchsvollste Anfaenger-Sorte.
      Basilikumsamen bilden beim Befeuchten eine Schleimschicht (Mucilage)
      — das ist normal und kein Schimmel! Basilikum keimt langsam, braucht
      mehr Waerme (mind. 22 Grad) und vertraegt kein Uebergiessen.
      Rucola: 7 bis 10 Tage. Scharf-pfeffrig, sehr wuechsig.
      Geschmacksprofile:
      Scharf/wuerzig: Radieschen, Senf, Rucola
      Mild/nussig: Sonnenblume, Erbsenschoss
      Aromatisch: Basilikum, Koriander
      Mild/erdig: Brokkoli, Rote Bete, Weizengras
