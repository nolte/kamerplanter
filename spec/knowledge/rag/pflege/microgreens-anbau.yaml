  - id: microgreens-profi-vermarktung
    title: Microgreens professionell anbauen und vermarkten
    content: |
      Wer ueber den Eigenverbrauch hinaus denkt, kann mit Microgreens
      ein kleines Nebeneinkommen aufbauen — der Markt in Gastronomie
      und auf Wochenmaerkten ist gut aufnahmefaehig fuer frische,
      lokal erzeugte Microgreens.
      Anbausystem skalieren:
      Stapelbare Regalgestelle mit LED-Beleuchtung pro Ebene ermoeglichen
      den Anbau auf 4 bis 6 Ebenen uebereinander auf weniger als einem
      Quadratmeter Grundflaeche. Eine 120-cm-Standleuchte mit Full-Spectrum-
      LED liefert genuegend Licht fuer eine Schale (200-300 PPFD genuegen).
      Ernteplanung fuer kontinuierliche Versorgung:
      Gestaffelte Aussaat ist der Schluessel: Alle 2 bis 3 Tage eine
      neue Schale ansetzen. So ist alle 2 bis 3 Tage eine Schale erntereif
      was taeglich frische Ware ohne Leerlauf ergibt. Fuer eine taeglich
      erntefaehige Produktion von z.B. Radieschen (7 Tage Wachstum)
      braucht man 3 bis 4 Schalen im Rotation.
      Verpackung und Haltbarkeit:
      Microgreens halten im Kuehlschrank bei 4 Grad Celsius 3 bis 5 Tage
      nach der Ernte. Ideale Verpackung: Clamshell-Boxen (100-125 g),
      Cut-to-Order auf Bestellung. Lebend auf dem Substrat halten sie
      laenger — Gastro-Kunden schaetzen oft die lebende Schale (1 bis
      2 Wochen haltbar) die sie selbst schneiden.
      Absatzwege:
      Gastronomie (Restaurants, Cafes): Direkter Kontakt, regelmaessige
      Bestellungen. Sternekoeche und Veggie-Restaurants zahlen Premiumpre-
      ise fuer aussergewoehnliche Sorten (Blutampfer, Shiso, Thai-Basilikum).
      Farmers Markets / Wochenmarkt: Sichtbarer Verkauf, Kundenkontakt,
      gute Preise bei hochwertiger Praesentation.
      Kosten-Ertrags-Uebersicht (Beispiel Radieschen):
      Eine Standard-Schale (25x50 cm) ergibt ca. 200-300 g Ernte.
      Samenkosten ca. 0,50-1,00 Euro pro Schale, Substrat ca. 0,30 Euro.
      Verkaufspreis frisch: 3-6 Euro pro 100 g. Marge ist attraktiv bei
      guter Auslastung.
      LED-Optimierung:
      Full-Spectrum-LED mit 4000-6500 K Farbtemperatur. Abstand zur
      Pflanze: ca. 20-30 cm. Timer auf 14-16 Stunden pro Tag.
      Energiekosten sind gering (10-20 Watt pro Schale genuegen).
