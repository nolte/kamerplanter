  - id: microgreens-aussaat-wachstum
    title: Microgreens aussaeen und pflegen — Schritt fuer Schritt
    content: |
      Schritt 1 — Einweichen (nur grosse Samen):
      Sonnenblume, Erbse und Weizengras muessen 8 bis 12 Stunden in
      Wasser eingeweicht werden bevor die Aussaat erfolgt. Kleine Samen
      wie Radieschen, Brokkoli, Kresse oder Basilikum brauchen kein
      Einweichen.
      Schritt 2 — Dicht saeen:
      Das Substrat gleichmaessig anfeuchten (nicht triefend nass, aber
      durchgehend feucht). Samen lueckenlos und dicht aussaeen —
      dichter als man denkt! Bei Microgreens ist dichtes Saeen richtig:
      Die Samen sollten den Boden fast komplett bedecken, leicht
      ueberlappend ist in Ordnung. Zu duenn gesaet gibt schlechten Ertrag.
      Schritt 3 — Blackout-Phase (2 bis 4 Tage):
      Schale abdecken (zweite Schale umgedreht als Deckel, dunkle Tuete,
      oder Karton). Leichtes Gewicht obendrauf legen (z.B. eine mit Wasser
      gefuellte zweite Schale) — der Druck hilft Samen und Substrat in
      Kontakt zu halten und foerdert gleichmaessiges Keimen. In der
      Blackout-Phase strecken sich die Stengel auf der Suche nach Licht.
      Die Keimlinge werden laenger und zarter — das ist erwuenscht!
      Keine Feuchtigkeit noetig waehrend der Blackout-Phase wenn das
      Substrat beim Saeen gut angefeuchtet war.
      Schritt 4 — Licht (nach Blackout):
      Sobald die meisten Keimlinge 2 bis 3 cm hoch sind und gegen den
      Deckel druecken, kommt Licht dazu. 12 bis 16 Stunden pro Tag.
      Kein direktes Mittagssonnenlicht noetig; helles indirektes Licht
      oder eine einfache LED-Leiste genuegt.
      Schritt 5 — Bottom-Watering (nicht von oben giessen!):
      Wasser IMMER von unten zugeben. Die Pflanzschale (mit Loecher)
      in die Auffangschale stellen und dort Wasser eingiessen.
      Das Substrat saugt Wasser von unten auf. Von oben giessen
      foerdert Schimmel auf dem dichten Saatgut und beschaedigt
      zarte Keimlinge.
      Temperatur: 18 bis 24 Grad Celsius. Kuehlere Temperaturen
      verlangsamen das Wachstum, waermere foerdern Schimmel.
      Schritt 6 — Ernte:
      Mit einer sauberen Schere oder einem scharfen Messer knapp
      ueber dem Substrat abschneiden. Erntezeit je nach Sorte 7 bis
      21 Tage nach Aussaat (Details im Sortenguide). Frisch geerntet
      schmecken Microgreens am besten; im Kuehlschrank halten sie
      3 bis 5 Tage.
