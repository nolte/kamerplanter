  - id: kuebelpflanzen-winter-pflege
    title: Kuebelpflanzen richtig ueberwintern
    content: |
      Kuebelpflanzen wie Oleander, Citrus, Olive, Fuchsie, Engelstrompete
      oder Pelargonie sind nicht frosthart und muessen vor dem ersten Frost
      ins Winterquartier.
      Das ideale Winterquartier:
      - Frostfrei: Temperatur zwischen 5-10 Grad Celsius, kein Frost
      - Kuehler Raum: NICHT ins warme Wohnzimmer! Kuebelpflanzen brauchen
        kuehle Ueberwinterung (Keller mit Fenster, Garage, Treppenhaus,
        unbeheizter Wintergarten)
      - Hell: Moeglichst viel Licht. Dunkle Keller nur fuer laubabwerfende
        Arten (Fuchsie, Engelstrompete). Immergruene (Oleander, Citrus)
        MUESSEN hell stehen
      Pflege im Winterquartier:
      - Wenig giessen: Substrat darf nicht komplett austrocknen, aber nur
        sparsam giessen. Alle 2-4 Wochen pruefen. Staunaesse unbedingt
        vermeiden — reduzierter Stoffwechsel kann Naesse nicht verarbeiten.
      - Kein Duenger: Absolut kein Duenger waehrend der Ueberwinterung!
        Erst wieder duengen wenn die Pflanze im Fruehling neu austreibt.
      - Schaedlinge kontrollieren: Schildlaeuse und Wolllaeuse lieben
        das trockene Winterquartier. Regelmaessig kontrollieren.
      - Blaetter fallen ab? Bei laubabwerfenden Arten normal. Bei immer-
        gruenen: zu dunkel oder zu warm → Standort korrigieren.
      Rausstellung: Nach den Eisheiligen (ab Mitte Mai). Erst 7-10 Tage
      im Halbschatten abhaerten, dann an den endgueltigen Standort.
    metadata:
      topic: container_plant_overwintering
      temperature_celsius: [5, 10]
      difficulty: beginner
