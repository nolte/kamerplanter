  - id: wurzelstock-teilung
    title: Wurzelstock-Teilung beim Umtopfen
    content: |
      Was ist Wurzelstock-Teilung und wann mache ich das? Viele Pflanzen
      wachsen als Horst — sie bilden mehrere Triebe aus einem gemeinsamen
      Wurzelstock. Beim Umtopfen kannst du diesen Horst einfach teilen
      und bekommst sofort mehrere fertige Pflanzen mit eigenen Wurzeln.
      Ideale Kandidaten:
      - Spathiphyllum (Einblatt): Bildet dichte Horste, laesst sich
        leicht in 2-4 Teile trennen.
      - Calathea/Maranta: Vorsichtig teilen, jedes Teil braucht
        mindestens 3-4 Blaetter und intakte Wurzeln.
      - Farne (Nephrolepis, Asplenium): Wurzelballen halbieren oder
        dritteln, jedes Stueck in frisches Substrat.
      - Graeser (Carex, Festuca): Im Fruehling teilen, kraeftig
        zurueckschneiden nach der Teilung.
      So geht's:
      1. Pflanze aus dem Topf nehmen und Erde vorsichtig von den
         Wurzeln schuetteln oder abspuelen.
      2. Natuerliche Trennlinien suchen — oft siehst du, wo sich
         einzelne Triebgruppen abgrenzen.
      3. Mit den Haenden auseinanderziehen. Wenn die Wurzeln zu
         verfilzt sind: sauberes Messer benutzen, nicht reissen.
      4. Jedes Teil muss eigene Wurzeln und mindestens 2-3 Triebe haben.
         Zu kleine Teile kuemmern oder sterben.
      5. Sofort in frisches, leicht feuchtes Substrat einpflanzen.
      6. Erste Woche: Halbschatten, erhoehte Luftfeuchtigkeit, nicht
         duengen. Nach 2 Wochen normal weiterpflegen.
      Bester Zeitpunkt: Fruehling, wenn die Pflanze sowieso umgetopft
      wird und in die Wachstumsphase startet.
    metadata:
      topic: root_division
      difficulty: easy
      plants: [spathiphyllum, calathea, ferns, grasses]

  - id: kindel-ableger
    title: Kindel und Ableger — Babypflanzen abtrennen
    content: |
      Was sind Kindel und wann trenne ich sie ab? Kindel (auch Ableger
      oder Offsets) sind Miniaturpflanzen, die von der Mutterpflanze
      direkt gebildet werden. Sie wachsen an der Basis, an Stengeln
      oder an Bluetentrieben und sind genetisch identische Klone.
      Typische Kindel-Bildner:
      - Pilea peperomioides (Ufopflanze): Bildet staendig kleine
        Ableger an der Basis und manchmal am Stengel. Wenn der Ableger
        5-6 eigene Blaetter hat: mit scharfem Messer abtrennen, dabei
        moeglichst eigene Wurzeln mitnehmen.
      - Chlorophytum (Gruenlilie): Bildet Kindel an langen Blueten-
        trieben. Entweder abschneiden und in Wasser/Substrat bewurzeln,
        oder den Trieb in einen Nebentopf leiten und dort bewurzeln
        lassen (Absenker-Methode).
      - Bromelien (Guzmania, Vriesea): Die Mutterpflanze stirbt nach
        der Bluete langsam ab und bildet 1-3 Kindel an der Basis.
        Abtrennen, wenn sie mindestens ein Drittel der Muttergroesse
        erreicht haben — vorher sind sie nicht ueberlebensfaehig.
      - Aloe vera: Bildet Ableger neben der Mutterpflanze. Beim
        Umtopfen vorsichtig abdrehen oder abschneiden.
      - Agave: Aehnlich wie Aloe — Ableger an der Basis.
      Allgemeine Regel: Kindel nicht zu frueh abtrennen! Sie beziehen
      Naehrstoffe von der Mutterpflanze. Warte, bis sie eigene Wurzeln
      und mindestens 3-4 Blaetter haben. Zu kleine Kindel haben eine
      hohe Ausfallrate.
    metadata:
      topic: offsets_pups
      difficulty: easy
      plants: [pilea, chlorophytum, bromeliads, aloe, agave]

  - id: auslaeufer
    title: Auslaeufer bewurzeln und abtrennen
    content: |
      Was sind Auslaeufer und wie nutze ich sie zur Vermehrung?
      Auslaeufer (Stolonen) sind oberirdische oder knapp unterirdische
      Triebe, an deren Spitzen neue Pflaenzchen entstehen. Die
      Mutterpflanze versorgt sie ueber den Auslaeufer, bis sie
      eigene Wurzeln gebildet haben.
      Typische Auslaeufer-Pflanzen:
      - Erdbeere: Bildet nach der Ernte viele Auslaeufer. Die ersten
        1-2 Ableger (nahe der Mutter) sind am kraeftigsten. Weitere
        entfernen, sie schwaecht die Mutterpflanze. Ableger in einen
        kleinen Topf mit Erde leiten und mit Drahtbuegel fixieren.
        Auslaeufer erst kappen, wenn der Ableger gut bewurzelt ist
        (2-3 Wochen).
      - Chlorophytum (Gruenlilie): Auslaeufer an Bluetentrieben —
        gleiche Methode wie bei Erdbeere, oder abschneiden und in
        Wasser stellen.
      - Saxifraga stolonifera (Judenbart): Bildet haengende Auslaeufer
        mit Miniaturpflanzen — dekorativ und leicht zu vermehren.
      Absenker-Methode im Detail:
      1. Auslaeufer mit Jungpflanze identifizieren.
      2. Kleinen Topf mit feuchtem Substrat neben die Mutterpflanze
         stellen.
      3. Jungpflanze auf das Substrat legen, mit Drahtbuegel oder
         Stein fixieren, damit Bodenkontakt besteht.
      4. Regelmaessig giessen — die Jungpflanze bildet innerhalb von
         2-4 Wochen eigene Wurzeln.
      5. Auslaeufer kappen, sobald die Jungpflanze fest verwurzelt ist.
      6. Noch 1 Woche im Halbschatten akklimatisieren, dann normal
         weiterpflegen.
    metadata:
      topic: runners_stolons
      difficulty: easy
      plants: [strawberry, chlorophytum, saxifraga]

  - id: rhizom-teilung
    title: Rhizom-Teilung — unterirdische Sprosse teilen
    content: |
      Was ist ein Rhizom und wie teile ich es? Ein Rhizom ist ein
      verdickter unterirdischer Spross (kein Wurzel!), der horizontal
      waechst und an jedem Knoten neue Triebe und Wurzeln bilden kann.
      Rhizome speichern Energie und sind ideal zur Vermehrung geeignet.
      Typische Rhizom-Pflanzen:
      - Iris (Schwertlilie): Alle 3-4 Jahre teilen, sonst bluehen sie
        nicht mehr. Rhizom ausgraben, alte Mitte entfernen, aeussere
        Stuecke mit je einem Blaetterfaecher und gesunden Wurzeln
        weiterverwenden. Rhizom flach pflanzen — Oberseite darf
        leicht aus der Erde schauen.
      - Ingwer (Zingiber): Frisches Rhizom aus dem Supermarkt (Bio,
        mit Augen/Knospen) funktioniert. In Stuecke mit je 2-3 Augen
        brechen, 1 Tag antrocknen lassen, flach in feuchtes Substrat
        legen, Augen nach oben.
      - Zamioculcas (Gluecksfeder): Bildet kartoffelartige Rhizome.
        Beim Umtopfen vorsichtig teilen, jedes Stueck braucht mindestens
        ein Auge/einen Triebansatz. Bewurzelung dauert Monate — Geduld!
      - Sansevieria: Waechst ueber Rhizome, die unterirdisch neue
        Triebe bilden. Rhizom-Stueck mit Trieb abschneiden.
      - Maigloekkchen, Bambus: Rhizome sehr wuchsfreudig, Teilung
        dient auch der Ausbreitungs-Kontrolle.
      Allgemeine Tipps:
      - Schnittflaechen mit Holzkohlepulver oder Zimtpulver bestauben,
        um Pilzbefall zu verhindern.
      - Nach der Teilung sparsam giessen, bis neue Wurzeln aktiv sind.
      - Bester Zeitpunkt: Fruehling oder nach der Bluete.
    metadata:
      topic: rhizome_division
      difficulty: moderate
      plants: [iris, ginger, zamioculcas, sansevieria, bamboo]
