      harvest_window_amber_percent: "10-30"

  - id: pk-dosierung-ec-management
    title: PK-Boost Dosierung und EC-Management
    content: |
      PK-Boost erhoeht die Gesamt-EC der Naehrloesung. Diesen EC-Beitrag nicht
      unterschaetzen — er kann leicht zu Ueberduengung fuehren, wenn die Basis-EC
      nicht angepasst wird.

      EC-Beitrag typischer PK-Produkte:
      - PK 13-14 (Standarddosis 1 ml/L): ca. +0,3-0,5 mS/cm
      - Monokaliumphosphat (1 g/L): ca. +0,7-1,0 mS/cm (hochkonzentriert!)
      - Organische PK-Booster (Bat Guano Fluessig): ca. +0,1-0,3 mS/cm

      EC-Kompensation: Wenn die Ziel-EC in der Bluete 1,6 mS/cm betraegt und der
      PK-Boost 0,4 mS/cm beitraegt, muss die Basis-Naehrloesung auf 1,2 mS/cm
      reduziert werden. Die Gesamt-EC darf die Phasen-Ziel-EC nicht ueberschreiten.

      Praxis-Vorgehen:
      1) Basis-Naehrloesung ansetzen (EC etwas niedriger als Ziel)
      2) PK-Boost zugeben
      3) Gesamt-EC messen
      4) Falls EC zu hoch: Mit Wasser verduennen, NICHT den PK-Boost teilweise entfernen
      5) pH-Wert kontrollieren (PK-Produkte koennen pH senken)

      Haeufiger Fehler: Basis-EC beibehalten UND PK-Boost obendrauf dosieren. Ergebnis:
      EC-Spitze von 2,0+ mS/cm, Blattspitzenbrand, Naehrstoff-Lockout. Besonders
      gefaehrlich bei empfindlichen Sorten (Leichtzehrer, Sativa-dominante Genetiken).

      Empfehlung: Mit 50% der Hersteller-Empfehlung starten. Nur wenn die Pflanze
      nach 3-5 Tagen keine Stresszeichen zeigt, auf 75% und dann 100% steigern.
      Pflanzenbeobachtung ist wichtiger als das Etikett.
    metadata:
      pk_13_14_ec_per_ml: "0.3-0.5"
      mkp_ec_per_g: "0.7-1.0"
      starting_dose: "50%"
      increase_interval_days: "3-5"

  - id: pk-ueberdosierung-erkennen
    title: PK-Ueberdosierung erkennen und korrigieren
    content: |
      PK-Ueberdosierung ist einer der haeufigsten Fehler in der Bluete. Die Symptome
      werden oft faelschlicherweise als andere Probleme diagnostiziert.

      Symptome der Phosphor-Ueberdosierung:
      - Dunkelgruene, fast schwarz-gruene Blaetter
      - Blattspitzenbrand (braune, trockene Spitzen)
      - Blaetter klauen/krallen sich nach unten
      - Zink-, Eisen- und Kupfer-Mangelsymptome (P-Ueberschuss blockiert Spurenelemente)
      - Blaetter werden steif und sproede
      - Calcium- und Magnesium-Aufnahme wird gehemmt

      Symptome der Kalium-Ueberdosierung:
      - Aehnlich wie P-Ueberschuss: Blattspitzenbrand
      - Calcium- und Magnesium-Mangel (kompetitive Hemmung)
      - Interkostalchlorose (aehnelt Mg-Mangel, ist aber K-induziert)
      - Wurzelschaeden bei starker Ueberdosierung
      - Salzkrusten auf der Substrat-Oberflaeche

      Abgrenzung: Die Symptome ueberlappen stark mit echtem Ca/Mg-Mangel. Diagnose-
      Schluessel: Wenn Ca/Mg-Supplementierung nicht hilft und EC hoch ist (>2,0 mS/cm),
      liegt wahrscheinlich PK-Ueberschuss vor, der Ca/Mg blockiert.

      Sofortmassnahmen:
      1) PK-Boost sofort stoppen
      2) EC der Naehrloesung um 30-40% reduzieren
      3) In Hydroponik: Reservoirwechsel mit reduzierter EC (nur Basis, kein PK)
      4) In Kokos/Erde: Flush mit 2-3x Topfvolumen pH-adjustiertem Wasser
      5) Nach 3-5 Tagen Erholung: Basis-Naehrloesung ohne PK-Boost fuer 1 Woche
      6) PK-Boost erst wieder einfuehren, wenn Pflanze gesund, bei 25% der vorherigen Dosis

      Langzeitfolge: In der Bluete kann eine PK-Ueberdosierung irreversiblen Ertrags-
      und Qualitaetsverlust verursachen, da beschaedigte Bluetenteile nicht regenerieren.
    metadata:
      phosphorus_excess_sign: dark_leaves_clawing
      potassium_excess_sign: leaf_tip_burn_with_interveinal_chlorosis
      ec_reduction: "30-40%"
      flush_volume: "2-3x_pot_volume"
      recovery_days: "3-5"

  - id: pk-boost-nicht-fuer-alle
    title: PK-Boost — Nicht fuer alle Pflanzen noetig
    content: |
      PK-Boost ist kein Universalmittel. Viele Pflanzen brauchen keinen zusaetzlichen
      PK-Boost und reagieren sogar negativ darauf.

      Pflanzen die von PK-Boost profitieren:
      - Cannabis (alle Sorten): Deutlicher Ertragszuwachs bei korrektem Timing
      - Tomaten: Groessere, schmackhaftere Fruechte
      - Paprika und Chili: Mehr und schwaerfere Fruechte
      - Erdbeeren: Suessere Fruechte, laengere Erntephase
      - Kuerbisgewaechse: Groessere Fruechte

      Pflanzen die KEINEN PK-Boost brauchen:
      - Blattgemuese (Salat, Spinat, Mangold): Hoeherer PK foerdert vorzeitige
        Bluete (Schiessen), was die Ernte ruiniert
      - Kraeuter (Basilikum, Petersilie, Koriander): Werden durch P/K-Ueberschuss
        bitter und schiessen schneller
      - Wurzelgemuese (Moehren, Radieschen): Basis-Duengung reicht
      - Microgreens und Sprossen: Wachsen zu kurz fuer PK-Boost-Relevanz

      Pflanzen mit reduziertem PK-Bedarf:
      - Bohnen und Erbsen (Leguminosen): Fixieren eigenen Stickstoff, moderate Basis-
        Duengung plus leichter PK-Boost (50% Dosis) bei Huelsen-Bildung reicht
      - Zierpflanzen: Abhaengig von Art. Bluetenpflanzen (Rosen, Dahlien) profitieren,
        Gruenpflanzen (Farne, Monstera) nicht.

      Generelle Regel: PK-Boost nur fuer Pflanzen, bei denen Blueten oder Fruechte
      das Ernteziel sind. Bei Blaettern, Wurzeln oder Stengeln als Ernteziel: Kein PK-Boost,
      stattdessen ausgewogene oder N-betonte Ernaehrung beibehalten.
    metadata:
      benefit_crops: [cannabis, tomatoes, peppers, strawberries, squash]
      avoid_crops: [lettuce, spinach, herbs, microgreens]
      reduced_dose_crops: [legumes, ornamental_flowers]

  - id: pk-autoflower-timing
    title: PK-Boost Timing bei Autoflowern
    content: |
      Autoflowering Sorten (Selbstblueher) haben einen komprimierten Lebenszyklus
      von typischerweise 8-12 Wochen gesamt (Saemling bis Ernte). Das PK-Boost-Timing
      muss entsprechend angepasst werden.

      Autoflower-Lebenszyklus (typisch):
      - Woche 1-2: Saemling (keine Duengung oder sehr leicht, EC 0,3-0,5)
      - Woche 3-4: Vegetativ (EC 0,6-1,0, N-betont)
      - Woche 5: Uebergang / Pre-Flower (Stretch beginnt)
      - Woche 6-7: Fruehe Bluete (Stretch endet, Blueten bilden sich)
      - Woche 8-9: Peak-Bluete (maximale Bluetenentwicklung)
      - Woche 10-11: Spaete Bluete / Reife
      - Woche 11-12: Flush und Ernte

      PK-Boost-Timing fuer Autoflower:
      - Woche 6 (nach Stretch): PK-Boost Start bei 25-50% Dosis
      - Woche 7-8: PK-Boost bei 50-75% Dosis (Peak)
      - Woche 9: PK-Boost auf 25-50% reduzieren
      - Woche 10: PK-Boost stoppen
      - Woche 11-12: Flush

      Besonderheiten bei Autoflowern:
      - KEIN ueraggressives Feeding: Autoflower haben genetisch bedingt oft kleinere
        Wurzelsysteme und vertragen weniger EC als photoperiodische Sorten.
        Maximale EC selten ueber 1,4-1,6 mS/cm.
      - Kein Stress: Jeder Stress (auch durch Ueberduengung) kostet Ertrag, da keine
        Moeglichkeit besteht, die vegetative Phase zu verlaengern.
      - Beobachtung ist alles: Autoflower-Sorten variieren stark in ihrer Bluetedauer.
        Trichom-Beobachtung (milchig/bernstein) ist zuverlaessiger als Wochen-Zaehlung.
    metadata:
      total_lifecycle_weeks: "8-12"
      pk_start_week: "6"
      pk_peak_weeks: "7-8"
      pk_stop_week: "10"
      max_ec: "1.4-1.6"

  - id: pk-outdoor-timing
    title: PK-Boost Timing im Freiland
    content: |
      Im Freiland folgt die Bluete dem natuerlichen Lichtzyklus und variiert je nach
      Breitengrad, Sorte und Klima. Das PK-Boost-Timing orientiert sich an der
      natuerlichen Blueteprogression statt an festen Wochenschemata.

      Cannabis Outdoor (Mitteleuropa, ~50 Grad N):
      - Blueteinduktion: Ab Mitte/Ende August (ununterbrochene Nachtlaenge >10-12h)
      - Stretch: Mitte August bis Anfang September (2-3 Wochen)
      - PK-Boost Start: Anfang September (nach sichtbarem Stretch-Ende)
      - PK-Boost Peak: Mitte September bis Anfang Oktober
      - PK-Boost Stop: Mitte Oktober
      - Ernte: Ende Oktober bis Anfang November (sortenabhaengig)

      Fruchtgemuese Outdoor:
      - Tomaten: PK-Boost ab Erscheinen der ersten Bluetentrauben, durchgehend
        bis 2 Wochen vor letzter Ernte. Kalimagnesia (40-60 g/m²) als Top-Dressing
        alle 3-4 Wochen zusaetzlich zur Fluessigduengung.
      - Paprika: Ab Fruchtansatz (ca. Juni/Juli) bis September.
      - Kuerbis: Ab Fruchtansatz bis Reife. Bei Riesenkuerbissen hohe PK-Dosen.

      Organischer PK-Boost im Freiland:
      - Beinwelljauche: 1:10 verduennt, alle 2 Wochen (kaliumreich)
      - Knochenmehl: 50-80 g/m² als Top-Dressing zu Bluetebeginn (phosphorreich)
      - Bat Guano (Phosphor-reich): 30-50 g/m² zu Bluetebeginn
      - Holzasche: 30-50 g/m² (kaliumreich, pH-erhoehend — Vorsicht bei Kalkboeden)
      - Bananenschalen-Duenger (getrocknet/gemahlen): 50 g/m², kaliumreich

      Wetter-Anpassung: Bei Kuehlperioden (<15 Grad nachts) PK-Aufnahme reduziert.
      Blattspray mit PK-Loesung kann bei kuehlen Wurzelzonen die Versorgung unterstuetzen.
    metadata:
      cannabis_outdoor_pk_start: early_September
      cannabis_outdoor_harvest: late_October
      tomato_pk_start: first_flower_truss
