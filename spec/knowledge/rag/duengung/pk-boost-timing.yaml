chunks:
  - id: pk-boost-grundlagen
    title: Was ist ein PK-Boost und wofuer wird er eingesetzt?
    content: |
      Ein PK-Boost ist ein Zusatzduenger mit erhoehtem Phosphor- (P) und Kaliumgehalt (K),
      der waehrend der Bluetephase zusaetzlich zur Basis-Naehrloesung verabreicht wird.
      Ziel ist die Maximierung von Blueten-/Fruchtbildung, Ertrag und Qualitaet.

      Phosphor (P) in der Bluete: Essentiell fuer Energietransfer (ATP), DNA/RNA-Synthese,
      Blueteninduktion und Samenbildung. Erhoehter Bedarf ab Blutebeginn, Maximum in der
      mittleren Bluete. Phosphormangel in der Bluete fuehrt zu kleinen, lockeren Blueten
      und deutlich reduziertem Ertrag.

      Kalium (K) in der Bluete: Reguliert Wasserhaushalt (Stomata), aktiviert Enzyme
      fuer Zucker-/Staerkeproduktion, foerdert den Transport von Assimilaten in die
      Blueten/Fruechte. Kalium ist der "Qualitaets-Naehrstoff" — er verbessert Geschmack,
      Aroma, Farbe und Haltbarkeit von Fruechten.

      Typische PK-Verhaeltnisse kommerzieller Produkte:
      - PK 13-14 (z.B. Canna): 0-13-14 (kein Stickstoff)
      - PK 9-18 (z.B. Advanced Nutrients): Mehr K als P
      - PK 10-10: Ausgeglichen, fuer moderate Anwendung
      - Monokaliumphosphat (MKP): 0-52-34, hochkonzentriert, sparsam dosieren

      Wichtig: PK-Boost ist ein ZUSATZ, kein Ersatz fuer Basis-Duenger. Die Basis-
      Naehrloesung liefert weiterhin N, Ca, Mg und Spurenelemente. Der PK-Boost
      erhoeht nur die P/K-Fraktion fuer den gesteigerten Bedarf in der Bluete.
    metadata:
      purpose: increased_PK_during_flowering
      common_ratios: ["0-13-14", "0-9-18", "0-10-10", "0-52-34"]

  - id: pk-boost-startzeitpunkt
    title: Wann mit dem PK-Boost beginnen
    content: |
      Das richtige Timing beim Start des PK-Boosts ist entscheidend. Zu frueh schadet
      mehr als es nuetzt, zu spaet verschenkt Ertragspotenzial.

      Standard-Zeitpunkt: Woche 3-4 der Bluete, NACHDEM der Stretch (vertikales
      Streckungswachstum) abgeschlossen ist. Der Stretch dauert typischerweise 1-3
      Wochen nach Umstellung auf 12/12 Licht (Photoperiode). Waehrend des Stretchs
      braucht die Pflanze noch verhaeltnismaessig viel Stickstoff fuer vegetatives
      Wachstum — PK-Boost waere hier kontraproduktiv.

      Visuelle Indikatoren fuer den Start:
      - Vertikales Wachstum hat aufgehoert (Stretch ist vorbei)
      - Erste sichtbare Blueten-Cluster (Calyxe) bilden sich
      - Weisse Faeden (Stigmen/Narben) sind deutlich sichtbar
      - Die Pflanze wechselt vom "nach oben wachsen" zum "nach aussen fuellen"

      Phasenabhaengige Dosierung:
      - Woche 3-4 (Start): 25-50% der empfohlenen Dosis. Beobachten.
      - Woche 4-5: 50-75% der empfohlenen Dosis, wenn keine Stresssymptome.
      - Woche 5-6: 75-100% der empfohlenen Dosis (Peak-Bluete).
      - Woche 6-7: 50-75% (Dosis reduzieren, Flush vorbereiten).
      - Woche 7-8+ (letzte 2 Wochen): PK-Boost stoppen, nur noch Basis oder Flush.

      Achtung: Diese Timeline gilt fuer 8-9-woechige Blutesorten. Bei 10-12-woechigen
      Sorten (z.B. viele Sativa-Hybriden) den Zeitrahmen proportional strecken.
      Bei 6-7-woechigen Sorten (z.B. einige Indica) komprimieren.
    metadata:
      typical_start_week: "3-4"
      stretch_duration_weeks: "1-3"
      peak_dose_week: "5-6"
      stop_weeks_before_harvest: "2"

  - id: pk-boost-stoppen-flush
    title: PK-Boost stoppen und Flush einleiten
    content: |
      Das korrekte Beenden des PK-Boosts und die Ueberleitung in die Flush-Phase ist
      genauso wichtig wie der Start. Zu spaetes Stoppen fuehrt zu Naehrstoffueberschuss
      in der Pflanze, der Geschmack und Rauchqualitaet negativ beeinflusst.

      Zeitpunkt zum Stoppen:
      - 2-3 Wochen vor der geplanten Ernte den PK-Boost komplett absetzen
      - 1-2 Wochen vor der Ernte mit dem Flush beginnen (abhaengig vom Medium)

      Medium-spezifischer Flush:
      - Hydroponik (DWC, NFT): 5-7 Tage reines, pH-adjustiertes Wasser (EC 0,0-0,1).
        Kurzer Flush reicht, da kein Puffermedium vorhanden.
      - Kokos: 7-10 Tage mit EC 0,0-0,2. Kokos haelt mehr Naehrstoffe als Hydro
        (KAK), daher laengerer Flush noetig.
      - Erde (mineralisch geduengt, ohne lebende Biologie): 10-14 Tage mit reinem Wasser.
        Erde hat die hoechste Pufferkapazitaet, Naehrstoffe werden am langsamsten ausgewaschen.
      - Erde (mit Mykorrhiza/organischer Biologie): 5-7 Tage genuegen.
        Laengerer Flush schaedigt das Bodenleben und die Mykorrhiza-Symbiose.

      Visuelle Indikatoren waehrend des Flush:
      - Blaetter beginnen zu vergilben (Stickstoff wird mobilisiert — erwuenscht!)
      - Blattraender werden leicht braun/lila (Phosphor-Mobilisierung)
      - Blueten reifen weiter, nehmen aber kaum noch an Masse zu
      - Fanleaves (grosse Sonnenblaetter) fallen teilweise ab

      Hinweis zur Wissenschaft: Die Notwendigkeit des Pre-Harvest-Flush ist wissenschaftlich
      umstritten. Eine Studie der University of Guelph (2020) fand keinen signifikanten
      Unterschied in der chemischen Zusammensetzung. Viele Grower berichten dennoch von
      subjektiv besserem Geschmack nach Flush. Konservative Empfehlung: Mindestens PK-Boost
      rechtzeitig stoppen, Flush optional je nach persoenlicher Praeferenz.
    metadata:
      pk_stop_weeks_before_harvest: "2-3"
      flush_hydro_days: "5-7"
      flush_coco_days: "7-10"
      flush_soil_days: "10-14"

  - id: trichome-reife-indikator
    title: Trichom-Reife als Timing-Indikator
    content: |
      Trichome (Harzdrüsen) sind der zuverlaessigste Indikator fuer den Reifezustand
      und damit fuer das optimale Erntezeitfenster. Sie bestimmen, wann der PK-Boost
      gestoppt und der Flush eingeleitet werden sollte.

      Beobachtung: Handlupe (60-100x Vergroesserung) oder USB-Mikroskop auf die
      Blueten (nicht Blaetter) richten. Trichom-Koepfchen beurteilen:

      Stadium 1 — Klare Trichome: Glasig-transparent. Pflanze ist unreif, PK-Boost
      weiterfuehren. Noch 2-4 Wochen bis zur Ernte.

      Stadium 2 — Milchig-truebe Trichome: Weisslich-opak, wie Milchglas. Hoechster
      THC-Gehalt (bei Cannabis), maximale Potenz. Wenn 70-80% der Trichome milchig
      sind: PK-Boost stoppen, Flush einleiten.

      Stadium 3 — Bernsteinfarbene Trichome: Gelb-braune Verfaerbung. THC wird zu
      CBN abgebaut (sedativer Effekt). Bei Gemuese/Obst: ueberreif, Qualitaetsverlust.

      Optimaler Erntezeitpunkt (Cannabis): 70-90% milchig + 10-30% bernstein.
      Fuer energetischen Effekt: Mehr milchig (80-90%). Fuer koerperbetont: Mehr
      bernstein (20-30%).

      PK-Boost-Timing anhand Trichome:
      - Alle klar: PK-Boost auf Peak-Dosis (75-100%)
      - Erste milchige: PK-Boost auf 50% reduzieren
      - 50% milchig: PK-Boost stoppen
      - 70% milchig: Flush starten
      - 80-90% milchig + 10-20% bernstein: Ernten

      Fuer andere Kulturen: Fruchtreife-Indikatoren je nach Art beachten (Tomaten:
      Farbumschlag, Paprika: Fruchtgroesse und Farbe, Gurken: Groesse vor Gelbfaerbung).
    metadata:
      magnification_x: "60-100"
      observe_location: flowers_not_leaves
