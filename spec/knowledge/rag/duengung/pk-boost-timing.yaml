  - id: pk-flush-wissenschaft
    title: Flush vor der Ernte — Wissenschaft und Praxis
    content: |
      Der Pre-Harvest-Flush (Spuelung vor der Ernte) nach dem PK-Boost ist ein
      kontroverses Thema. Hier die Fakten und die praktische Empfehlung.

      Wissenschaftliche Datenlage:
      - Studie Univ. of Guelph (Danziger & Bernstein, 2020): Cannabis-Pflanzen wurden
        0, 7 und 14 Tage geflusht. Kein signifikanter Unterschied in Mineralgehalt,
        THC, Terpen-Profil oder Rauchqualitaet in Blind-Tests. Ertrag war identisch.
      - Studie zur Tomatenqualitaet: Flushing erhoehte den Zuckergehalt leicht
        (weniger Wasseraufnahme konzentriert Zucker), aber reduzierte den Gesamtertrag.

      Argumente FUER den Flush:
      - Subjektive Grower-Erfahrung: Glatterer Rauch, weissere Asche, besserer Geschmack
      - Schadet nie (wenn kurz genug): 5-7 Tage Flush verursachen keinen Ertragsverlust
      - Kostenersparnis: Weniger Duenger in den letzten Wochen
      - Risikominimierung: Verhindert Naehrstoff-Ablagerungen im Endprodukt

      Argumente GEGEN den Flush:
      - Fehlende wissenschaftliche Evidenz fuer Qualitaetsverbesserung
      - Ertragsverlust bei zu langem Flush (>2 Wochen)
      - Stress fuer die Pflanze in einer kritischen Reifephase

      Praktische Empfehlung — der Kompromiss:
      Da die Datenlage umstritten ist, empfehlen wir einen pragmatischen Mittelweg:
      - PK-Boost auf jeden Fall 2-3 Wochen vor Ernte stoppen (unbestritten sinnvoll)
      - EC reduzieren statt komplett flushen: Letzte 1-2 Wochen die EC auf 50% der
        normalen Dosierung senken (Duenger reduzieren) ODER reines Wasser verwenden
      - Erde: Laengerer Flush sinnvoller als in Hydroponik (Salzpufferung im Boden)
      - Hydroponik: 5-7 Tage reichen voellig aus
      - Keinesfalls laenger als 2 Wochen flushen — die Pflanze baut Chlorophyll
        und Proteine ab, was Blattgewebe und ggf. Geschmack negativ beeinflusst
      Dieser Kompromiss — EC reduzieren statt abrupt stoppen — ist die persoenliche
      Praeferenz vieler erfahrener Grower und schadet in keinem Fall.

      Im Kamerplanter-System wird der Flush als Phase-Transition oder manuell
      ueber die Watering-Schedule (ScheduleMode) gesteuert. Die ReadinessEngine
      (REQ-007) beruecksichtigt Trichom-Reife als Ernte-Indikator.
    metadata:
      guelph_study_year: "2020"
      recommended_flush_days_hydro: "5-7"
      recommended_flush_days_soil: "10-14"
      max_flush_days: "14"
      pk_stop_before_harvest_weeks: "2-3"
