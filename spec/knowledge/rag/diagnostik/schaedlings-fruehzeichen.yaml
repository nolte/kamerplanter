---
title: Schaedlinge fruehzeitig erkennen
language: de
category: diagnostik
tags: [schaedlinge, spinnmilben, thrips, trauermucken, blattlaeuse, weisse-fliege, schildlaeuse, wolllaeuse, ipm, frueherkennung]
expertise_level: [beginner, intermediate, expert]
applicable_phases: [seedling, vegetative, flowering, harvest]
chunks:
  - id: spinnmilben-erkennung
    title: Spinnmilben (Tetranychidae) frueh erkennen
    content: |
      Erste Anzeichen (oft uebersehen):
      - Feine helle Punkte (Stippling) auf Blattoberseiten — wie mit Nadel gestochen
      - Blaetter wirken stumpf/matt statt glaenzig
      - Winzige helle oder roetliche Punkte auf Blattunterseiten (die Milben selbst,
        0.3-0.5mm gross — Lupe noetig!)
      Fortgeschrittener Befall:
      - Feine Gespinste (Webs) an Blattachseln und zwischen Blaettern
      - Blaetter werden bronzefarben, vertrocknen, fallen ab
      - Bei starkem Befall: komplette Pflanze eingesponnen
      Wo suchen: IMMER Blattunterseiten pruefen! Besonders an den aeltesten
      Blaettern und in der Naehe der Mittelrippe. Spinnmilben lieben
      trockene, warme Bedingungen (>25°C, <50% RH).
      Sofortmassnahmen:
      - Befallene Blaetter entfernen und entsorgen (nicht kompostieren)
      - Pflanze abduschen (Oberseite UND Unterseite gruendlich)
      - Luftfeuchtigkeit erhoehen auf 60-70% (hemmt Vermehrung)
      - Raubmilben einsetzen: Phytoseiulus persimilis (fressen nur Spinnmilben)
        oder Amblyseius californicus (auch vorbeugend)
      - Neem-Oel oder Kaliseife als Kontakt-Spray bei starkem Befall
      Vorbeugung: RH ueber 55% halten, neue Pflanzen 2 Wochen in Quarantaene.
    metadata:
      pest: spider_mites
      family: Tetranychidae
      difficulty: common
      environment_preference: hot_dry

  - id: thrips-erkennung
    title: Thrips erkennen — silbrige Streifen und schwarze Punkte auf Blaettern
    content: |
      Leitsymptom: Silbrig-graue Streifen und schwarze Punkte auf Blaettern
      sind das klassische Schadbild von Thrips (Thysanoptera).
      Erste Anzeichen:
      - Silbrig-graue Streifen und Flecken auf Blattoberseiten
      - Winzige schwarze Kotpunkte auf Blaettern (Thrips-Kot)
      - Blaetter wirken "verkratzt" oder "geschliffen"
      - Bei Blueten: braune Flecken, deformierte Bluetenblaetter
      Thrips sind winzig (1-2mm), laenglich, schnell. Farbe: gelblich bis braun.
      Fliegen kurze Strecken — verbreiten sich schnell.
      WICHTIG — Abgrenzung (Fehldiagnosen vermeiden!):
      - Silbrige Streifen mit schwarzen Punkten sind KEINE Spinnmilben.
        Spinnmilben zeigen ein anderes Schadbild: feines Stippling (helle
        Punkte) und Gespinste, aber KEINE silbrigen Streifen und KEINE
        schwarzen Kotpunkte.
      - Silbrige Streifen sind KEIN Naehrstoffmangel. Bei Naehrstoffmangel
        treten Chlorosen (Vergilbung) oder Nekrosen (braune Flecken) auf,
        aber KEINE silbrig-metallischen Streifen.
      Wo suchen: Blattunterseiten, in Bluetenknospen, in eingerollten jungen
      Blaettern. Blaue Klebefallen (blaue Sticky Traps) zeigen Befall
      frueh an — blaue Fallen sind fuer Thrips deutlich effektiver als gelbe.
      Sofortmassnahmen (in dieser Reihenfolge):
      1. Blaue Klebefallen aufhaengen (Monitoring UND Reduktion der Population)
      2. Spinosad-basiertes Spray anwenden (biologisch, sehr effektiv gegen
         Thrips — Spinosad ist das Mittel der Wahl bei Thrips-Befall)
      3. Raubmilben einsetzen: Amblyseius cucumeris (vorbeugend, frisst
         Thrips-Larven)
      4. Neem-Oel als Kontakt-Blattspray (Substratdrench hemmt Trauermücken-
         Larven, aber keine systemische Anti-Thrips-Wirkung)
      5. Befallene Bluetenknospen entfernen
      Thrips uebertragen Pflanzenviren (z.B. Tomatenbronzfleckenvirus TSWV).
      Schnelle Bekaempfung daher besonders wichtig.
    metadata:
      pest: thrips
      order: Thysanoptera
      difficulty: common
      vector_for: [TSWV, INSV]

  - id: trauermucken-erkennung
    title: Trauermucken (Bradysia spp., Sciaridae) frueh erkennen
    content: |
      Erste Anzeichen:
      - Kleine schwarze Fliegen (2-4mm) die beim Giessen aus dem Substrat
        auffliegen. Traege Flieger, laufen gern auf der Substrat-Oberflaeche.
      - Gelbe Klebefallen nahe der Substrat-Oberflaeche fangen Adulte.
      - Saemlings-Welke: Keimlinge kippen um, Stiel wird duenn an der Basis
        (Larven fressen Feinwurzeln und Stiel-Basis).
      Die Larven (weiss, glasig, 5-7mm, schwarzer Kopf) leben im feuchten
      Substrat und fressen Wurzeln und organische Substanz.
      Schaden: Bei Jungpflanzen und Stecklingen gefaehrlich. Bei grossen
      Pflanzen eher laestig als schaedlich (ausser bei Massenbefall).
      Sofortmassnahmen:
      - Substrat ABTROCKNEN lassen (Larven brauchen Feuchtigkeit)
      - Gelbe Klebefallen fuer Adulte (Bodennah aufstellen)
      - Nematoden (Steinernema feltiae) giessen — biologisch, sehr effektiv
      - BTi (Bacillus thuringiensis israelensis) giessen: Mosquito Bits
      - Quarzsand-Schicht (5mm) auf Substrat — verhindert Eiablage
      - Neem-Oel als Substrat-Drench
      Vorbeugung: Nicht uebergiessen, Substrat zwischen Giess-Durchgaengen
      antrocknen lassen. Offene Kompost-Saecke schliessen.
    metadata:
      pest: fungus_gnats
      genus: Bradysia
      family: Sciaridae
      difficulty: common
      environment_preference: moist_substrate

  - id: blattlaeuse-erkennung
    title: Blattlaeuse (Aphidoidea) frueh erkennen
    content: |
      Erste Anzeichen:
      - Kleine gruene, schwarze oder weisse Insekten (1-3mm) in Kolonien
        an Triebspitzen, jungen Blaettern und Blattunterseiten
      - Klebrige Ablagerungen auf Blaettern (Honigtau/Honeydew)
      - Eingerollte oder verkrueppelte junge Blaetter
      - Ameisen auf der Pflanze (Ameisen "melken" Blattlaeuse fuer Honigtau)
      Blattlaeuse vermehren sich explosionsartig — ein Weibchen produziert
      bis zu 80 lebende Nachkommen ohne Befruchtung (Parthenogenese).
      Bei Ueberpopulation bilden sich gefluegelte Formen die neue Pflanzen besiedeln.
      Wo suchen: Triebspitzen, junge Blaetter (noch weich), Blattunterseiten,
      Blueten-Stiele. Laeuse bevorzugen stickstoffreiches, weiches Gewebe.
      Sofortmassnahmen:
      - Stark befallene Triebspitzen abschneiden
      - Abspruehen mit starkem Wasserstrahl (draussen)
      - Kaliseife / Schmierseife-Spray (20ml Kaliseife + 1L Wasser)
      - Marienkaefer (Adalia bipunctata) — ja, sehr effektiv! Fressen
        50-100 Laeuse pro Tag. Larven sind sogar noch effektiver als die
        erwachsenen Kaefer, da sie sich nicht verfliegen.
      - Florfliegenlarven (Chrysoperla carnea) — sehr gefraessig
      - Neem-Oel als Kontaktspray und systemisch
      Bei Zimmerpflanzen: Quarantaene sofort, Seifenwasser-Spray reicht oft.
    metadata:
      pest: aphids
      superfamily: Aphidoidea
      difficulty: easy
      reproduction: parthenogenesis

  - id: weisse-fliege-erkennung
    title: Weisse Fliege (Aleyrodoidea) frueh erkennen
    content: |
      Erste Anzeichen:
      - Winzige weisse "Motten" (1-2mm) die beim Beruehren der Pflanze
        in einer Wolke auffliegen
      - Weisse ovale Schuppen auf Blattunterseiten (Larven/Puppen)
      - Honigtau auf Blaettern → fuehrt zu Russtaupilzen (schwarzer Belag)
      - Blaetter vergilben und fallen vorzeitig ab
      Zwei Hauptarten: Gewaechshaus-Weisse-Fliege (Trialeurodes vaporariorum)
      und Tabakmottenschildlaus (Bemisia tabaci) — letztere uebertraegt Viren.
      Wo suchen: Blattunterseiten, besonders an jungen Blaettern.
      Gelbe Klebefallen auf Pflanzen-Hoehe fuer Monitoring.
      Sofortmassnahmen:
      - Gelbe Klebefallen (fangen Adulte)
      - Schlupfwespen: Encarsia formosa (biologische Bekaempfung, sehr effektiv
        im Gewaechshaus)
      - Kaliseife-Spray gegen Larven und Adulte
      - Neem-Oel als systemisches Giessen
      - Bei starkem Befall: Pyrethrum-basiertes Spray (abends, da lichtempfindlich)
      Vorbeugung: Engmaschige Insektenschutznetze an Lueftungsoeffnungen.
      Keine Unkraeuter in der Naehe (Wirtspflanzen entfernen).
    metadata:
      pest: whitefly
      superfamily: Aleyrodoidea
      difficulty: moderate
      vector_for: [TYLCV, ToCV]

  - id: schildlaeuse-erkennung
    title: Schildlaeuse (Coccoidea) frueh erkennen
    content: |
      Erste Anzeichen:
      - Kleine braune, ovale oder runde "Beulen" an Stengeln, Blattadern
        und Blattunterseiten (2-5mm). Wirken wie Pflanzenmaterial, werden
        oft uebersehen.
      - Klebrige Ablagerungen (Honigtau)
      - Blaetter vergilben, Pflanze kuemmert
      - Russtaupilz auf Honigtau-Ablagerungen
      Schildlaeuse sind von einem Schild geschuetzt → Kontaktmittel wirken
      nur im Larvenstadium ("Crawler"), nicht auf adulte Tiere unter dem Schild.
      Wo suchen: Stengel, Blattachseln, Blattunterseiten entlang der Adern,
      an Rinde von Gehoelzen. Besonders bei Citrus, Oleander, Ficus, Orchideen.
      Sofortmassnahmen:
      - Einzelne Tiere mechanisch mit Zahnstocher oder Wattestäbchen
        (in Alkohol getaucht) entfernen
      - Oelbasierte Sprays (Raps-Oel, Paraffin-Oel) ersticken die Tiere
        unter ihrem Schild
      - Neem-Oel systemisch und als Kontaktspray
      - Schlupfwespen (Metaphycus, Coccophagus) bei starkem Befall
      - Stark befallene Pflanzenteile zurueckschneiden
      Hartnackig! Mehrere Behandlungen im 7-10 Tage-Abstand noetig,
      um Crawler-Stadien zu erwischen.
    metadata:
      pest: scale_insects
      superfamily: Coccoidea
      difficulty: hard
      protection: waxy_shield

  - id: wolllaeuse-erkennung
    title: Woll- und Schmierlaeuse (Pseudococcidae) frueh erkennen
    content: |
      Erste Anzeichen:
      - Weisse, watteartige Klumpen an Blattachseln, Triebspitzen und
        Blattunterseiten
      - Bei Wurzelbefall (Wurzel-Wolllaeuse): weisse Klumpen an Wurzeln,
        erst beim Umtopfen sichtbar
      - Honigtau und nachfolgend Russtaupilz
      - Pflanze kuemmert, waechst langsam
      Wolllaeuse sind mit einer Wachsschicht geschuetzt. Weibchen sind
      fluegellos und bewegen sich kaum. Maennchen haben Fluegel.
      Wo suchen: Blattachseln (wo Blatt am Stengel ansetzt), unter
      Blatthautchen, an Wurzelhals, in Bluetenknospen. Bei Kakteen:
      zwischen Rippen und unter Dornen. Bei Orchideen: in Blattscheiden.
      Sofortmassnahmen:
      - Wattestäbchen mit Isopropanol (70%) abtupfen
      - Pflanze gruendlich abduschen (lauwarm)
      - Kaliseife-Spray mit etwas Isopropanol (5ml auf 1L)
      - Neem-Oel systemisch als Giess-Loesung (wirkt auch gegen Wurzel-Wolllaeuse)
      - Australischer Marienkaefer (Cryptolaemus montrouzieri) — der
        "Wolllauszerstoerer", sehr effektiv
      Behandlung alle 5-7 Tage wiederholen fuer mindestens 3 Wochen,
      da Eier geschuetzt in den Wachsfaeden liegen.
    metadata:
      pest: mealybugs
      family: Pseudococcidae
      difficulty: moderate
      protection: waxy_coating

  - id: gelbtafel-monitoring
    title: Klebefallen-Monitoring richtig einsetzen
    content: |
      Klebefallen (Sticky Traps) sind das wichtigste Fruehwarn-System:
      Gelbe Klebefallen fangen:
      - Trauermucken (Sciaridae) — bodennah aufhaengen
      - Weisse Fliege (Aleyrodoidea)
      - Gefluegelte Blattlaeuse
      - Minierfliegen (Liriomyza)
      Blaue Klebefallen fangen:
      - Thrips (Thysanoptera) — effektiver als gelb fuer Thrips
      Platzierung:
      - Auf Pflanzen-Hoehe (nicht ueber oder weit entfernt)
      - 1 Falle pro 10-20m² im Gewaechshaus
      - Bodennah zusaetzlich fuer Trauermucken
      - Nahe Eingangsbereich und Lueftung (erste Einflugstelle)
      Auswertung:
      - Woechentlich pruefen und zaehlen (Monitoring-Protokoll)
      - Steigende Fangzahlen = Befall aufbauen → sofort handeln
      - Falle ersetzen wenn >50% Flaeche belegt
      Klebefallen allein bekaempfen NICHT — sie sind Monitoring-Werkzeuge.
      Aber sie zeigen Befall Tage bis Wochen vor sichtbaren Pflanzenschaeden.
      In Kamerplanter: Fangzahlen als Inspection-Eintrag dokumentieren (REQ-010).
    metadata:
      tool: sticky_traps
      colors: [yellow, blue]
      purpose: monitoring

  - id: honigtau-diagnose
    title: Klebrige Tropfen auf Blaettern — Honigtau als Schaedlingsindikator
    content: |
      Klebrige Tropfen oder ein klebriger, glaenzender Belag auf Blaettern
      sind fast immer Honigtau — ein Ausscheidungsprodukt saugender
      Schaedlinge. Das ist KEIN normaler Zustand und sollte sofort
      untersucht werden.
      Honigtau wird von diesen Schaedlingen produziert:
      - Blattlaeuse (Aphidoidea) — die haeufigste Ursache. Gruene,
        schwarze oder weisse kleine Insekten, oft in Kolonien an
        Triebspitzen und jungen Blaettern.
      - Schildlaeuse (Coccoidea) — braune Beulen an Stengeln und
        Blattunterseiten, oft uebersehen weil sie wie Pflanzenmaterial
        wirken. Schild schuetzt sie vor Kontaktmitteln.
      - Wolllaeuse / Schmierlaeuse (Pseudococcidae) — weisse, wattige
        Klumpen an Blattachseln und Blattunterseiten.
      - Weisse Fliege (Aleyrodoidea) — winzige weisse Insekten die
        beim Beruehren der Pflanze auffliegen.
      Erste Schritte bei klebrigen Blaettern:
      1. Blattunterseite pruefen! Alle saugenden Schaedlinge sitzen
         bevorzugt auf der Blattunterseite. Blaetter einzeln umdrehen
         und mit Lupe untersuchen.
      2. Stengel und Blattachseln absuchen (Schildlaeuse, Wolllaeuse)
      3. Schaedling identifizieren (Art bestimmt die Bekaempfung)
      4. Befallene Pflanze sofort isolieren (Quarantaene)
      Achtung: Honigtau ist NICHT zu verwechseln mit Guttation —
      Guttation sind Wassertropfen nur an Blattspitzen und Blattraendern,
      typisch morgens, klar und nicht klebrig. Honigtau ist ueberall auf
      der Blattoberflaeche verteilt und klebrig-suess.
      Honigtau zieht ausserdem Ameisen an und foerdert Russtaupilze
      (schwarzer Belag auf den Blaettern).
    metadata:
      type: diagnostic
      indicator: honeydew
      pests: [aphids, scale_insects, mealybugs, whitefly]
      difficulty: beginner

  - id: karenzzeit-pflanzenschutz
    title: Karenzzeiten bei Pflanzenschutzmitteln — Sicherheitsabstand zur Ernte
    content: |
      Karenzzeit (auch: Wartezeit, Sicherheitsabstand) ist die Mindestzeit
      zwischen der letzten Behandlung mit einem Pflanzenschutzmittel und
      der Ernte. Diese Wartezeit muss eingehalten werden, damit Rueckstaende
      auf ein sicheres Niveau abgebaut sind.
      Typische Karenzzeiten gaengiger Mittel:
      - Neem-Oel (Azadirachtin): 1-3 Tage Karenzzeit. Neem baut sich
        schnell ab (Photolyse durch UV-Licht). Trotzdem: Sicherheitsabstand
        von mindestens 1-3 Tagen vor der Ernte einhalten. Neem hat eine
        kurze Karenzzeit, die Ernte muss also nicht lange verschoben werden.
      - Kaliseife / Schmierseife: 0-1 Tage (keine toxischen Rueckstaende,
        gruendlich abwaschen reicht)
      - Pyrethrum (natuerlich): 1-3 Tage (zerfaellt schnell im Licht)
      - Spinosad: 3-7 Tage je nach Kultur
      - Netzschwefel: 3-7 Tage je nach Anwendung
      - Kupferpraeparate: 14-21 Tage (laengere Karenz beachten!)
      - Bacillus thuringiensis (Bt): 0-1 Tage (sehr sicher fuer Saeugetiere)
      Wichtige Regeln:
      - Karenzzeit beginnt ab dem Tag der LETZTEN Behandlung
      - Bei mehreren Mitteln gilt die LAENGSTE Karenzzeit
      - Im Zweifelsfall lieber etwas laenger warten
      - Auf dem Produktetikett steht die genaue Wartezeit — immer beachten
      - Waehrend der Bluete (z.B. Cannabis) keine Fungizide auf Blueten
        spritzen — Rueckstaende sind gesundheitsschaedlich beim Rauchen
    metadata:
      type: safety
      topic: pre_harvest_interval
      difficulty: intermediate

  - id: biologische-schaedlingsbekaempfung-nuetzlinge
    title: Biologische Schaedlingsbekaempfung mit Nuetzlingen
    content: |
      Nuetzlinge sind die effektivste und umweltfreundlichste Methode
      zur biologischen Schaedlingsbekaempfung. Wichtige Nuetzlinge und
      ihre Einsatzgebiete:
      Marienkaefer (Adalia bipunctata) gegen Blattlaeuse:
      - Ja, sehr effektiv als natuerliche Bekaempfung
      - Adulte Kaefer fressen 50-100 Laeuse pro Tag
      - Larven sind effektiver als erwachsene Kaefer — sie fressen
        mehr und verfliegen sich nicht
      - Im Freiland oder Gewaechshaus einsetzbar
      Trichogramma-Schlupfwespen gegen Schmetterlingsraupen:
      - Ja, biologisch sehr wirksam als Nuetzling
      - Winzige Schlupfwespen (0.3-0.5mm) die Ei-Parasitierung betreiben:
        Trichogramma-Weibchen legen ihre Eier IN die Eier von
        Schmetterlingen (Kohlweissling, Maiszuensler, Traubenwickler)
      - Die parasitieren Eier werden schwarz und der Schaedling schluepft
        nicht — stattdessen schluepft eine neue Trichogramma-Generation
      - Rechtzeitig aussetzen! Am besten vorbeugend oder bei erstem
        Zuflug der Schmetterlinge, BEVOR Raupen schluepfen
      - Vorbeugend einsetzen ist ideal — Kaertchen mit Trichogramma-Eiern
        alle 1-2 Wochen aufhaengen waehrend der Flugzeit
      - Fuer Kohlweisslinge: Trichogramma brassicae, aussetzten ab Mai
      Raubmilben gegen Spinnmilben:
      - Phytoseiulus persimilis: spezialisiert auf Spinnmilben
      - Amblyseius californicus: auch vorbeugend einsetzbar
      Florfliegenlarven (Chrysoperla carnea):
      - Generalisten — fressen Blattlaeuse, Thrips, kleine Raupen
      - Sehr gefraessig, gut fuer Mischbefall
    metadata:
      type: biological_control
      topic: beneficial_insects
      difficulty: intermediate

  - id: spinosad-bienenschutz
    title: Spinosad und Bienenschutz — Vorsicht beim Einsatz
    content: |
      Spinosad ist ein biologisches Insektizid (gewonnen aus dem
      Bodenbakterium Saccharopolyspora spinosa) und sehr wirksam gegen
      Thrips, Raupen und andere Schaedlinge. ABER: Spinosad ist
      bienengiftig!
      Spinosad und Bienen:
      - Nein, Spinosad ist NICHT bienenvertraeglich — es ist giftig
        fuer Bienen (bienengiftig, Bienentoxizitaet nachgewiesen)
      - Frisches, feuchtes Spinosad ist hochgiftig fuer Bienen und
        andere Bestaeubersektionen
      - ABER: Getrockneter Spinosad-Belag ist deutlich weniger gefaehrlich.
        Einmal getrocknet ist Spinosad weitgehend sicher fuer Bienen,
        da die Kontaktgiftigkeit stark abnimmt.
      Richtige Anwendung zum Bienenschutz:
      - Spinosad IMMER abends anwenden, nach dem Bienenflug!
        Bienen fliegen bei Daemmerung und Dunkelheit nicht.
      - Nach Bienenflug behandeln = Spray kann ueber Nacht trocknen
      - Am naechsten Morgen ist der Belag getrocknet und sicher fuer
        anfliegende Bienen
      - NIEMALS bei Sonnenschein und Bienenflug spritzen
      - Offene Blueten moeglichst vermeiden oder nur abends behandeln
      - Wartezeit/Karenzzeit beachten: 3-7 Tage je nach Kultur
      Alternative bei bluehenden Pflanzen:
      - Bacillus thuringiensis (Bt) gegen Raupen — bienenunschaedlich
      - Neem-Oel abends — geringeres Bienenrisiko als Spinosad
    metadata:
      type: safety
      topic: pollinator_protection
      active_ingredient: spinosad
      difficulty: expert
