  - id: ipm-3-stufen-modell
    title: "IPM — Was ist integrierter Pflanzenschutz und warum biologisch vor chemisch?"
    content: |
      Integriertes Pest Management (IPM) ist kein einzelnes Mittel, sondern ein Gesamtkonzept
      aus drei aufeinander aufbauenden Stufen: Prävention, Monitoring und Intervention.
      Ziel ist es, Schäden zu minimieren ohne unnötig auf chemische Mittel zurückzugreifen.

      Stufe 1 — Prävention (immer zuerst):
      Schadensvermeidung durch gute Kulturführung. Dazu zählen: resistente Sorten wählen,
      optimale Wachstumsbedingungen schaffen (Licht, Temperatur, Luftfeuchtigkeit), Kulturhygiene,
      Fruchtfolge einhalten, Quarantäne für neue Pflanzen. Prävention ist billiger und effektiver
      als jede nachträgliche Behandlung.

      Stufe 2 — Monitoring (frühzeitig erkennen):
      Regelmäßige Inspektionen — mindestens wöchentlich, in der Blüte zweimal pro Woche.
      Klebefallen (gelb für Trauermücken/Weiße Fliege, blau für Thrips), Blattunterseiten
      kontrollieren, Befallsprotokoll führen. Befallsdruck einschätzen: keine, niedrig, mittel,
      hoch, kritisch. Erst wenn ein Befall die Schadensschwelle überschreitet, wird eingegriffen.

      Schadensschwelle: Nicht jeder einzelne Schädling erfordert Behandlung. Die Schadensschwelle
      ist der Befallsgrad, ab dem wirtschaftlicher oder ästhetischer Schaden entsteht.
      Unterhalb der Schwelle genügt Monitoring.

      Stufe 3 — Intervention (so spät und so zielgerichtet wie möglich):
      Reihenfolge: mechanisch → biologisch → chemisch-biologisch → synthetisch-chemisch.
      Biologische Mittel (Neem, Kaliseife, Bt, Nützlinge) bevorzugen, weil sie:
      - Nützlinge schonen und das natürliche Gleichgewicht erhalten
      - Keine oder kurze Karenzzeiten haben
      - Geringeres Resistenzrisiko aufweisen
      - Für Ernte und Verzehr sicherer sind

      Synthetisch-chemische Mittel sind immer die letzte Wahl, da sie Nützlinge abtöten,
      Resistenzen fördern und lange Karenzzeiten haben können.
