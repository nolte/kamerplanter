  # ---------------------------------------------------------------------------
  # 1. Tomaten & Nachtschatten
  # ---------------------------------------------------------------------------
  - id: artspez-nachtschatten
    title: Tomaten und Nachtschatten — haeufigste Krankheiten und Schaedlinge
    content: |
      Tomaten (Solanum lycopersicum), Paprika (Capsicum annuum), Aubergine
      (S. melongena) und Kartoffel (S. tuberosum) teilen viele Erreger, weil
      sie alle Nachtschattengewaechse (Solanaceae) sind. Nie auf derselben
      Flaeche nacheinander anbauen — Fruchtfolge mindestens 3-4 Jahre.

      Die 5 haeufigsten Probleme (nach Praxisrelevanz):

      1. Kraut- und Braunfaeule (Phytophthora infestans) — Hauptgefahr im Freiland.
         Braune, waessrige Blattflecken, weisslicher Sporenrasen auf der Unterseite,
         Fruechte bekommen harte braune Stellen. Bricht explosionsartig bei feucht-
         warmem Wetter (15-25 Grad, Regen) aus. Tomaten und Kartoffeln NICHT
         nebeneinander pflanzen — gleicher Erreger, gegenseitige Ansteckung.
         Vorbeugung: von unten giessen, Kupferpraeparat vorbeugend.
         Saison: Hauptsaison Juli-September.
         Verweis: Detail-Chunk "krautfaeule-kartoffel-tomate".

      2. Bluetenendfaeule (Blossom End Rot, BER) — kein Erreger, sondern
         Calcium-Transportproblem. Braune, eingesunkene Flecken am Fruchtboden.
         Ursache: Ungleichmaessige Bewaesserung verhindert Ca-Transport, NICHT
         unbedingt Ca-Mangel im Boden. Calcium ist ein immobiler Naehrstoff der
         staendig mit dem Wasserstrom aufgenommen werden muss. Loesung: gleichmaessig
         giessen, nie austrocknen lassen, CalMag-Duengung pruefen. Bei Aubergine und
         Paprika ebenfalls moeglich.
         Saison: Ganze Fruchtphase, haeufiger bei Hitzestress.

      3. Thrips und Weisse Fliege — Hauptschaedlinge besonders unter Glas.
         Thrips: silbrige Streifen und schwarze Kotpunkte auf Blaettern, uebertragen
         Tomatenbronzfleckenvirus (TSWV). Weisse Fliege: winzige weisse Insekten,
         Honigtau, Russstaupilz auf Blaettern. Beide Arten bevorzugen die Blattunterseite.
         Massnahmen: Blaue Klebefallen fuer Thrips, gelbe fuer Weisse Fliege;
         Spinosad gegen Thrips; Encarsia formosa (Schlupfwespe) gegen Weisse Fliege.
         Verweis: Detail-Chunks "thrips-erkennung", "weisse-fliege-erkennung".

      4. Septoria-Blattfleckenkrankheit (Septoria lycopersici) — kleine runde
         Flecken mit hellem Zentrum und dunklem Rand, beginnt an den unteren
         Blaettern. Foerdernd: Blattnaeseperioden, schlechte Luftzirkulation.
         Massnahmen: Befallene Blaetter entfernen, von unten giessen, Kupferpraeparat.
         Saison: Sommer, besonders bei nassem Wetter.

      5. Tomatenminiermotte (Tuta absoluta) — Minierfrasse in Blaettern und
         Fruechten, Larven bohren Galerien ins Blattgewebe. Hauptproblem in
         Gewaechshaeusern und im Sueden. Massnahmen: Pheromonfallen zum Monitoring,
         Trichogramma-Schlupfwespen, Spinosad.

      Weitere relevante Probleme: Alternaria-Schwarzfleckenkrankheit (groessere
      braune Flecken, konzentrische Ringe), Fusarium-Welke und Verticillium-Welke
      (einseitiges Welken, Leitgewebe braun gefaerbt — nicht heilbar, betroffene
      Pflanzen entfernen), Blattlaeuse an Triebspitzen (Honigtau, eingerollte Blaetter),
      Kartoffelkaefer bei Kartoffeln (gefressen Blaetter, orange-schwarz gestreifte
      Larven und Kaefer).
    metadata:
