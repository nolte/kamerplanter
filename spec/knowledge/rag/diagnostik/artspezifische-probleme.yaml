  # ---------------------------------------------------------------------------
  # 14. Huelsenfruechte
  # ---------------------------------------------------------------------------
  - id: artspez-huelsenfruechte
    title: Huelsenfruechte (Bohnen, Erbsen, Ackerbohne) — haeufigste Probleme
    content: |
      Huelsenfruechte — Buschbohne und Stangenbohne (Phaseolus vulgaris),
      Erbse (Pisum sativum), Ackerbohne (Vicia faba) — sind wichtige
      Stickstoff-Fixierer (Wurzelbakterien, Rhizobien!) und bereichern den
      Boden. Sie haben aber charakteristische Pilz- und Schaedlingsprobleme.
      Fruchtfolge: 3 Jahre Pause fuer alle Leguminosen auf derselben Flaeche.

      Die 5 haeufigsten Probleme:

      1. Schwarze Bohnenlaus (Aphis fabae) — massenhaftes Auftreten an
         Triebspitzen von Ackerbohne und Bohnen. Grosse schwarze Laeusekolonien
         an Triebspitzen die zusammenrollen und kuemmern. Honigtau, Russtaupilz.
         Massnahmen: Triebspitzen abknipsen (mit Laeuse, verringert Population
         deutlich!), Marienkaefer foerdern, Kaliseife-Spray. Vorbeugend:
         frueh saeen damit Pflanzen stark sind bevor Lausdruck beginnt.
         Saison: Mai-Juli.

      2. Rost an Bohnen (Uromyces appendiculatus) und Erbsen (Uromyces pisi) —
         orangerote Pusteln auf Blattoberseiten und -unterseiten, befallene
         Blaetter sterben ab. Foerdernd: feuchte, warme Bedingungen.
         Massnahmen: Befallene Blaetter entfernen (nicht kompostieren), Netzschwefel,
         weite Reihenabstaende fuer Luftzirkulation. Schwere Faelle koennen
         die Ernte stark mindern.
         Saison: Sommer, besonders nach Regen.

      3. Echter Mehltau an Erbsen (Erysiphe pisi) — weisslicher Belag auf
         Blaettern und Huelsen, typisch im Hochsommer bei Hitze und Trockenheit.
         Massnahmen: Kurzfruchtige Sorten frueh saeen (vor Mehltau-Saison),
         Backpulver-Spray, Milch-Spray.
         Saison: Juli-September.

      4. Botrytis an Ackerbohnen und Bohnen (Botrytis fabae, B. cinerea) —
         grauer Schimmel an Stengeln, Blaettern und Huelsen bei feuchtem Wetter.
         Pflanze kann schnell zusammenbrechen. Massnahmen: Pflanzabstand
         erhoehen, nicht von oben bewaessern, abgestorbene Pflanzenteile
         regelmaessig entfernen.
         Verweis: Detail-Chunk "grauschimmel-botrytis".
         Saison: Fruehjahr und feuchter Sommer.

      5. Schnecken an Bohnen-Jungpflanzen — Schnecken fressen Keimblatter
         und junge Blaetter, besonders in feuchten Fruehjahren. Massnahmen:
         Eisenphosphat-Schneckenkorn (Ferramol), Schneckenbarrieren, abends
         absammeln.
         Saison: Fruehjahr, nach Regen.

      Erbsenwickler (Cydia nigricana) — Larven fressen Erbsensamen in der
      Huelse. Keine aeusseren Anzeichen bis zur Ernte. Massnahmen:
      Pheromonfallen zum Monitoring, Spinosad, Netz.
