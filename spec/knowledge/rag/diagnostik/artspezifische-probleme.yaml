        - spinnmilben
        - thrips
        - trauermucken
        - fusarium
        - pythium
      difficulty: intermediate

  # ---------------------------------------------------------------------------
  # 7. Orchideen
  # ---------------------------------------------------------------------------
  - id: artspez-orchideen
    title: Orchideen (Phalaenopsis, Dendrobium, Cattleya) — haeufigste Probleme
    content: |
      Orchideen sind robuster als ihr Ruf — die meisten Probleme entstehen
      durch Pflegefehler, nicht durch unabwendbare Krankheiten. Haeufigste
      Arten: Phalaenopsis (Schmetterlingsorchidee), Dendrobium, Cattleya,
      Oncidium, Vanda.

      Die 5 haeufigsten Probleme:

      1. Nassfaeule / Bakterielle Herzfaeule — das gefaehrlichste Problem.
         Braune, waeessrige, weiche Stellen an Blaettern oder Herzpunkt der
         Pflanze, oft uebel riechend. Ursache: Wasser bleibt im Blatttrichter
         oder Triebzentrum stehen. Bakterien (Erwinia) besiedeln nasses Gewebe.
         Massnahmen: Befallenes Gewebe sauber herausschneiden (desinfizierte
         Schere), Schnittstelle mit Zimt oder Aktivkohle bestauben (anti-
         bakteriell). Orchideen IMMER von unten giessen oder Wasser aus dem
         Blatttrichter herausschuetteln.
         Saison: Ganzjaehrig, besonders im Herbst/Winter bei schlechter Luefte.

      2. Schildlaeuse (Coccoidea) — haeufigster Schaedling an Orchideen.
         Braune oder weissliche Schuppen an Blaettern, Stengeln und Luftwurzeln.
         Schildlaeuse sind klein und werden oft verwechselt mit natuerlichen
         Pflanzenstrukturen. Klebrige Ablagerungen (Honigtau) als weiteres Indiz.
         Massnahmen: Einzelne Tiere mit Isopropanol-Wattestaechen abtupfen,
         Oelbasierte Sprays (Paraffinoel), Neem-Oel.
         Verweis: Detail-Chunk "schildlaeuse-erkennung".

      3. Woll- und Schmierlaeuse (Pseudococcidae) — weisse wattige Klumpen
         in Blattachseln, an Luftwurzeln und in Blattscheiden. Besonders schwer
         zu entdecken und zu bekaempfen weil sie sich in Schutzraeume zurueckziehen.
         Wurzel-Wolllaeuse sind erst beim Umtopfen sichtbar.
         Massnahmen: Isopropanol-Wattestaechen, Kaliseife-Spray, Neem-Oel als
         Giessloesung (gegen Wurzel-Wolllaeuse). Behandlung wochenlang wiederholen.
         Verweis: Detail-Chunk "wolllaeuse-erkennung".

      4. Schwarzfleckenkrankheit (Colletotrichum gloeosporioides) — dunkle,
         eingesunkene Flecken auf Blaettern, die sich ausbreiten. Foerdernd:
         hohe Feuchte und schlechte Luftzirkulation. Massnahmen: Befallene
         Blaetter entfernen, Schnittflaechen desinfizieren, Luftzirkulation
         verbessern, Kupferpraeparat vorsichtig (Orchideen reagieren empfindlich).

      5. Thrips an Orchideen — Schadbild an Bluetenblaettern (silbrige,
         verwischte Muster), Blueten oeffnen sich missgebildet. Thrips verstecken
         sich in Bluetenknospen.
         Massnahmen: Blaue Klebefallen, Spinosad (vor der Bluete anwenden),
         Amblyseius cucumeris.
         Verweis: Detail-Chunk "thrips-erkennung".

      Besonderheit Orchideen: Orchideen brauchen transparente Toepfe (Wurzeln
      benoetigen Licht fuer Photosynthese) und ein sehr gut durchlueftetes
      Substrat (Rinden-Substrat, nicht Erde). Staunaeese toetet Orchideen-
      Wurzeln schnell. Abgestorbene oder welke Wurzeln (silbergrau, hohl) sind
      normal — nicht abschneiden solange sie noch lebendig sind (gruen nach Giessen).
    metadata:
      topic: artspezifische_probleme
      plant_group: orchideen
      species_list:
        - Phalaenopsis spp.
        - Dendrobium spp.
        - Cattleya spp.
        - Oncidium spp.
        - Vanda spp.
      common_problems:
        - nassfaeule
        - schildlaeuse
        - wolllaeuse
        - schwarzfleckenkrankheit
        - thrips
      difficulty: intermediate

  # ---------------------------------------------------------------------------
  # 8. Tropische Zimmerpflanzen
  # ---------------------------------------------------------------------------
  - id: artspez-tropische-zimmerpflanzen
    title: Tropische Zimmerpflanzen (Monstera, Calathea, Ficus, Philodendron) — Probleme
    content: |
      Tropische Zimmerpflanzen — Monstera deliciosa, Philodendron spp.,
      Alocasia spp., Calathea spp., Ficus benjamina, Epipremnum aureum
      (Efeutute), Spathiphyllum (Einblatt) — stammen aus feuchten Tropen
      und haben dort wenige natuerliche Schaedlinge. Im trockenen Wohnraum
      entstehen aber charakteristische Pflegeprobleme.

      Die 5 haeufigsten Probleme:

      1. Wurzelfaeule durch Ueberwaesserung — die haeufigste Todesursache
         fuer Zimmerpflanzen! Pflanze welkt trotz nasser Erde, Substrat riecht
         modrig, Wurzeln braun und schleimig. Erreger: Pythium, Phytophthora.
         Ursache: zu haeufiges Giessen ohne die Substrat-Oberflaechenpruefung,
         fehlende Drainage-Loecher, Untersetzer permanent mit Wasser.
         Massnahmen: Fingerprobe vor jedem Giessen (erst giessen wenn obere
         2-3 cm trocken), umtopfen mit Wurzelbeschnitt, frisches Substrat.
         Verweis: Detail-Chunks "wurzelfaeule-erkennung", "zimmerpflanze-blaetter-haengen".

      2. Spinnmilben durch Heizungsluft — im Winter, wenn Heizung laeuft
         und Luftfeuchtigkeit auf 20-30% sinkt, explodiert Spinnmilben-
         Population. Kleine helle Punkte auf Blattoberseiten, Gespinste.
         Ficus, Monstera, Alocasia und Calathea besonders gefaehrdet.
         Massnahmen: Luftfeuchtigkeit auf 50-60% erhoehen (Luftbefeuchter),
         Pflanze abduschen, Raubmilben bei starkem Befall.
         Verweis: Detail-Chunk "spinnmilben-erkennung".

      3. Schildlaeuse und Wolllaeuse — Ficus, Efeutute und Orchideen sind
         Hauptwirte. Schildlaeuse sitzen als braune Schuppen an Stengeln;
         Wolllaeuse bilden weisse Watteklumpen in Blattachseln. Beide
         produzieren Honigtau (klebrige Blaetter) als fruehes Warnsignal.
         Massnahmen: Isopropanol-Wattestaechen, Kaliseife-Spray, Neem-Oel.
         Verweis: Detail-Chunks "schildlaeuse-erkennung", "wolllaeuse-erkennung",
         "honigtau-diagnose".

      4. Thrips an Monstera und Alocasia — silbrige verwischte Spuren und
         schwarze Kotpunkte auf Blattoberseiten. Thrips sind Indoor besonders
         hartnackig, da natuerliche Feinde fehlen. Schnelle Ausbreitung auf
         Nachbarpflanzen — befallene Pflanze sofort isolieren!
         Massnahmen: Blaue Klebefallen, Spinosad-Spray, Amblyseius cucumeris.
         Verweis: Detail-Chunk "thrips-erkennung".

      5. Trauermucken (Sciaridae) — kleine schwarze Fliegen aus feuchter Erde.
         Larven schaden Wurzeln von Jungpflanzen und Stecklingen, bei grossen
         Pflanzen eher laestig. Substrat zwischen Giess-Gaengen antrocknen
         lassen ist die wichtigste Massnahme.
         Verweis: Detail-Chunk "trauermucken-erkennung".

      Besondere Anfaelligkeit Calathea: extrem empfindlich auf Leitungswasser
      (Kalk, Chlor, Fluorid) und trockene Luft. Calathea-spezifische Symptome
      (braune Blattspitzen) sind fast immer auf Wasserqualitaet und
      Luftfeuchtigkeit zurueckzufuehren, nicht auf Schaedlinge.
      Verweis: Detail-Chunk "braune-blattspitzen-zimmerpflanze".
    metadata:
      topic: artspezifische_probleme
      plant_group: tropische_zimmerpflanzen
      species_list:
        - Monstera deliciosa
        - Philodendron spp.
        - Alocasia spp.
        - Calathea spp.
        - Ficus benjamina
        - Epipremnum aureum
        - Spathiphyllum wallisii
      common_problems:
        - wurzelfaeule
        - spinnmilben
        - schildlaeuse
        - wolllaeuse
        - thrips
        - trauermucken
      difficulty: beginner

  # ---------------------------------------------------------------------------
  # 9. Sukkulenten & Kakteen
  # ---------------------------------------------------------------------------
  - id: artspez-sukkulenten-kakteen
    title: Sukkulenten und Kakteen — wenige aber ernste Probleme
    content: |
      Sukkulenten (Aloe vera, Echeveria, Crassula, Haworthia) und Kakteen
      (Familie Cactaceae) sind sehr trockenheitstolerant und haben wenige
      Krankheiten — aber die Probleme die auftreten sind oft fatal wenn
      sie zu spaet erkannt werden.

      Die 4 haeufigsten Probleme:

      1. Wurzelfaeule durch zu nasses Substrat — mit Abstand das haeufigste
         Problem und haeufigste Todesursache. Sukkulenten und Kakteen speichern
         Wasser im Gewebe und brauchen sehr selten Wasser. Das Substrat muss
         zwischen den Giess-Gaengen vollstaendig austrocknen. Symptome: Stengel
         oder Blattbasis wird weich und glasig, Pflanze kippt um, Wurzeln
         braun-schwarz und faul. Kein Wiederherstellen wenn der Stengel von
         unten faul ist.
         Massnahmen: Pruefen: Topf hochheben — wenn er noch schwer ist, NICHT
         giessen. Kakteen im Winter (Oktober-Maerz) gar nicht giessen.
         Staunaeesse und geschlossene Untersetzer vermeiden.
         Verweis: Detail-Chunk "wurzelfaeule-erkennung".

      2. Woll- und Schmierlaeuse in Ritzen und Rippen — der haeufigste
         Schaedling an Kakteen und Sukkulenten. Weisse Watteklumpen zwischen
         Kakteenrippen, unter Dornen und in Blattachseln von Sukkulenten.
         Besonders tief in Ritzen versteckt, daher hartnackig.
         Massnahmen: Isopropanol-Wattestaechen in alle Ritzen, Neem-Oel als
         Bespruehed und Giessanwendung, Wattestaechen jeden 5-7 Tage wiederholen.
         Verweis: Detail-Chunk "wolllaeuse-erkennung".

      3. Schildlaeuse an Stamm und Blattoberseiten — besonders bei Aloe vera,
         Crassula und stammbildenden Kakteen. Braungraue Schuppen an Stengeln,
         Honigtau. Massnahmen: wie Schildlaeuse allgemein, Oel-Sprays besonders
         effektiv fuer den Schild.
         Verweis: Detail-Chunk "schildlaeuse-erkennung".

      4. Pilzbefall bei Staunaeesse (Fusarium, Pythium) — bei nassen
         Bedingungen koennen Pilze Wunden (Beschnitt, Umtopf-Schaden) besiedeln.
         Vorbeugen: Wunden vor dem Einpflanzen antrocknen lassen (24-48 Stunden
         an der Luft), kein Wasser auf frische Wunden, mineralisches Substrat
         (wenig Torf, hoher Mineral- und Sandanteil).
         Verweis: Detail-Chunk "wurzelfaeule-behandlung".

      Besonderheit Saisonalitaet: Kakteen und viele Sukkulenten haben eine
      echte Winterruhe. Im Winter (wenig Licht, kuehler Standort, kein Giessen)
      sind sie kaum anfaellig fuer Krankheiten. Die meisten Probleme entstehen
      wenn im Winter zu warm und zu nass gehalten wird.
    metadata:
      topic: artspezifische_probleme
      plant_group: sukkulenten_kakteen
      species_list:
        - Aloe vera
        - Echeveria spp.
        - Crassula ovata
        - Haworthia spp.
        - Cactaceae (diverse)
      common_problems:
        - wurzelfaeule
        - wolllaeuse
        - schildlaeuse
        - pilzbefall
      difficulty: beginner

  # ---------------------------------------------------------------------------
  # 10. Rosen
  # ---------------------------------------------------------------------------
  - id: artspez-rosen
    title: Rosen — Sternrussstaub, Mehltau, Rost und die typischen Schaedlinge
    content: |
      Rosen (Rosa spp.) gehoeren zu den anspruchsvollsten Gartengehoelzen
      in Bezug auf Pflanzenschutz. Drei pilzliche Haupterkrankungen plus
      einige charakteristische Schaedlinge bestimmen den Pflanzenschutz
      im Rosenbeet.

      Die 5 haeufigsten Probleme:

      1. Sternrussstaub (Diplocarpon rosae) — haeufigste Pilzkrankheit an
         Rosen. Schwarze Flecken mit gefransten, sternfoermigen Raendern auf
         Blattoberseiten, befallene Blaetter werden gelb und fallen vorzeitig ab.
         Bei starkem Befall kahl werdende Straeucher. Foerdernd: Blattnaeseperioden,
         warme feuchte Sommer.
         Massnahmen: Laubfall sofort entfernen (Sporen ueberwintern in abgefallenen
         Blaettern!), nicht von oben giessen, resistente Sorten waehlen
         (z.B. ADR-geprueft), Netzschwefel oder Kupfer vorbeugennd.
         Saison: Sommer bis Herbst, Hauptbefall Juli-September.

      2. Echter Mehltau an Rosen (Podosphaera pannosa) — weisslicher pudriger
         Belag auf jungen Trieben, Knospen und Blattunterseiten. Junge
         Blaetter kringeln sich ein. Foerdernd: warme Tage, kuehle Naechte,
         trockene Blattoberflaechen.
         Massnahmen: Milch-Spray (1:9), Netzschwefel, Kaliumbicarbonat,
         kranke Triebe abschneiden. Verweis: Detail-Chunk "echter-mehltau".
         Saison: Mai-September.

      3. Rost an Rosen (Phragmidium mucronatum) — orangerote Pusteln auf
         Blattunterseiten, gelbe Flecken oben. Befallene Blaetter fallen ab.
         Foerdernd: feuchte Bedingungen, besonders im Fruehsommer.
         Massnahmen: Befallene Blaetter entfernen, Netzschwefel, Kupferpraeparat.
         Saison: Fruehsommer, nach Regen.

      4. Blattlaeuse (Macrosiphum rosae) — gruenliche bis roetliche Laeuse an
         Triebspitzen und Knospen, Honigtau, verkrueppelte Knospen.
         Blattlaeuse sind bei Rosen fast unvermeidlich, aber gut kontrollierbar.
         Massnahmen: Stark befallene Triebspitzen abschneiden, Marienkaefer
         foerdern (biologisch), Kaliseife-Spray, Neem-Oel.
         Saison: April-September.

      5. Rosenblattwespe (Blennocampa phyllocolpa) — Blaetter rollen sich
         laengsseits zusammen, Larven sitzen innen. Typisch im Fruehsommer.
         Massnahmen: Befallene Blaetter einzeln absammeln und entsorgen,
         bei starkem Befall Spinosad.
         Verweis allgemein Schaedlinge: Detail-Chunk "biologische-schaedlingsbekaempfung-nuetzlinge".
         Saison: Mai-Juni.

      Botrytis an Rosenknospen (Botrytis cinerea) — bei feuchtem Wetter
      und in Hochlagen. Knospen oeffnen sich nicht, werden braun-matschig.
      Massnahmen: Luftzirkulation verbessern, abgestorbene Bluetenteile
      regelmaessig entfernen.
    metadata:
      topic: artspezifische_probleme
      plant_group: rosen
      species_list:
        - Rosa spp.
      common_problems:
        - sternrussstaub
        - echter_mehltau
        - rost
        - blattlaeuse
        - rosenblattwespe
      difficulty: intermediate

  # ---------------------------------------------------------------------------
  # 11. Obstgehoelze
  # ---------------------------------------------------------------------------
  - id: artspez-obstgehoelze
    title: Obstgehoelze (Apfel, Kirsche, Pflaume, Erdbeere, Johannisbeere) — Probleme
    content: |
      Obstgehoelze umfassen sehr unterschiedliche Familien. Kernobst (Malus,
      Pyrus), Steinobst (Prunus), Beerenobst (Ribes, Rubus, Fragaria) haben
      je eigene Schwachstellen.

      Die wichtigsten Probleme nach Gruppe:

      KERNOBST (Apfel, Birne):
      1. Apfelschorf (Venturia inaequalis) — haeufigste Apfelkrankheit.
         Olivbraune bis schwarze, korkige Flecken auf Fruechten und Blaettern.
         Fruechte rissig, lagert schlecht. Foerdernd: feuchtes Fruehjahr.
         Massnahmen: Laubfall vergraben oder kompostieren, Kupfer oder Schwefel
         vorbeugennd, schorfresistente Sorten (z.B. Topaz, Rebella).
         Saison: Fruehjahr (Erstinfektionen), Sommer.

      2. Feuerbrand (Erwinia amylovora) — meldepflichtige Bakterienkrankheit
         an Kernobst und Quitten. Bluetenstaende, Triebe und Aeste vertrocknen
         blitzartig — "Kaeltebrand-Optik". Befallene Teile werden braun-schwarz,
         biegen sich hakenfoermig. KEIN Gegenmittel. Befallene Teile sofort und
         grosszuegig (mind. 50 cm ins gesunde Holz) herausschneiden, Werkzeug
         desinfizieren. Meldepflicht in manchen Bundeslaendern pruefen!
         Saison: Bluete (Hauptinfektionszeit), heisses feuchtes Wetter.

      STEINOBST (Kirsche, Pflaume, Pfirsich):
      3. Kräuselkrankheit des Pfirsichs (Taphrina deformans) — Blaetter
         kraeuseln und deformieren sich und faerben sich rot-gelblich. Frueher
         Blattfall geschwaeicht die Pflanze. Nur ein Behandlungszeitpunkt: nach
         dem Laubfall im Herbst oder kurz vor der Knospenentfaltung im Fruehjahr
         (Kupferpraeparat). Saison: Fruehsommer (sichtbar); Infektion: Fruehsommer.

      4. Kirschessigfliege (Drosophila suzukii) — legt Eier in reife und
         halbreife Fruechte (Kirschen, Heidelbeeren, Himbeeren, Erdbeeren, Trauben).
         Fruechte fallen fruehzeitig ab, verderben schnell. Massnahmen: Engmaschige
         Netze (1-2mm Maschenweite), Fallensysteme, Fruchte schnell ernten.
         Saison: Sommer-Herbst (Spaetsorten besonders betroffen).

      BEERENOBST:
      5. Monilia-Fruchtfaeule (Monilinia fructigena) — braune, sich aus-
         breitende Faeulnis an Fruechten mit konzentrischen Sporenpusteln.
         Fruechte mumifizieren und bleiben am Baum haengen (Infektionsquelle!).
         Massnahmen: Mumifizierte Fruechte entfernen, befallene Fruechte nie
         kompostieren, Luftzirkulation durch Schnitt verbessern.
         Verweis: Detail-Chunk "grauschimmel-botrytis" (Botrytis an Erdbeere).

      Blattlaeuse und Apfelwickler sind weitere haeufige Probleme bei Kernobst.
      Apfelwickler-Kontrolle: Pheromonfallen zum Monitoring, Codling Moth
      Granulovirus (biologisch, sehr effektiv).
    metadata:
      topic: artspezifische_probleme
      plant_group: obstgehoelze
      species_list:
        - Malus domestica
        - Pyrus communis
        - Prunus avium
        - Prunus persica
        - Ribes spp.
        - Rubus spp.
        - Fragaria x ananassa
      common_problems:
        - apfelschorf
        - feuerbrand
        - kraeusselkrankheit
        - kirschessigfliege
        - monilia
      difficulty: intermediate

  # ---------------------------------------------------------------------------
  # 12. Zwiebelgewaechse / Allium
  # ---------------------------------------------------------------------------
  - id: artspez-allium
    title: Zwiebeln, Knoblauch, Lauch, Schnittlauch — haeufigste Probleme
    content: |
      Alliumgewaechse — Zwiebel (Allium cepa), Knoblauch (A. sativum),
      Lauch/Porree (A. porrum), Schnittlauch (A. schoenoprasum) — haben eine
      enge Verwandtschaft und teilen viele Krankheitserreger. Fruchtfolge
      3 Jahre Anbaupause fuer alle Allium-Arten.

      Die 5 haeufigsten Probleme:

      1. Falscher Mehltau an Zwiebel und Lauch (Peronospora destructor,
         P. parasitica) — gelbliche Flecken auf Blaettern mit grau-violettem
         Sporenrasen. Befallene Blaetter kippen um. Foerdernd: kuehle, feuchte
         Perioden im Fruehjahr und Herbst.
         Massnahmen: Kupferpraeparat (vorbeugend!), Pflanzabstand, nicht von oben
         bewaessern, Fruchtfolge einhalten.
         Saison: Fruehjahr und Herbst, nach Regenperioden.
         Verweis: Detail-Chunk "falscher-mehltau".

      2. Rost an Lauch und Knoblauch (Puccinia allii) — orangerote Pusteln auf
         Blaettern, geschwaeicht das Gewebe. Knoblauch besonders anfaellig im
         Fruehjahr. Massnahmen: Befallene Blaetter entfernen, Netzschwefel.
         Bei Lauch: Sorten mit Rostresistenz waehlen.
         Saison: Fruehjahr bis Sommer.

      3. Lauchminierfliege (Phytomyza gymnostoma) — weissliche Minen
         (Frass-Galerien) in den Blaettern von Lauch, Schnittlauch, Schalotten.
         Typisch: Larven fressen in der Blattspreite, hinterlassen weissliche
         Linien oder Flecken. Massnahmen: Kulturschutznetze als beste Vorbeugung,
         befallene Blaetter entfernen, gelbe Klebefallen zum Monitoring.
         Saison: Fruehjahr und Herbst (zwei Generationen).

      4. Zwiebelfliege (Delia antiqua) — Larven fressen in der Zwiebelbasis,
         Pflanzen welken und sterben ab. Besonders bei Jungpflanzen und
         Steckzwiebeln gefaehrlich. Massnahmen: Kulturschutznetze, Fruchtfolge,
         nicht zu frueh stecken (kalte Boeden bevorzugt von Zwiebelfliege).
         Saison: April-Juni (erste Generation), August-September (zweite).

      5. Fusarium-Halsfaeule (Fusarium oxysporum) — Basis der Zwiebel wird
         weich und faul, Blaetter sterben von unten ab. Boden-Pathogen das
         sich durch kontaminierte Steckzwiebeln und Boden verbreitet.
         Massnahmen: Gesundes Pflanzgut verwenden, gute Drainage, weite
         Fruchtfolge (4 Jahre), befallene Pflanzen entfernen.
         Saison: Ganzjaehrig, sichtbar vor der Ernte und bei Lagerung.
    metadata:
      topic: artspezifische_probleme
      plant_group: allium
      species_list:
        - Allium cepa
        - Allium sativum
        - Allium porrum
        - Allium schoenoprasum
      common_problems:
        - falscher_mehltau
        - rost
        - lauchminierfliege
        - zwiebelfliege
        - fusarium
      difficulty: intermediate

  # ---------------------------------------------------------------------------
  # 13. Wurzelgemuese
  # ---------------------------------------------------------------------------
  - id: artspez-wurzelgemuese
    title: Wurzelgemuese (Moehre, Pastinake, Sellerie, Rote Bete) — typische Probleme
    content: |
      Wurzelgemuese — Moehre (Daucus carota), Pastinake (Pastinaca sativa),
      Knollensellerie (Apium graveolens var. rapaceum), Rote Bete und Mangold
      (Beta vulgaris) — haben ein geschuetzteres Erntegut unter der Erde, aber
      typische ober- und unterirdische Schaedlinge.

      Die 5 haeufigsten Probleme:

      1. Moehrenfliege (Psila rosae) — ein Hauptschaedling der Moehre. Larven
         fressen rostbraune Gaenge (Frass) in die Moehrenwurzel, die dann fault.
         Charakteristisch: rotorangene Rostfaerbung um die Frass-Gaenge, unange-
         nehmer Geruch bei starkem Befall. Massnahmen: Kulturschutznetze (engmaschig,
         1mm) sind die wirksamste Methode, Saatzeit verspaeten (nach Ende des ersten
         Flugs, Ende Juni), Karotten und Lauch als Mischkultur (Lauch-Geruch verwirrt
         Moehrenfliege).
         Saison: Zwei Flugepochen: Mai-Juni und August-September.

      2. Alternaria an Moehre (Alternaria dauci) — braune bis schwarze Flecken auf
         Blaettern mit gelben Raendern, spaeter absterbende Blaetter. Foerdernd:
         warme feuchte Witterung. Massnahmen: weite Fruchtfolge (3-4 Jahre keine
         Apiaceae), befallenes Laub entfernen, Fungizid nur bei Starkbefall.
         Saison: Sommer.

      3. Cercospora-Blattflecken (Cercospora beticola) an Rote Bete und Mangold —
         runde Flecken mit hellgrauem Zentrum und dunkelrotem bis braunem Rand.
         Bei Massenbefall starkes Absterben der Blattmasse, was die Rueben-
         Entwicklung bremst. Massnahmen: weite Fruchtfolge, Kupferpraeparat.
         Saison: Sommer, besonders bei Waerme und Feuchte.

      4. Wuehlmaeuse (Arvicola terrestris, Microtus arvalis) — graben Gaenge
         unter Moehren, Pastinaken, Rote Bete und fressen die Wurzeln von unten.
         Ernte bricht zusammen oder Pflanze faellt plotzlich um (wurzellos).
         Massnahmen: Fallen (Maulwurffallen umgebaut fuer Wuehlmaus), Drahtkoerbe
         beim Pflanzen, Katzen als biologische Kontrolle.
         Saison: Ganzjaehrig, besonders Herbst-Winter.

      5. Nematoden (Meloidogyne-Gallennematoden) — Gallen (Verdickungen) an
         Moehren und Pastinaken, missgebildete Wurzeln. Haeufig nach Monokultur
         auf leichten Sandboeden.
         Massnahmen: Fruchtfolge mit Tagetes als Zwischenfrucht (nematizide Wirkung),
         resistente Sorten, Bodenbewaesserung optimieren.
         Saison: Sommer (Nematoden bei Waerme aktiver).
