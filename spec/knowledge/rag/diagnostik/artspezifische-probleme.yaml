  # ---------------------------------------------------------------------------
  # 3. Kohlgewaechse / Brassicaceae
  # ---------------------------------------------------------------------------
  - id: artspez-brassicaceae
    title: Kohl und Kreuzbluetengewaechse — Kohlhernie, Weisstlinge und Co.
    content: |
      Alle Brassicaceae — Weisskohl, Rotkohl, Blumenkohl, Brokkoli, Rosenkohl,
      Kohlrabi (alle Brassica oleracea Varietaeten), Chinakohl (B. rapa),
      Rettich (Raphanus sativus), Rucola (Eruca vesicaria) — sind von
      denselben wirtsspezifischen Erregern und Schaedlingen bedroht.
      Strenge Fruchtfolge: mindestens 4 Jahre Anbaupause fuer Brassicaceae.

      Die 5 haeufigsten Probleme:

      1. Kohlhernie (Plasmodiophora brassicae) — die gefaehrlichste Krankheit
         der Brassicaceae. Knollig verdickte Wurzeln, Pflanze kuemmert und welkt
         tagsuebers obwohl Boden feucht ist. Dauersporen ueberleben 15-20 Jahre im
         Boden. Kein Fungizid wirkt — Plasmodiophora ist ein Protist, kein Pilz.
         Vorbeugung: pH auf 7.0-7.5 anpassen (Dolomitkalk), strenge Fruchtfolge
         4 Jahre, resistente Sorten (z.B. Kilaton F1, Clapton F1).
         Saison: Befallsrisiko ganzjaehrig, sichtbar ab Halbzeit des Wachstums.
         Verweis: Detail-Chunk "kohlhernie".

      2. Kohlweissling (Pieris brassicae, P. rapae) und Kohleule (Mamestra
         brassicae) — Raupen fressen grossflaechig Blattoberseite und
         Herzblatt. Kohlweissling-Raupen sind gruenlich, in Gruppen; Kohleule-
         Raupen sind dicker, gruenbraun, nachtaktiv. Massnahmen: Handauflesen,
         Bacillus thuringiensis (Bt) Spray (biologisch, sehr wirksam gegen Raupen),
         Trichogramma-Schlupfwespen vorbeugend aussetzen ab Mai.
         Saison: Mai-September (mehrere Generationen).

      3. Erdfloeche (Phyllotreta spp.) — kleine schwarze Kaefer (2-3mm) die
         viele kleine Loecher in die Blaetter fressen ("Schrotschuss-Muster").
         Hauptgefahr fuer Jungpflanzen und Keimlinge — koennen schnell abtoeten.
         Grosse Pflanzen vertragen Schaden besser. Massnahmen: Kulturschutznetze
         (beste Loesung), Pflanzenkohle oder Feldspat auf den Boden, Bewaesserung
         erhoehen (Erdfloeche meiden feuchte Bedingungen).
         Saison: April-Mai besonders gefaehrlich fuer Jungpflanzen.

      4. Falscher Mehltau an Kohl (Peronospora brassicae) — gelbe Flecken oben,
         grau-weisser Sporenrasen unten. Besonders an Jungpflanzen und Keimlingen
         gefaehrlich. Foerdernd: Naesse, kuehle Temperaturen, Enge.
         Massnahmen: Kupferpraeparat, Pflanzabstand erhoehen, nicht von oben giessen.
         Saison: Fruehjahr und Herbst.

      5. Kohlschabe (Plutella xylostella) — kleine Raupe (10mm), friert gruenlich,
         frisst Blattoberflaeche weg und hinterlaesst zarten Blatthautfilm
         ("Fensterscheiben"). Massnahmen: Bt-Spray, Diamid-Insektizide bei
         starkem Befall, Kulturschutznetze.
         Saison: Mehrere Generationen, Mai-Oktober.

      Besondere Anfaelligkeit: Brassicaceae bilden KEINE Mykorrhiza-Symbiose,
      daher ist Mykorrhiza-Praeparat hier verschwendet. Stattdessen Trichoderma
      fuer Wurzelschutz verwenden.
    metadata:
      topic: artspezifische_probleme
      plant_group: brassicaceae
      species_list:
        - Brassica oleracea
        - Brassica rapa
        - Raphanus sativus
        - Eruca vesicaria
      common_problems:
        - kohlhernie
        - kohlweissling
        - erdfloeche
        - falscher_mehltau
        - kohlschabe
      difficulty: intermediate

  # ---------------------------------------------------------------------------
  # 4. Salat & Blattgemuese
  # ---------------------------------------------------------------------------
  - id: artspez-salat-blattgemuese
    title: Salat und Blattgemuese — Schnecken, Falscher Mehltau und Botrytis
    content: |
      Kopfsalat (Lactuca sativa), Spinat (Spinacia oleracea), Mangold
      (Beta vulgaris var. cicla), Feldsalat (Valerianella locusta) und
      verwandte Blattgemuese sind kurzlebige, weichgewebige Pflanzen mit
      hoher Anfaelligkeit fuer Feuchtigkeitsprobleme und saugende Schaedlinge.

      Die 5 haeufigsten Probleme:

      1. Schnecken — das Hauptproblem schlechthin fuer Salat!
         Braune Nacktschnecken (Arion spp.) und graue Ackerschnecken
         (Deroceras reticulatum) fressen nachts ganze Salatpflanzen ab. Typisch:
         morgens sind Jungpflanzen oder ganze Koepfe verschwunden oder stark
         zerfressen. Schleimspur als Indiz. Massnahmen: Schneckenkorn mit
         Eisen-III-Phosphat (Ferramol — biovertraeglich, fuer Haus- und Wildtiere
         ungefaehrlich), Bierfallen, Schneckenbarrieren (Kupfer, Granulat), abends
         Schnecken absammeln (am effektivsten direkt nach Regen).
         Saison: Hauptsaison Fruehjahr und Herbst, bei Regen und Feuchte.

      2. Falscher Mehltau am Salat (Bremia lactucae) — gelbe eckige Flecken
         auf Blattoberseiten, weisslicher Sporenrasen auf Blattunterseiten.
         Befallene Blaetter sterben schnell ab. Rassevielfalt des Erregers macht
         Resistenzsorten schwierig. Foerdernd: Feuchte, kuehle Temperaturen, Enge.
         Massnahmen: Pflanzabstand (Luftzirkulation!), Kupferpraeparat, abends
         NICHT sprengen.
         Saison: Herbst und Fruehjahr besonders gefaehrlich.

      3. Blattlaeuse am Salat — besonders gruene Salatblattlaus (Nasonovia
         ribisnigri) kriechen in den Kopf und sind im Salat kaum zu entfernen.
         Roetliche oder gruenliche Laeuse zwischen den Blaettern.
         Massnahmen: Kein wirksames Mittel wenn im Kopf — betroffene Pflanzen
         entsorgen. Vorbeugung: Gelbfallen, offene Sorten bevorzugen, Reihenfolge
         mit Neem-Drench vor der Kopfbildung.
         Saison: Ganzjaehrig im Gewaechshaus, Fruehjahr-Sommer im Freiland.

      4. Grauschimmel / Botrytis (Botrytis cinerea) — grauer, pelziger Schimmel
         an Blaettern, Stengel und Kopf, besonders bei Lagerungs-Salat und unter
         Glas. Befallenes Gewebe wird matschig. Foerdernd: hohe Feuchte, Verwundungen,
         abgestorbene Blaetter als Eintrittspforte.
         Massnahmen: Abgestorbene Blaetter regelmaessig entfernen, Luftzirkulation,
         Pflanzabstand erhoehen, keine Bewaesserung ueber Blaetter.
         Verweis: Detail-Chunk "grauschimmel-botrytis".
         Saison: Herbst bis Fruehjahr, Gewaechshaus.

      5. Nematoden als Bodenproblem — parasitaere Wurzelgallennematoden (Meloidogyne)
         verursachen Knoetchen an Salat-Wurzeln, Pflanze kuemmert. Haeufig nach
         Monokultur. Massnahmen: Bodenbewohnte Nutz-Nematoden (Steinernema
         gegen Trauermucken), Fruchtfolge, Tagetes als Zwischenfrucht
         (exudiert nematizide Substanzen).
         Saison: Sommer (Nematoden aktiver bei Waerme).
    metadata:
      topic: artspezifische_probleme
      plant_group: salat_blattgemuese
      species_list:
        - Lactuca sativa
        - Spinacia oleracea
        - Beta vulgaris var. cicla
        - Valerianella locusta
      common_problems:
