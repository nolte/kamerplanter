      difficulty: beginner

  # ---------------------------------------------------------------------------
  # 5. Kraeuter
  # ---------------------------------------------------------------------------
  - id: artspez-kraeuter
    title: Kraeuter (Basilikum, Petersilie, Minze, Thymian) — artspezifische Probleme
    content: |
      Kraeuter umfassen sehr unterschiedliche Familien mit je eigenen Schwachstellen.
      Basilikum (Ocimum basilicum) — Lippenbluetengewaechs;
      Petersilie, Dill, Fenchel (Apiaceae); Minze (Mentha spp.);
      Thymian, Rosmarin (mediterrane Lippenbluetengewaechse).

      Die haeufigsten Probleme nach Kraeuter-Art:

      BASILIKUM — haeufigste Probleme:
      1. Fusarium-Welke (Fusarium oxysporum f.sp. basilici) — Hauptgefahr
         fuer Basilikum! Pflanze welkt ploetzlich, Stengel wird an der Basis
         braun, faellt um. Kein Mittel bekannt — befallene Pflanzen sofort
         entsorgen (NICHT kompostieren!). Bodenpathogen das lange im Boden
         ueberlebt. Vorbeugung: frische Anzuchterde, gute Drainage, nicht zu
         nass halten. Saatgut aus sicherer Quelle.
         Saison: Ganzjaehrig, besonders bei nasskalten Bedingungen.

      2. Falscher Mehltau (Peronospora belbahrii) an Basilikum — gelbe
         Flecken oben, grauer Sporenrasen unten. Junge Pflanzen besonders
         anfaellig. Foerdernd: kuehle feuchte Bedingungen, Blattnaeseperioden.
         Massnahmen: Luftzirkulation stark verbessern, nicht von oben giessen,
         ggf. Kupferpraeparat. Verweis: Detail-Chunk "falscher-mehltau".
         Saison: Fruehjahr und kuehlere Perioden.

      MINZE — haeufigste Probleme:
      3. Rost an Minze (Puccinia menthae) — orangerote bis braunrote Pusteln
         auf Blattunterseiten, Blattoberseite zeigt gelbliche Flecken. Befallene
         Pflanzen stark zurueckschneiden (auf 5cm), Schnittgut entsorgen.
         Massnahmen: Befallene Teile entfernen, Netzschwefel, Sorten mit
         Resistenz waehlen.
         Saison: Sommer bis Herbst, besonders feucht-warm.

      KRAEUTER ALLGEMEIN — Schaedlinge:
      4. Blattlaeuse an Petersilie, Dill, Fenchel — Gruene und schwarze
         Blattlaeuse (oft Aphis spp.) an Triebspitzen und Blattunterseiten,
         klebrige Ablagerungen. Massnahmen: Kaliseife-Spray, Abspruehen
         mit Wasserstrahl. Bei Kraeuter: Neem-Oel erst nah an der Ernte
         NICHT anwenden (Geschmack!).
         Verweis: Detail-Chunk "blattlaeuse-erkennung".

      5. Spinnmilben bei trockenen Kraeuten (Thymian, Rosmarin) — mediterrane
         Kraeuter werden unter trocken-heissen Bedingungen (Topf in der Sonne,
         Heizungsnaehe) haeufig von Spinnmilben befallen. Feine Stippling auf
         Blattoberseiten, Gespinste. Massnahmen: Luftfeuchtigkeit leicht
         erhoehen, Pflanze abduschen, Raubmilben.
         Verweis: Detail-Chunk "spinnmilben-erkennung".

      Besonderheit: Bei Kraeuter die kurz vor der Ernte stehen, keine Mittel
      mit langer Karenzzeit einsetzen. Hausmittel (Kaliseife, Backpulver,
      Milch-Spray) bevorzugen. Thymian und Rosmarin sind robuster als
      Basilikum und Petersilie.
    metadata:
      topic: artspezifische_probleme
      plant_group: kraeuter
      species_list:
        - Ocimum basilicum
        - Petroselinum crispum
        - Mentha spp.
        - Rosmarinus officinalis
        - Thymus vulgaris
      common_problems:
        - fusarium_welke
        - falscher_mehltau
        - rost
        - blattlaeuse
        - spinnmilben
      difficulty: beginner

  # ---------------------------------------------------------------------------
  # 6. Cannabis
  # ---------------------------------------------------------------------------
  - id: artspez-cannabis
    title: Cannabis — Botrytis, Echter Mehltau und die haeufigsten Schaedlinge (Indoor)
    content: |
      Cannabis (Cannabis sativa) hat im Indoor-Anbau spezifische Risikoprofile
      die stark von der Wachstumsphase abhaengen. Kontrolle von Luftfeuchtigkeit
      und Luftzirkulation ist die wichtigste Praevention.

      Die 5 wichtigsten Probleme:

      1. Botrytis / Bud Rot (Botrytis cinerea) — die Hauptgefahr in der
         Bluetephase. Blueten werden von innen braun und matschig, grauer
         Schimmelrasen sichtbar wenn man die Bluete oeffnet. Besonders bei
         dichten Indica-lastigen Bluetenstaenden mit schlechter Luftzirkulation.
         VORSICHT: Befallene Bluetenteile NICHT rauchen — Mykotoxine sind
         gesundheitsschaedlich. Sofort grosszuegig herausschneiden.
         Massnahmen: RH in spaeter Bluete unter 45-50% halten, Luftbewegung
         maximieren, Entfeuchter einsetzen.
         Saison/Phase: Bluete (Woche 5-10), besonders spaete Bluete.
         Verweis: Detail-Chunk "grauschimmel-botrytis".

      2. Echter Mehltau (White Powdery Mildew, WPM) — weisser pudriger Belag
         auf Blattoberseiten, typischer Mehltau-Look. Seltener als Botrytis aber
         haeufig in der vegetativen Phase oder fruehen Bluete. Foerdernd: warme
         Tage, kuehle Naechte, schlechte Luftzirkulation.
         Massnahmen: Milch-Spray (1:9), Kaliumbicarbonat (Vitisan), Netzschwefel
         (NICHT an Blueten spritzen!), Luftzirkulation verbessern.
         Verweis: Detail-Chunk "echter-mehltau".

      3. Spinnmilben (Tetranychidae) — sehr haeufig Indoor, besonders wenn
         Temperatur hoch und Luftfeuchtigkeit niedrig. Feine helle Punkte auf
         Blattoberseiten, Gespinste bei starkem Befall. Spinnmilben vermehren
         sich unter trockenen, warmen Bedingungen extrem schnell.
         Massnahmen: Luftfeuchtigkeit auf 50-60% erhoehen, Raubmilben
         (Phytoseiulus persimilis), Neem-Oel als Spray (nicht in Bluete!).
         Verweis: Detail-Chunk "spinnmilben-erkennung".

      4. Thrips — silbrige Streifen und schwarze Kotpunkte auf Blaettern.
         Indoor ein haeufiger Neueinschleppung durch kontaminierte Erde oder
         neue Pflanzen. Blaue Klebefallen fuer Monitoring.
         Massnahmen: Spinosad (sehr effektiv, abends anwenden), Amblyseius
         cucumeris (Raubmilbe gegen Thrips-Larven), blaue Klebefallen.
         In der Bluete: Spinosad nur an Blaettern, NICHT an Blueten.
         Verweis: Detail-Chunk "thrips-erkennung".

      5. Trauermucken (Sciaridae) — besonders bei ueberwaessertem Substrat
         in Erde-Anzucht. Larven fressen Feinwurzeln und schwaecht Jungpflanzen.
         Massnahmen: Substrat abtrocknen lassen, BTi giessen (Mosquito Bits),
         Nematoden (Steinernema feltiae), gelbe Klebefallen.
         Verweis: Detail-Chunk "trauermucken-erkennung".

      Weitere bekannte Probleme: Fusarium und Pythium (Wurzelfaeule, besonders
      Hydro), Blattlaeuse an Triebspitzen, Hopfenmosaikvirus (HpMV) und
      Tabakmosaikvirus (TMV) durch kontaminierte Werkzeuge und Haende (Desinfek-
      tion mit Isopropanol ist Pflicht). Pythium bevorzugt Wassertemperaturen
      ueber 22 Grad — Hydro-Reservoir kuehl halten.
      Verweis Wurzelfaeule: Detail-Chunks "wurzelfaeule-erkennung", "wurzelfaeule-behandlung".
    metadata:
      topic: artspezifische_probleme
      plant_group: cannabis
      species_list:
        - Cannabis sativa
      common_problems:
