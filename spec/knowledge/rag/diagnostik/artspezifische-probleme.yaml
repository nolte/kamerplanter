  # ---------------------------------------------------------------------------
  # 2. Kueurbisgewaechse
  # ---------------------------------------------------------------------------
  - id: artspez-kueurbis
    title: Kueurbisgewaechse (Gurke, Zucchini, Kuerbis, Melone) — haeufigste Probleme
    content: |
      Alle Kueurbisgewaechse (Cucurbitaceae) — Gurke (Cucumis sativus),
      Zucchini und Kuerbis (Cucurbita pepo, maxima, moschata), Melone
      (Citrullus lanatus, Cucumis melo) — teilen eine enge Verwandtschaft
      und aehnliche Probleme. Fruchtfolge 3-4 Jahre auf derselben Flaeche.

      Die 5 haeufigsten Probleme:

      1. Echter Mehltau an Kueurbisgewaechsen — sehr haeufig, besonders ab
         Hochsommer. Weisser pudriger Belag auf Blattoberseiten, beginnt als
         kleine Flecken. Erreger: Sphaerotheca fuliginea / Podosphaera xanthii.
         Foerdernd: warme Tage + kuehle Naechte, TROCKENE Blattoberflaechen.
         Massnahmen: Milch-Spray (1:9), Backpulver-Spray, Netzschwefel.
         Befallene Pflanzen koennen noch einige Wochen produzieren.
         Saison: Juli-Oktober (nimmt mit Alter zu).
         Verweis: Detail-Chunk "echter-mehltau".

      2. Falscher Mehltau an Gurke (Pseudoperonospora cubensis) — gelbe eckige
         Flecken oben, grau-violetter Sporenrasen unten. Sehr schnell fortschreitend.
         Foerdernd: kuehle, feuchte Bedingungen, Blattnaeseperioden.
         Massnahmen: Von unten giessen, Luftzirkulation verbessern, Kupferpraeparat.
         Saison: Fruehsommer bis Herbst bei kuehl-nassem Wetter.
         Verweis: Detail-Chunk "falscher-mehltau".

      3. Gurkenmosaikvirus (Cucumber Mosaic Virus, CMV) — Mosaikmuster aus hell-
         und dunkelgruenen Flecken auf Blaettern, deformierte Fruechte, Pflanze
         wuechst verkuemmert. Uebertragen durch Blattlaeuse. Kein Mittel gegen
         das Virus selbst — Blattlaeuse konsequent bekaempfen, befallene Pflanzen
         entfernen. Pflanzenwerkzeug desinfizieren.
         Saison: Ganze Vegetationsperiode.

      4. Blattlaeuse an Triebspitzen — besonders gruene Blattlaus (Myzus persicae),
         uebertraegt CMV und andere Viren. Kolonien an jungen Trieben, eingerollte
         Blaetter, Honigtau. Massnahmen: Kaliseife-Spray, Marienkaefer,
         Florfliegenlarven.
         Verweis: Detail-Chunk "blattlaeuse-erkennung".

      5. Spinnmilben bei Gurke — haeufig bei Hitzestress und trockener Luft.
         Stippling auf Blattoberseiten, feine Gespinste, Blattunterseiten pruefen.
         Gurken reagieren empfindlich und koennen schnell stark geschaedigt werden.
         Massnahmen: Luftfeuchtigkeit erhoehen, Pflanze abduschen, Raubmilben
         (Phytoseiulus persimilis).
         Verweis: Detail-Chunk "spinnmilben-erkennung".

      Besondere Anfaelligkeit: Jungpflanzen sind extrem schneckengefaehrdet —
      Schnecken fressen Keimlinge nachts ab, oft sind morgens nur noch Stiele
      uebrig. Bierfallen und Schneckenkorn (metaldehyd- oder eisenphosphatbasiert)
      um Jungpflanzen legen.
    metadata:
      topic: artspezifische_probleme
      plant_group: kueurbisgewaechse
