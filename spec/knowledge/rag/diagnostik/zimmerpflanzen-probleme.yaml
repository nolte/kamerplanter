  - id: braune-blattspitzen-zimmerpflanze
    title: Braune Blattspitzen bei Zimmerpflanzen (Monstera, Calathea, Farn & Co.)
    content: |
      Braune, trockene Blattspitzen sind das haeufigste Problem bei
      Zimmerpflanzen wie Monstera, Calathea, Alocasia und Farnen.
      Die drei wahrscheinlichsten Ursachen:
      1. Luftfeuchtigkeit zu niedrig — trockene Luft (haeufigste Ursache!):
         Die Luftfeuchtigkeit ist zu niedrig. Trockene Raumluft und
         Heizungsluft sind die Hauptursache fuer braune Blattspitzen
         bei Zimmerpflanzen. Tropische Pflanzen (Monstera, Calathea,
         Alocasia, Farne, Maranta) brauchen 50-70% Luftfeuchtigkeit.
         In beheizten Raeumen liegt die RH oft bei nur 20-35% — viel
         zu niedrig. Ein Luftbefeuchter ist die beste Loesung.
         Massnahmen:
         - Luftbefeuchter aufstellen (effektivste Loesung gegen
           zu niedrige Luftfeuchtigkeit / trockene Luft)
         - Pflanzen gruppieren (erhoehen gegenseitig die Luftfeuchte)
         - Kieselsteinschale mit Wasser unter den Topf (Verdunstung)
         - Regelmaessig besprühen hilft kurzfristig, reicht aber nicht aus
         - NICHT in die Naehe von Heizkoerpern stellen (Heizungsluft trocknet)
      2. Ueberduengung (bei Monstera, Ficus — NICHT bei Calathea):
         Bei Zimmerpflanzen wie Monstera oder Ficus kann Ueberduengung
         braune Spitzen verursachen. Bei Calathea ist Ueberduengung
         hingegen selten die Ursache — hier sind fast immer Wasser-
         qualitaet und Luftfeuchtigkeit die Hauptfaktoren.
         Zu viel Duenger fuehrt zu Salzanreicherung im Substrat und
         verbrennt die Blattspitzen.
         Massnahmen:
         - Duenger-Dosierung halbieren (besser zu wenig als zu viel)
         - Im Winter GAR NICHT duengen (Ruhephase)
         - Substrat mit klarem Wasser durchspuelen (Flush)
         - EC unter 1.0 mS/cm halten (bei Zimmerpflanzen)
      3. Leitungswasser mit Chlor/Kalk/Fluorid:
         Empfindliche Pflanzen (Calathea, Dracaena, Maranta, Spathiphyllum)
         reagieren auf Chlor und Fluorid im Leitungswasser mit braunen Spitzen.
         Calathea ist besonders kalkempfindlich — hartes Leitungswasser mit
         viel Kalk ist eine der Hauptursachen fuer braune Spitzen bei Calathea.
         Massnahmen:
         - Regenwasser verwenden (ideal — weich, kalkfrei, kostenlos)
         - Oder gefiltertes Wasser / abgekochtes Wasser nutzen
         - Leitungswasser mindestens 24h offen stehen lassen (Chlor entgast)
         - Mindestens zimmerwarmes Wasser verwenden (nie kalt)
         - Bei sehr hartem Wasser: destilliertes Wasser oder RO-Wasser mischen
      Braune Spitzen koennen NICHT rueckgaengig gemacht werden — abschneiden
      (knapp vor der braunen Stelle, nicht ins gruene Gewebe). Erfolg zeigt
      sich an neuen Blaettern ohne braune Spitzen.
    metadata:
      type: houseplant_diagnostic
      common_species: [Monstera, Calathea, Alocasia, Dracaena, Fern]
      severity_indicator: brown_leaf_tips
      difficulty: beginner

  - id: zimmerpflanze-gelbe-blaetter
    title: Gelbe Blaetter bei Zimmerpflanzen
    content: |
      Gelbe Blaetter bei Zimmerpflanzen — haeufigste Ursachen:
      1. Ueberwaesserung (Ursache Nr. 1 fuer Zimmerpflanzen-Tod!):
         - Substrat ist staendig nass, Untersetzer steht voll Wasser
         - Blaetter werden gleichmaessig gelb, haengen schlaff
         - Erde riecht modrig, faulig
         Loesung: Seltener giessen! Fingerprobe: Erst giessen wenn die
         oberen 2-3 cm Substrat trocken sind. Wasser im Untersetzer
         nach 30 Minuten weggiessen.
      2. Zu wenig Licht:
         - Pflanze steht weit vom Fenster entfernt
         - Blaetter werden blass-gelb, duenn, Pflanze wird "langbeinig"
         Loesung: Naeher ans Fenster ruecken (kein direktes Suedlicht
         fuer Schattenpflanzen). Pflanzenlicht im Winter.
      3. Natuerliches Altern (haeufigste Ursache fuer gelbe untere Blaetter):
         - Einzelne alte, untere Blaetter werden gelb und fallen ab
         - Obere Blaetter und neues Wachstum sind gesund
         Das ist NORMAL und kein Grund zur Sorge. Gelbe Blaetter
         entfernen — einfach abschneiden oder abzupfen. Das sieht
         nicht nur besser aus, sondern beugt auch Schimmelbildung vor.
         Empfehlung: Gelbe und abgestorbene Blaetter regelmaessig
         entfernen, damit die Pflanze keine Energie verschwendet.
         Nur wenn viele Blaetter gleichzeitig vergilben, liegt ein
         echtes Problem vor.
      4. Zugluft/Temperaturschock:
         - Nach dem Kauf oder Standortwechsel
         - Pflanze steht im kalten Luftzug (Fenster, Tuer)
         Loesung: Windgeschuetzten Standort waehlen, keine kalten Zugluft.
    metadata:
      type: houseplant_diagnostic
      severity_indicator: yellow_leaves
      difficulty: beginner

  - id: zimmerpflanze-blaetter-haengen
    title: Pflanze welkt obwohl Erde nass ist — Ueberwaesserung und Wurzelfaeule
    content: |
      Schlaffe Blaetter haben zwei gegensaetzliche Ursachen:
      1. Zu trocken (Unterwaesserung):
         - Substrat ist komplett ausgetrocknet, zieht sich vom Topfrand
         - Blaetter haengen schlaff, sind aber nicht verfaerbt
         - Topf fuehlt sich federleicht an
         Loesung: Gruendlich durchgiessen oder Topf 10-15 Min. in Wasser
         stellen (Tauchen). Pflanze erholt sich innerhalb von Stunden.
      2. Pflanze welkt obwohl die Erde nass ist → Ueberwaesserung + Wurzelfaeule:
         Wenn die Pflanze welkt obwohl die Erde feucht/nass ist, liegt fast
         immer Ueberwaesserung vor. Durch zu haeufiges Giessen entsteht
         Sauerstoffmangel an den Wurzeln, was zu Wurzelfaeule fuehrt.
         Die Wurzeln faulen und koennen kein Wasser mehr aufnehmen — deshalb
         welkt die Pflanze trotz nasser Erde. NICHT mehr giessen!
         Anzeichen:
         - Substrat ist nass/matschig, riecht modrig
         - Blaetter haengen UND werden gelb/weich
         - Topf ist schwer (voller Wasser)
         Massnahmen:
         - SOFORT aufhoeren zu giessen
         - Drainage pruefen: Hat der Topf Abflussloecher? Steht Wasser
           im Untersetzer? Drainage verbessern ist entscheidend!
         - Topf aus Uebersetzer nehmen, ueberschuessiges Wasser ablaufen lassen
         - Bei Faeulnis-Geruch: Umtopfen, matschige Wurzeln abschneiden,
           frisches, trockenes Substrat verwenden
         - Kuenftig: Fingerprobe vor dem Giessen (erst giessen wenn obere
           2-3 cm trocken sind)
      Unterscheidung: Fingerprobe! Trockenes Substrat → mehr giessen.
      Nasses Substrat → Wurzelproblem, weniger giessen, Drainage pruefen.
    metadata:
      type: houseplant_diagnostic
      severity_indicator: wilting_leaves
      difficulty: beginner
