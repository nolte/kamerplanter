  - id: kompost-qualitaet
    title: Kompost — Qualitaet, Anwendung und C/N-Verhaeltnis
    content: |
      Kompost ist das Rueckgrat der organischen Freilandduengung. Qualitaet und Reifegrad
      bestimmen, ob er nuetzt oder schadet.

      Reifetest: Eine Handvoll Kompost sollte angenehm erdig riechen (nicht faulig oder
      nach Ammoniak), kruemelig-feucht sein (nicht matschig), und eine dunkelbraune bis
      schwarze Farbe haben. Kressetest: Kressesamen auf feuchtem Kompost aussaeen — bei
      reifem Kompost keimen sie innerhalb von 3-5 Tagen gleichmaessig.

      C/N-Verhaeltnis: Das Kohlenstoff-zu-Stickstoff-Verhaeltnis bestimmt die
      Zersetzungsgeschwindigkeit. Reifer Kompost: C/N 15-20:1 (ideal). Unreifer Kompost:
      C/N > 25:1 — entzieht dem Boden Stickstoff (Stickstoff-Raub/N-Immobilisierung),
      da Mikroorganismen N fuer die Zersetzung benoetigen. Ergebnis: Gelbliche Blaetter
      trotz Duengung.

      Aufwandmengen:
      - Neuanlage/ausgelaugte Boeden: 5-8 L/m2 (einmalig)
      - Jaehrliche Erhaltung: 2-3 L/m2
      - Starkzehrer-Beete: 3-5 L/m2
      - Hochbeete (Nachfuellung): 5-10 L/m2 im Fruehjahr (Absackung ausgleichen)

      Eigener vs. gekaufter Kompost: Eigenkompost ist kostenlos, aber die Qualitaet
      schwankt. Gekaufter RAL-guetezertifizierter Kompost hat garantierte Naehrstoffwerte
      und ist schadstofffrei. Fuer kritische Kulturen (Gemuese, Kraeuter) ist zertifizierter
      Kompost vorzuziehen.

      Achtung: Kompost ist kein Vollduenger. Er liefert vor allem Kalium und Spurenelemente,
      aber vergleichsweise wenig Stickstoff und Phosphor. Hornmehl ergaenzt den N-Bedarf,
      Knochenmehl den P-Bedarf.
    metadata:
      cn_ratio_ideal: "15-20:1"
      annual_rate_l_per_m2: "2-3"
      heavy_feeder_rate_l_per_m2: "3-5"

  - id: hornmehl-hornspaene
    title: Hornmehl und Hornspaene — Organische Stickstoffquellen
    content: |
      Hornmehl und Hornspaene sind die wichtigsten organischen Stickstoffduenger im
      Freiland. Sie bestehen aus gemahlenem Rinderhorn (ca. 12-14% N) und unterscheiden
      sich nur in der Koernung und damit der Freisetzungsgeschwindigkeit.

      Hornmehl (fein gemahlen, <1 mm): Schnelle Freisetzung ueber 2-4 Wochen. Ideal
      fuer Kopfduengung waehrend der Vegetationsperiode, wenn Pflanzen sichtbaren
      N-Mangel zeigen (hellgruene bis gelbe aeltere Blaetter). Dosierung: 50-80 g/m2
      als Kopfduengung, leicht einharken und waessern.

      Hornspaene (grob, 1-5 mm): Langsame Freisetzung ueber 4-8 Wochen. Ideal fuer
      Grundduengung im Fruehjahr und Hochbeet-Schichtung. Dosierung: 80-120 g/m2.

      Hornschrot (mittel): Kompromiss, Freisetzung 3-6 Wochen. Vielseitig einsetzbar.

      Anwendungsregeln:
      - Immer leicht in die oberen 2-5 cm einarbeiten (nicht auf der Oberflaeche liegen
        lassen — trocknet aus und fault bei Naesse)
      - Nach dem Einarbeiten gruendlich waessern
      - Nicht direkt an Stiel oder Wurzelhals streuen (Verbrennungsgefahr)
      - Letzte Gabe spaetestens August (Stauden, Gehoelze: kein Herbst-N!)
      - Wirkung pH-abhaengig: Unter pH 5,5 verlangsamt sich die mikrobielle Umsetzung

      Alternative: Schafwollpellets (ca. 10-12% N) als vegane Alternative, zusaetzlich
      Kalium und Schwefel. Langsamere Freisetzung als Hornmehl. Dosierung: 100-150 g/m2.
    metadata:
      nitrogen_content_percent: "12-14"
      horn_meal_release_weeks: "2-4"
      horn_chips_release_weeks: "4-8"
