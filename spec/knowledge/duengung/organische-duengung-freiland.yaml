  - id: grundduengung-fruehjahr
    title: Grundduengung im Fruehjahr
    content: |
      Die Grundduengung im Fruehjahr legt die Naehrstoffbasis fuer die gesamte
      Vegetationsperiode. Sie erfolgt 2-4 Wochen vor der Pflanzung/Aussaat, sobald
      der Boden bearbeitbar ist (typisch Maerz-April).

      Standardrezept pro Quadratmeter:
      - Reifer Kompost: 3-5 Liter (ca. 2-3 cm Schicht)
      - Hornmehl oder Hornspaene: 80-120 g/m2 (als Stickstoffquelle)
      - Gesteinsmehl (Basalt oder Diabas): 100-200 g/m2 (Spurenelemente, Silizium)
      - Kalimagnesia (Patentkali): 50-80 g/m2 bei Kaliumbedarf lt. Bodenanalyse

      Einarbeitung: Kompost und feste Duenger oberflaechlich einharken (obere 5-10 cm),
      nicht tief untergraben. Die Bodenorganismen im Oberboden zersetzen das Material
      am effizientesten. Tiefes Umgraben zerstoert die Bodenstruktur und Mykorrhiza-Netze.

      Starkzehrer (Tomaten, Kuerbis, Kohl): Obere Dosierung waehlen, ggf. zusaetzlich
      2-3 L/m2 Wurmhumus. Mittelzehrer (Paprika, Salate, Moehren): Mittlere Dosierung.
      Schwachzehrer (Kraeuter, Bohnen, Erbsen): Nur Kompost, kein Hornmehl — Leguminosen
      fixieren eigenen Stickstoff ueber Rhizobien.

      Timing: Nicht zu frueh ausbringen — bei Frost und Naesse werden Naehrstoffe
      ausgewaschen, bevor die Pflanzen sie nutzen koennen. Bodentemperatur sollte
      mindestens 8-10 Grad Celsius betragen, da die mikrobielle N-Mineralisierung
      von Hornprodukten unter 8 Grad nahezu stoppt. Eine Maerz-Gabe bei 5 Grad
      zeigt erst 4-6 Wochen spaeter Wirkung — fuer sofortige Wirkung erst ab
      April ausbringen wenn der Boden sich erwaermt hat.
