      stem_clearance_cm: "5"

  - id: gruenduengung
    title: Gruenduengung — Arten, Timing und Einarbeitung
    content: |
      Gruenduengung (Zwischenfrucht/Deckfrucht) baut Bodenfruchtbarkeit auf, verhindert
      Erosion, unterdrueckt Unkraut und liefert organische Substanz. Sie ist ein zentrales
      Element der Fruchtfolge (Starkzehrer->Mittelzehrer->Schwachzehrer->Gruenduengung).

      Leguminosen (N-Fixierer):
      - Luzerne (Medicago sativa): Tiefwurzler bis 3m, exzellente Bodenlockerung,
        fixiert 150-300 kg N/ha. Mehrjaehrig, ideal fuer laengere Brachen.
      - Inkarnatklee (Trifolium incarnatum): Winterhart, fixiert 80-150 kg N/ha.
        Aussaat August-September, Einarbeitung April-Mai.
      - Blaue Lupine (Lupinus angustifolius): Saure Boeden (pH 5-6,5), Tiefwurzler,
        fixiert 100-200 kg N/ha. Aussaat April-Mai.
      - Weissklee (Trifolium repens): Niedrig, trittfest, ideal als Untersaat zwischen
        Reihen. Fixiert 50-100 kg N/ha.

      Nicht-Leguminosen:
      - Phacelia (Phacelia tanacetifolia): Bienenweide, keine Verwandtschaft zu
        Kulturpflanzen (keine Fruchtfolgeprobleme), friert bei -8 Grad ab.
        Aussaat April-September.
      - Gelbsenf (Sinapis alba): Schnellwuechsig (6-8 Wochen), Nematodenunterdrueckung.
        Nicht vor Kohlgewaechsen (gleiche Familie!). Aussaat Maerz-September.
      - Oelrettich: Tiefwurzler, bricht Verdichtungen auf. Aussaat Juni-August.

      Einarbeitung: 2-4 Wochen vor der Folgepflanzung oberflaechlich mulchen oder
      einarbeiten (obere 5-10 cm). Nicht unterpfluegen — anaerobe Faeulnis verhindert
      Naehrstofffreisetzung. Gruene Masse vor der Samenreife einarbeiten.
    metadata:
      clover_n_fixation_kg_ha: "80-150"
      lupine_n_fixation_kg_ha: "100-200"
