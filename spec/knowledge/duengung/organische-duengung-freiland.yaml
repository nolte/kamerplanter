  - id: bodenanalyse
    title: Bodenanalyse — Was testen, wie interpretieren
    content: |
      Eine professionelle Bodenanalyse ist die Grundlage fuer gezielte, bedarfsgerechte
      Duengung. Ohne Bodenanalyse ist jede Duengung Raterei.

      Probenahme: Im Fruehjahr (Maerz-April) vor der Grundduengung. 10-15 Einstiche
      gleichmaessig ueber das Beet verteilt, obere 30 cm, mischen, 500g als Mischprobe
      ins Labor schicken. Verschiedene Beete separat beproben.

      Standard-Analyse (Grunduntersuchung):
      - pH-Wert: Optimal 6,0-7,0 fuer die meisten Gemuese. Unter 5,5: Kalken. Ueber 7,5:
        Schwefel oder sauren Kompost einarbeiten.
      - Phosphor (P2O5): Versorgungsstufe A (sehr niedrig) bis E (sehr hoch).
        Ziel: Stufe C (optimal). Ueberdosierung (Stufe D/E) ist haeufig in Gartenboeden.
      - Kalium (K2O): Wie Phosphor in Stufen. Leichte Boeden verlieren K schneller.
      - Magnesium (Mg): Wichtig fuer Photosynthese. Mg-Mangel haeufig auf sauren Sandboeden.
      - Humusgehalt: Optimal 4-8% im Gemuesegarten. Unter 2% dringend Kompost zugeben.
      - Bodenart: Sand/Lehm/Ton-Anteil bestimmt Wasser- und Naehrstoffhaltekapazitaet.

      Erweiterte Analyse (empfohlen alle 3-5 Jahre): Spurenelemente (Fe, Mn, Zn, Cu, B),
      KAK (Kationenaustauschkapazitaet), Stickstoff (Nmin).

      Labore: LUFA (Landwirtschaftliche Untersuchungs- und Forschungsanstalt) in jedem
      Bundesland. Kosten: 20-50 Euro fuer Grunduntersuchung. Ergebnis in 2-3 Wochen.

      Interpretation: Das Labor liefert Duengeempfehlungen mit. Wichtig: Die Empfehlungen
      gelten fuer konventionelle Mineraldungung — bei organischer Duengung die Mengen
      anpassen (organische Duenger haben niedrigere Naehrstoffgehalte und langsamere
      Verfuegbarkeit).
    metadata:
      sampling_depth_cm: "30"
      sample_count: "10-15"
      optimal_ph: "6.0-7.0"
      optimal_humus_percent: "4-8"
      analysis_interval_years: "3-5"
      cost_eur: "20-50"

  - id: flaechenbasierte-dosierung
    title: Flaechenbasierte Dosierung (g/m2 und L/m2)
    content: |
      Im Freiland wird nicht pro Pflanze dosiert, sondern pro Flaeche. Dies ermoeglicht
      eine gleichmaessige Bodenversorgung unabhaengig von der Pflanzendichte.

      Umrechnung: 100 g/m2 = 1 kg pro 10 m2. Bei einem 1,2 m breiten Beet von 5 m Laenge
      (6 m2) werden fuer 80 g/m2 Hornmehl insgesamt 480 g benoetigt.

      Typische Aufwandmengen fuer Starkzehrer (pro Vegetationsperiode):
      - Kompost: 3-5 L/m2 (Grundduengung Fruehjahr)
      - Hornmehl: 80-120 g/m2 (aufgeteilt in 2-3 Gaben)
      - Gesteinsmehl: 100-200 g/m2 (1x im Fruehjahr)
      - Holzasche: 50-100 g/m2 (max. 1x jaehrlich, Kalium + Kalk)
      - Algenkalk: 100-200 g/m2 (pH-Korrektur, Calcium)
      - Organischer Vollduenger (Pellets): lt. Herstellerangabe, typisch 80-150 g/m2

      Fluessigduenger (Jauche, Komposttee): 1-3 L/m2 bei jeder Gabe, verduennt 1:10
      bis 1:20. Alle 2-3 Wochen waehrend der Hauptwachstumszeit.

      Praxistipp Dosierungshilfe: Ein gehaeufter Essloeffel Hornmehl = ca. 15 g.
      Eine 10-Liter-Giesskanne mit Jauche 1:10 reicht fuer ca. 3-5 m2.

      Hochbeete: 20-30% hoehere Dosierung als Freilandbeete, da Hochbeete schneller
      auslaugen (bessere Drainage, hoehere Bodentemperatur = schnellerer Abbau).

      Toepfe/Kuebel im Freien: Nicht flaechenbasiert dosieren, sondern nach Topfvolumen.
      Faustregel: Pro 10 Liter Erdvolumen die Menge fuer 0,1 m2 verwenden.
    metadata:
      compost_l_per_m2: "3-5"
      horn_meal_g_per_m2: "80-120"
      rock_flour_g_per_m2: "100-200"
      raised_bed_increase: "20-30%"

  - id: jauche-bruehe-komposttee
    title: Pflanzenjauchen, Bruehen und Komposttee
    content: |
      Selbst hergestellte Pflanzenjauchen und -bruehen sind kostenlose, wirksame
      Duenger und Pflanzenstarkungsmittel. Sie liefern Naehrstoffe, Spurenelemente
      und bioaktive Substanzen.

      Brennnesseljauche (Stickstoff-betont):
      - Herstellung: 1 kg frische Brennnesseln (vor Bluete) in 10 L Wasser, 10-14 Tage
        gaeren lassen, taeglich umruehren. Fertig wenn nicht mehr schaeumend.
      - Anwendung: 1:10 verduennt giessen (1 L Jauche auf 10 L Wasser), alle 2 Wochen.
        Als Blattspray 1:20 verduennt.
      - Wirkung: Ca. 0,5% N, plus Eisen, Kieselsaeure. Staerkt Pflanzengewebe.

      Beinwelljauche (Kalium-betont):
      - Herstellung: Wie Brennnesseljauche, 1 kg Beinwellblaetter auf 10 L Wasser.
      - Anwendung: 1:10 verduennt, ideal waehrend Bluete und Fruchtbildung.
      - Wirkung: Hoher Kaliumgehalt, foerdert Fruchtqualitaet und Reife.

      Schachtelhalmbruehe (Kieselsaeure, Pflanzenschutz):
      - Herstellung: 100 g getrockneten Schachtelhalm in 1 L Wasser 24h einweichen,
        dann 30 min koecheln lassen. Abseihen und abkuehlen.
      - Anwendung: 1:5 verduennt als Blattspray, vorbeugend gegen Pilzkrankheiten.
      - Wirkung: Kieselsaeure staerkt Zellwaende, erschwert Pilzbefall.

      Komposttee (AACT — Actively Aerated Compost Tea):
      - Herstellung: 1 Schaufel reifen Kompost in Jutesack, in 10 L Wasser haengen,
        24-48h mit Luftpumpe belueften. Sofort verwenden (nicht lagern!).
      - Anwendung: Unverduennt giessen oder 1:5 als Blattspray.
      - Wirkung: Milliarden nuetzlicher Mikroorganismen, foerdert Bodenleben.

      Achtung: Alle Jauchen riechen intensiv. Im staedtischen Umfeld Nachbarn informieren.
      Niemals unverduennt anwenden — Wurzelverbrennung!
    metadata:
      nettle_dilution: "1:10"
      comfrey_dilution: "1:10"
      horsetail_dilution: "1:5"
      fermentation_days: "10-14"

  - id: mykorrhiza
    title: Mykorrhiza-Inokulation
    content: |
      Mykorrhiza-Pilze sind symbiotische Partner der Pflanzenwurzeln. Sie vergroessern
      das Wurzelsystem effektiv um das 10-100-fache und verbessern die Aufnahme von
      Phosphor, Zink, Kupfer und Wasser dramatisch.

      Typen:
      - Arbuskulaere Mykorrhiza (AM): Die wichtigste Gruppe fuer Gemuese, Kraeuter und
        die meisten Kulturpflanzen. 80% aller Landpflanzen bilden AM-Symbiosen.
      - Ektomykorrhiza (EM): Fuer Baeume und Straeucher (Eiche, Birke, Kiefer).
        Nicht relevant fuer Gemuesegaerten.

      Nicht-mykorrhizierende Familien: Kreuzbluetler (Kohl, Rettich, Senf), Gaensefuss-
      gewaechse (Spinat, Rote Bete, Mangold) und Knoeterichgewaechse (Buchweizen, Rhabarber)
      bilden KEINE Mykorrhiza. Inokulation ist hier nutzlos und Geldverschwendung.

      Anwendung: Inokulum (Granulat oder Pulver) direkt an die Wurzelzone bringen — beim
      Pflanzen in das Pflanzloch geben oder bei Aussaat in die Saatfurche streuen. Auf
      der Erdoberflaeche ist es wirkungslos, da die Sporen Wurzelkontakt brauchen.

      Foerderung bestehender Mykorrhiza:
      - Boden nicht umgraben (zerreisst Pilznetzwerk)
      - Kein ueberschuessiger Phosphor-Duenger (>Stufe C hemmt Mykorrhiza-Bildung)
      - Keine Fungizide anwenden
      - Dauerbegrunung/Mulch statt nackter Boden
      - Fruchtfolge mit mykorrhizierenden Arten

      Ertragssteigerung durch Mykorrhiza: Studien zeigen 10-25% Mehrertraege bei Tomaten,
      Paprika und Gurken in nicht-sterilen Freilandboeden. Effekt ist groesser auf
      naehrstoffarmen und trockenen Boeden.
    metadata:
      non_mycorrhizal_families: [Brassicaceae, Chenopodiaceae, Polygonaceae]
      yield_increase_percent: "10-25"
      root_extension_factor: "10-100x"

  - id: saisonaler-duengekalender
    title: Saisonaler Duengekalender (Maerz bis Oktober)
    content: |
      Ein strukturierter Duengekalender verhindert Ueber- und Unterduengung und stellt
      sicher, dass Naehrstoffe zum richtigen Zeitpunkt verfuegbar sind.

      Maerz: Bodenanalyse durchfuehren (falls nicht im Herbst geschehen). Kompost und
      Gesteinsmehl auf die Beete ausbringen, sobald der Boden frostfrei und abgetrocknet
      ist. Gruenduengung von Winterbedeckung einarbeiten (2-4 Wochen vor Pflanzung).

      April: Grundduengung mit Hornmehl/Hornspaenen fuer Starkzehrer-Beete. Mykorrhiza-
      Inokulum beim Pflanzen von Vorkultur-Setzlingen. Komposttee als Bodenaktivator.

      Mai (nach Eisheiligen): Waermeliebende Kulturen pflanzen. Mulchschicht ausbringen
      (5-8 cm). Erste Brennnesseljauche ansetzen. Phacelia oder Klee als Untersaat
      zwischen den Reihen saeen.

      Juni: Kopfduengung mit Hornmehl fuer Starkzehrer (50 g/m2). Brennnesseljauche
      alle 2 Wochen. Beinwelljauche fuer bluehende/fruchtende Kulturen starten.

      Juli: Zweite Kopfduengung fuer langstehende Kulturen (Tomaten, Paprika, Kuerbis).
      Kalimagnesia (30-50 g/m2) fuer Fruchtqualitaet. Schachtelhalmbruehe vorbeugend
      spritzen bei feucht-warmer Witterung.

      August: Letzte Stickstoffgabe fuer einjaehrige Kulturen. Stauden und Gehoelze:
      KEIN Stickstoff mehr (Frosthaerte!). Abgeerntete Beete sofort mit Gruenduengung
      bestellen.

      September: Herbstkompost auf abgeraeumte Beete (2-3 L/m2). Wintergruenduengung
      aussaeen (Inkarnatklee, Winterroggen). Holzasche (50 g/m2) fuer Kalium.

      Oktober: Letzte Aufraeum-Arbeiten. Mulch auf Winterbeete. Keine Duengung mehr.
      Boden ruht bis zum Fruehjahr.
    metadata:
      last_nitrogen_month: August
      green_manure_autumn: [Inkarnatklee, Winterroggen]
      autumn_compost_l_per_m2: "2-3"

  - id: mischkultur-naehrstoffdynamik
    title: Companion Planting und Naehrstoffdynamik
    content: |
      Mischkultur (Companion Planting) nutzt die unterschiedlichen Naehrstoffbeduerfnisse
      und -beitraege von Pflanzen fuer gegenseitigen Nutzen. Aus Duengesicht sind
      folgende Kombinationen besonders relevant:

      Leguminosen als Stickstofflieferanten: Bohnen und Erbsen fixieren atmosphaerischen
      Stickstoff ueber Rhizobien-Bakterien in ihren Wurzelknoellchen. Nachbarpflanzen
      profitieren teilweise bereits waehrend der Kultur, voll nach der Einarbeitung.
      Klassiker: Mais + Stangenbohnen + Kuerbis (Milpa/Drei Schwestern).

      Tiefwurzler + Flachwurzler: Kombinieren erschliesst verschiedene Bodenhorizonte.
      Tomaten (tiefe Pfahlwurzel) + Basilikum (flache Wurzeln) konkurrieren nicht um
      dieselben Naehrstoffe. Tiefwurzler holen Naehrstoffe aus unteren Schichten und
      machen sie ueber Laubfall/Kompostierung verfuegbar.

      Starkzehrer neben Schwachzehrern: Dosierungskompromiss notwendig. Nicht einheitlich
      duengen, sondern gezielt an der Starkzehrer-Seite mehr geben. Alternativ: Starkzehrer
      in die Mitte des Beetes, Schwachzehrer an den Rand.

      Allelopathie beachten: Manche Pflanzen hemmen das Wachstum ihrer Nachbarn durch
      Wurzelausscheidungen. Walnuss (Juglon) hemmt Tomaten. Fenchel hemmt viele
      Gemuesesorten. Sonnenblumen koennen Boden fuer Nachfolger belasten.

      Naehrstoff-Konkurrenz minimieren: Gleiche Naehrstoff-Hauptbedarfe (z.B. zwei
      Starkzehrer) nebeneinander fuehren zu Konkurrenz. Abwechseln: Starkzehrer,
      Mittelzehrer, Schwachzehrer, Leguminose innerhalb eines Beetes.

      Duengestrategie bei Mischkultur: Grundduengung gleichmaessig, Kopfduengung gezielt
      an Starkzehrer. Fluessigduenger direkt an den Wurzelbereich der beduerftigen Pflanze
      giessen, nicht flaechig verteilen.
    metadata:
      milpa_crops: [Mais, Stangenbohnen, Kuerbis]
      legume_n_benefit: partial_during_growth_full_after_incorporation
