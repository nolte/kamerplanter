  - id: mulchen-materialien
    title: Mulchen — Materialien, Schichtdicke und Stickstoffraub
    content: |
      Mulchen ist gleichzeitig Bodenverbesserung, Feuchtigkeitsschutz, Unkrautunterdrueckung
      und indirekte Duengung. Die Materialwahl bestimmt den Effekt.

      Geeignete Mulchmaterialien (mit Naehrstoffbeitrag):
      - Rasenschnitt (angewelkt!): 2-3 cm, C/N ca. 15:1, schnelle N-Freisetzung.
        Nie dicker als 5 cm und nie frisch — fault sonst und bildet eine undurchlaessige
        Schicht. Immer 1-2 Tage anwelken lassen.
      - Stroh: 5-10 cm, C/N ca. 80:1, kaum Naehrstoffbeitrag aber hervorragende
        Bodenbedeckung. Achtung: Hohes C/N bindet Boden-N (Stickstoffraub). Vor dem
        Mulchen mit Stroh extra Hornmehl geben (30-50 g/m2).
      - Laub (zerkleinert): 5-8 cm, C/N variabel. Eichenlaub sauer (pH-senkend),
        gut fuer Heidelbeeren. Nusslaub meiden (Juglone hemmen Wachstum).
      - Holzhaecksel: 5-10 cm, C/N 400-500:1, nur auf Wegen oder als Baumscheiben-Mulch.
        Nie in Beete einarbeiten — extremer Stickstoffraub! Auf der Oberflaeche ist der
        Effekt akzeptabel, da die Zersetzung nur an der Unterseite stattfindet.

      Stickstoffraub (N-Immobilisierung): Materialien mit C/N > 30:1 entziehen dem Boden
      Stickstoff waehrend der Zersetzung. Gegenmassnahme: Pro 10 cm kohlenstoffreichem Mulch
      zusaetzlich 50-80 g/m2 Hornmehl ausbringen.

      Wichtig: Mulchschicht immer 5 cm Abstand zum Pflanzenstiel halten, um Faulebildung
      und Schneckenbefall am Stiel zu vermeiden.
    metadata:
      grass_clippings_thickness_cm: "2-3"
      straw_thickness_cm: "5-10"
      straw_cn_ratio: "80:1"
