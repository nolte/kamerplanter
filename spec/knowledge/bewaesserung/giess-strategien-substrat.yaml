chunks:
  - id: giessen-erde
    title: Giess-Strategie fuer Erde und erdbasierte Substrate
    content: |
      Grundregel: Erst giessen wenn die oberen 2-3 cm Substrat trocken sind.
      Finger-Test: Zeigefinger 2-3cm tief in die Erde stecken. Fuehlt sich
      feucht an → noch nicht giessen. Trocken und kruemelig → giessen.
      Gewichts-Methode (fuer Anfaenger): Topf hochheben. Schwer = noch feucht.
      Leicht = Zeit zu giessen. Referenz: Frisch gegossenen Topf wiegen.
      Richtig giessen in Erde:
      - Langsam und gleichmaessig ueber die gesamte Oberflaeche giessen
      - So viel giessen bis 10-20% als Runoff unten herauslaufen
      - Runoff zeigt: Gesamtes Substrat ist durchfeuchtet (kein trockener Kern)
      - Ueberschuss in Untersetzer abgiessen (nicht stehen lassen!)
      Frequenz (Richtwerte):
      - Sommer/Wachstumsphase: alle 3-5 Tage (je nach Topfgroesse)
      - Winter/Ruhephase: alle 7-14 Tage
      - Grosse Pflanze in kleinem Topf: haeufiger
      - Kleine Pflanze in grossem Topf: seltener (Wurzelfaeule-Risiko!)
      Topfmaterial-Einfluss:
      - Plastik: Haelt Feuchtigkeit laenger, guenstiger
      - Terracotta/Ton: Verdunstet ueber Waende, trocknet 2× schneller
      - Stofftopf (Fabric Pot): Gute Belueftung, trocknet schnell, Air-Pruning
    metadata:
      topic: watering_soil
      test_method: [finger_test, weight_method]
      runoff_target_percent: [10, 20]

  - id: giessen-coco
    title: Giess-Strategie fuer Kokos/Coco
    content: |
      Coco ist KEIN Erde-Ersatz — Giessverhalten ist fundamental anders!
      Kernregel: Coco haeufig und mit Naehrloesung giessen.
      Nie komplett austrocknen lassen (wird hydrophob).
      Nie nur mit reinem Wasser giessen (wascht CEC-gebundene Naehrstoffe aus).
      Hochfrequenz-Fertigation (Standard in Coco):
      - Saemlinge: 1×/Tag, kleine Menge
      - Vegetativ: 2-3×/Tag
      - Bluete: 3-5×/Tag (Peak Bloom bis 7× in kleinen Toepfen)
      - Immer 10-20% Runoff als Ziel
      Warum so oft? Coco haelt Wasser UND Luft gleichzeitig (anders als Erde).
      Haeufiges Giessen in Coco fuehrt NICHT zu Ueberwaesserung, weil die
      Struktur natuerlich belueftet bleibt. Im Gegenteil: Haeufiges Giessen
      = haeufiger frische Naehrstoffe = schnelleres Wachstum.
      Automatisierung: Bei 3-5× taeglich wird manuelles Giessen unpraktisch.
      Timer-gesteuerte Bewaesserung (Tropfer, Halos) empfohlen ab
      fortgeschrittenem Level. Kamerplanter kann Giess-Zeitplan verwalten
      (WateringSchedule / Giessplan).
      Topfgroesse in Coco: Kleiner als in Erde (3-5L reichen fuer grosse
      Pflanzen bei Hochfrequenz-Fertigation vs. 10-20L in Erde).
    metadata:
      topic: watering_coco
      frequency_bloom: [3, 7]
      never: [dry_out, plain_water]

  - id: giessen-hydro
    title: Giess-Strategie fuer Hydroponik-Systeme
    content: |
      DWC (Deep Water Culture):
      - Wurzeln haengen permanent in belüfteter Naehrloesung
      - Keine "Giess-Frequenz" — Loesung ist immer da
      - Entscheidend: Geloester Sauerstoff (Luftsteine, >6 mg/L DO)
      - Wassertemperatur 18-22°C (Pythium-Praevention)
      - Wasserstand: Wurzeln 2-3cm ueber Wasserspiegel starten lassen
        (Luft-Wurzeln bilden sich), dann Niveau halten
      NFT (Nutrient Film Technique):
      - Duenner Naehrloesungsfilm (2-3mm) fliesst permanent ueber Wurzeln
      - Pumpe muss 24/7 laufen (Pumpenausfall = sofortige Austrocknung!)
      - Backup-Pumpe oder Alarm empfohlen
      - Neigung: 1-3% Gefaelle
      Ebb & Flow (Flut & Ebbe):
      - Wanne wird zyklisch geflutet und entleert
      - Frequenz: Alle 2-4 Stunden waehrend Lichtphase
      - Seltener nachts (1-2× oder gar nicht)
      - Flutzyklus: 15-30 Minuten flueten, dann ablaufen lassen
      Tropf-/Drip-Systeme:
      - Kontrollierte Zufuhr ueber Tropfer an jede Pflanze
      - Timer-gesteuert: Gleiche Frequenz wie Coco (abhaengig vom Substrat
        im Topf: Steinwolle, Coco, Perlit, Blähton)
    metadata:
      topic: watering_hydro
      systems: [dwc, nft, ebb_flow, drip]

  - id: giessen-pon-semihydro
    title: Giess-Strategie fuer Pon, Seramis und Semi-Hydro
    content: |
      Pon (Lechuza, mineralisches Substrat), Seramis und aehnliche
      mineralische Substrate funktionieren nach dem Docht-/Wicking-Prinzip:
      Grundprinzip: Wasservorrat im Gefaess-Boden, Substrat saugt
      Wasser nach oben (Kapillarwirkung). Pflanze nimmt was sie braucht.
      Giessen bei Pon/Lechuza-System:
      - Wasser auf 1/3 der Gefaesshoehe auffuellen (Wasserstandsanzeiger)
      - WARTEN bis Reservoir LEER ist (Anzeiger auf Minimum)
      - 1-3 Tage trocken lassen (Trockenphase/Dry-Cycle)
      - Dann wieder auffuellen
      Warum Trockenphase? Wurzeln brauchen Sauerstoff. Die Trockenphase
      belueftet das Substrat. Ohne Trockenphase → Sauerstoffmangel →
      Wurzelfaeule (auch in mineralischem Substrat moeglich!).
      Umstellung von Erde auf Pon:
      - Wurzeln muessen sich an Semi-Hydro anpassen (2-4 Wochen)
      - Alte Erd-Wurzeln sterben teilweise ab, neue Wasser-Wurzeln bilden sich
      - Waehrend Umstellung: Sparsam giessen, Pflanze nicht ueberstrapazieren
      - Kein Duenger fuer erste 2 Wochen nach Umstellung
      Naehrstoff-Versorgung: Fluessigduenger ins Giesswasser (0.5-1.0 mS/cm),
      oder Langzeit-Duenger-Kegel im Substrat (Lechuza PON enthaelt welchen).
    metadata:
      topic: watering_pon_semihydro
      principle: wicking
      dry_cycle: required

  - id: giessen-outdoor-beete
    title: Bewaesserung im Freiland und Hochbeet
    content: |
      Grundregel Outdoor: Lieber seltener und durchdringend giessen als
      taeglich oberflaechlich. Tiefliegende Wurzeln machen Pflanzen
      trockenresistenter.
      Frequenz-Richtwerte (Sommer, kein Regen):
      - Gemuese-Beete: 2-3×/Woche, je 15-25 L/m²
      - Hochbeete: Haeufiger (trocknen schneller aus, weniger Erdvolumen)
      - Frisch gepflanzt: Taeglich fuer 1-2 Wochen (Anwachsen)
      - Etablierte Stauden/Gehoelze: 1×/Woche tief giessen
      Giess-Zeitpunkt:
      - Morgens frueh (5-9 Uhr): Beste Zeit. Pflanze nutzt Wasser
        am Tag, Blaetter trocknen schnell (weniger Pilzkrankheiten)
      - Abends: Zweitbeste Option, weniger Verdunstung. Nachteil:
        Feuchtigkeit auf Blaettern ueber Nacht → Pilzrisiko
      - NICHT mittags in voller Sonne (Verdunstung, angeblicher
        Brennglas-Effekt ist Mythos, aber Verschwendung)
      Methoden:
      - Tropfbewaesserung: Effizienteste Methode, Wasser direkt an Wurzeln
      - Giesskanne: Bodennah giessen, Blaetter trocken halten
      - Rasensprenger: Nur Notloesung (viel Verdunstung, nasse Blaetter)
      - Ollas (Ton-Gefaesse): Vergraben, Wasser sickert durch poroese Wand
      Mulch: Reduziert Verdunstung um 50-70%. Immer mulchen!
    metadata:
      topic: watering_outdoor
      best_time: morning
      frequency_per_week: [2, 3]
