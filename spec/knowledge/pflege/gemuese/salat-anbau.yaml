  - id: salat-ernte
    title: "Salat — Ernte und Sortenwahl"
    content: |
      Kopfsalat: Den ganzen Kopf ernten, sobald er fest ist. Morgens
      ernten, dann ist der Salat am knackigsten. Den Strunk bodennah
      abschneiden.

      Pflueck- und Schnittsalat: Aeussere Blaetter einzeln pfluecken,
      das Herz stehen lassen — es waechst 2 bis 3 Mal nach
      (Cut-and-Come-Again-Methode). Ideal fuer kontinuierliche Ernte
      ueber Wochen.

      Sortenwahl fuer verschiedene Jahreszeiten:
      Fruehjahr (Maerz bis Mai): Kopfsalat, Feldsalat, Rucola.
      Sommer (Juni bis August): Schossfeste Sorten wie Batavia,
      Eichblatt, Lollo Rosso. Hitzetolerante Sorten waehlen.
      Herbst (September bis November): Asia-Salate, Endivie, Radicchio,
      Feldsalat (Valerianella). Unter Vlies bis in den Winter.

      Lagerung: Frisch geernteter Salat haelt im Kuehlschrank 3 bis
      5 Tage. In ein feuchtes Kuechentuch einwickeln oder in einem
      verschlossenen Behaelter lagern. Salat laesst sich nicht
      einfrieren oder konservieren — immer frisch verbrauchen.

      Saatgut-Tipp: Eine Tuete Pfluecksalat-Mix reicht fuer eine ganze
      Saison bei Staffelsaat. Verschiedene Sorten im Mix sorgen fuer
      Abwechslung auf dem Teller.
