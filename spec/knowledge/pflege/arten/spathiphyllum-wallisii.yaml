  - id: einblatt-standort
    title: "Einblatt — Standort und Licht"
    content: |
      Das Einblatt (Spathiphyllum wallisii, auch Friedenslilie oder
      Peace Lily genannt) ist eine der besten Zimmerpflanzen fuer dunkle
      Standorte. Es ueberlebt mit weniger Licht als die meisten anderen
      Pflanzen und belohnt gute Pflege mit eleganten weissen Blueten.

      Licht: Helles bis schattiges indirektes Licht. Das Einblatt kommt
      auch in Nordzimmern gut zurecht. Kein direktes Sonnenlicht — die
      zarten Blaetter verbrennen schnell. Fuer Blueten braucht die
      Pflanze allerdings mehr Licht: Ein heller Standort ohne direkte
      Sonne foerdert die Bluetenbildung deutlich.

      Temperatur: 20 bis 26 Grad Celsius am Tag, nachts 16 bis 20 Grad.
      Mindesttemperatur 13 Grad. Kaelteempfindlicher als Monstera —
      unter 10 Grad drohen Kaelteschaeden.

      Luftfeuchtigkeit: 50 bis 70 Prozent. Das Einblatt liebt hohe
      Luftfeuchtigkeit — es ist eine ideale Badezimmerpflanze. Bei
      trockener Heizungsluft regelmaessig besprühen oder Luftbefeuchter
      nutzen.

      Standort-Tipp: Ideal fuer Badezimmer (hohe Luftfeuchtigkeit und
      oft wenig direktes Licht). Auch Bueros und Nordzimmer funktionieren
      gut.

      Luftreinigung: Das Einblatt ist einer der besten Luftreiniger
      unter den Zimmerpflanzen. Es filtert Formaldehyd, Benzol,
      Trichlorethylen, Xylol und sogar Ammoniak aus der Raumluft.
    metadata:
      topic: einblatt_care
      species: "Spathiphyllum wallisii"
      difficulty: beginner

  - id: einblatt-giessen
    title: "Einblatt — Giessen und Substrat"
    content: |
      Das Einblatt hat ein praktisches eingebautes Durstsignal:
      Wenn es Wasser braucht, laesst es die Blaetter haengen.
      Nach dem Giessen erholt es sich innerhalb weniger Stunden
      vollstaendig. Trotzdem sollte man nicht regelmaessig bis zur
      Welke warten, da wiederholter Trockenstress die Pflanze
      schwaecht.

      Giess-Rhythmus Sommer (Maerz bis September): Alle 5 bis 7 Tage.
      Die oberen 2 bis 3 Zentimeter Erde zwischen den Wassergaben
      antrocknen lassen.

      Giess-Rhythmus Winter (Oktober bis Februar): Alle 7 bis 10 Tage.
      Etwas weniger giessen, aber nicht komplett austrocknen lassen.

      Giessmethode: Von oben gleichmaessig giessen, bis Wasser aus den
      Abzugsloechern laeuft. Ueberschuss nach 30 Minuten entfernen.

      Wasserqualitaet: Weiches Wasser bevorzugt. Abgestandenes
      Leitungswasser oder Regenwasser verwenden — das Einblatt reagiert
      empfindlich auf Chlor und Fluor im Wasser.

      Substrat: Lockere, humose Zimmerpflanzenerde mit 10 bis 20 Prozent
      Perlite. Leicht sauer (pH 5,5 bis 6,5).

      Haeufigste Giess-Fehler:
      - Staunaesse: Fuehrt zu Wurzelfaeule. Ueberschuss immer entfernen.
      - Kalkhaltiges Wasser: Kann zu braunen Blattspitzen beitragen.
      - Zu viel austrocknen lassen: Wiederholte Welke schwaecht die
        Pflanze auf Dauer.
    metadata:
      topic: einblatt_care
      species: "Spathiphyllum wallisii"
      difficulty: beginner

  - id: einblatt-duengung
    title: "Einblatt — Duengung und Umtopfen"
    content: |
      Duengung: Das Einblatt ist ein Schwachzehrer — weniger ist mehr.
      Alle 3 Wochen von Maerz bis September mit einem Gruenpflanzen-
      Fluessigduenger duengen, aber immer nur die halbe Herstellerdosis
      (zum Beispiel 3 bis 4 ml statt 7 ml pro Liter Wasser).

      Fuer Blueten: Im Fruehjahr kurzzeitig auf Bluehpflanzenduenger
      (hoeherer Phosphoranteil, zum Beispiel NPK 3-4-5) umstellen.

      Von Oktober bis Februar: Kein Duenger.

      Wichtig: Ueberdüngung ist die haeufigste Fehlerquelle beim
      Einblatt. Typisches Symptom: Braune Blattspitzen. Im Zweifel
      lieber duenner und oefter duengen als selten und konzentriert.
      Alle 2 bis 3 Monate das Substrat mit klarem Wasser durchspuelen,
      um Salzansammlungen auszuwaschen.

      Braune Blattspitzen — die drei haeufigsten Ursachen in dieser
      Reihenfolge: 1. Ueberdüngung, 2. Trockene Luft, 3. Chlor oder
      Fluor im Leitungswasser.

      Umtopfen: Alle 18 Monate bei Bedarf (Wurzeln fuellen den Topf
      vollstaendig aus). Topf nicht zu gross waehlen — leicht eingeengte
      Wurzeln foerdern die Bluete. Empfohlenes Topfvolumen: 2 bis 5 Liter.

      Vermehrung: Durch Teilung beim Umtopfen. Reife Pflanzen bilden
      Ableger am Rhizom. Jede Teilung muss eigene gesunde Wurzeln und
      mindestens 2 bis 3 Blaetter haben.

      Achtung: Giftig fuer Katzen, Hunde und Kinder. Die Bluetenkolben
      koennen bei Pollenallergikern Reaktionen ausloesen — Bluetenkolben
      vor dem Oeffnen abschneiden, wenn jemand betroffen ist.
    metadata:
      topic: einblatt_care
      species: "Spathiphyllum wallisii"
      difficulty: beginner
