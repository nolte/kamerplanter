  - id: ficus-elastica-giessen
    title: "Gummibaum — Giessen und Substrat"
    content: |
      Der Gummibaum ist beim Giessen vergleichsweise unkompliziert,
      vertraegt aber keine Staunaesse.

      Giess-Rhythmus Sommer (Maerz bis Oktober): Alle 7 bis 14 Tage.
      Die ersten 2 bis 5 Zentimeter Erde zwischen den Wassergaben
      trocknen lassen.

      Giess-Rhythmus Winter (November bis Februar): Alle 14 bis 21 Tage.
      Deutlich weniger giessen, da die Pflanze kaum waechst.

      Giessmethode: Gruendlich durchgiessen (Drench and Drain). Immer
      zimmerwarmes Wasser verwenden.

      Substrat: Lockere, gut durchlaessige Qualitaetserde mit 20 Prozent
      Perlite. pH-Wert 6,0 bis 7,0. Schwere Erde vermeiden — gute
      Drainage ist wichtig.

      Haeufigste Giess-Fehler:
      - Zu viel giessen: Gelbe Blaetter, Blattverlust, Wurzelfaeule.
        Wenn die Pflanze welkt trotz feuchter Erde, sind die Wurzeln
        wahrscheinlich schon angegriffen.
      - Wasser im Untersetzer stehen lassen: Klassischer Anfaengerfehler,
        fuehrt schnell zu Staunaesse.
      - Zu selten giessen ist weniger schlimm: Der Gummibaum verzeiht
        kurze Trockenperioden besser als die meisten Ficus-Arten.
    metadata:
      topic: ficus_elastica_care
      species: "Ficus elastica"
      difficulty: beginner

  - id: ficus-elastica-duengung
    title: "Gummibaum — Duengung und Umtopfen"
    content: |
      Duengung: Monatlich von Maerz bis Oktober mit einem
      Gruenpflanzen-Fluessigduenger (zum Beispiel NPK 7-3-6,
      5 ml pro Liter Wasser). Stickstoffbetonte Formel foerdert
      glaenzendes, grosses Laub.

      November bis Februar: Kein Duenger.

      Organische Alternative: 15 Prozent Wurmhumus oder 10 Prozent
      Bokashi beim Umtopfen unter das Substrat mischen.

      Umtopfen: Alle 2 Jahre in einen leicht groesseren Topf.
      Empfohlenes Topfvolumen: 10 bis 30 Liter. Mindestens 30 cm
      Topftiefe. Bester Zeitpunkt: Fruehjahr.

      Rueckschnitt: Vertraegt Rueckschnitt gut, am besten im Fruehjahr
      (Maerz bis Mai). Topping (Haupttrieb kappen) foerdert Verzweigung.
      Schnittstellen mit Aktivkohle behandeln, weil viel Milchsaft
      austritt.

      Ruhephase (November bis Februar): Weniger giessen, nicht duengen.
      Blaetter weiterhin regelmaessig entstauben.

      Achtung: Der Gummibaum ist giftig fuer Haustiere und Kinder.
      Der Milchsaft kann bei Latex-Allergikern Kreuzreaktionen ausloesen.
      Beim Schneiden immer Handschuhe tragen.
