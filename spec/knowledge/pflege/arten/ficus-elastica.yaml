  - id: ficus-elastica-standort
    title: "Gummibaum — Standort und Licht"
    content: |
      Der Gummibaum (Ficus elastica) ist deutlich robuster als seine
      Verwandten Geigenfeige und Birkenfeige. Er toleriert Standortwechsel,
      niedrigere Lichtverhältnisse und gelegentliches Vergessen beim
      Giessen besser.

      Licht: Helles, indirektes Licht ist optimal. Der Gummibaum kommt
      aber auch mit weniger Licht zurecht als andere Ficus-Arten. Dunkle
      Sorten wie 'Burgundy' vertragen etwas mehr Schatten, variegierte
      Sorten wie 'Tineke' brauchen mehr Licht, damit die Musterung
      erhalten bleibt. Direkte Mittagssonne vermeiden.

      Temperatur: 18 bis 29 Grad Celsius am Tag, nachts nicht unter
      15 Grad. Mindesttemperatur 10 Grad. Damit ist er kaeltetoleranter
      als die Geigenfeige.

      Luftfeuchtigkeit: 40 bis 60 Prozent genuegen. Normale Raumluft
      reicht in der Regel aus. Keine besondere Befeuchtung noetig.

      Sommer im Freien: Der Gummibaum kann im Sommer auf den Balkon
      oder die Terrasse gestellt werden — halbschattiger, windgeschuetzter
      Platz. Vor dem ersten Frost wieder einraumen.

      Besonderheit: Die grossen, glaenzenden Blaetter reinigen die Luft
      besonders gut (NASA Clean Air Study). Regelmaessiges Abstauben
      der Blaetter foerdert sowohl die Photosynthese als auch die
      Luftreinigung.
    metadata:
