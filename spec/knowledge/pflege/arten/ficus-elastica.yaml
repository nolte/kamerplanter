  - id: ficus-elastica-probleme
    title: "Gummibaum — Probleme und Vermehrung"
    content: |
      Haeufigste Probleme:
      - Gelbe Blaetter und Blattverlust: Ueberwaesserung ist die
        haeufigste Ursache. Weniger giessen und Drainage pruefen.
      - Schwarzer Belag auf Blaettern (Russtau): Folge von
        Schildlaus- oder Schmierlausbefall. Erst die Schaedlinge
        bekaempfen, dann die Blaetter abwischen.
      - Blaetter verlieren Glanz: Staub auf den Blaettern oder
        Naehrstoffmangel.

      Schaedlinge: Spinnmilben (Gespinste, Blaetter vergilben),
      Schmierlaeusen (Wollflecken), Schildlaeusen (braune Schilder),
      Weisse Fliegen (Honigtau). Alle 2 Wochen kontrollieren.

      Behandlung: Neemoel (0,5 Prozent) gegen Spinnmilben und
      Schmierlaeusen. Alkohol (70 Prozent) mit Wattestaebchen gegen
      Schildlaeusen. Insektizidseife gegen Weisse Fliegen.

      Vermehrung: Mittlerer Schwierigkeitsgrad. Stecklinge (10 bis
      15 cm) bei 22 bis 26 Grad und ueber 80 Prozent Luftfeuchtigkeit
      bewurzeln. Schnittstelle kurz trocknen lassen wegen des
      Milchsafts, dann mit Plastikbeutel abdecken. Bewurzelung in
      4 bis 8 Wochen. Abmoosen (Luftabsenker) funktioniert bei
      dickeren Staemmen besser.
    metadata:
