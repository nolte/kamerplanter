  - id: palmen-giessen
    title: "Zimmerpalmen — Giessen und Substrat"
    content: |
      Palmen moegen gleichmaessig feuchtes, aber nie staunasses
      Substrat. Die oberen 3 bis 5 Zentimeter antrocknen lassen,
      dann gruendlich durchgiessen.

      Giess-Rhythmus Sommer:
      - Stubenpalme: Alle 7 bis 10 Tage.
      - Kentia-Palme: Alle 7 bis 10 Tage.
      - Areka-Palme: Alle 5 bis 10 Tage (braucht etwas mehr Wasser).

      Giess-Rhythmus Winter:
      - Stubenpalme: Alle 10 bis 14 Tage.
      - Kentia-Palme: Alle 14 bis 21 Tage.
      - Areka-Palme: Alle 10 bis 14 Tage.

      Wasserqualitaet — das wichtigste Thema bei Palmen!
      Palmen sind empfindlich gegenueber Fluorid und Salzen im
      Leitungswasser. Braune Blattspitzen sind fast immer ein Zeichen
      fuer Fluorid- oder Salzschaeden. Gefiltertes Wasser, Regenwasser
      oder abgestandenes Leitungswasser (Chlor verdunstet, Fluorid
      leider nicht) verwenden. Im Zweifelsfall: Destilliertes Wasser
      fuer die Areka-Palme.

      Substrat: Gute Palmenerde oder Zimmerpflanzenerde mit 20 Prozent
      Perlite und 10 Prozent Sand. pH-Wert 6,0 bis 7,0. Gute Drainage,
      aber feuchtigkeitshaltend.

      Topfgroesse:
      - Stubenpalme: 3 bis 15 Liter, 20 cm Tiefe.
      - Kentia-Palme: 10 bis 30 Liter, 30 cm Tiefe.
      - Areka-Palme: 10 bis 30 Liter, 30 cm Tiefe.
    metadata:
      topic: palm_care
      species: "Chamaedorea elegans, Howea forsteriana, Dypsis lutescens"
