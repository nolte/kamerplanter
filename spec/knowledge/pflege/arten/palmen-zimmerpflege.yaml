  - id: palmen-standort
    title: "Zimmerpalmen — Standort und Licht"
    content: |
      Zimmerpalmen gehoeren zu den elegantesten Gruenpflanzen fuer
      Innenraeume. Die drei beliebtesten Arten:

      Stubenpalme (Chamaedorea elegans): Die kompakteste Zimmerpalme
      (60 bis 200 cm). Vertraegt auch weniger Licht — eine der wenigen
      echten Palmen, die am Nordfenster gedeiht. Ideal: 100 bis 400
      Mikromol PPFD.

      Kentia-Palme (Howea forsteriana): Die robusteste und eleganteste
      Zimmerpalme (150 bis 300 cm). Seit dem Viktorianischen Zeitalter
      beliebt. Toleriert niedrige Lichtverhaeltnisse besser als fast
      alle anderen Palmen. Waechst extrem langsam (6 bis 12 cm pro
      Jahr). Ideal: 100 bis 400 Mikromol PPFD.

      Areka-Palme (Dypsis lutescens): Die buschigste und schnellst
      wachsende der drei (150 bis 250 cm). Braucht etwas mehr Licht
      als die anderen beiden. Laut NASA-Studie einer der besten
      natuerlichen Luftreiniger und Luftbefeuchter. Ideal: 200 bis
      600 Mikromol PPFD.

      Standort fuer alle: Helles, indirektes Licht. Ost- oder
      Westfenster ideal. Direkte Mittagssonne verbrennt die Wedel.

      Temperatur: 18 bis 27 Grad. Im Winter nicht unter 10 bis 12
      Grad. Zugluft vermeiden.

      Luftfeuchtigkeit: 50 bis 70 Prozent. Regelmaessig besprühen,
      besonders im Winter bei Heizungsluft.

      Alle drei Palmen sind laut ASPCA nicht giftig fuer Katzen
      und Hunde — haustierfreundlich.
    metadata:
      topic: palm_care
      species: "Chamaedorea elegans, Howea forsteriana, Dypsis lutescens"
