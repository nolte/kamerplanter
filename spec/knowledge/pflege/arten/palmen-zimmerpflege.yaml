  - id: palmen-probleme
    title: "Zimmerpalmen — Probleme und Vermehrung"
    content: |
      Haeufigste Probleme:
      - Braune Blattspitzen: Das haeufigste Problem bei Palmen!
        Ursachen: Fluorid im Giesswasser, zu trockene Luft,
        Salzansammlungen im Substrat oder Ueberdüngung. Gefiltertes
        Wasser verwenden und alle 3 bis 4 Monate das Substrat mit
        klarem Wasser durchspuelen.
      - Gelbe Wedel: Ueberwaesserung, Staunaesse oder
        Naehrstoffmangel (besonders Magnesium oder Kalium).
      - Braune Flecken: Nasses Laub (beim Giessen nicht auf die
        Wedel spritzen) oder Pilzbefall.
      - Langsames Wachstum: Normal! Besonders die Kentia-Palme
        waechst nur 6 bis 12 cm pro Jahr.

      Schaedlinge: Spinnmilben (haeufigster Schaedling bei trockener
      Heizungsluft — Gespinste, Wedel vergilben), Schmierlaeusen
      (Wollflecken in Wedelbasis) und Schildlaeusen (braune Schilder
      auf Blattstielen). Alle 2 Wochen kontrollieren.

      Behandlung: Neemoel (0,5 Prozent) gegen Spinnmilben und
      Schmierlaeusen. Alkohol 70 Prozent mit Wattestäbchen gegen
      Schildlaeusen. Hohe Luftfeuchtigkeit beugt Spinnmilben vor.

      Vermehrung: Schwierig bis unmoeglich fuer Heimgaertner.
      - Stubenpalme: Nur durch Samen (Keimung 3 bis 6 Monate).
      - Kentia-Palme: Nur durch Samen (Keimung bis zu mehrere Jahre!).
      - Areka-Palme: Teilung von Buescheln beim Umtopfen moeglich,
        aber Pflanzen etablieren sich langsam. Samen keimen in
        4 bis 6 Wochen bei 27 Grad.

      Palmen sind Langzeitpflanzen — eine gut gepflegte Kentia kann
      ueber 50 Jahre alt werden.
    metadata:
      topic: palm_care
      species: "Chamaedorea elegans, Howea forsteriana, Dypsis lutescens"
      difficulty: beginner
