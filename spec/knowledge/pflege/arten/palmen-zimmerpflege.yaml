  - id: palmen-duengung
    title: "Zimmerpalmen — Duengung und Umtopfen"
    content: |
      Duengung: Von Maerz bis September regelmaessig duengen.
      Palmenduenger ist ideal (NPK 5-3-7 oder 7-3-7, kaliumbetont).

      - Stubenpalme: Monatlich, 5 ml pro Liter.
      - Kentia-Palme: Alle 2 Wochen, halbe Dosis. Empfindlich gegen
        Ueberdüngung!
      - Areka-Palme: Alle 2 bis 3 Wochen, 4 bis 5 ml pro Liter.

      Von Oktober bis Februar: Kein Duenger.

      Palmen brauchen mehr Kalium und Magnesium als typische
      Zimmerpflanzen. Spezielle Palmenduenger beruecksichtigen das.

      Umtopfen:
      - Stubenpalme: Alle 2 bis 3 Jahre.
      - Kentia-Palme: Alle 3 bis 4 Jahre (mag enge Toepfe).
      - Areka-Palme: Alle 2 bis 3 Jahre.

      Bester Zeitpunkt: Fruehling. Palmen moegen kein haeufiges
      Umtopfen und reagieren empfindlich auf Stoerung der Wurzeln.
      Nur umtopfen, wenn der Topf wirklich durchwurzelt ist.

      Rueckschnitt: Niemals gruene Wedel schneiden! Palmen koennen
      nicht nachwachsen. Nur vollstaendig abgestorbene, braune Wedel
      an der Basis entfernen. Teilweise gruene Wedel stehen lassen —
      die Palme zieht noch Naehrstoffe daraus.

      Tipp: Regelmaessig Staub von den Wedeln wischen, das foerdert
      die Lichtaufnahme und haelt Schaedlinge fern.
