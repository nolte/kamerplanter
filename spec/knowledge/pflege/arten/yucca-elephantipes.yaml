  - id: yucca-elephantipes-standort
    title: "Yucca-Palme — Standort und Licht"
    content: |
      Die Yucca-Palme (Yucca elephantipes) stammt aus den Trockenwaeldern
      Mexikos und Zentralamerikas. Trotz ihres Namens ist sie keine echte
      Palme, sondern gehoert zu den Agavengewaechsen. Sie liebt moeglichst
      viel Licht und vertraegt auch volle Sonne.

      Licht: Suedwester oder Suedfenster mit direkter Sonne ist ideal.
      Die Yucca gehoert zu den wenigen Zimmerpflanzen, die volle
      Mittagssonne vertragen. Bei zu wenig Licht wird sie schlapp und
      die Blaetter vergilben.

      Temperatur: Im Sommer 20-28 Grad Celsius, im Winter kuehler
      (10-18 Grad). Eine kuehle Ueberwinterung bei 10-15 Grad ist sogar
      foerderlich fuer die Gesundheit. Kurzzeitig ueberlebt sie bis
      -2 Grad, aber Frost beschaedigt die Pflanze.

      Luftfeuchtigkeit: 30-50% genuegen — trockene Luft ist kein Problem.
      Im Sommer darf die Yucca gerne auf den Balkon oder die Terrasse in
      die volle Sonne. Langsam akklimatisieren (erst Halbschatten, dann
      ueber 2 Wochen volle Sonne). Vor dem ersten Nachtfrost (unter 5 Grad)
      wieder reinholen.

      Die Yucca ist giftig fuer Katzen, Hunde und Kinder (Saponine).
      Besonders Katzen reagieren empfindlich.
    metadata:
      topic: yucca_elephantipes_care
