  - id: zamioculcas-giessen
    title: "Zamioculcas — Giessen und Substrat"
    content: |
      Bei der Zamioculcas gilt noch staerker als beim Bogenhanf: Lieber
      zu wenig als zu viel giessen. Die sukkulenten Rhizome (Knollen)
      speichern so viel Wasser, dass die Pflanze wochen- bis monatelang
      ohne Wasser ueberlebt.

      Giess-Rhythmus Sommer (April bis September): Alle 14 bis 21 Tage.
      Das Substrat muss zwischen den Wassergaben vollstaendig
      durchtrocknen.

      Giess-Rhythmus Winter (Oktober bis Maerz): Einmal pro Monat
      genuegt. Die Rhizome speichern genug Wasser.

      Giessmethode: Gruendlich durchgiessen (Drench and Drain), dann
      komplett austrocknen lassen. Ueberschuss sofort entfernen.

      Wasserqualitaet: Normales Leitungswasser ist voellig in Ordnung.
      Staunaesse unbedingt vermeiden.

      Substrat: Kaktus- oder Sukkulentenerde, oder stark durchlaessige
      Mischung: 50 Prozent Erde plus 50 Prozent Perlite oder Grobsand.
      Guter Wasserabzug ist essentiell. Rhizome nicht vollstaendig mit
      Erde bedecken. Empfohlenes Topfvolumen: 3 bis 15 Liter.
      Mindestens 20 cm Topftiefe fuer die Knollen.

      Haeufigste Giess-Fehler:
      - Zu viel giessen: Die haeufigste Todesursache. Gelbe Triebe,
        weiche Knollen und fauliger Geruch sind die Warnzeichen
        (Rhizomfaeule).
      - Im Winter regelmaessig giessen: Voellig unnoetig. Die Knollen
        haben genug Reserven.
      - Zu selten giessen: Kaum moeglich — die Zamioculcas vertraegt
        extreme Trockenheit.
    metadata:
      topic: zamioculcas_care
      species: "Zamioculcas zamiifolia"
      difficulty: beginner

  - id: zamioculcas-duengung
    title: "Zamioculcas — Duengung und Umtopfen"
    content: |
      Duengung: Die Zamioculcas ist ein extremer Schwachzehrer.
      Ueberdüngung schadet mehr als Unterdüngung. Maximal 3 bis 4
      Duengergaben pro Jahr.

      Von April bis August: Alle 6 bis 8 Wochen mit einem Kakteen-
      und Sukkulentenduenger (zum Beispiel NPK 4-6-7, nur 2 ml pro
      Liter — halbe Normaldosis). Alternativ normalen Zimmerpflanzen-
      duenger mit einem Drittel der Dosis.

      Von September bis Maerz: Kein Duenger. Niemals im Winter duengen.

      Organische Alternative: 10 Prozent Wurmhumus oder feine Hornspaene
      (2 g pro Liter Substrat) beim Umtopfen im Fruehling.

      Langsames Wachstum ist normal: Bei der Zamioculcas ist Geduld
      gefragt. Kein Grund, mehr zu duengen.

      Umtopfen: Nur alle 2 bis 3 Jahre, wenn die Knollen den Topf
      sprengen (passiert woertlich — Zamioculcas kann Plastiktoepfe
      sprengen). Im Fruehling umtopfen.

      Vermehrung: Drei Methoden, alle erfolgreich:
      1. Teilung der Rhizome beim Umtopfen — schnellste Methode.
      2. Staengelstecklinge in Wasser oder Substrat — dauert 2 bis
         3 Monate bis zur Bewurzelung.
      3. Einzelne Blaettchen in Substrat stecken — dauert 4 bis 6
         Monate, bilden aber zuverlaessig neue Knollen.

      Achtung: Giftig fuer Katzen, Hunde und Kinder
      (Calciumoxalat-Kristalle). Beim Umtopfen Handschuhe tragen,
      da der Pflanzensaft Hautreizungen verursachen kann.
    metadata:
      topic: zamioculcas_care
      species: "Zamioculcas zamiifolia"
      difficulty: beginner
