  - id: zamioculcas-standort
    title: "Zamioculcas — Standort und Licht"
    content: |
      Die Zamioculcas (Zamioculcas zamiifolia, auch ZZ-Pflanze oder
      Gluecksfeder genannt) ist neben dem Bogenhanf die genuegsamste
      Zimmerpflanze ueberhaupt. Sie uebersteht extreme Trockenheit
      dank ihrer unterirdischen Knollen (Rhizome), die als Wasser-
      und Naehrstoffspeicher dienen. Ideal fuer Menschen, die ihre
      Pflanzen regelmaessig vergessen zu giessen.

      Licht: Extrem anpassungsfaehig. Von hellem indirektem Licht
      bis zu dunklen Ecken — die Zamioculcas waechst fast ueberall.
      Bei mehr Licht waechst sie schneller und kraeftiger. In dunklen
      Ecken ueberlebt sie problemlos, waechst aber sehr langsam.
      Direkte Sonne kann die Blaetter verbrennen.

      Temperatur: 18 bis 26 Grad Celsius optimal. Nachts nicht unter
      15 Grad. Mindesttemperatur 8 Grad — damit kaeltetoleranter als
      viele tropische Pflanzen.

      Luftfeuchtigkeit: 30 bis 50 Prozent — die Zamioculcas bevorzugt
      trockene Luft. Normale Raumluft ist perfekt, auch im Winter
      bei Heizungsluft.

      Standort-Tipp: Ideal fuer Bueros ohne Tageslicht, Flure,
      Schlafzimmer und alle Raeume, in denen andere Pflanzen eingehen
      wuerden. Die glaenzenden, dunkelgruenen Blaetter sind auch
      dekorativ in modernen Einrichtungen.

      Besonderheit: Zamioculcas ist die einzige Art in ihrer Gattung
      (monotypisch). Die Sorte 'Raven' mit fast schwarzen Blaettern
      ist besonders dekorativ.
    metadata:
