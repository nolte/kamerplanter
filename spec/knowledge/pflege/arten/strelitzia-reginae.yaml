  - id: strelitzia-duengung
    title: "Paradiesvogelblume — Duengung und Umtopfen"
    content: |
      Duengung: Die Strelitzia ist ein mittlerer Zehrer und braucht
      in der Wachstumsphase regelmaessige Naehrstoffe.

      Maerz bis September: Alle 2 bis 3 Wochen mit einem Gruenpflanzen-
      Fluessigduenger (NPK 7-3-6, 5 ml pro Liter Wasser). Stickstoff
      foerdert kraeftiges Blattwachstum.

      Fuer Blueten: Wenn die Pflanze bluehreif ist (ab 3 bis 5 Jahren),
      im Herbst auf einen Bluehpflanzenduenger (zum Beispiel NPK 5-8-10,
      hoeherem Phosphoranteil) umstellen. Phosphor foerdert die
      Bluetenbildung.

      Im Winter: Monatlich oder gar nicht duengen. Der kuehle Standort
      und weniger Wasser sind wichtiger als Duengung.

      Organische Alternative: 30 bis 50 g Hornspaene pro Topf im
      Fruehling. 15 Prozent Wurmhumus beim Umtopfen.

      Umtopfen: Nur alle 3 bis 4 Jahre — so selten wie moeglich.
      Beengte Wurzeln foerdern die Bluete. Nur umtopfen, wenn die
      Pflanze den Topf wirklich sprengt.

      Rueckschnitt: Verblühte Blütenstiele und abgestorbene Blaetter
      an der Basis entfernen. Kein Formschnitt noetig.

      Vermehrung: Durch Teilung beim Umtopfen — Pflanzenbueschel
      vorsichtig trennen, Wurzeln moeglichst erhalten. Geteilte
      Pflanzen brauchen oft 2 bis 3 Jahre bis zur erneuten Bluete.
      Auch aus Samen moeglich, aber Keimung dauert 1 bis 6 Monate
      und ist sehr variabel.

      Achtung: Giftig fuer Katzen, Hunde und Kinder, besonders
      Blueten und Samen.
    metadata:
      topic: strelitzia_care
      species: "Strelitzia reginae"
      difficulty: beginner

  - id: strelitzia-bluete
    title: "Paradiesvogelblume — Bluete und Probleme"
    content: |
      So bringst du die Strelitzia zum Bluehen:
      Die drei Schluesselfaktoren sind: viel Licht, kuehler Winter und
      enge Toepfe. Ohne alle drei zusammen wird es schwierig.

      1. Maximales Licht: Mindestens 6 Stunden direkte Sonne pro Tag.
         Im Sommer (Mai bis Oktober) draussen in voller Sonne aufstellen.
      2. Kuehler Winter: Oktober bis Maerz bei 12 bis 18 Grad. Ein
         unbeheiztes, helles Treppenhaus oder kuehler Wintergarten ist
         ideal.
      3. Nicht umtopfen: Beengte Wurzeln signalisieren der Pflanze,
         Blueten zu bilden. Nur umtopfen wenn unbedingt noetig.
      4. Geduld: 3 bis 5 Jahre bis zur ersten Bluete.

      Haeufigste Probleme:
      - Keine Bluete: Fast immer zu wenig Licht oder zu warmer Winter.
      - Einrollende Blaetter: Zu trocken (mehr giessen) oder zu kalt.
      - Braune Blattspitzen: Trockene Luft, Ueberduengung oder
        Salzansammlungen im Substrat.
      - Braune Blattflecken: Nasses Laub oder bakterielle Infektion.

      Schaedlinge: Spinnmilben (Gespinste, Blaetter vergilben),
      Schmierlaeusen (Wollflecken), Schildlaeusen (braune Schilder).
      Alle 2 Wochen kontrollieren.

      Behandlung: Neemoel (0,5 Prozent) gegen Spinnmilben und
      Schmierlaeusen. Alkohol (70 Prozent) mit Wattestaebchen gegen
      Schildlaeusen.
    metadata:
      topic: strelitzia_care
      species: "Strelitzia reginae"
      difficulty: intermediate
