  - id: strelitzia-standort
    title: "Paradiesvogelblume — Standort und Licht"
    content: |
      Die Paradiesvogelblume (Strelitzia reginae, auch Bird of Paradise)
      ist eine imposante Zimmerpflanze aus Suedafrika, die bei guter Pflege
      spektakulaere orange-blaue Blueten bildet. Allerdings braucht sie
      dafuer viel Licht und einen kuehlen Winter.

      Licht: Maximales Tageslicht — mindestens 6 Stunden direkte Sonne
      pro Tag. Ein Platz direkt am Suedfenster ist ideal. Die Strelitzia
      ist eine der wenigen Zimmerpflanzen, die volle Sonne nicht nur
      vertraegt, sondern braucht. Ohne ausreichend Licht waechst sie
      zwar, blueht aber nie.

      Temperatur Sommer: 18 bis 29 Grad Celsius. Im Sommer draussen
      aufstellen (Mai bis Oktober) in voller Sonne — das foerdert die
      Bluetenbildung enorm.

      Temperatur Winter: Kuehler Standort zwischen 12 und 18 Grad,
      nachts bis 8 Grad. Diese kuehle Ruhephase ist entscheidend fuer
      die Bluetenbildung. In einem warmen Wohnzimmer (22 Grad) den
      ganzen Winter ueber wird die Strelitzia keine Blueten ansetzen.

      Luftfeuchtigkeit: 40 bis 60 Prozent — normale Raumluft genuegt.

      Haeufigster Fehler: Zu dunkel oder zu warm im Winter. Die
      Pflanze braucht 3 bis 5 Jahre bis zur ersten Bluete. Geduld
      und viel Licht sind die Schluesselfaktoren.

      Mindesttemperatur: 8 Grad. Die Strelitzia toleriert kurze
      Froeste bis minus 3 Grad, sollte aber nicht darauf verlassen
      werden.
    metadata:
