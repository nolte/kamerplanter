  - id: strelitzia-giessen
    title: "Paradiesvogelblume — Giessen und Substrat"
    content: |
      Die Strelitzia hat fleischige Wurzeln, die bei Staunaesse schnell
      faulen. Gleichzeitig braucht sie in der Wachstumsphase ausreichend
      Wasser.

      Giess-Rhythmus Sommer (April bis September): Alle 7 bis 10 Tage.
      Gleichmaessig feucht halten, aber nie staunass. Die oberen 3 bis
      5 Zentimeter Erde zwischen den Wassergaben antrocknen lassen.

      Giess-Rhythmus Winter (Oktober bis Maerz): Alle 14 bis 21 Tage.
      Deutlich weniger giessen, besonders wenn die Pflanze kuehl steht.

      Giessmethode: Gruendlich durchgiessen (Drench and Drain).
      Ueberschuss sofort entfernen.

      Wasserqualitaet: Normales Leitungswasser ist in Ordnung.

      Substrat: Hochwertige, gut durchlaessige Einheitserde mit
      20 Prozent Perlite. pH 5,5 bis 7,5. Gute Drainage ist wichtig
      wegen der fleischigen Wurzeln.

      Wichtig: Topf nicht zu gross waehlen. Beengter Wurzelraum foerdert
      die Bluetenbildung. Empfohlenes Topfvolumen: 10 bis 25 Liter.
      Mindestens 30 cm Topftiefe.

      Haeufigste Giess-Fehler:
      - Staunaesse: Fuehrt zu Wurzelfaeule (weiche Staengelbasis, Welke).
      - Im kuehlen Winter zu viel giessen: Bei niedrigen Temperaturen
        braucht die Pflanze deutlich weniger Wasser.
      - Austrocknen lassen im Sommer: Schadet dem Blattwachstum,
        besonders wenn die Pflanze draussen in der Sonne steht.
    metadata:
      topic: strelitzia_care
