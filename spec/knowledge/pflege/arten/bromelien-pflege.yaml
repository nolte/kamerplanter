  - id: bromelien-standort
    title: "Bromelien — Standort und Licht"
    content: |
      Bromelien sind tropische Aufsitzerpflanzen (Epiphyten) mit
      farbenpraechtigem Bluetenstand und einem charakteristischen
      Wassertrichter in der Blattmitte.

      Die drei beliebtesten Zimmerpflanzen-Bromelien:

      Guzmania lingulata (Guzmanie): Leuchtend rote, orange oder
      gelbe Hochblaetter. Kompakt (30 bis 50 cm). Helles, indirektes
      Licht, keine direkte Sonne.

      Vriesea splendens (Flammendes Schwert): Aufrechter, schwertfoermiger
      Bluetenstand in Rot-Orange. Dekorative, gebaenderte Blaetter
      (40 bis 60 cm). Helles, indirektes Licht.

      Aechmea fasciata (Urnenpflanze): Silbergraue, breitblaettrige
      Rosette mit rosa-violettem Bluetenstand (30 bis 60 cm).
      Vertraegt etwas mehr Licht als die anderen beiden.

      Standort fuer alle: Helles, indirektes Licht. Ost- oder
      Westfenster ideal. Keine direkte Mittagssonne — sie
      verbrennt die Blaetter. 100 bis 300 Mikromol PPFD genuegen.

      Temperatur: 18 bis 27 Grad. Unter 10 bis 13 Grad beginnen
      Schaeden. Zugluft vermeiden.

      Luftfeuchtigkeit: 55 bis 75 Prozent. Hoeher als normale
      Raumluft. Regelmaessig besprühen oder Luftbefeuchter verwenden.
      Ein helles Badezimmer ist ein hervorragender Standort.

      Alle drei Arten sind laut ASPCA nicht giftig fuer Katzen
      und Hunde.
    metadata:
      topic: bromeliad_care
      species: "Guzmania lingulata, Vriesea splendens, Aechmea fasciata"
      difficulty: beginner

  - id: bromelien-giessen
    title: "Bromelien — Giessen und Substrat"
    content: |
      Bromelien werden voellig anders gegossen als normale
      Zimmerpflanzen. Sie haben einen zentralen Blatttrichter, der
      als natuerlicher Wasserspeicher dient.

      Die wichtigste Regel: Wasser gehoert in den Trichter, nicht
      primaer ins Substrat!

      Trichter-Pflege:
      - Den zentralen Trichter stets mit 2 bis 3 cm Wasser gefuellt
        halten.
      - Alle 2 bis 3 Wochen den Trichter komplett leeren und mit
        frischem Wasser befuellen. Das verhindert Faeulnis,
        Bakterienbildung und Mückenlarven.
      - In der Heizperiode oefter auffuellen (Verdunstung!).
      - Bei Temperaturen unter 15 Grad: Trichter leerer halten,
        um Herzfaeule zu vermeiden.

      Wasserqualitaet: Kalkarmes, zimmerwarmes Wasser. Regenwasser
      oder gefiltertes Wasser sind ideal. Kalk verstopft die
      Trichome (Sternhaerchen), ueber die Bromelien Naehrstoffe
      aufnehmen.

      Substrat: Lockeres, durchlaessiges Bromelien- oder
      Orchideensubstrat (Rindenmulch, Perlite). Bromelien sind
      Epiphyten mit minimalem Wurzelsystem — das Substrat dient
      vor allem der Standfestigkeit. pH-Wert 5,5 bis 6,5.
      Staunaesse im Substrat ist toedlich.

      Topfgroesse: 2 bis 5 Liter, 12 bis 15 cm Tiefe genuegen.

      Giess-Rhythmus Sommer: Trichter woechentlich prüfen und
      auffuellen. Substrat nur leicht feucht halten.
      Giess-Rhythmus Winter: Trichter alle 2 Wochen erneuern.
      Substrat fast trocken halten.
    metadata:
      topic: bromeliad_care
      species: "Guzmania lingulata, Vriesea splendens, Aechmea fasciata"
      difficulty: beginner

  - id: bromelien-duengung
    title: "Bromelien — Duengung und Lebenszyklus"
    content: |
      Bromelien werden niemals ueber das Substrat geduengt!
      Die Naehrstoffe kommen ausschliesslich ueber den
      Blatttrichter.

      Duengung: Von April bis September alle 4 bis 6 Wochen stark
      verduennten Bromelien- oder Orchideenduenger in den Trichter
      geben. Nur ein Viertel der Normaldosis verwenden!
      Zu konzentrierte Loesung schaedigt die empfindlichen Trichome
      auf der Blattinnenseite.

      Von Oktober bis Maerz: Kein Duenger.

      Umtopfen: Selten noetig. Alle 2 Jahre oder wenn Kindel
      abgetrennt werden.

      Der besondere Lebenszyklus der Bromelien:
      Bromelien sind monokarp — die Mutterpflanze blueht nur einmal
      und stirbt danach ab. Das ist kein Fehler, sondern normal!

      1. Rosetten-Aufbau (2 bis 4 Jahre): Pflanze waechst, bildet
         grosse Blattrosette.
      2. Bluetenstand erscheint: Farbenpraechtige Hochblaetter,
         haelt 2 bis 6 Monate.
      3. Kindel-Bildung: Waehrend oder nach der Bluete bildet die
         Mutterpflanze 1 bis 5 Ableger (Kindel/Pups) an der Basis.
      4. Mutterpflanze stirbt ab: Ueber mehrere Monate vergilbt
         die Mutterpflanze und versorgt die Kindel mit Naehrstoffen.
      5. Kindel abtrennen: Wenn sie ein Drittel bis die Haelfte
         der Groesse der Mutterpflanze erreicht haben.

      Tipp Bluehinduktion: Wenn die Pflanze nach 3 bis 4 Jahren
      nicht blueht, einen reifen Apfel neben die Pflanze legen
      und beides mit einer Plastiktuete abdecken. Das Ethylengas
      des Apfels loest die Bluete in 6 bis 8 Wochen aus.
    metadata:
      topic: bromeliad_care
      species: "Guzmania lingulata, Vriesea splendens, Aechmea fasciata"
      difficulty: beginner

  - id: bromelien-probleme
    title: "Bromelien — Probleme und Vermehrung"
    content: |
      Haeufigste Probleme:
      - Herzfaeule (Trichterfaeule): Braune, faulige, stinkende
        Masse in der Trichtermitte. Ursache: Stehendes Wasser bei
        zu kuehlen Temperaturen. Trichter regelmaessig ausspuelen
        und bei Temperaturen unter 15 Grad weniger Wasser im
        Trichter halten.
      - Braune Blattspitzen: Zu trockene Luft. Luftfeuchtigkeit
        erhoehen.
      - Blaetter verlieren Farbe: Zu viel direkte Sonne oder
        Naehrstoffmangel.
      - Mutterpflanze stirbt nach Bluete: Normal! Kein Pflegefehler.
        Auf Kindel-Bildung warten.

      Schaedlinge: Spinnmilben (feine Gespinste auf Blattunterseiten),
      Schildlaeusen (braune Schuppen), Wolllaeusen (Wollbelag im
      Trichter) und Thrips (silbrige Streifen). Alle 2 Wochen
      kontrollieren.

      Behandlung: Neemoel (0,5 Prozent) auf die Blaetter sprühen —
      niemals in den Trichter! Alkohol 70 Prozent mit Wattestäbchen
      gegen Schildlaeusen und Wolllaeusen. Trichter regelmaessig
      mit frischem Wasser ausspuelen.

      Vermehrung — einfach ueber Kindel:
      Kindel (Pups) abtrennen, wenn sie mindestens ein Drittel der
      Groesse der Mutterpflanze erreicht haben (etwa 10 bis 15 cm).
      Mit scharfem Messer vom Mutterstamm trennen. In lockeres
      Bromelien- oder Orchideensubstrat einpflanzen. Bis zur naechsten
      Bluete des Kindels dauert es 2 bis 4 Jahre.

      Die absterbende Mutterpflanze nicht sofort entfernen — sie gibt
      weiter Naehrstoffe an die Kindel weiter. Erst entfernen, wenn
      sie vollstaendig abgestorben ist.

      Gute Kombinationspartner fuer Bromelien: Orchideen,
      Stubenpalmen und andere tropische Pflanzen mit aehnlichen
      Feuchtigkeitsanspruechen. Nicht mit Kakteen oder Sukkulenten
      kombinieren — voellig gegensaetzliche Pflegeansprueche.
    metadata:
      topic: bromeliad_care
      species: "Guzmania lingulata, Vriesea splendens, Aechmea fasciata"
      difficulty: beginner
