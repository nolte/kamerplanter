  - id: codiaeum-probleme
    title: "Croton — Probleme und Vermehrung"
    content: |
      Haeufigste Probleme:
      - Massiver Blattfall: Standortwechsel, Zugluft oder
        Temperaturschock. Crotons hassen Veraenderungen.
      - Farben verblassen: Zu wenig Licht. Naeher ans Fenster.
      - Gelbe Blaetter: Ueberwaesserung oder Kaelte.
      - Weisser Belag auf Blaettern: Echter Mehltau. Mit
        Kaliumbicarbonat (0,5 Prozent) besprühen.

      Schaedlinge: Spinnmilben (Farbverlust, Gespinste — haeufigster
      Schaedling!), Schmierlaeusen (Wollflecken), Schildlaeusen
      (braune Schilder) und Thrips (silbrige Streifen). Woechentlich
      kontrollieren, besonders Blattunterseiten.

      Behandlung: Neemoel (0,5 Prozent) gegen Spinnmilben,
      Schmierlaeusen und Thrips. Alkohol 70 Prozent mit Wattestäbchen
      gegen Schildlaeusen.

      Vermehrung: Mittelschwer. Stecklinge (3 bis 4 cm, halbholzig)
      im Sommer nehmen. Schnittstelle mit Holzkohle bestreuen, um
      den Latex-Fluss zu stoppen. Hohe Bodenwärme (25 bis 30 Grad)
      und Folienzelt (hohe Luftfeuchtigkeit) sind wichtig. Bewurzelung
      dauert 4 bis 8 Wochen.

      Achtung: Croton ist giftig fuer Katzen, Hunde und Kinder. Der
      Milchsaft (Latex) kann Hautreizungen, Blaeschen und bei Verschlucken
      Erbrechen und Durchfall verursachen. Immer Handschuhe tragen.
    metadata:
      topic: codiaeum_care
      species: "Codiaeum variegatum"
      difficulty: beginner
