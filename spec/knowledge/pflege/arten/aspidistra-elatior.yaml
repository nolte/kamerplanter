  - id: aspidistra-elatior-standort
    title: "Schusterpalme — Standort und Licht"
    content: |
      Die Schusterpalme (Aspidistra elatior) ist die robusteste Zimmerpflanze
      ueberhaupt — daher der englische Name "Cast Iron Plant" (Gusseisen-
      pflanze). Sie stammt aus schattigen Bergwaeldern in Japan und China
      und ueberlebt Vernachlaessigung, Dunkelheit, Trockenheit und Staub,
      die andere Pflanzen toeten wuerden.

      Licht: Halbschatten bis Schatten — die Schusterpalme ist eine der
      wenigen Pflanzen, die wirklich dunkle Ecken vertraegt. Ein Nord-
      fenster oder ein Platz weit weg vom Fenster ist voellig in Ordnung.
      Direkte Sonne sollte vermieden werden — sie verbrennt die Blaetter.

      Temperatur: Extrem breit tolerant: 7-27 Grad Celsius. Die Pflanze
      ist sogar halbfrosthart (bis -15 Grad im Freiland). Als Zimmer-
      pflanze 15-24 Grad optimal, aber sie ueberlebt auch in kuehlen
      Treppenhaeusern oder ungeheizten Raeumen.

      Luftfeuchtigkeit: 30-60% — voellig unkritisch. Trockene Heizungsluft
      ist kein Problem.

      Die Schusterpalme ist nicht giftig — sicher fuer Katzen, Hunde und
      Kinder. Sie waechst allerdings sehr langsam (nur 2-5 neue Blaetter
      pro Jahr).
    metadata:
