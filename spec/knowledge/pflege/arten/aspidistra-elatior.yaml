  - id: aspidistra-elatior-giessen
    title: "Schusterpalme — Giessen und Substrat"
    content: |
      Die Schusterpalme ist anspruchslos beim Giessen. Im Sommer alle
      1-2 Wochen giessen, im Winter alle 2-4 Wochen. Das Substrat
      zwischen den Wassergaben leicht antrocknen lassen.

      Giessmethode: Kraeftig durchgiessen und ablaufen lassen.
      Leitungswasser ist voellig in Ordnung. Staunaesse ist die einzige
      ernsthafte Bedrohung fuer diese Pflanze — sonst kann man kaum
      etwas falsch machen.

      Substrat: Normale Blumenerde mit 20% Perlite. pH 5.5-7.0.
      Gute Drainage genuegt. Nichts Besonderes noetig.

      Die Pflanze hat ein Rhizom (unterirdischer Wurzelstock), das
      langsam waechst und Wasser speichert. Dadurch uebersteht sie
      auch laengere Trockenperioden problemlos.

      Einziger haeufiger Fehler: Zu viel giessen. Staunaesse fuehrt zu
      Wurzelfaeule — und das ist praktisch das Einzige, woran eine
      Schusterpalme eingeht. Im Zweifel lieber zu wenig als zu viel
      giessen.
    metadata:
      topic: aspidistra_elatior_care
      species: "Aspidistra elatior"
      difficulty: beginner

  - id: aspidistra-elatior-duengung
    title: "Schusterpalme — Duengung und Umtopfen"
    content: |
      Die Schusterpalme ist ein leichter Zehrer und ueberlebt auch
      ohne jegliche Duengung mehrere Jahre. Von April bis September
      monatlich mit einem Gruenpflanzenduenger duengen (z.B. Compo
      7-3-6, 3 ml/L). Oktober bis Maerz nicht duengen.

      Umtopfen: Nur alle 3-4 Jahre noetig, weil die Pflanze so langsam
      waechst. Im Fruehling umtopfen. Nicht zu oft stoeren — die
      Schusterpalme braucht Zeit, sich nach dem Umtopfen zu erholen.

      Rueckschnitt: Kein Rueckschnitt noetig. Nur komplett abgestorbene
      braune Blaetter an der Basis abzupfen. Die Pflanze reguliert sich
      selbst.

      Vermehrung: Durch Teilung des Rhizoms beim Umtopfen im Fruehling.
      Mindestens 2-3 Blaetter pro Abschnitt lassen. Die neuen Teilstuecke
      brauchen 1-2 Jahre bis sie wieder voll schoene Pflanzen sind —
      Geduld ist gefragt.

      Schaedlinge sind selten: Gelegentlich Schmierlaeuse (Wollflecken)
      oder Spinnmilben bei sehr trockener Luft. Behandlung: Neemoel
      0.5% spruehen.

      Die Schusterpalme ist die perfekte Pflanze fuer alle, die wenig
      Zeit oder Erfahrung haben — und trotzdem eine huebsche Gruenpflanze
      moechten.
