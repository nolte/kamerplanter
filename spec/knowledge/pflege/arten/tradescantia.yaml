  - id: tradescantia-standort
    title: "Dreimasterblume — Standort und Licht"
    content: |
      Die Dreimasterblume (Tradescantia zebrina) liebt helles, indirektes
      Licht. Je heller der Standort, desto intensiver werden die
      silbrig-violetten Blattfarben. An einem Nordfenster verblassen die
      Farben und die Pflanze wird langstielig und kahl ("leggy").

      Ein Platz am Ost- oder Westfenster ist ideal. Direkte Mittagssonne
      vertraegt sie in Massen, kann aber bei zu viel Hitze die Blaetter
      bleichen. Am Suedfenster leicht zurueckgesetzt funktioniert ebenfalls
      gut.

      Temperatur: 18 bis 27 Grad Celsius im Sommer, im Winter nicht unter
      12 Grad. Kurze Kuehle bis 5 Grad uebersteht sie, aber Dauerfrost
      ist toedlich. Zugluft und Heizungsnaehe meiden.

      Luftfeuchtigkeit: 40 bis 60 Prozent genuegen voellig. Normale
      Raumluft reicht aus — die Tradescantia ist anspruchslos.

      Tipp: Als Haengepflanze in einer Ampel besonders dekorativ.
      Die Triebe koennen 60 bis 100 cm lang werden und haengen
      elegant ueber den Topfrand.
    metadata:
      topic: tradescantia_care
      species: "Tradescantia zebrina"
      difficulty: beginner

  - id: tradescantia-giessen
    title: "Dreimasterblume — Giessen und Substrat"
    content: |
      Die Tradescantia mag gleichmaessig feuchtes Substrat, aber keine
      Staunaesse. Giesse gruendlich und lass die oberen 2 bis 3 Zentimeter
      Erde zwischen den Wassergaben antrocknen.

      Giess-Rhythmus Sommer: Alle 5 bis 10 Tage, je nach Standort und
      Topfgroesse. Bei warmem, hellem Standort haeufiger.

      Giess-Rhythmus Winter: Alle 10 bis 14 Tage. Weniger giessen, da
      die Pflanze langsamer waechst.

      Wasserqualitaet: Normales Leitungswasser ist voellig in Ordnung.
      Die Tradescantia ist nicht empfindlich gegenueber Kalk.

      Substrat: Normale Zimmerpflanzenerde mit etwa 20 Prozent Perlite
      fuer bessere Drainage. pH-Wert 6,0 bis 7,0. Die Pflanze ist
      extrem anpassungsfaehig und toleriert verschiedene Substrate.

      Haeufigste Fehler:
      - Zu viel giessen: Wurzelfaeule, fahle Blaetter.
      - Zu wenig giessen: Blaetter werden duenn und schlaff.
      - Dauerhaft nasse Fuesse: Staunaesse ist die haeufigste
        Todesursache.
    metadata:
      topic: tradescantia_care
      species: "Tradescantia zebrina"
      difficulty: beginner

  - id: tradescantia-duengung
    title: "Dreimasterblume — Duengung und Umtopfen"
    content: |
      Duengung: Von April bis September alle 4 Wochen mit einem normalen
      Zimmerpflanzen-Fluessigduenger duengen (zum Beispiel NPK 7-3-6,
      etwa 3 ml pro Liter Wasser). Die Tradescantia ist ein Schwachzehrer
      und braucht nicht viel.

      Von Oktober bis Maerz wird nicht geduengt. Ueberdüngung erkennst
      du daran, dass die Blaetter ihre typische Silber-Violett-Faerbung
      verlieren und gelblich werden.

      Umtopfen: Alle 12 bis 24 Monate in einen etwas groesseren Topf.
      Bester Zeitpunkt: Fruehling (Maerz/April). Topfvolumen 1 bis 5
      Liter reicht voellig. Mindesttiefe 12 cm.

      Rueckschnitt: Die Tradescantia braucht regelmaessigen Rueckschnitt,
      um buschig und kompakt zu bleiben. Kahle, langstielige Triebe auf
      5 bis 10 cm zurueckschneiden — das foerdert dichten, farbintensiven
      Neuwuchs. Am besten im Fruehjahr (Maerz/April), aber auch
      zwischendurch moeglich.

      Tipp: Helles Licht ist fuer intensive Blattfarben wichtiger als
      Duengung.
    metadata:
      topic: tradescantia_care
      species: "Tradescantia zebrina"
      difficulty: beginner

  - id: tradescantia-probleme
    title: "Dreimasterblume — Probleme und Vermehrung"
    content: |
      Haeufigste Probleme:
      - Kahle, lange Triebe: Zu wenig Licht. Heller stellen und
        zurueckschneiden.
      - Farbverlust (Blaetter werden gruen): Zu wenig Licht oder
        Ueberdüngung.
      - Gelbe Blaetter: Ueberwaesserung oder Naehrstoffmangel.
      - Wurzelfaeule: Staunaesse. Substrat wechseln und weniger giessen.

      Schaedlinge: Spinnmilben (feine Gespinste bei trockener Luft),
      Blattlaeuse (Kolonien an Triebspitzen) und Trauermücken (Larven
      im feuchten Substrat). Alle 2 Wochen kontrollieren.

      Behandlung: Neemoel (0,5 Prozent) gegen Spinnmilben und Blattlaeuse.
      Nematoden (Steinernema feltiae) gegen Trauermücken.

      Vermehrung: Extrem einfach — eine der leichtesten Zimmerpflanzen
      ueberhaupt. Stecklinge mit 2 bis 4 Knoten abschneiden, in ein
      Glas Wasser stellen. Nach 1 bis 2 Wochen bilden sich Wurzeln.
      Dann in Erde einpflanzen. Alternativ: Stecklinge direkt in
      feuchtes Substrat stecken. Erfolgsrate liegt nahe 100 Prozent.

      Achtung: Tradescantia ist leicht giftig fuer Katzen, Hunde und
      Kinder. Der Pflanzensaft kann Kontaktdermatitis verursachen —
      bei empfindlicher Haut Handschuhe tragen.
    metadata:
      topic: tradescantia_care
      species: "Tradescantia zebrina"
      difficulty: beginner
