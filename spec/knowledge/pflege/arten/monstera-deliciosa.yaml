  - id: monstera-giessen
    title: "Fensterblatt — Giessen und Substrat"
    content: |
      Die Monstera mag gleichmaessige Feuchtigkeit, aber keine Staunaesse.
      Giesse von oben, bis Wasser aus den Abzugsloechern laeuft. Nach
      30 Minuten den Untersetzer leeren.

      Giess-Rhythmus Sommer (Maerz bis Oktober): Alle 5 bis 7 Tage.
      Lass die oberen 3 bis 5 Zentimeter Erde zwischen den Wassergaben
      antrocknen. Die Fingerprobe ist der beste Test: Fuehlt sich die
      Erde in 3 cm Tiefe trocken an, wird gegossen.

      Giess-Rhythmus Winter (November bis Februar): Alle 10 bis 14 Tage.
      Die Pflanze waechst langsamer und braucht weniger Wasser.

      Substrat: Eine lockere, grobe Mischung ist wichtig. Bewährt hat sich:
      50 bis 60 Prozent Zimmerpflanzenerde, 20 bis 30 Prozent Orchideenrinde,
      10 bis 20 Prozent Perlite. Der pH-Wert sollte zwischen 5,5 und 6,5
      liegen. Staunaesse ist der haeufigste Fehler und fuehrt zu
      Wurzelfaeule.

      Wasserqualitaet: Normales Leitungswasser ist voellig in Ordnung.
      Am besten zimmerwarm giessen.

      Haeufigste Giess-Fehler:
      - Zu viel giessen: Gelbe Blaetter, matschige Stiele, fauliger Geruch.
      - Zu wenig giessen: Blaetter rollen sich ein, braune Raender.
      - Wasser im Untersetzer stehen lassen: Fuehrt zu Wurzelfaeule.
    metadata:
      topic: monstera_care
      species: "Monstera deliciosa"
      difficulty: beginner

  - id: monstera-duengung
    title: "Fensterblatt — Duengung und Umtopfen"
    content: |
      Duengung: Von Maerz bis Oktober alle 2 Wochen mit einem
      Gruenpflanzen-Fluessigduenger duengen (zum Beispiel NPK 7-3-6,
      etwa 7 ml pro Liter Wasser). Im Maerz und September mit halber
      Dosis starten beziehungsweise ausklingen lassen.

      Von November bis Februar wird nicht geduengt — die Pflanze ruht
      und kann die Naehrstoffe nicht verwerten. Ueberdüngung erkennst du
      an braunen Blattspitzen und Salzraendern.

      Tipp: Alle 3 bis 4 Monate das Substrat gruendlich mit klarem Wasser
      durchspuelen. Das schwemmt ueberschuessige Salze aus.

      Umtopfen: Alle 18 bis 24 Monate in einen Topf, der etwa 5 cm
      groesser ist als der alte. Bester Zeitpunkt: Fruehling (April).
      Schwere Toepfe aus Ton oder Keramik geben grossen Exemplaren mit
      Kletterhilfe mehr Stabilitaet.

      Empfohlenes Topfvolumen: 10 bis 20 Liter je nach Groesse.
      Mindestens 25 cm Topftiefe, damit die kraeftigen Wurzeln Platz haben.

      Ruhephase (November bis Februar): Weniger giessen, nicht duengen,
      Standort nicht wechseln. Blaetter regelmaessig von Staub befreien
      — das foerdert die Lichtaufnahme.
