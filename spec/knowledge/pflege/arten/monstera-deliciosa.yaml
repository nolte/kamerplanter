  - id: monstera-standort
    title: "Fensterblatt — Standort und Licht"
    content: |
      Das Fensterblatt (Monstera deliciosa) braucht helles, indirektes Licht.
      Direkte Mittagssonne verbrennt die Blaetter — ein Platz am Ost- oder
      Westfenster ist ideal. Auch leicht zurueckgesetzt an einem Suedfenster
      funktioniert gut, solange kein direktes Sonnenlicht auf die Blaetter
      faellt. Nordfenster sind zu dunkel, es sei denn du ergaenzt mit einer
      Pflanzenlampe.

      Die beruehmten Loecher in den Blaettern (Fenestrierung) bilden sich
      nur bei ausreichend Licht. Bekommt die Monstera zu wenig Licht,
      bleiben neue Blaetter klein und ohne Loecher.

      Temperatur: Ideal sind 18 bis 27 Grad Celsius. Unter 12 Grad stellt
      die Pflanze das Wachstum komplett ein. Nachts sollte es nicht unter
      16 Grad fallen. Zugluft und Standorte neben Heizkoerpern vermeiden.

      Luftfeuchtigkeit: 50 bis 70 Prozent sind optimal. Normale
      Raumluft reicht meist aus, im Winter bei Heizungsluft hilft
      gelegentliches Besprühen oder eine Schale mit Wasser neben der
      Pflanze.

      Wichtig: Die Monstera ist eine Kletterpflanze. Ein Moosstab oder
      Kokosstab als Rankhilfe foerdert groessere Blaetter und kraeftigeres
      Wachstum. Luftwurzeln nicht abschneiden — sie helfen der Pflanze
      bei der Naehrstoff- und Wasseraufnahme.
    metadata:
      topic: monstera_care
