  - id: monstera-probleme
    title: "Fensterblatt — Probleme und Vermehrung"
    content: |
      Haeufigste Probleme:
      - Gelbe Blaetter: Meist Ueberwaesserung. Seltener Naehrstoffmangel
        oder zu wenig Licht.
      - Braune Blattspitzen: Trockene Luft, Ueberdüngung oder Salzansammlung
        im Substrat.
      - Keine Loecher in neuen Blaettern: Zu wenig Licht. Naeher ans Fenster
        stellen oder Pflanzenlampe ergaenzen.
      - Blaetter rollen sich ein: Zu trocken, mehr giessen.

      Schaedlinge: Spinnmilben (feine Gespinste, besonders bei trockener
      Heizungsluft), Schmierlaeusen (wattige weisse Flecken in
      Blattachseln) und Trauermücken (kleine schwarze Fliegen, Larven im
      Substrat). Regelmaessige Kontrolle alle 2 Wochen, besonders
      Blattunterseiten und Stielachseln absuchen.

      Behandlung: Neemoel (0,5 Prozent Spruehloesung) hilft gegen
      Spinnmilben und Schmierlaeusen. Gegen Trauermücken wirken Gelbtafeln
      und Nematoden (Steinernema feltiae) zum Giessen.

      Vermehrung: Sehr einfach. Stecklinge mit mindestens einem Knoten
      (der Verdickung am Stiel, wo Blaetter und Luftwurzeln wachsen)
      abschneiden. In Wasser stellen — nach 2 bis 4 Wochen bilden sich
      Wurzeln. Dann in Substrat einpflanzen. Alternativ Abmoosen:
      Stiel anritzen, feuchtes Moos umwickeln und mit Folie abdecken.
      Sicherste Methode mit geringstem Verlustrisiko.

      Achtung: Monstera ist giftig fuer Katzen, Hunde und Kinder.
      Der Pflanzensaft kann Hautreizungen verursachen — beim Schneiden
      Handschuhe tragen.
    metadata:
