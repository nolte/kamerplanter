  - id: bogenhanf-duengung
    title: "Bogenhanf — Duengung und Umtopfen"
    content: |
      Duengung: Der Bogenhanf ist ein extremer Schwachzehrer — er
      speichert Naehrstoffe in seinen sukkulenten Blaettern. Maximal
      2 bis 3 Duengergaben pro Jahr genuegen.

      Von April bis August: Alle 6 bis 8 Wochen mit einem Kakteen- und
      Sukkulentenduenger (zum Beispiel NPK 4-6-7, nur 2 ml pro Liter —
      halbe Normaldosis). Alternativ normalen Zimmerpflanzenduenger mit
      einem Drittel der empfohlenen Dosis verwenden.

      Von September bis Maerz: Kein Duenger. Ueberdüngung bei
      Winterruhe ist einer der haeufigsten Fehler.

      Organische Alternative: 10 Prozent Wurmhumus oder 5 Prozent
      Pflanzenkohle beim Umtopfen unter das Substrat mischen.

      Umtopfen: Nur alle 2 bis 3 Jahre, wenn die Wurzeln aus dem Topf
      draengen. Im Fruehling (Februar/Maerz). Bogenhanf mag es etwas
      enger — zu grosse Toepfe erhoehen das Staunaesserisiko.

      Vermehrung: Drei Methoden moeglich:
      1. Teilung des Rhizoms beim Umtopfen — schnellste Methode.
      2. Blattstecklinge: 5 bis 8 cm lange Stuecke eines Blattes
         in Substrat stecken. Dauert 2 bis 3 Monate.
         Wichtig: Variegierte Sorten wie 'Laurentii' verlieren bei
         Blattstecklingen ihre Baenderung — gruene Nachkoemmlinge.
      3. Ableger (Auslaeufer) am Topfrand, wenn vorhanden.

      Achtung: Leicht giftig fuer Katzen, Hunde und Kinder (Saponine).
      Symptome: Uebelkeit, Erbrechen, Durchfall.
    metadata:
      topic: bogenhanf_care
      species: "Dracaena trifasciata"
      difficulty: beginner
