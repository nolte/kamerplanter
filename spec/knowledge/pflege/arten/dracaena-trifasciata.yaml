  - id: bogenhanf-standort
    title: "Bogenhanf — Standort und Licht"
    content: |
      Der Bogenhanf (Dracaena trifasciata, frueher Sansevieria trifasciata,
      auch Schwiegermutterzunge oder Snake Plant genannt) gehoert zu den
      robustesten Zimmerpflanzen ueberhaupt. Er vertraegt Vernachlaessigung,
      trockene Luft und wenig Licht besser als fast jede andere Pflanze.

      Licht: Extrem anpassungsfaehig. Von Vollsonne bis Halbschatten —
      der Bogenhanf waechst (fast) ueberall. Mehr Licht foerdert
      schnelleres Wachstum und kraeftigere Farben. Auch in dunklen Ecken
      ueberlebt er, waechst dann aber extrem langsam. Variegierte Sorten
      wie 'Laurentii' (goldener Blattrand) brauchen etwas mehr Licht.

      Temperatur: 18 bis 27 Grad Celsius optimal. Nachts nicht unter
      15 Grad. Mindesttemperatur 10 Grad — unter 10 Grad drohen
      Kaelteschaeden. Normale Zimmertemperatur ist perfekt.

      Luftfeuchtigkeit: 30 bis 50 Prozent — der Bogenhanf bevorzugt
      trockene Luft. Er ist damit ideal fuer beheizte Raeume im Winter,
      wo andere Pflanzen unter der trockenen Heizungsluft leiden.
      Keine Befeuchtung noetig.

      Standort-Tipp: Ideal fuer Schlafzimmer (produziert nachts
      Sauerstoff), Bueros, Flure und alle Raeume mit trockener Luft.
      Einer der besten Luftreiniger laut NASA-Studie: filtert
      Formaldehyd, Benzol, Trichlorethylen, Xylol und Toluol.
    metadata:
      topic: bogenhanf_care
      species: "Dracaena trifasciata"
      difficulty: beginner

  - id: bogenhanf-giessen
    title: "Bogenhanf — Giessen und Substrat"
    content: |
      Beim Bogenhanf gilt die goldene Regel: Lieber zu wenig als zu
      viel giessen. Die sukkulenten Blaetter speichern Wasser, und
      Ueberwaesserung ist mit Abstand der haeufigste Pflegefehler.

      Giess-Rhythmus Sommer (April bis September): Alle 14 bis 21 Tage.
      Das Substrat muss zwischen den Wassergaben komplett durchtrocknen.

      Giess-Rhythmus Winter (Oktober bis Maerz): Nur einmal pro Monat
      oder noch seltener. Im Winter braucht der Bogenhanf fast kein
      Wasser.

      Giessmethode: Gruendlich durchgiessen (Drench and Drain), dann
      komplett austrocknen lassen. Ueberschuss sofort entfernen.

      Wasserqualitaet: Normales Leitungswasser ist voellig in Ordnung.
      Staunaesse unbedingt vermeiden.

      Substrat: Kaktus- oder Sukkulentenerde, oder Einheitserde mit
      30 bis 40 Prozent Perlite oder Sand. Sehr durchlaessig. Tongefaesse
      sind ideal, weil sie schneller austrocknen als Plastiktoepfe.
      Empfohlenes Topfvolumen: 2 bis 15 Liter.

      Haeufigste Giess-Fehler:
      - Zu viel giessen: Die haeufigste Todesursache. Weiche, gelbe
        Blaetter an der Basis und fauliger Geruch sind Warnzeichen.
      - Wasser in den Blatttrichter: Kann besonders im Winter zu
        Blattbasisfaeule fuehren.
      - Im Winter genauso viel giessen wie im Sommer: Fuehrt fast
        sicher zu Wurzelfaeule.
