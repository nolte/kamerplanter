  - id: dracaena-marginata-standort
    title: "Drachenbaum — Standort und Licht"
    content: |
      Der Drachenbaum (Dracaena marginata) stammt aus Madagaskar und ist
      ein Klassiker unter den Buero- und Zimmerpflanzen. Er vertraegt
      Vernachlaessigung und kommt auch mit weniger Licht zurecht.

      Licht: Helles, indirektes Licht ist optimal, aber auch Halbschatten
      wird toleriert. Bei ausreichend Licht bildet die Pflanze einen
      markanten, verzweigten Stamm mit bueschelartigen Blattrosetten an
      den Spitzen. Direkte Mittagssonne kann die Blaetter verbrennen.

      Temperatur: 18-27 Grad Celsius. Im Winter nicht unter 10 Grad.
      Normale Zimmertemperatur ist perfekt.

      Luftfeuchtigkeit: 40-60% genuegen. Trockene Raumluft wird gut
      vertragen. Der Drachenbaum ist ein guter Luftreiniger — er filtert
      Formaldehyd, Benzol und andere Schadstoffe aus der Luft.

      Besonderer Hinweis fuer Katzenhalter: Dracaena ist fuer Katzen
      deutlich giftiger als fuer Hunde oder Menschen. Saponine und
      aetherische Oele koennen bei Katzen Erbrechen, Speichelfluss und
      Pupillenerweiterung verursachen. In Katzenhaushalten besser eine
      Alternative waehlen (z.B. Gruenlilie oder Gebetspflanze).
    metadata:
      topic: dracaena_marginata_care
      species: "Dracaena marginata"
      difficulty: beginner

  - id: dracaena-marginata-giessen
    title: "Drachenbaum — Giessen und Substrat"
    content: |
      Der Drachenbaum braucht maessig Wasser. Im Sommer alle 10-14 Tage
      giessen, im Winter alle 3-4 Wochen. Zwischen den Wassergaben das
      Substrat gut antrocknen lassen.

      Giessmethode: Kraeftig durchgiessen und ablaufen lassen. Staunaesse
      vermeiden — fuehrt zu Wurzelfaeule. Die Pflanze vertraegt Trockenheit
      besser als Naesse.

      Wasserqualitaet: Der Drachenbaum ist fluoridsensitiv. Fluorid im
      Leitungswasser verursacht braune Blattspitzen — das ist der haeufigste
      Pflegefehler und wird oft faelschlich als Naehrstoffmangel gedeutet.
      Besser: Gefiltertes Wasser, Regenwasser oder Leitungswasser einen
      Tag stehen lassen. Kein kalkreiches Wasser verwenden.

      Substrat: Zimmerpflanzenerde mit guter Drainage, 20-30% Perlite
      beimischen. pH-Wert 6.0-7.0. Fluoridarm wenn moeglich.

      Die unteren Blaetter fallen mit der Zeit natuerlich ab — dadurch
      bildet sich der charakteristische Stamm. Das ist normal und kein
      Zeichen fuer falsche Pflege.
    metadata:
      topic: dracaena_marginata_care
      species: "Dracaena marginata"
      difficulty: beginner

  - id: dracaena-marginata-duengung
    title: "Drachenbaum — Duengung und Umtopfen"
    content: |
      Der Drachenbaum ist ein Schwachzehrer. Von Maerz bis September
      monatlich mit einem Gruenpflanzenduenger duengen (z.B. Substral
      7-3-7, 4 ml/L). Oktober bis Februar nicht duengen.

      Wichtig: Keinen phosphatreichen Duenger verwenden — Phosphatduenger
      enthalten oft Fluorid als Verunreinigung, und der Drachenbaum
      reagiert darauf mit braunen Blattspitzen.

      Umtopfen: Alle 2-3 Jahre im Fruehling. Frisches Substrat mit guter
      Drainage verwenden. Die Pflanze kann Indoor 1-3 Meter hoch werden.

      Rueckschnitt: Das Kappen des Haupttriebs foerdert Verzweigung.
      Die Pflanze treibt zuverlaessig neu aus. Abgestorbene untere
      Blaetter einfach abzupfen — so bildet sich der charakteristische
      Stamm besser aus.

      Vermehrung: Kopfstecklinge (10-15 cm) mit Blattrosette in Substrat
      stecken. Oder Stammstuecke (5-10 cm) ohne Blaetter aufrecht in
      feuchtes Substrat — sie bilden an den Knoten neue Triebe.
      Bewurzelung bei 22-25 Grad in 4-6 Wochen.

      Haeufige Schaedlinge: Spinnmilben, Schmierlaeuse und Schildlaeuse.
      Regelmaessig kontrollieren. Behandlung: Neemoel 0.5% oder
      Alkohol mit Wattestaebchen.
    metadata:
