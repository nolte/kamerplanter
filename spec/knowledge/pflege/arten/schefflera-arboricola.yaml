  - id: schefflera-arboricola-giessen
    title: "Strahlenaralie — Giessen und Substrat"
    content: |
      Die Strahlenaralie mag gleichmaessige Feuchtigkeit ohne Staunaesse.
      Im Sommer alle 7-10 Tage giessen, im Winter alle 10-14 Tage.
      Das Substrat zwischen den Wassergaben leicht antrocknen lassen.

      Giessmethode: Kraeftig durchgiessen und ablaufen lassen.
      Leitungswasser ist gut vertraeglich. Gleichmaessig feucht halten,
      aber nie im Wasser stehen lassen.

      Substrat: Hochwertige Blumenerde mit 20% Perlite. pH-Wert 6.0-6.5.
      Gute Drainage ist wichtig. Tongefaesse bevorzugen — sie verhindern
      Ueberwaesserung.

      Typische Probleme bei falschem Giessen:
      - Blaetter werden gelb und fallen ab: Ueberwaesserung oder Staunaesse
      - Blaetter haengen und welken: Zu trocken oder Wurzelfaeule
      - Klebrige Tropfen auf Blaettern: Natuerlicher Guttationsprozess
        oder Hinweis auf Schaedlingsbefall (Honigtau)

      Die Schefflera vertraegt regelmaessigen starken Rueckschnitt gut
      und treibt zuverlaessig neu aus. Triebspitzen pinzieren foerdert
      buschigen Wuchs.
