  - id: schefflera-arboricola-standort
    title: "Strahlenaralie — Standort und Licht"
    content: |
      Die Strahlenaralie (Schefflera arboricola) stammt aus den tropischen
      Waeldern Taiwans und Suedchinas. Sie ist tolerant gegenueber
      schwaeherem Licht und eignet sich daher auch fuer dunklere
      Zimmerecken — ideal als Bueropflanze.

      Licht: Helles, indirektes Licht ist optimal (Ost- oder Westfenster).
      Vertraegt aber auch Halbschatten. Panaschierte Sorten (Gold Capella,
      Trinette) brauchen mehr Licht, damit die Musterung erhalten bleibt.
      Direkte Mittagssonne im Sommer vermeiden.

      Temperatur: 18-27 Grad Celsius. Im Winter nicht unter 12 Grad.
      Toleriert kurze Abkuehlungen auf 10 Grad. Zugluft vermeiden.

      Luftfeuchtigkeit: 40-60% genuegen. Normale Raumluft reicht aus.
      Die Schefflera ist diesbezueglich unkompliziert. Im Sommer kann
      die Pflanze auf den Balkon — Halbschatten bevorzugt, frostfrei.

      Die Schefflera wird oft mit der grossen Art S. actinophylla
      verwechselt. S. arboricola bleibt kompakter (bis 2 m Indoor) und
      laesst sich sogar als Bonsai kultivieren.

      Achtung: Die Pflanze ist giftig fuer Katzen, Hunde und Kinder
      (Calciumoxalat und Saponine). Bei Hautkontakt mit dem Saft
      koennen empfindliche Personen Reizungen bekommen.
    metadata:
      topic: schefflera_arboricola_care
