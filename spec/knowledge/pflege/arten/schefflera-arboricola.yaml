  - id: schefflera-arboricola-duengung
    title: "Strahlenaralie — Duengung und Umtopfen"
    content: |
      Die Strahlenaralie ist ein mittlerer Zehrer. Von Maerz bis September
      monatlich mit einem stickstoffbetonten Zimmerpflanzenduenger duengen
      (z.B. Compo 7-3-6, 5 ml/L). Oktober bis Februar nicht duengen.
      Bei wenig Licht die Duengermenge auf ein Viertel reduzieren.

      Umtopfen: Alle 2 Jahre im Fruehling. Topf eine Groesse groesser
      waehlen und frische Erde verwenden. Beim Umtopfen kann Hornmehl
      (30-50 g/Topf) als organischer Langzeitduenger eingearbeitet werden.

      Schaedlinge: Anfaellig fuer Spinnmilben, Schmierlaeuse, Schildlaeuse
      und Blattlaeuse. Regelmaessig kontrollieren (alle 2 Wochen).
      Behandlung: Neemoel 0.5% spruehen, Schildlaeuse mit Alkohol und
      Wattestaebchen entfernen, Blattlaeuse mit Insektizidseife behandeln.

      Rueckschnitt im Fruehjahr (Maerz-April): Vertraegt starken
      Rueckschnitt und treibt zuverlaessig neu aus. Auf gewuenschte
      Form bringen. Triebspitzen regelmaessig pinzieren fuer buschigen
      Wuchs.

      Vermehrung: Halbholzige Stecklinge (8-12 cm) bei 22-26 Grad und
      hoher Luftfeuchtigkeit bewurzeln. Dauer: 4-8 Wochen. Abmoosen
      (Luftabsenker) ist zuverlaessiger fuer dickere Staemme.
