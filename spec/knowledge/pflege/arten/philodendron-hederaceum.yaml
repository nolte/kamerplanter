  - id: philodendron-standort
    title: "Herzblatt-Philodendron — Standort und Licht"
    content: |
      Der Herzblatt-Philodendron (Philodendron hederaceum) ist eine der
      pflegeleichtesten Zimmerpflanzen ueberhaupt. Mit ihren herzfoermigen
      Blaettern waechst sie als Haengepflanze in der Ampel oder als
      Kletterpflanze am Moosstab.

      Achtung Verwechslung: Der Herzblatt-Philodendron sieht der Efeutute
      (Epipremnum aureum) sehr aehnlich, ist aber eine andere Gattung.
      Im Handel wird er manchmal auch unter den alten Namen Philodendron
      scandens oder P. oxycardium verkauft.

      Licht: Helles bis mittleres indirektes Licht. Kommt auch mit
      weniger Licht zurecht als viele andere Zimmerpflanzen, waechst
      dann aber langsamer mit kleineren Blaettern. Keine direkte Sonne
      — die Blaetter verbrennen leicht. Ein Nordfenster funktioniert
      sogar, solange es nicht zu dunkel ist.

      Temperatur: 18 bis 26 Grad Celsius, nachts nicht unter 15 Grad.
      Mindesttemperatur 10 Grad. Empfindlich gegenueber Kaelte und
      Zugluft.

      Luftfeuchtigkeit: 40 bis 60 Prozent — normale Raumluft reicht
      aus. Die Pflanze ist hier weniger anspruchsvoll als viele andere
      tropische Arten.

      Tipp: Ein Moosstab als Kletterhilfe foerdert groessere Blaetter.
      Als Haengepflanze bleiben die Blaetter kleiner, was aber ebenfalls
      dekorativ aussieht.
    metadata:
      topic: philodendron_care
