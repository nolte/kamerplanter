  - id: philodendron-giessen
    title: "Herzblatt-Philodendron — Giessen und Substrat"
    content: |
      Der Herzblatt-Philodendron ist beim Giessen unkompliziert und
      verzeiht gelegentliches Vergessen.

      Giess-Rhythmus Sommer (Maerz bis September): Alle 7 bis 10 Tage.
      Die oberen 2 bis 3 Zentimeter Erde zwischen den Wassergaben
      antrocknen lassen.

      Giess-Rhythmus Winter (Oktober bis Februar): Alle 14 bis 21 Tage.

      Giessmethode: Gruendlich durchgiessen (Drench and Drain).
      Ueberschuss nach 30 Minuten entfernen.

      Wasserqualitaet: Normales Leitungswasser ist gut vertraeglich.
      Abgestandenes Wasser bevorzugt.

      Substrat: Lockere, durchlaessige Einheitserde mit 20 bis 30 Prozent
      Perlite. pH 6,0 bis 7,0. Guter Wasserabzug wichtig.

      Empfohlenes Topfvolumen: 2 bis 10 Liter. Mindestens 15 cm
      Topftiefe.

      Haeufigste Giess-Fehler:
      - Ueberwaesserung: Gelbe Blaetter und Wurzelfaeule.
      - Wasser auf den Blaettern stehen lassen: Kann braune, nasse
        Blattflecken verursachen (bakterielle Blattflecken).
      - Zu selten giessen ist weniger kritisch: Die Pflanze verzeiht
        kurzfristige Trockenheit relativ gut.
    metadata:
      topic: philodendron_care
      species: "Philodendron hederaceum"
      difficulty: beginner

  - id: philodendron-duengung
    title: "Herzblatt-Philodendron — Duengung und Umtopfen"
    content: |
      Duengung: Der Herzblatt-Philodendron ist ein Schwachzehrer —
      alle 4 Wochen in der Wachstumsphase (Maerz bis September) mit
      einem Gruenpflanzen-Fluessigduenger duengen (NPK 7-3-6, 5 ml
      pro Liter Wasser).

      Im Winter: Kein Duenger. Ueberdüngung fuehrt zu braunen
      Blattspitzen.

      Organische Alternative: 10 Prozent Wurmhumus beim Umtopfen
      unter das Substrat mischen.

      Umtopfen: Alle 1 bis 2 Jahre im Fruehling. Topfgroesse nur
      leicht vergroessern (2 bis 3 cm mehr Durchmesser).

      Rueckschnitt: Im Fruehling (Maerz/April) lange Triebe auf
      gewuenschte Laenge kuerzen. Die abgeschnittenen Stuecke eignen
      sich hervorragend als Stecklinge.

      Vermehrung: Sehr einfach — ideal fuer Anfaenger. Stecklinge
      mit 2 bis 3 Knoten und mindestens 2 Blaettern abschneiden.
      Mindestens ein Knoten muss unter der Wasseroberflaeche sein.
      In Wasser stellen: Nach 2 bis 4 Wochen bilden sich Wurzeln.
      Dann in Substrat einpflanzen. Funktioniert auch direkt in
      feuchtem Substrat. Sehr hohe Erfolgsrate.

      Achtung: Der Herzblatt-Philodendron ist giftig fuer Katzen,
      Hunde und Kinder. Der Milchsaft kann Kontaktdermatitis ausloesen.
    metadata:
      topic: philodendron_care
      species: "Philodendron hederaceum"
      difficulty: beginner
