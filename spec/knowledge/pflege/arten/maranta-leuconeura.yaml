  - id: maranta-leuconeura-giessen
    title: "Gebetspflanze — Giessen und Substrat"
    content: |
      Die Gebetspflanze mag gleichmaessige Feuchtigkeit, aber keine
      Staunaesse. Im Sommer alle 5-7 Tage giessen, im Winter alle
      7-10 Tage. Das Substrat sollte leicht feucht bleiben, aber nie
      richtig nass stehen.

      Giessmethode: Am besten von unten giessen (Topf in Wasser stellen
      fuer 15-20 Minuten). So bleiben die Blaetter trocken — nasse Blaetter
      foerdern Pilzkrankheiten.

      Wasserqualitaet ist wichtig: Weiches, kalkfreies Wasser verwenden.
      Regenwasser oder destilliertes Wasser ist ideal. Fluorid im
      Leitungswasser schadet der Pflanze und verursacht braune Blattspitzen.
      Mindestens Leitungswasser einen Tag stehen lassen.

      Substrat: Lockere, feuchtigkeitshaltende aber gut durchlaessige Erde.
      Normale Blumenerde mit 20% Perlite und 10% Kokoserde mischen.
      pH-Wert 5.5-6.5 — kein kalkhaltiges Substrat verwenden.

      Typische Fehler: Zu kalkhaltiges Wasser, zu trockene Luft im Winter
      und direkte Sonne (Blaetter verbleichen und verbrennen).
    metadata:
      topic: maranta_leuconeura_care
      species: "Maranta leuconeura"
      difficulty: beginner

  - id: maranta-leuconeura-duengung
    title: "Gebetspflanze — Duengung und Umtopfen"
    content: |
      Die Gebetspflanze ist ein Schwachzehrer. Von Maerz bis September
      alle 4 Wochen mit einem Zimmerpflanzenduenger in halber Dosierung
      duengen (z.B. Compo Orchideenduenger 7-5-6, 3 ml/L auf halbe
      Dosis reduziert). Oktober bis Februar nicht duengen.

      Wichtig: Fluoridhaltige Duenger vermeiden — Fluorid schadet der
      Pflanze und verursacht Blattspitzenverbrennung.

      Umtopfen: Alle 12-18 Monate im Fruehling. Die Pflanze waechst
      relativ zuegig und bildet ein flaches Rhizom-System. Beim Umtopfen
      kann die Pflanze gleichzeitig geteilt werden — das ist auch die
      einfachste Vermehrungsmethode.

      Schaedlinge: Bei trockener Luft anfaellig fuer Spinnmilben
      (feine Gespinste, Blaetter vergilben). Vorbeugung: Luftfeuchtigkeit
      hoch halten. Bei Befall Neemoel 0.5% spruehen. Thripse (silbrige
      Streifen auf Blaettern) mit Insektizidseife behandeln.

      Die verwandten Calatheen (Goeppertia) haben aehnliche Ansprueche,
      sind aber empfindlicher. Die Gebetspflanze ist toleranter und
      daher besser fuer Einsteiger geeignet.
    metadata:
