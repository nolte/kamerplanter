  - id: maranta-leuconeura-standort
    title: "Gebetspflanze — Standort und Licht"
    content: |
      Die Gebetspflanze (Maranta leuconeura) kommt aus dem Unterwuchs
      tropischer Regenwaelder in Brasilien. Sie braucht indirektes Licht
      und vertraegt keine direkte Sonne — ein Nordfenster oder ein
      zurueckgesetzter Platz am Ost-/Westfenster ist perfekt.

      Temperatur: 18-27 Grad Celsius das ganze Jahr ueber. Unter 15 Grad
      wird es kritisch. Die Pflanze reagiert empfindlich auf Zugluft und
      Temperaturschwankungen — nicht neben offene Fenster oder Heizungen
      stellen.

      Luftfeuchtigkeit: Mindestens 55-70% sind ideal. Trockene Heizungsluft
      im Winter ist das groesste Problem. Abhilfe: Luftbefeuchter aufstellen,
      Kieselstein-Schale mit Wasser unter den Topf oder mehrere Pflanzen
      gruppieren. Regelmaessig besprühen kann helfen, aber nicht uebertreiben
      (Blattflecken-Gefahr).

      Besonderheit: Die Blaetter falten sich abends senkrecht zusammen wie
      Gebeths-Haende (Nyktinastie) und oeffnen sich morgens wieder. Wenn
      die Blaetter das nicht mehr tun, stimmt etwas nicht.

      Die Gebetspflanze ist nicht giftig — ideal fuer Haushalte mit
      Katzen, Hunden und Kindern.
    metadata:
      topic: maranta_leuconeura_care
      species: "Maranta leuconeura"
