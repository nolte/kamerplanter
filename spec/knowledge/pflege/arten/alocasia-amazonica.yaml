  - id: alocasia-standort
    title: "Elefantenohr — Standort und Licht"
    content: |
      Das Elefantenohr (Alocasia x amazonica, oft als 'Polly' verkauft)
      ist eine tropische Pflanze mit dramatischen, pfeilfoermigen Blaettern
      und auffaelliger weisser Blattaderung. Trotz des Namens kommt sie
      nicht aus dem Amazonas — sie ist eine Hybridzuechtung aus Florida.

      Licht: Helles, indirektes Licht. Kein direktes Sonnenlicht, da die
      Blaetter schnell verbrennen. Ein Platz am Ost- oder Westfenster
      mit leichtem Abstand ist ideal. Bei zu wenig Licht werden die
      Blaetter kleiner und die Pflanze waechst kaum.

      Temperatur: 18 bis 27 Grad Celsius am Tag, nachts nicht unter
      16 Grad. Unter 15 Grad stellt die Pflanze das Wachstum ein und
      kann in eine Dormanz (Ruhephase) gehen — alle Blaetter sterben ab
      und nur die Knolle ueberwintert im Topf. Das ist normal und kein
      Zeichen des Absterbens. Im Fruehling treibt sie wieder aus.

      Luftfeuchtigkeit: 60 bis 80 Prozent — das ist der entscheidende
      Faktor. Bei trockener Raumluft bekommen die Blaetter braune Raender
      und Spitzen. Ein Luftbefeuchter, regelmaessiges Besprühen oder ein
      Platz im Badezimmer hilft.

      Achtung: Alocasia ist stark giftig fuer Katzen, Hunde und
      Kleinkinder. Die Calciumoxalat-Kristalle koennen schwere
      Schwellungen im Mund- und Rachenraum verursachen. In Haushalten
      mit Kleinkindern oder Tieren besser auf andere Pflanzen ausweichen.
    metadata:
      topic: alocasia_care
      species: "Alocasia x amazonica"
