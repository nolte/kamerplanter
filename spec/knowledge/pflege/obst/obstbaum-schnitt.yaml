chunks:
  - id: obstbaum-pflanzschnitt
    title: "Pflanzschnitt — Der erste Schnitt nach der Pflanzung"
    content: |
      Der Pflanzschnitt erfolgt direkt nach dem Pflanzen (Herbst oder
      Fruehling) und legt den Grundstein fuer die gesamte Kronenform.
      Ohne Pflanzschnitt entwickelt der Baum keine stabile Krone.

      Stammverlaengerung bestimmen: Den kraeftigsten, moeglichst
      senkrecht wachsenden Trieb als Mitteltrieb (Stammverlaengerung)
      auswaehlen. Er bleibt der hoechste Punkt.

      Leitaeste waehlen: 3 bis 4 kraeftige Seitentriebe auswaehlen,
      die gleichmaessig um den Stamm verteilt sind und in einem
      Winkel von 45 bis 60 Grad abgehen. Ideal ist eine spiralfoermige
      Anordnung mit 10 bis 15 cm Hoehen-Abstand zueinander.

      Leitaeste einkuerzen: Alle Leitaeste auf etwa die gleiche Hoehe
      schneiden — auf ein nach aussen zeigendes Auge. Die Leitaeste
      sollen 20 bis 30 cm kuerzer sein als die Stammverlaengerung
      (Saftwaage).

      Konkurrenztriebe entfernen: Triebe, die steil nach oben wachsen
      und dem Mitteltrieb Konkurrenz machen, komplett entfernen (auf
      Astring schneiden). Ebenso nach innen wachsende und sich
      kreuzende Triebe.

      Schnittfuehrung: Immer knapp oberhalb eines nach aussen zeigenden
      Auges schneiden, leicht schraeg (Wasser läuft ab). Nicht zu
      dicht am Auge (trocknet aus), nicht zu weit entfernt (Stummel
      fault). 3 bis 5 mm ueber dem Auge ist ideal.

      Wichtig: Den Pflanzschnitt nicht weglassen aus Mitleid — der
      Baum braucht diesen Impuls, um eine stabile Struktur zu entwickeln.
      Ein ungeschnittener Jungbaum wird kopflastig und bricht spaeter
      unter Fruchtlast.
    metadata:
      topic: fruit_tree_pruning
      subtopic: planting_cut
      difficulty: beginner

  - id: obstbaum-erziehungsschnitt
    title: "Erziehungsschnitt — Kronenaufbau in Jahr 2 bis 5"
    content: |
      Der Erziehungsschnitt formt die Krone in den ersten 3 bis 5 Jahren
      nach der Pflanzung. Ziel ist eine stabile, lichtdurchfluetete
      Kronenform — entweder Pyramidenkrone (Hochstamm, Halbstamm) oder
      Spindel (Niederstamm, Spalier).

      Pyramidenkrone (klassisch): Die 3 bis 4 Leitaeste wachsen weiter
      nach aussen-oben. Jedes Jahr die Leitaeste um ein Drittel einkuerzen,
      auf ein nach aussen zeigendes Auge. Stammverlaengerung ebenfalls
      einkuerzen, aber immer 20 cm hoeher als die Leitaeste (Saftwaage
      beibehalten). Konkurrenztriebe weiterhin konsequent entfernen.

      Spindelform (modern, ertragreich): Ein durchgehender Mitteltrieb
      mit kurzen, waagerechten Seitenaesten (Fruchtaeste). Seitentriebe
      werden nicht eingekuerzt, sondern waagerecht gebunden (mit
      Schnur und Heringe oder Gewichten). Waagerechte Triebe bilden
      mehr Blütenknospen und weniger Holz.

      Astwinkel korrigieren: Zu steil stehende Aeste (unter 45 Grad)
      mit Spreizhölzern oder Abspannung auf 45 bis 60 Grad bringen.
      Das verlangsamt das Wachstum und foerdert die Fruchtbildung.

      Fruchtholz erkennen: Kurze, gedrungene Triebe mit dicken,
      runden Knospen (Blütenknospen) sind Fruchtholz — nicht
      wegschneiden. Lange, duenne Triebe mit spitzen Knospen
      (Holzknospen) sind Wachstumstriebe.

      Schnittzeit: Winterschnitt (Dezember bis Februar) fuer den
      Aufbau. Starker Schnitt regt starkes Wachstum an — das ist
      in der Erziehungsphase erwünscht. Bei Steinobst (Kirsche,
      Pflaume) besser nach der Ernte schneiden (geringere
      Infektionsgefahr).
    metadata:
      topic: fruit_tree_pruning
      subtopic: training_cut
      difficulty: intermediate

  - id: obstbaum-erhaltungsschnitt
    title: "Erhaltungsschnitt — Ab Jahr 5, Fruchtholz-Erneuerung"
    content: |
      Ab dem 5. Standjahr ist die Kronenform etabliert. Jetzt geht
      es um Erhaltung: Fruchtholz erneuern, Krone licht halten und
      Ertrag stabilisieren. Der Erhaltungsschnitt findet jaehrlich
      im Winter statt (Dezember bis Februar, nicht bei Frost unter
      minus 5 Grad).

      Grundregeln: Die Krone soll so licht sein, dass ein Hut
      durchfaellt (Hutprobe). Licht muss bis ins Kroneninnere
      dringen — schattige Bereiche produzieren kein Fruchtholz
      und sind anfaellig fuer Pilze.

      Was wird entfernt: Totes und krankes Holz (immer zuerst).
      Sich kreuzende und reibende Aeste (den schwächeren entfernen).
      Steil nach oben wachsende Wasserschosse (Triebe aus altem
      Holz). Nach innen wachsende Triebe. Aeste, die zu dicht
      beieinander stehen (Abstand zwischen Fruchtaesten: 20 bis
      30 cm).

      Fruchtholz-Erneuerung: Obstbaeume tragen am besten an
      2- bis 4-jaehrigem Holz. Aelteres Fruchtholz bringt kleinere,
      minderwertige Fruechte. Prinzip: Altes Fruchtholz auf eine
      juengere Verzweigung ableiten (auf Zugast schneiden). So wird
      kontinuierlich junges Fruchtholz nachgezogen.

      Verjuengungsschnitt: Bei vernachlaessigten, alten Baeumen
      nicht alles auf einmal schneiden — maximal ein Drittel der
      Krone pro Jahr entfernen. Radikaler Rueckschnitt provoziert
      explosive Wasserschoss-Bildung. Lieber ueber 3 Jahre
      schrittweise verjuengen.

      Schnittstellen: Aeste auf Astring schneiden (direkt am
      Astring, nicht hineinsaegen, nicht Stummel stehen lassen).
      Bei Aesten ueber 5 cm Durchmesser in 3 Schritten saegen
      (Unterschnitt, Oberschnitt, Feinschnitt), um Einreissen zu
      verhindern.
    metadata:
      topic: fruit_tree_pruning
      subtopic: maintenance_cut
      difficulty: intermediate

  - id: obstbaum-sommerschnitt
    title: "Sommerschnitt — Juni bis August"
    content: |
      Der Sommerschnitt ergaenzt den Winterschnitt und hat andere
      Wirkungen: Waehrend Winterschnitt das Wachstum anregt, bremst
      Sommerschnitt das Wachstum. Das macht ihn ideal fuer die
      Kontrolle von zu starkem Triebwachstum.

      Wasserschosse entfernen: Die wichtigste Sommer-Massnahme.
      Wasserschosse (auch Wasserreiser) sind steil nach oben schiessende,
      unverzweigte Triebe aus altem Holz oder Schnittstellen. Sie
      entstehen als Reaktion auf starken Winterschnitt oder Stress.
      Im Juni/Juli ausreissen (nicht schneiden) — das zerstoert die
      schlafenden Augen an der Basis und verhindert Neuaustrieb.
      Ausgerissene Wasserschosse kommen seltener wieder.

      Formierung: Junge Seitentriebe, die zu steil stehen, im Sommer
      in die Waagerechte binden. Das Holz ist noch biegsam und
      verholzt in der neuen Position. Im Winter ist das nicht mehr
      moeglich (Bruchgefahr).

      Steinobst schneiden: Kirschen, Pflaumen und Mirabellen
      bevorzugt nach der Ernte im Sommer schneiden (Juli/August).
      Das Pilzinfektions-Risiko ist im Sommer geringer als im Winter.
      Besonders Suesskirschen reagieren empfindlich auf Winterschnitt
      (Gummifluss, Infektionen).

      Fruchtausdunnung: Streng genommen kein Schnitt, aber im Juni
      unerlässlich. Bei Apfel und Birne den sogenannten Junifall
      abwarten (der Baum wirft von selbst Fruechte ab), dann
      verbleibende Fruchtbueschel auf 1 bis 2 Fruechte ausdünnen.

      Achtung: Nicht zu spaet schneiden (nach August). Junges Holz,
      das nach einem Spaetschnitt austreibt, reift nicht mehr aus
      und erfriert im Winter.
    metadata:
      topic: fruit_tree_pruning
      subtopic: summer_cut
      difficulty: intermediate

  - id: obstbaum-werkzeug
    title: "Schnittwerkzeug — Schere, Saege und Desinfektion"
    content: |
      Gutes Werkzeug macht saubere Schnitte. Saubere Schnitte heilen
      schneller und sind weniger anfaellig fuer Infektionen.

      Bypass-Schere (Rosenschere): Fuer Triebe bis 2 cm Durchmesser.
      Bypass-Typ (zwei aneinander vorbeigleitende Klingen) ist besser
      als Amboss-Typ, da er nicht quetscht. Gute Marken: Felco,
      ARS, Gardena Premium. Die Schere muss scharf sein — stumpfe
      Klingen quetschen das Gewebe und verursachen Rindenschaeden.

      Astschere (Zweihandschere): Fuer Aeste von 2 bis 4 cm. Lange
      Griffe bieten Hebelwirkung. Bypass-Modell bevorzugen. Teleskop-
      Astscheren erreichen Aeste bis 4 bis 5 Meter Hoehe.

      Baumsaege: Fuer Aeste ueber 4 cm. Klappsaegen (Silky, Felco)
      sind praktisch und schneiden auf Zug (japanisches Prinzip).
      Feinere Zahnung fuer saubere Schnitte, grobe Zahnung fuer
      schnelles Arbeiten. Kettensaege nur fuer sehr dicke Aeste und
      mit Erfahrung.

      Desinfektion: Zwischen jedem Baum und bei krankem Holz zwischen
      jedem Schnitt die Klinge desinfizieren. Mittel: 70-prozentiger
      Isopropanol (Spray oder Tuch) oder Einwirkzeit 30 Sekunden.
      Chlorbleiche (1:10) funktioniert auch, greift aber Metall an.
      Feuer (Klinge abflammen) ist eine schnelle Alternative im Feld.

      Wundverschluss: Umstritten. Aktuelle Forschung zeigt, dass
      Baeume Wunden am besten selbst verschliessen (Kompartimentierung).
      Wundverschlussmittel koennen Feuchtigkeit einschliessen und
      Faeulnis foerdern. Empfehlung: Bei Schnittstellen unter 5 cm
      keinen Verschluss. Bei groesseren Wunden und anfaelligen Sorten
      (Kirsche) kann ein Wundverschluss sinnvoll sein. Nie Teer oder
      Farbe verwenden.

      Pflege: Klingen nach jedem Einsatz reinigen (Harz entfernen
      mit WD-40 oder Balistol), oelen und trocken lagern. Jaehrlich
      schaerfen (Schleifstein oder Profi-Service).
    metadata:
      topic: fruit_tree_pruning
      subtopic: tools
      difficulty: beginner
