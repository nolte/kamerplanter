apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: kamerplanter

build:
  local:
    push: false
  artifacts:
    - image: kamerplanter-backend
      context: src/backend
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: "app/**/*.py"
            dest: /app
    - image: kamerplanter-frontend
      context: src/frontend
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: "src/**/*.ts"
            dest: /app
          - src: "src/**/*.tsx"
            dest: /app
          - src: "src/**/*.css"
            dest: /app
    - image: kamerplanter-ha-integration
      context: src/ha-integration
      docker:
        dockerfile: Dockerfile.dev

manifests:
  kustomize:
    paths:
      - deploy/ha

deploy:
  kubectl: {}
  helm:
    releases:
      - name: kamerplanter-arangodb
        chartPath: helm/kamerplanter-arangodb
        valuesFiles:
          - helm/kamerplanter-arangodb/values-dev.yaml
        namespace: default

      - name: redis
        remoteChart: bitnami/redis
        version: 24.1.0
        namespace: default
        setValues:
          architecture: standalone
          auth.enabled: false
          master.persistence.size: 1Gi

      - name: kamerplanter
        chartPath: helm/kamerplanter
        valuesFiles:
          - helm/kamerplanter/values-dev.yaml
        namespace: default
        setValueTemplates:
          backend.image.repository: "{{.IMAGE_REPO_kamerplanter_backend}}"
          backend.image.tag: "{{.IMAGE_TAG_kamerplanter_backend}}"
          frontend.image.repository: "{{.IMAGE_REPO_kamerplanter_frontend}}"
          frontend.image.tag: "{{.IMAGE_TAG_kamerplanter_frontend}}"

portForward:
  - resourceType: service
    resourceName: homeassistant
    namespace: default
    port: 8123
    localPort: 8123
  - resourceType: service
    resourceName: kamerplanter-backend
    namespace: default
    port: 8000
    localPort: 8000
  - resourceType: service
    resourceName: kamerplanter-frontend
    namespace: default
    port: 5173
    localPort: 3000
  - resourceType: service
    resourceName: kamerplanter-arangodb
    namespace: default
    port: 8529
    localPort: 8529

profiles:
  - name: backend-only
    patches:
      # Remove frontend build artifact
      - op: remove
        path: /build/artifacts/1
      # Remove frontend port forward (index 2: homeassistant=0, backend=1, frontend=2, arangodb=3)
      - op: remove
        path: /portForward/2

  - name: frontend-only
    patches:
      # Remove backend build artifact
      - op: remove
        path: /build/artifacts/0
      # Remove backend port forward (index 1: homeassistant=0, backend=1, frontend=2, arangodb=3)
      - op: remove
        path: /portForward/1

  - name: debug
    patches:
      - op: add
        path: /build/artifacts/0/docker/buildArgs
        value:
          DEBUGPY_ENABLED: "true"
    activation:
      - command: debug
