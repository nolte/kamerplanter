name: HA Integration Release

on:
  release:
    types: [published]

jobs:
  ha-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch manifest.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' \
            src/ha-integration/custom_components/kamerplanter/manifest.json \
            > manifest.tmp && mv manifest.tmp \
            src/ha-integration/custom_components/kamerplanter/manifest.json

      - name: Package integration ZIP
        run: |
          mkdir -p staging/custom_components
          cp -r src/ha-integration/custom_components/kamerplanter \
            staging/custom_components/kamerplanter
          cd staging
          zip -r ../kamerplanter-ha.zip custom_components/

      - name: Upload ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" kamerplanter-ha.zip --clobber
