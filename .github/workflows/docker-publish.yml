name: Build & Publish Container Images

on:
  push:
    branches: [develop]
    tags: ['v*']
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'docker/**'
      - 'spec/knowledge/rag/**'
      - 'helm/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    # On tags and workflow_dispatch, skip path filtering — build everything
    if: github.ref_type == 'branch'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      vectordb: ${{ steps.filter.outputs.vectordb }}
      knowledge: ${{ steps.filter.outputs.knowledge }}
      embedding-service: ${{ steps.filter.outputs.embedding-service }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            frontend:
              - 'src/frontend/**'
            vectordb:
              - 'docker/vectordb/**'
            knowledge:
              - 'docker/knowledge/**'
              - 'spec/knowledge/rag/**'
            embedding-service:
              - 'docker/embedding-service/**'
            helm:
              - 'helm/**'

  build-backend:
    needs: changes
    if: |
      always() &&
      (needs.changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/kamerplanter-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: changes
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/kamerplanter-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-vectordb:
    needs: changes
    if: |
      always() &&
      (needs.changes.outputs.vectordb == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/kamerplanter-vectordb
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/vectordb
          file: docker/vectordb/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-knowledge:
    needs: changes
    if: |
      always() &&
      (needs.changes.outputs.knowledge == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/kamerplanter-knowledge
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/knowledge/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-embedding-service:
    needs: changes
    if: |
      always() &&
      (needs.changes.outputs.embedding-service == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/kamerplanter-embedding-service
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/embedding-service
          file: docker/embedding-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm-charts:
    needs: changes
    if: |
      always() &&
      (needs.changes.outputs.helm == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - kamerplanter
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Determine chart version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Update chart version for release
        if: steps.version.outputs.version != ''
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" helm/${{ matrix.chart }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" helm/${{ matrix.chart }}/Chart.yaml

      - name: Set image tags in chart values for release
        if: steps.version.outputs.version != '' && matrix.chart == 'kamerplanter'
        run: |
          sed -i "s/tag: latest/tag: ${{ steps.version.outputs.version }}/" helm/${{ matrix.chart }}/values.yaml

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build chart dependencies
        run: |
          helm repo add bjw-s https://bjw-s-labs.github.io/helm-charts/
          helm repo add ollama https://otwld.github.io/ollama-helm/
          helm dependency build helm/${{ matrix.chart }}

      - name: Package chart
        run: helm package helm/${{ matrix.chart }}

      - name: Push chart to GHCR
        run: helm push ${{ matrix.chart }}-*.tgz oci://${{ env.IMAGE_PREFIX }}/charts

      - name: Upload chart as release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" ${{ matrix.chart }}-*.tgz --clobber

  update-release-assets:
    needs: [build-backend, build-frontend, build-vectordb, build-knowledge, build-embedding-service, publish-helm-charts]
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and upload docker-compose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NUM="${VERSION#v}"
          sed "s/__VERSION__/${VERSION_NUM}/g" docker-compose.release.yml > docker-compose-${VERSION_NUM}.yml
          cp .env.example .env.example-${VERSION_NUM}
          gh release upload "$VERSION" "docker-compose-${VERSION_NUM}.yml" ".env.example-${VERSION_NUM}" --clobber

      - name: Update release body with package links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NUM="${VERSION#v}"
          BODY=$(gh release view "$VERSION" --json body -q .body)
          PACKAGES=$(cat <<EOF

          ## Packages

          ### Container Images
          - \`ghcr.io/${{ github.repository_owner }}/kamerplanter-backend:${VERSION_NUM}\`
          - \`ghcr.io/${{ github.repository_owner }}/kamerplanter-frontend:${VERSION_NUM}\`
          - \`ghcr.io/${{ github.repository_owner }}/kamerplanter-vectordb:${VERSION_NUM}\`
          - \`ghcr.io/${{ github.repository_owner }}/kamerplanter-knowledge:${VERSION_NUM}\`
          - \`ghcr.io/${{ github.repository_owner }}/kamerplanter-embedding-service:${VERSION_NUM}\`

          ### Helm Chart
          - \`oci://ghcr.io/${{ github.repository_owner }}/charts/kamerplanter:${VERSION_NUM}\`

          \`\`\`bash
          helm pull oci://ghcr.io/${{ github.repository_owner }}/charts/kamerplanter --version ${VERSION_NUM}
          \`\`\`

          ### Docker Compose
          \`\`\`bash
          curl -LO https://github.com/${{ github.repository }}/releases/download/${VERSION}/docker-compose-${VERSION_NUM}.yml
          curl -LO https://github.com/${{ github.repository }}/releases/download/${VERSION}/.env.example-${VERSION_NUM}
          cp .env.example-${VERSION_NUM} .env   # edit passwords!
          docker compose -f docker-compose-${VERSION_NUM}.yml up -d
          \`\`\`
          EOF
          )
          gh release edit "$VERSION" --notes "${BODY}${PACKAGES}"
